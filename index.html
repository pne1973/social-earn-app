<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.53 - Full Tabs Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #F0F2F5; --g-green: #34A853; }
        body { font-family: 'Segoe UI', Tahoma, Helvetica, Arial, sans-serif; background: var(--fb-bg); color: #1c1e21; margin: 0; }
        
        #login-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .app-header { position: fixed; top: 0; width: 100%; z-index: 1000; height: 60px; background: white; border-bottom: 1px solid #dadce0; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { position: fixed; top: 60px; width: 100%; z-index: 950; height: 32px; background: white; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--g-green); text-transform: uppercase; }
        .ad-provider { position: fixed; top: 92px; width: 100%; z-index: 900; height: 28px; background: #f8f9fa; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #bdc1c6; text-transform: uppercase; }
        
        .main-content { padding-top: 130px; padding-bottom: 90px; min-height: 100vh; }
        .feed-container { max-width: 580px; margin: 0 auto; padding: 10px; }
        .post-card { background: white; border-radius: 12px; border: 1px solid #dadce0; margin-bottom: 16px; overflow: hidden; }
        
        /* COMENTÁRIOS ESTILO FB */
        .comment-bubble { background: #f0f2f5; border-radius: 18px; padding: 8px 12px; margin-bottom: 6px; display: inline-block; max-width: 90%; }
        
        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #dadce0; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #65676b; cursor: pointer; }
        .nav-active { color: var(--fb-blue); border-top: 3px solid var(--fb-blue); }

        .page-content { display: none; }
        .active-page { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="w-20 h-20 bg-[#1877F2] rounded-2xl flex items-center justify-center text-white text-5xl font-black italic mb-8 shadow-xl">f</div>
        <input id="login-id" type="text" placeholder="Introduza o seu ID" class="w-full max-w-xs p-4 bg-gray-100 rounded-2xl mb-4 text-center font-black outline-none border-2 border-transparent focus:border-blue-500">
        <button onclick="doLogin()" class="w-full max-w-xs bg-[#1877F2] text-white p-4 rounded-2xl font-black shadow-lg">ENTRAR</button>
    </div>

    <div id="app-ui" class="hidden">
        <header class="app-header">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">S</div>
                <span class="font-bold text-blue-600">Apex Social</span>
            </div>
            <div id="bal-top" class="text-xl font-black text-green-600">0.0000€</div>
        </header>

        <div class="status-bar">v33.53 • SISTEMA DE ABAS REATIVADO</div>
        <div class="ad-provider">GOOGLE ADSENSE CERTIFIED</div>

        <div class="main-content">
            <div id="p-feed" class="page-content active-page">
                <div class="feed-container">
                    <div onclick="openModal('modal-editor')" class="bg-white p-4 rounded-xl mb-4 border flex items-center gap-3 cursor-pointer">
                        <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
                        <span class="text-gray-400">No que está a pensar?</span>
                    </div>
                    <div id="feed-list"></div>
                </div>
            </div>

            <div id="p-ranking" class="page-content">
                <div class="feed-container">
                    <h2 class="font-black text-center mb-4 uppercase">Ranking Global</h2>
                    <div id="ranking-list" class="bg-white rounded-xl border"></div>
                </div>
            </div>

            <div id="p-wallet" class="page-content">
                <div class="feed-container">
                    <div class="bg-white p-8 rounded-2xl border text-center">
                        <p class="text-gray-400 text-[10px] font-black uppercase mb-2">O seu Saldo</p>
                        <h1 id="wallet-val" class="text-4xl font-black text-blue-600 mb-6">0.0000€</h1>
                        <button class="bg-green-600 text-white w-full p-4 rounded-xl font-bold uppercase text-xs">Levantar XP</button>
                    </div>
                </div>
            </div>

            <div id="p-admin" class="page-content">
                <div class="feed-container">
                    <div class="bg-white p-6 rounded-xl border border-red-200">
                        <h2 class="font-black text-red-600 uppercase mb-4">Painel Admin</h2>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-gray-50 p-4 rounded text-center"><p class="text-[10px] text-gray-400 font-bold">USERS</p><span id="adm-u" class="font-black">0</span></div>
                            <div class="bg-gray-50 p-4 rounded text-center"><p class="text-[10px] text-gray-400 font-bold">POSTS</p><span id="adm-p" class="font-black">0</span></div>
                        </div>
                        <button onclick="location.reload()" class="w-full bg-black text-white p-3 rounded font-bold uppercase text-xs">Reset Total</button>
                    </div>
                </div>
            </div>
        </div>

        <nav id="main-nav">
            <div class="nav-item nav-active" onclick="changeTab('feed', this)">FEED</div>
            <div class="nav-item" onclick="changeTab('ranking', this)">RANKING</div>
            <div class="nav-item" onclick="changeTab('wallet', this)">CARTEIRA</div>
            <div id="nav-adm-btn" class="nav-item hidden" onclick="changeTab('admin', this)">ADMIN</div>
        </nav>
    </div>

    <div id="modal-editor" class="modal-fullscreen">
        <div class="flex justify-between p-4 border-b">
            <button onclick="closeModal('modal-editor')">Cancelar</button>
            <span class="font-bold">Novo Post</span>
            <button onclick="publish()" class="text-blue-600 font-bold">Publicar</button>
        </div>
        <textarea id="post-txt" placeholder="No que está a pensar?" class="flex-1 p-5 outline-none text-lg resize-none"></textarea>
    </div>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let uID = null;
        let bal = 0;
        const ADMIN_ID = "5401881400";

        async function doLogin() {
            const val = document.getElementById('login-id').value.trim();
            if(!val) return;
            uID = val;

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');

            if(uID === ADMIN_ID) {
                document.getElementById('nav-adm-btn').classList.remove('hidden');
            }

            // Inicializar Dados
            await syncUser();
            await loadFeed();
            await loadRanking();
            if(uID === ADMIN_ID) loadAdmin();
        }

        async function syncUser() {
            let { data } = await sb.from('perfis').select('saldo').eq('id', uID).single();
            if(!data) {
                await sb.from('perfis').insert([{ id: uID, saldo: 0 }]);
                bal = 0;
            } else {
                bal = Number(data.saldo);
            }
            updateUI();
        }

        async function loadFeed() {
            const container = document.getElementById('feed-list');
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const { data: comms } = await sb.from('comentarios').select('*').order('created_at', {ascending: true});
            
            container.innerHTML = "";
            posts?.forEach((p, i) => {
                const pComms = comms?.filter(c => c.post_id == p.id) || [];
                let cHTML = pComms.length > 0 ? `<div class="p-4 bg-white border-t">` : "";
                pComms.forEach(c => {
                    cHTML += `<div class="block mb-2"><div class="comment-bubble"><span class="block text-[10px] font-bold">ID ${c.user_id}</span><span class="text-sm">${c.content}</span></div></div>`;
                });
                if(pComms.length > 0) cHTML += `</div>`;

                container.innerHTML += `
                <div class="post-card border">
                    <div class="p-4">
                        <span class="font-bold text-sm block">Utilizador ${p.user_id}</span>
                        <p class="mt-2 text-md">${p.content}</p>
                    </div>
                    <div class="flex border-t text-xs font-bold text-gray-500">
                        <div class="flex-1 p-3 text-center border-r" onclick="reward(0.0002)">LIKE</div>
                        <div class="flex-1 p-3 text-center">COMENTAR</div>
                    </div>
                    ${cHTML}
                </div>`;
            });
        }

        async function loadRanking() {
            const { data } = await sb.from('perfis').select('id, saldo').order('saldo', {ascending: false}).limit(10);
            const list = document.getElementById('ranking-list');
            list.innerHTML = "";
            data?.forEach((r, i) => {
                list.innerHTML += `<div class="flex justify-between p-4 border-b last:border-0"><span>#${i+1} ID ${r.id}</span><span class="font-bold text-green-600">${Number(r.saldo).toFixed(4)}€</span></div>`;
            });
        }

        async function loadAdmin() {
            const { count: uCount } = await sb.from('perfis').select('*', { count: 'exact', head: true });
            const { count: pCount } = await sb.from('posts').select('*', { count: 'exact', head: true });
            document.getElementById('adm-u').innerText = uCount || 0;
            document.getElementById('adm-p').innerText = pCount || 0;
        }

        function changeTab(t, el) {
            // Esconder todas as abas
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
            // Remover estado ativo da nav
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            
            // Mostrar a aba certa
            document.getElementById('p-' + t).classList.add('active-page');
            el.classList.add('nav-active');

            // Recarregar dados específicos ao mudar de aba
            if(t === 'feed') loadFeed();
            if(t === 'ranking') loadRanking();
            if(t === 'admin') loadAdmin();
        }

        async function publish() {
            const txt = document.getElementById('post-txt').value.trim();
            if(!txt) return;
            const { error } = await sb.from('posts').insert([{ user_id: uID, content: txt }]);
            if(!error) { reward(0.0150); closeModal('modal-editor'); document.getElementById('post-txt').value = ""; loadFeed(); }
        }

        function reward(v) { bal += v; updateUI(); sb.from('perfis').upsert({ id: uID, saldo: bal }); }
        function updateUI() { 
            const val = bal.toFixed(4) + "€";
            document.getElementById('bal-top').innerText = val;
            document.getElementById('wallet-val').innerText = val;
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
