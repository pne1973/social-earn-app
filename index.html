<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* DESIGN SYSTEM - GOOGLE CLEAN */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { background-color: #f8f9fa; }
        body { background-color: #f8f9fa; color: #202124; font-family: 'Roboto', Arial, sans-serif; padding-top: 170px; padding-bottom: 20px; }

        /* HEADER */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #dadce0; }
        .ad-banner-top { background: #1a73e8; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 500; text-transform: uppercase; }
        
        .user-stats-bar { display: flex; justify-content: space-around; background: #fff; padding: 15px 5px; border-bottom: 1px solid #f1f3f4; }
        .stat-pill { text-align: center; flex: 1; border-right: 1px solid #f1f3f4; }
        .stat-pill:last-child { border-right: none; }
        .stat-pill span { display: block; font-size: 9px; color: #70757a; text-transform: uppercase; margin-bottom: 3px; }
        .stat-pill b { font-size: 13px; color: #1a73e8; }
        
        .tabs { display: flex; background: #fff; }
        .tab-item { flex: 1; padding: 14px 5px; text-align: center; color: #5f6368; font-size: 11px; font-weight: 500; cursor: pointer; text-transform: uppercase; border-bottom: 3px solid transparent; }
        .tab-item.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; }

        /* CONTENT */
        .content { padding: 16px; max-width: 550px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block !important; }

        /* CARDS */
        .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; border: 1px solid #dadce0; }
        .post-id { font-size: 10px; color: #70757a; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .post-content { font-size: 15px; color: #3c4043; line-height: 1.5; }
        
        /* ADMIN ONLY ELEMENTS */
        .admin-only { display: none; } /* Escondido por padrão */
        .admin-card { background: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .stat-box { background: #f8f9fa; padding: 16px; border-radius: 8px; border: 1px solid #e8eaed; text-align: center; }
        .finance-val { font-size: 32px; color: #d93025; font-weight: bold; display: block; margin: 10px 0; }

        /* INPUTS & BUTTONS */
        .input-google { width: 100%; border: 1px solid #dadce0; padding: 12px; border-radius: 4px; font-size: 14px; margin-bottom: 12px; outline: none; }
        .btn-primary { background: #1a73e8; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; width: 100%; }
        .link-blue { color: #1a73e8; font-size: 13px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="ad-banner-top" id="headerTitle">Apex Social</div>
        
        <div class="user-stats-bar">
            <div class="stat-pill"><span>Meus XP</span><b id="topXP">0</b></div>
            <div class="stat-pill"><span>Saldo EUR</span><b id="topBalance">0.0000€</b></div>
            
            <div class="stat-pill admin-only"><span>Dívida Rede</span><b id="topBurn" style="color:#d93025;">0.00€</b></div>
            <div class="stat-pill admin-only"><span>Estado</span><b style="color:#1e8e3e;">ONLINE</b></div>
        </div>

        <div class="tabs">
            <div class="tab-item active" onclick="openTab('feed-page', this)">Explorar</div>
            <div class="tab-item" onclick="openTab('wallet-page', this)">Minha Rede</div>
            <div class="tab-item" onclick="openTab('info-page', this)">Informação</div>
            <div id="adm-tab" class="tab-item admin-only" style="color:#d93025;" onclick="openTab('admin-page', this)">Consola</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div class="card">
                <textarea id="postText" class="input-google" style="min-height: 60px; border:none; padding:0;" placeholder="O que deseja partilhar?"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label class="link-blue" for="fileInput"><i class="fas fa-camera"></i> Foto (+15 XP)</label>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImg(this)">
                    <button onclick="publish()" class="btn-primary" style="width:auto;">Publicar</button>
                </div>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="wallet-page" class="page">
            <div class="card" style="text-align:center;">
                <h3>Convidar Amigos</h3>
                <p id="refLink" style="margin:20px 0; font-family:monospace; font-size:11px; background:#f1f3f4; padding:10px;">...</p>
                <button class="btn-primary" onclick="copyRef()">Copiar Link</button>
            </div>
        </div>

        <div id="info-page" class="page">
            <div class="card">
                <h3>Tabela de Ganhos</h3>
                <div style="margin-top:15px; font-size:14px;">
                    <p>Post com Foto: <b class="link-blue">15 XP</b></p>
                    <p>Like Recebido: <b class="link-blue">2 XP</b></p>
                    <p>Novo Amigo: <b class="link-blue">100 XP</b></p>
                </div>
            </div>
        </div>

        <div id="admin-page" class="page admin-only">
            <div class="admin-card">
                <h3>Painel Master</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;">
                    <div class="stat-box"><small>Users</small><b id="admUsers">0</b></div>
                    <div class="stat-box"><small>Posts</small><b id="admPosts">0</b></div>
                </div>
                <div class="stat-box" style="background:#fdf7f7;">
                    <small style="color:#d93025;">Total Cash-out</small>
                    <b class="finance-val" id="admBurn">0.0000€</b>
                </div>
                <div id="admPayments" style="margin-top:20px;"></div>
                <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                <input type="number" id="delId" class="input-google" placeholder="ID Post">
                <button onclick="adminDelete()" class="btn-primary" style="background:#d93025;">Eliminar Post</button>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        // --- CONFIGURAÇÃO DE IDENTIDADE ---
        const myId = 5401881400; // O TEU ID
        const isAdmin = (myId === 5401881400);

        async function init() {
            if(isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('headerTitle').innerText = "Apex Business Control";
                loadAdminStats();
            }
            getProfile();
            loadFeed();
        }

        async function getProfile() {
            const { data: u } = await client.from('profiles').select('*').eq('id', myId).single();
            if(u) {
                document.getElementById('topXP').innerText = Math.floor(u.points).toLocaleString();
                document.getElementById('topBalance').innerText = (u.points * 0.0001).toFixed(4) + "€";
                document.getElementById('refLink').innerText = `https://apexsocial.app/?ref=${myId}`;
            }
        }

        async function loadFeed() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = posts.map(p => `
                <div class="card">
                    <div class="post-id">
                        <span>Publicação #${p.id}</span>
                        ${isAdmin ? `<span style="color:#d93025; font-weight:bold;">User: ${p.user_id}</span>` : ''}
                    </div>
                    <div class="post-content">${p.content || ''}</div>
                    <div style="margin-top:12px; border-top:1px solid #f1f3f4; padding-top:10px;">
                        <span onclick="handleLike(${p.id})" class="link-blue"><i class="fas fa-heart"></i> Gosto (${p.likes || 0})</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadAdminStats() {
            const { data: users } = await client.from('profiles').select('*');
            const { count: pCount } = await client.from('posts').select('*', { count: 'exact', head: true });
            const totalXP = users.reduce((acc, curr) => acc + (curr.points || 0), 0);
            const eur = (totalXP * 0.0001).toFixed(4);

            document.getElementById('admUsers').innerText = users.length;
            document.getElementById('admPosts').innerText = pCount;
            document.getElementById('admBurn').innerText = eur + "€";
            document.getElementById('topBurn').innerText = eur + "€";

            let payHtml = '';
            users.filter(u => u.points >= 5000).forEach(u => {
                payHtml += `<div style="padding:10px; background:#f8f9fa; margin-bottom:5px; font-size:12px; display:flex; justify-content:space-between;">
                    <span>User ${u.id}: ${(u.points * 0.0001).toFixed(2)}€</span>
                    <button onclick="alert('${u.paypal_email}')" class="link-blue" style="border:none; background:none;">PAYPAL</button>
                </div>`;
            });
            document.getElementById('admPayments').innerHTML = payHtml || '<p style="font-size:11px; color:#aaa;">Sem saques.</p>';
        }

        async function adminDelete() {
            const id = document.getElementById('delId').value;
            await client.from('posts').delete().eq('id', id);
            alert("Eliminado."); loadAdminStats(); loadFeed();
        }

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        init();
    </script>
</body>
</html>
