<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn v33.12 - FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--fb-bg); margin: 0; padding-top: 180px; padding-bottom: 80px; font-weight: 700; }
        
        /* CABEÇALHO FIXO */
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 1px solid #ddd; z-index: 2000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-bar { position: fixed; top: 72px; width: 100%; height: 40px; background: white; border-bottom: 1px solid #eee; z-index: 1999; display: flex; align-items: center; padding: 0 16px; font-size: 10px; color: #34A853; text-transform: uppercase; }
        .publisher { position: fixed; top: 112px; width: 100%; background: white; padding: 12px; z-index: 1998; border-bottom: 8px solid #ddd; }
        
        /* POSTS ESTILO FB LITE */
        .fb-post { background: white; margin-bottom: 8px; border-y: 1px solid #ddd; width: 100%; }
        .fb-h { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .fb-avatar { width: 36px; height: 36px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .fb-c { padding: 0 12px 12px; font-size: 15px; font-weight: 400; line-height: 1.4; }
        .fb-img { width: 100%; display: block; background: #f0f2f5; }
        .fb-a { display: flex; border-top: 1px solid #eee; margin: 0 12px; padding: 4px 0; }
        .fb-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px; color: #65676b; font-size: 12px; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #ddd; display: flex; z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #65676b; }
        .nav-item.active { color: var(--fb-blue); border-top: 3px solid var(--fb-blue); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white italic font-black text-2xl">S</div>
            <span class="text-blue-600 font-black text-xs">SOCIAL EARN</span>
        </div>
        <div class="text-right">
            <div id="display-saldo" class="text-green-600 text-xl font-black">0.0000</div>
            <div id="display-currency" class="text-gray-400 text-[8px] font-black uppercase">Carregando...</div>
        </div>
    </header>

    <div class="status-bar">
        <span>Ganhos Ativos: 100%</span>
        <button onclick="logout()" class="ml-auto text-gray-300">Sair</button>
    </div>

    <main id="tab-feed" class="tab-content active">
        <div class="publisher">
            <div onclick="openPost()" class="bg-gray-100 rounded-full px-4 py-2 text-gray-400 text-sm font-bold flex items-center gap-2">
                <div class="fb-avatar" style="width:20px; height:20px;">👤</div>
                O que estás a pensar?
            </div>
        </div>
        <div id="feed-items">
            <p class="p-10 text-center text-gray-400 text-xs">A ligar ao servidor...</p>
        </div>
    </main>

    <main id="tab-ganhos" class="tab-content pt-10 px-6">
        <div class="bg-white p-10 text-center rounded-3xl shadow-sm border border-gray-100">
            <p class="text-[10px] text-gray-300 uppercase mb-2">Saldo Total</p>
            <h1 id="wall-saldo" class="text-4xl font-black text-blue-600 mb-6">0.0000</h1>
            <div class="w-full bg-gray-100 h-2 rounded-full mb-4">
                <div id="withdraw-bar" class="bg-blue-600 h-full rounded-full w-0 transition-all"></div>
            </div>
            <p id="min-text" class="text-[9px] text-gray-400 uppercase">Mínimo para saque: ...</p>
        </div>
    </main>

    <nav>
        <button onclick="show('feed')" id="btn-feed" class="nav-item active">🏠<span>Feed</span></button>
        <button onclick="show('ganhos')" id="btn-ganhos" class="nav-item">💰<span>Ganhos</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let uid = localStorage.getItem('apex_uid');
        let saldo = 0;
        let config = { sym: '€', min: 5.0, code: 'EUR' };

        // 1. DETECTAR MOEDA DO PAÍS
        function setupLocale() {
            if (navigator.language === 'pt-BR') config = { sym: 'R$', min: 25.0, code: 'BRL' };
            document.getElementById('display-currency').innerText = config.code;
            document.getElementById('min-text').innerText = `Saque Mínimo: ${config.sym}${config.min.toFixed(2)}`;
        }

        // 2. CARREGAR FEED (FIXED)
        async function loadFeed() {
            const container = document.getElementById('feed-items');
            try {
                const { data: posts, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
                
                if (error) throw error;
                if (!posts || posts.length === 0) {
                    container.innerHTML = "<p class='p-20 text-center text-gray-400'>Nenhuma publicação encontrada.</p>";
                    return;
                }

                let html = "";
                posts.forEach((p, i) => {
                    html += `
                    <div class="fb-post">
                        <div class="fb-h">
                            <div class="fb-avatar">👤</div>
                            <div class="flex flex-col">
                                <span class="text-sm font-bold">User ${p.user_id.slice(0,5)}</span>
                                <span class="text-[10px] text-gray-400 font-normal">Agora mesmo</span>
                            </div>
                        </div>
                        <div class="fb-c">${p.content}</div>
                        ${p.image_url ? `<img src="${p.image_url}" class="fb-img">` : ''}
                        <div class="fb-a">
                            <button onclick="addEarn(0.0006)" class="fb-btn">👍 Gosto</button>
                            <button onclick="addEarn(0.0010)" class="fb-btn">💬 Comentar</button>
                            <button onclick="addEarn(0.0020)" class="fb-btn">🔗 Partilhar</button>
                        </div>
                    </div>`;
                    if((i+1)%3 === 0) html += `<div class="p-8 text-center text-[8px] text-gray-300 font-black uppercase tracking-widest border-b border-gray-100">Anúncio Google Ads</div>`;
                });
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<p class="p-10 text-center text-red-500 text-xs">Erro de ligação: ${e.message}</p>`;
            }
        }

        async function init() {
            if (!uid) {
                uid = prompt("ID:");
                if (uid) { localStorage.setItem('apex_uid', uid); location.reload(); }
                return;
            }
            setupLocale();
            const { data } = await sb.from('perfis').select('saldo').eq('id', uid).single();
            if (data) saldo = Number(data.saldo);
            updateUI();
            loadFeed();
        }

        function addEarn(val) {
            saldo += val;
            updateUI();
            sb.from('perfis').update({ saldo: saldo }).eq('id', uid).then();
        }

        function updateUI() {
            const val = `${config.sym}${saldo.toFixed(4)}`;
            document.getElementById('display-saldo').innerText = val;
            document.getElementById('wall-saldo').innerText = val;
            let p = (saldo / config.min) * 100;
            document.getElementById('withdraw-bar').style.width = Math.min(p, 100) + "%";
        }

        function show(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t === 'feed') loadFeed();
        }

        async function openPost() {
            const txt = prompt("O QUE ESTÁS A PENSAR?");
            if(txt) {
                const img = prompt("LINK DA IMAGEM (OPCIONAL):");
                await sb.from('posts').insert({ user_id: uid, content: txt, image_url: img });
                addEarn(0.0150);
                loadFeed();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
