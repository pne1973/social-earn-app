<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Social - Full Feed v7</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f2f5; color: #1c1e21; font-family: sans-serif; padding-top: 140px; }
        
        .header-fixed { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; border-bottom: 1px solid #ddd; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .stats { display: flex; justify-content: space-around; padding: 12px 0; border-bottom: 1px solid #eee; }
        .stats b { display: block; color: #1a73e8; font-size: 14px; }
        .stats label { font-size: 9px; color: #65676b; text-transform: uppercase; font-weight: bold; }

        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 10px; min-height: 50px; resize: none; font-size: 14px; outline: none; background: #f5f6f7; }
        .post-img-result { width: 100%; border-radius: 8px; margin: 10px 0; display: block; }
        
        .post-actions { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid #f1f3f4; margin-top: 10px; padding-top: 10px; }
        .btn-act { background: none; border: none; color: #65676b; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn-act i { font-size: 16px; color: #1a73e8; }
        
        .comm-box { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; border: 1px solid #eee; }
        .comm-input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; outline: none; margin-top: 8px; }
        .comm-text { font-size: 12px; padding: 6px; border-bottom: 1px solid #eee; color: #333; background: #fff; border-radius: 4px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="blue-bar">APEX SOCIAL NETWORK</div>
        <div class="stats">
            <div><label>SALDO</label><b id="stEUR">0.0000€</b></div>
            <div><label>DÍVIDA</label><b id="stDebt" style="color:#d93025;">0.0000€</b></div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <textarea id="postTxt" placeholder="No que estás a pensar?"></textarea>
            <div id="preDiv" style="display:none; margin-top:10px;"><img id="imgPre" style="width:100%; border-radius:8px;"></div>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
                <label style="cursor:pointer; color:#1a73e8; font-size:22px;"><i class="fas fa-camera"></i><input type="file" id="fileIn" accept="image/*" style="display:none;" onchange="handleFile(this)"></label>
                <button onclick="send()" id="btnSend" style="background:#1a73e8; color:#fff; border:none; padding:8px 20px; border-radius:6px; font-weight:bold;">Publicar</button>
            </div>
        </div>
        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);

        let saldo = 0.0080;
        let imgBase64 = null;

        function updateUI() {
            const v = saldo.toFixed(4) + "€";
            document.getElementById('stEUR').innerText = v;
            document.getElementById('stDebt').innerText = v;
        }

        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; canvas.height = (img.height/img.width)*600;
                    canvas.getContext('2d').drawImage(img,0,0,600,canvas.height);
                    imgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('imgPre').src = imgBase64;
                    document.getElementById('preDiv').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function send() {
            const txt = document.getElementById('postTxt').value;
            if(!txt && !imgBase64) return;
            document.getElementById('btnSend').innerText = "A enviar...";

            const { error } = await client.from('posts').insert([{ 
                content: txt, image_url: imgBase64, likes: 0, comments_data: [] 
            }]);

            if(!error) {
                saldo += 0.0015;
                location.reload();
            } else {
                alert("Erro: " + error.message);
                document.getElementById('btnSend').innerText = "Publicar";
            }
        }

        async function loadFeed() {
            const { data: posts, error } = await client.from('posts').select('*').order('created_at', { ascending: false });
            if(error) return;

            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            posts.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                const likes = p.likes || 0;
                const comms = p.comments_data || [];
                
                div.innerHTML = `
                    <div style="font-size:10px; color:#999; margin-bottom:5px;">Post #${p.id}</div>
                    <p style="font-size:14px; line-height:1.4;">${p.content || ''}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img-result">` : ''}
                    
                    <div class="post-actions">
                        <button class="btn-act" onclick="likePost(${p.id}, ${likes})"><i class="fas fa-heart" style="color:#e0245e"></i> ${likes}</button>
                        <button class="btn-act" onclick="toggleComm(${p.id})"><i class="fas fa-comment"></i> ${comms.length}</button>
                        <button class="btn-act" onclick="sharePost('${p.content}', ${p.id})"><i class="fas fa-share"></i> Partilhar</button>
                        <button class="btn-act" onclick="del(${p.id})" style="color:#ccc"><i class="fas fa-trash"></i></button>
                    </div>

                    <div id="cb-${p.id}" class="comm-box">
                        <div id="cl-${p.id}">${comms.map(c => `<div class="comm-text">${c}</div>`).join('')}</div>
                        <input type="text" class="comm-input" placeholder="Escreve e prime Enter..." onkeypress="if(event.key==='Enter') addC(this, ${p.id})">
                    </div>
                `;
                feed.appendChild(div);
            });
        }

        async function likePost(id, cur) {
            const { error } = await client.from('posts').update({ likes: cur + 1 }).eq('id', id);
            if(!error) {
                saldo += 0.0002;
                updateUI();
                loadFeed(); // Atualiza o balão no ecrã
            }
        }

        function toggleComm(id) {
            const el = document.getElementById('cb-'+id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        async function addC(input, id) {
            const val = input.value;
            if(!val) return;
            
            // Buscar lista atual primeiro
            const { data } = await client.from('posts').select('comments_data').eq('id', id).single();
            let list = Array.isArray(data.comments_data) ? data.comments_data : [];
            list.push(val);
            
            const { error } = await client.from('posts').update({ comments_data: list }).eq('id', id);
            if(!error) {
                input.value = "";
                loadFeed(); // Atualiza o feed para mostrar o comentário novo
            }
        }

        function sharePost(text, id) {
            if (navigator.share) {
                navigator.share({
                    title: 'Apex Social',
                    text: text || 'Vejam este post na Apex!',
                    url: window.location.href
                }).then(() => {
                    alert("Obrigado por partilhar!");
                }).catch(console.error);
            } else {
                alert("Partilha não suportada neste navegador. Copia o link!");
            }
        }

        async function del(id) {
            if(confirm("Apagar post?")) { await client.from('posts').delete().eq('id', id); loadFeed(); }
        }

        updateUI();
        loadFeed();
    </script>
</body>
</html>
