<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v73 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; -webkit-tap-highlight-color: transparent; }
        .google-blue { color: #4285F4; }
        .google-bg-blue { background-color: #4285F4; }
        .nav-active { color: #4285F4 !important; border-top: 3px solid #4285F4; font-weight: 900; }
        .card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        #loader { display: none; position: fixed; inset: 0; background: white; z-index: 10000; align-items: center; justify-content: center; }
        .btn-interact:active { scale: 0.95; opacity: 0.8; }
    </style>
</head>
<body class="pb-24">

    <div id="loader">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500"></div>
    </div>

    <header class="sticky top-0 bg-white border-b z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black google-blue tracking-tighter uppercase">Apex Social</h1>
            <p class="text-[9px] font-bold text-gray-400 uppercase">v73 • Ligado</p>
        </div>
        <div class="bg-green-50 px-4 py-1.5 rounded-full border border-green-200">
            <span id="main-balance" class="font-black text-green-700 text-lg">0,0000€</span>
        </div>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto min-h-screen"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-lg">
        <button onclick="switchTab('feed')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-feed"><span class="text-[10px] font-black uppercase">Feed</span></button>
        <button onclick="switchTab('wallet')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-wallet"><span class="text-[10px] font-black uppercase">Carteira</span></button>
        <button onclick="switchTab('friends')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-friends"><span class="text-[10px] font-black uppercase">Rede</span></button>
        <button onclick="switchTab('profile')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-profile"><span class="text-[10px] font-black uppercase">Perfil</span></button>
        <button onclick="switchTab('admin')" class="flex flex-col items-center p-2 text-red-300 nav-btn" id="btn-admin" style="display:none;"><span class="text-[10px] font-black uppercase">Admin</span></button>
    </nav>

    <script>
        // CONFIGURAÇÃO DIRETA (SUBSTITUI PELOS TEUS DADOS)
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY"; // Põe aqui a chave eyJ...

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const USER_ID = "5401881400";
        
        let state = { saldo_eur: 0, bonus_restante: 0, is_turbo: false };
        let currentTab = 'feed';

        async function init() {
            showLoader(true);
            try {
                let { data } = await supabaseClient.from('perfis').select('*').eq('id', USER_ID).single();
                if (data) state = data;
                else await supabaseClient.from('perfis').insert([{ id: USER_ID }]);
            } catch (e) { console.error("Erro Supabase"); }

            if (USER_ID === "5401881400") document.getElementById('btn-admin').style.display = 'flex';
            showLoader(false);
            switchTab('feed');
        }

        async function doAction() {
            let ganho = state.is_turbo ? 0.0015 : 0.0004;
            state.saldo_eur = parseFloat(state.saldo_eur) + ganho;
            if (state.is_turbo) {
                state.bonus_restante--;
                if (state.bonus_restante <= 0) state.is_turbo = false;
            }
            updateUI();
            await supabaseClient.from('perfis').update(state).eq('id', USER_ID);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(`btn-${tab}`).classList.add('nav-active');
            render();
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = parseFloat(state.saldo_eur).toFixed(4) + '€';
        }

        function render() {
            const container = document.getElementById('app-content');
            updateUI();
            if (currentTab === 'feed') {
                container.innerHTML = `
                    <div class="card p-4 mb-4 bg-blue-50 flex justify-between items-center">
                        <p class="text-[10px] font-black uppercase">${state.is_turbo ? '🔥 Turbo' : '❄️ Normal'}</p>
                        <button onclick="location.reload()" class="google-bg-blue text-white px-4 py-2 rounded text-[10px] font-black uppercase">Atualizar</button>
                    </div>
                    <div class="card p-4">
                        <p class="text-sm mb-4">Clique no botão abaixo para validar a sua atividade diária.</p>
                        <button onclick="doAction()" class="google-blue font-black text-[10px] uppercase tracking-widest btn-interact">Gostar (+${state.is_turbo ? '0,0015' : '0,0004'}€)</button>
                    </div>
                `;
            } else if (currentTab === 'wallet') {
                container.innerHTML = `<div class="card p-10 text-center"><h1 class="text-5xl font-black google-blue">${state.saldo_eur.toFixed(4)}€</h1><p class="mt-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Saldo Disponível</p></div>`;
            } else if (currentTab === 'friends') {
                container.innerHTML = `<div class="card p-6"><p class="text-[10px] font-mono text-blue-500">ref/${USER_ID}</p></div>`;
            } else if (currentTab === 'profile') {
                container.innerHTML = `<div class="card p-6 text-center"><p class="font-black text-xs text-gray-400 uppercase">Utilizador #${USER_ID}</p></div>`;
            } else if (currentTab === 'admin') {
                container.innerHTML = `<div class="card p-4 border-red-500 border-2 bg-red-50 text-center"><p class="text-red-600 font-black text-[10px] uppercase">Admin Ativo</p></div>`;
            }
        }

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        window.onload = init;
    </script>
</body>
</html>
