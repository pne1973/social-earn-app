<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Social - Core Feed v4</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f8f9fa; color: #202124; font-family: 'Roboto', sans-serif; padding-top: 170px; }

        /* HEADER */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #dadce0; }
        .blue-bar { background: #1a73e8; color: #fff; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; padding: 15px 0; text-align: center; border-bottom: 1px solid #f1f3f4; background: #fff; }
        .stats b { display: block; color: #1a73e8; font-size: 16px; font-weight: 900; }
        .stats label { font-size: 9px; color: #70757a; text-transform: uppercase; font-weight: bold; margin-bottom: 3px; display: block; }

        /* CONTAINER */
        .container { max-width: 500px; margin: 0 auto; padding: 12px; }
        .card { background: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        /* POST AREA */
        #postTxt { width: 100%; border: 1px solid #eee; outline: none; font-size: 15px; min-height: 60px; resize: none; padding: 10px; border-radius: 6px; background: #fcfcfc; }
        .post-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-img { color: #1a73e8; font-size: 20px; cursor: pointer; }
        .btn-publish { background: #1a73e8; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* FEED STYLES */
        .post-img { width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid #eee; max-height: 400px; object-fit: cover; }
        .post-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #f1f3f4; margin-top: 12px; padding-top: 10px; }
        .btn-act { background: none; border: none; font-size: 12px; color: #5f6368; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-act i { color: #1a73e8; font-size: 16px; }
        .count { font-size: 10px; color: #999; margin-left: 2px; }

        /* COMMENTS */
        .comment-section { background: #f8f9fa; margin-top: 10px; padding: 8px; border-radius: 6px; display: none; }
        .comment-item { font-size: 12px; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .comment-input { width: 100%; padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; margin-top: 5px; }

        /* ADS */
        .ad-row { background: #fff7e0; border: 1px dashed #f9ab00; padding: 12px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-size: 10px; font-weight: bold; color: #b06000; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="blue-bar">APEX SOCIAL NETWORK</div>
        <div class="stats">
            <div><label>SALDO ATUAL</label><b id="stEUR">0.0000€</b></div>
            <div><label>REDE DÍVIDA</label><b id="stDebt" style="color:#d93025;">0.0000€</b></div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <textarea id="postTxt" placeholder="No que estás a pensar?"></textarea>
            <div id="preview" style="display:none; margin-top:10px;"><img id="imgPre" class="post-img" src=""></div>
            <div class="post-tools">
                <label for="fileIn" class="btn-img"><i class="fas fa-camera"></i></label>
                <input type="file" id="fileIn" accept="image/*" style="display:none;" onchange="handleImg(this)">
                <button onclick="publishPost()" id="btnSend" class="btn-publish">Publicar (+0.0015€)</button>
            </div>
        </div>

        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);

        let saldo = 0.0080;
        let base64Img = null;

        function updateUI() {
            const val = saldo.toFixed(4) + "€";
            document.getElementById('stEUR').innerText = val;
            document.getElementById('stDebt').innerText = val;
        }

        // Compressão de Imagem < 500KB
        function handleImg(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 800; canvas.height = (img.height / img.width) * 800;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Img = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('imgPre').src = base64Img;
                    document.getElementById('preview').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function publishPost() {
            const content = document.getElementById('postTxt').value;
            if(!content && !base64Img) return;
            
            document.getElementById('btnSend').innerText = "A enviar...";
            
            const { error } = await client.from('posts').insert([{ 
                content, 
                image_url: base64Img,
                likes: 0,
                comments_count: 0,
                comments_data: []
            }]);

            if(!error) {
                saldo += 0.0015;
                document.getElementById('postTxt').value = "";
                document.getElementById('preview').style.display = 'none';
                base64Img = null;
                document.getElementById('btnSend').innerText = "Publicar (+0.0015€)";
                updateUI();
                loadFeed();
            }
        }

        async function loadFeed() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            posts?.forEach((p, i) => {
                if(i > 0 && i % 3 === 0) feed.innerHTML += `<div class="ad-row">ANÚNCIO: APOIE A REDE APEX</div>`;

                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div style="font-size:11px; font-weight:bold; color:#1a73e8; margin-bottom:8px;">Utilizador Apex <span style="color:#999;">#${p.id}</span></div>
                    <p style="font-size:14px;">${p.content}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    
                    <div class="post-actions">
                        <button class="btn-act" onclick="likePost(${p.id}, ${p.likes || 0})"><i class="far fa-heart"></i> <span>${p.likes || 0}</span></button>
                        <button class="btn-act" onclick="toggleComments(${p.id})"><i class="far fa-comment"></i> <span>${p.comments_count || 0}</span></button>
                        <button class="btn-act btn-del" onclick="deletePost(${p.id})"><i class="fas fa-trash"></i></button>
                    </div>

                    <div id="comm-${p.id}" class="comment-section">
                        <div id="list-${p.id}">
                            ${(p.comments_data || []).map(c => `<div class="comment-item"><b>User:</b> ${c}</div>`).join('')}
                        </div>
                        <input type="text" class="comment-input" placeholder="Escreve um comentário..." onkeypress="addComment(event, ${p.id})">
                    </div>
                `;
                feed.appendChild(div);
            });
        }

        async function likePost(id, currentLikes) {
            const { error } = await client.from('posts').update({ likes: currentLikes + 1 }).eq('id', id);
            if(!error) {
                saldo += 0.0002;
                updateUI();
                loadFeed();
            }
        }

        function toggleComments(id) {
            const box = document.getElementById('comm-'+id);
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        async function addComment(e, id) {
            if(e.key === 'Enter' && e.target.value) {
                const comment = e.target.value;
                const { data } = await client.from('posts').select('comments_data, comments_count').eq('id', id).single();
                
                let newList = data.comments_data || [];
                newList.push(comment);
                
                await client.from('posts').update({ 
                    comments_data: newList, 
                    comments_count: (data.comments_count || 0) + 1 
                }).eq('id', id);
                
                loadFeed();
            }
        }

        async function deletePost(id) {
            if(confirm("Eliminar?")) { await client.from('posts').delete().eq('id', id); loadFeed(); }
        }

        updateUI();
        loadFeed();
    </script>
</body>
</html>
