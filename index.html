<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social v32 - Produção</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-bg: #f8f9fa;
            --text-dark: #202124;
            --text-gray: #70757a;
            --border: #dadce0;
            --success: #1e8e3e;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--google-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--text-dark);
        }

        header {
            background: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--google-blue);
        }

        .balance {
            color: var(--success);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .post-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .post-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 15px;
        }

        .post-content {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .actions {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .action-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }

        .icon-large {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .comment-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .status {
            color: var(--google-blue);
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 20px;
            outline: none;
        }

        button {
            background: var(--google-blue);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
        }

        nav {
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            position: sticky;
            bottom: 0;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-gray);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .nav-link.active {
            color: var(--google-blue);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span style="background:var(--google-blue); color:white; padding:4px 8px; border-radius:4px;">A</span>
        APEX SOCIAL
    </div>
    <div class="balance">0.0000€</div>
</header>

<div class="container">
    <div class="post-card">
        <div class="post-meta">
            <span>ID: #79</span>
            <span>Utilizador #1400</span>
        </div>
        <div class="post-content">TYHHHHH</div>
        
        <div class="actions">
            <div class="action-item"><span class="icon-large">👍</span>GOSTAR</div>
            <div class="action-item"><span class="icon-large">💬</span>COMENTAR</div>
            <div class="action-item"><span class="icon-large">🔗</span>PARTILHAR</div>
        </div>

        <div class="comment-section">
            <div class="status">Processing...</div>
            <div id="comments-79">
                <div style="padding: 5px 0; font-size: 0.95rem;">Ttgggyy</div>
            </div>
            <div class="input-group">
                <input type="text" placeholder="Escreve um comentário..." id="in-79">
                <button onclick="addComment(79)">OK</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <a href="#" class="nav-link active">REDE</a>
    <a href="#" class="nav-link">GANHOS</a>
    <a href="#" class="nav-link">GESTÃO</a>
</nav>

<script>
    function addComment(id) {
        const input = document.getElementById(`in-${id}`);
        const box = document.getElementById(`comments-${id}`);
        if(input.value.trim() !== "") {
            const div = document.createElement('div');
            div.style.padding = "5px 0";
            div.style.fontSize = "0.95rem";
            div.innerText = input.value;
            box.appendChild(div);
            input.value = "";
        }
    }
</script>

</body>
</html>
