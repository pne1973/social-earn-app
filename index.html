<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Earn</title>

    <!-- Ícones e fontes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Estilos internos (vamos organizar depois) -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050816;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        header {
            background: #0b1020;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #1f2535;
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0b1020;
            border-top: 1px solid #1f2535;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        nav button {
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
        }

        .page {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }
    </style>
</head>

<body>

<header>Social Earn</header>

<nav>
    <button onclick="showPage('home')"><i class="fa-solid fa-house"></i></button>
    <button onclick="showPage('wallet')"><i class="fa-solid fa-wallet"></i></button>
    <button onclick="showPage('feed')"><i class="fa-solid fa-newspaper"></i></button>
    <button onclick="showPage('profile')"><i class="fa-solid fa-user"></i></button>
</nav>

<!-- CONTÊINER PRINCIPAL DAS PÁGINAS -->
<div id="home" class="page active"></div>
<div id="wallet" class="page"></div>
<div id="feed" class="page"></div>
<div id="profile" class="page"></div>
<!-- ============================
     SECÇÃO HOME
============================= -->
<div id="home" class="page active">

    <h2>Bem-vindo 👋</h2>

    <p style="margin-top:10px; color:#ccc;">
        Escolhe uma das opções abaixo para navegar pela app.
    </p>

    <div style="margin-top:20px; display:flex; flex-direction:column; gap:12px;">

        <button onclick="showPage('wallet')" 
                style="padding:12px; background:#1f2937; border:none; border-radius:8px; color:white; font-size:16px; cursor:pointer;">
            💰 Ver Carteira
        </button>

        <button onclick="showPage('feed')" 
                style="padding:12px; background:#1f2937; border:none; border-radius:8px; color:white; font-size:16px; cursor:pointer;">
            📰 Ver Feed
        </button>

        <button onclick="showPage('profile')" 
                style="padding:12px; background:#1f2937; border:none; border-radius:8px; color:white; font-size:16px; cursor:pointer;">
            👤 Ver Perfil
        </button>

    </div>

</div>
