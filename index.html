<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background-color: #121212; }
        body { 
            background-color: #121212; color: #ffffff; 
            font-family: -apple-system, sans-serif;
            padding-top: 190px; padding-bottom: 20px;
        }

        /* HEADER & STATS */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
        .ad-top { background: #1a1a1a; color: #ffcc00; padding: 8px; text-align: center; font-size: 10px; font-weight: bold; border-bottom: 1px solid #333; }
        
        .user-stats-bar { display: flex; justify-content: space-around; background: #1a1a1a; padding: 12px 5px; border-bottom: 1px solid #252525; }
        .stat-pill { text-align: center; flex: 1; }
        .stat-pill span { display: block; font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .stat-pill b { font-size: 14px; color: #ffcc00; }

        .tabs { display: flex; background: #121212; justify-content: space-around; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; color: #888; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-item.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; }

        .content { padding: 15px; max-width: 500px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        
        .btn-pub { background: #ffcc00; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .admin-table th, .admin-table td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        .finance-pos { color: #00ff00; }
        .finance-neg { color: #ff4444; }
        .admin-link { display: none; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="ad-top">📢 APEX SOCIAL: Ganhe +2 XP de Check-in Diário!</div>
        
        <div class="user-stats-bar">
            <div class="stat-pill"><span>Saldo Total</span><b id="topBalance">0.0000€</b></div>
            <div class="stat-pill"><span>Amigos</span><b id="topRefs">0</b></div>
            <div class="stat-pill"><span>Renda Passiva</span><b id="topRefGains">0.0000€</b></div>
        </div>

        <div class="tabs">
            <div class="tab-item active" onclick="openTab('feed-page', this)">Feed</div>
            <div class="tab-item" onclick="openTab('wallet-page', this)">Rede</div>
            <div class="tab-item" onclick="openTab('info-page', this)">Info</div>
            <div id="adm-tab" class="tab-item admin-link" onclick="openTab('admin-page', this)">Admin</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div id="checkinCard" class="card" style="display:none; background: linear-gradient(45deg, #1e1e1e, #2a2a1a); border: 1px solid #ffcc00;">
                <h4 style="color:#ffcc00;">🎁 Bónus Diário Disponível!</h4>
                <button class="btn-pub" onclick="doCheckin()">Receber +2.0 XP</button>
            </div>
            <div class="card">
                <textarea id="postText" style="width:100%; background:transparent; border:none; color:#fff; outline:none;" placeholder="No que estás a pensar?"></textarea>
                <button class="btn-pub" onclick="publish()">Publicar</button>
                <div id="rewardHint" style="font-size:10px; color:#666; margin-top:8px;">A calcular...</div>
            </div>
            <div id="feed-items">A carregar...</div>
        </div>

        <div id="wallet-page" class="page">
            <div class="card" style="text-align:center;">
                <h4 style="color:#ffcc00;">Link de Afiliado</h4>
                <div id="refLink" style="background:#111; padding:12px; margin:15px 0; font-size:11px; border:1px dashed #444; color:#ffcc00; word-break: break-all;">A carregar...</div>
                <button class="btn-pub" onclick="copyRef()">Copiar Link</button>
            </div>
        </div>

        <div id="admin-page" class="page">
            <div class="card" style="border:1px solid #ff4444">
                <h3 style="color:#ff4444; margin-bottom:10px;">Monitor de Lucro Apex</h3>
                <div id="admSummary" style="font-size:12px;"></div>
            </div>
            <div class="card">
                <h4 style="color:#ffcc00;">Maiores Afiliadores</h4>
                <table class="admin-table">
                    <thead><tr><th>User ID</th><th>Amigos</th><th>Comissão (€)</th></tr></thead>
                    <tbody id="admRefTable"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const myId = 5401881400; 
        let dailyPosts = 0;

        async function getProfile() {
            const { data } = await client.from('profiles').select('*').eq('id', myId).single();
            if (data) {
                document.getElementById('topBalance').innerText = (data.points * 0.0010).toFixed(4) + "€";
                document.getElementById('topRefs').innerText = data.referrals_count || 0;
                document.getElementById('topRefGains').innerText = (data.referral_points * 0.0010).toFixed(4) + "€";
                document.getElementById('refLink').innerText = `https://apexsocial.app/?ref=${myId}`;

                const today = new Date().toISOString().split('T')[0];
                const { count } = await client.from('posts').select('*', { count: 'exact', head: true }).eq('user_id', myId).gte('created_at', today);
                dailyPosts = count || 0;
                
                let next = dailyPosts < 5 ? 5.0 : (dailyPosts < 10 ? 2.5 : 0.5);
                document.getElementById('rewardHint').innerHTML = `Hoje: <b>${dailyPosts} posts</b> | Próximo: <b>${next} XP</b>`;
                
                // Mostrar checkin se for novo dia (simulação)
                document.getElementById('checkinCard').style.display = 'block'; 
            }
            if(myId === 5401881400) document.getElementById('adm-tab').style.display = 'block';
        }

        async function doCheckin() {
            await client.rpc('increment_points', { user_id: myId, amount: 2.0 });
            document.getElementById('checkinCard').style.display = 'none';
            getProfile();
            alert("Ganhaste +2.0 XP de Check-in!");
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            if(!txt) return;
            let reward = dailyPosts < 5 ? 5.0 : (dailyPosts < 10 ? 2.5 : 0.5);
            await client.from('posts').insert([{ user_id: myId, content: txt }]);
            await client.rpc('increment_points', { user_id: myId, amount: reward });
            await client.rpc('process_referral_bonus', { user_id: myId, bonus_amount: reward * 0.1 });
            document.getElementById('postText').value = '';
            getProfile();
        }

        async function updateAdmin() {
            const { data: users } = await client.from('profiles').select('*').order('referral_points', { ascending: false });
            const { count: posts } = await client.from('posts').select('*', { count: 'exact' });
            let totalXP = 0; let tableHTML = '';
            users.forEach(u => {
                totalXP += u.points;
                tableHTML += `<tr><td>...${u.id.toString().slice(-4)}</td><td>${u.referrals_count || 0}</td><td class="finance-pos">${(u.referral_points * 0.0010).toFixed(4)}€</td></tr>`;
            });
            const debt = totalXP * 0.0010;
            const rev = posts * 18 * 0.0010; 
            document.getElementById('admSummary').innerHTML = `Dívida: <b class="finance-neg">${debt.toFixed(4)}€</b> | Est. Receita: <b class="finance-pos">${rev.toFixed(4)}€</b><br><h2>LUCRO: ${(rev-debt).toFixed(4)}€</h2>`;
            document.getElementById('admRefTable').innerHTML = tableHTML;
        }

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'admin-page') updateAdmin();
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('refLink').innerText);
            alert("Copiado!");
        }

        getProfile();
    </script>
</body>
</html>
