<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.12 - Estável</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; }
        body { font-family: 'Roboto', sans-serif; background: var(--fb-bg); margin: 0; padding-top: 185px; padding-bottom: 90px; }
        
        header { position: fixed; top: 0; left: 0; right: 0; height: 72px; background: white; border-bottom: 1px solid #ddd; z-index: 2000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-bar { position: fixed; top: 72px; left: 0; right: 0; height: 40px; background: white; border-bottom: 1px solid #eee; z-index: 1999; display: flex; align-items: center; padding: 0 16px; font-size: 10px; font-weight: 900; color: #34A853; text-transform: uppercase; }
        .publisher { position: fixed; top: 112px; left: 0; right: 0; background: white; padding: 12px; z-index: 1998; border-bottom: 8px solid #ddd; }

        .fb-post { background: white; margin-bottom: 8px; border-bottom: 1px solid #ddd; }
        .fb-h { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .fb-avatar { width: 40px; height: 40px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .fb-c { padding: 0 12px 12px; font-size: 15px; font-weight: 400; line-height: 1.4; }
        .fb-img { width: 100%; max-height: 500px; object-fit: cover; display: block; }
        .fb-a { display: flex; border-top: 1px solid #f0f2f5; padding: 4px 0; margin: 0 12px; }
        .fb-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; color: #65676b; font-size: 13px; font-weight: 700; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: white; border-top: 1px solid #ddd; display: flex; z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #65676b; text-transform: uppercase; position: relative; }
        .nav-item.active { color: var(--fb-blue); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white italic font-black text-2xl">S</div>
            <h1 class="text-blue-600 font-black text-xs leading-none">SOCIAL EARN</h1>
        </div>
        <div class="text-right">
            <div id="top-saldo" class="text-green-600 text-xl font-black">0.0000€</div>
        </div>
    </header>

    <div class="status-bar">
        <span id="mult-label">Multiplicador x1.0 Ativo</span>
        <button onclick="logout()" class="ml-auto text-gray-300">Sair</button>
    </div>

    <main id="view-feed" class="tab-content active">
        <div class="publisher">
            <div onclick="openPostModal()" class="bg-[#f0f2f5] rounded-full p-3 px-5 text-gray-500 text-sm font-bold">O que estás a pensar?</div>
        </div>
        <div id="feed-container"></div>
    </main>

    <main id="view-wallet" class="tab-content px-6 pt-10">
        <div class="bg-white rounded-3xl p-10 text-center shadow-sm border border-gray-100">
            <h2 class="text-[10px] font-black text-gray-300 uppercase mb-4 tracking-widest">Saldo (XP: <span id="xp-val">0</span>)</h2>
            <h1 id="wall-saldo" class="text-5xl font-black text-blue-600 mb-8">0.0000€</h1>
            <div class="w-full bg-gray-100 h-2 rounded-full mb-4"><div id="p-bar" class="bg-blue-600 h-full rounded-full w-0"></div></div>
            <p class="text-[9px] font-black text-gray-400 uppercase">Saque Mínimo: 5000 XP</p>
        </div>
    </main>

    <nav>
        <button onclick="tab('feed')" id="n-feed" class="nav-item active">🏠<span>Feed</span></button>
        <button onclick="tab('wallet')" id="n-wallet" class="nav-item">💰<span>Ganhos</span></button>
        <button id="n-admin" onclick="tab('admin')" class="nav-item hidden text-red-600">⚙️<span>Admin</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";

        let user = { id: localStorage.getItem('apex_uid'), xp: 0, mult: 1.0, actions: 0 };

        async function init() {
            if (!user.id) {
                let id = prompt("ID:");
                if (id) { localStorage.setItem('apex_uid', id); location.reload(); }
                return;
            }
            if (user.id === ADMIN_ID) document.getElementById('n-admin').classList.remove('hidden');

            const { data } = await sb.from('perfis').select('*').eq('id', user.id).single();
            if (data) user.xp = data.xp_total || 0;
            
            updateUI();
            loadFeed();
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            let html = "";
            posts.forEach((p) => {
                const sId = String(p.user_id).slice(0,5);
                html += `
                <div class="fb-post">
                    <div class="fb-h"><div class="fb-avatar">👤</div><div class="text-sm font-bold">User ${sId}</div></div>
                    <div class="fb-c">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="fb-img">` : ''}
                    <div class="fb-a">
                        <button onclick="addXP(5)" class="fb-btn">👍 Gosto</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function addXP(amt) {
            user.xp += amt;
            updateUI();
            await sb.from('perfis').update({ xp_total: user.xp }).eq('id', user.id);
        }

        function updateUI() {
            const eur = (user.xp / 1000).toFixed(4);
            document.getElementById('top-saldo').innerText = eur + "€";
            document.getElementById('wall-saldo').innerText = eur + "€";
            document.getElementById('xp-val').innerText = user.xp;
            document.getElementById('p-bar').style.width = Math.min((user.xp / 5000) * 100, 100) + "%";
        }

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
        }

        async function openPostModal() {
            const txt = prompt("No que estás a pensar?");
            if(txt) {
                await sb.from('posts').insert({ user_id: user.id, content: txt });
                addXP(15);
                loadFeed();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        init();
    </script>
</body>
</html>
