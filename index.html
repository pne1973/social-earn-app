<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v71 - Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; -webkit-tap-highlight-color: transparent; }
        .google-blue { color: #4285F4; }
        .google-bg-blue { background-color: #4285F4; }
        .nav-active { color: #4285F4 !important; border-top: 3px solid #4285F4; font-weight: 900; }
        .card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        #loader { display: none; position: fixed; inset: 0; background: white; z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-24">

    <div id="loader">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500"></div>
    </div>

    <header class="sticky top-0 bg-white border-b z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black google-blue tracking-tighter uppercase">Apex Social</h1>
            <p class="text-[9px] font-bold text-gray-400 uppercase">v71 • Sincronizado</p>
        </div>
        <div class="bg-green-50 px-4 py-1.5 rounded-full border border-green-200">
            <span id="main-balance" class="font-black text-green-700 text-lg">0,0000€</span>
        </div>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto min-h-screen"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-lg">
        <button onclick="switchTab('feed')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-feed"><span class="text-[10px] font-black uppercase tracking-tighter">Feed</span></button>
        <button onclick="switchTab('wallet')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-wallet"><span class="text-[10px] font-black uppercase tracking-tighter">Carteira</span></button>
        <button onclick="switchTab('friends')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-friends"><span class="text-[10px] font-black uppercase tracking-tighter">Rede</span></button>
        <button onclick="switchTab('profile')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-profile"><span class="text-[10px] font-black uppercase tracking-tighter">Perfil</span></button>
        <button onclick="switchTab('admin')" class="flex flex-col items-center p-2 text-red-300 nav-btn" id="btn-admin" style="display:none;"><span class="text-[10px] font-black uppercase tracking-tighter">Admin</span></button>
    </nav>

    <script>
        // --- CONFIGURAÇÃO (O RENDER SUBSTITUI ESTES TEXTOS) ---
        // As chaves no Render Environment devem ter os nomes: SUPABASE_URL e SUPABASE_KEY
        const SB_URL = "SUPABASE_URL_PLACEHOLDER"; 
        const SB_KEY = "SUPABASE_KEY_PLACEHOLDER"; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const USER_ID = "5401881400";
        
        let state = { saldo_eur: 0, bonus_restante: 0, is_turbo: false };
        let currentTab = 'feed';

        // --- MOTOR DE INICIALIZAÇÃO ---
        async function init() {
            showLoader(true);
            try {
                let { data, error } = await supabaseClient.from('perfis').select('*').eq('id', USER_ID).single();
                if (data) {
                    state = data;
                } else {
                    const { data: newUser } = await supabaseClient.from('perfis').insert([{ id: USER_ID }]).select().single();
                    if (newUser) state = newUser;
                }
            } catch (e) {
                console.error("Erro de conexão. Verifique as chaves no Render.");
            }

            if (USER_ID === "5401881400") document.getElementById('btn-admin').style.display = 'flex';
            showLoader(false);
            switchTab('feed');
        }

        // --- AÇÕES ---
        async function doAction() {
            let ganho = state.is_turbo ? 0.0015 : 0.0004;
            state.saldo_eur = parseFloat(state.saldo_eur) + ganho;
            
            if (state.is_turbo) {
                state.bonus_restante--;
                if (state.bonus_restante <= 0) state.is_turbo = false;
            }

            document.getElementById('main-balance').innerText = state.saldo_eur.toFixed(4) + '€';
            await supabaseClient.from('perfis').update(state).eq('id', USER_ID);
        }

        async function startSync() {
            showLoader(true);
            // Simulação de delay de vídeo/adsterra
            setTimeout(async () => {
                state.is_turbo = true;
                state.bonus_restante = 20;
                await supabaseClient.from('perfis').update({is_turbo:true, bonus_restante:20}).eq('id', USER_ID);
                showLoader(false);
                render();
                alert("🔥 Sincronização Concluída! 20 Bónus Turbo ativos.");
            }, 3000);
        }

        // --- NAVEGAÇÃO E UI ---
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(`btn-${tab}`).classList.add('nav-active');
            render();
        }

        function render() {
            const container = document.getElementById('app-content');
            document.getElementById('main-balance').innerText = parseFloat(state.saldo_eur).toFixed(4) + '€';

            if (currentTab === 'feed') {
                container.innerHTML = `
                    <div class="card p-4 mb-4 bg-blue-50 flex justify-between items-center shadow-sm">
                        <div>
                            <p class="text-[10px] font-black text-blue-600 uppercase">Status</p>
                            <p class="text-xs font-bold">${state.is_turbo ? '🔥 TURBO ('+state.bonus_restante+')' : '❄️ NORMAL'}</p>
                        </div>
                        <button onclick="startSync()" class="google-bg-blue text-white px-5 py-2 rounded-lg text-[10px] font-black uppercase">Sincronizar</button>
                    </div>
                    <div class="card p-4">
                        <p class="text-sm text-gray-700 mb-4 tracking-tight">Post oficial: Ganhe agora interagindo abaixo.</p>
                        <button onclick="doAction()" class="google-blue font-black text-[10px] uppercase tracking-widest">Gostar (+${state.is_turbo ? '0,0015' : '0,0004'}€)</button>
                    </div>
                `;
            } else if (currentTab === 'wallet') {
                container.innerHTML = `
                    <div class="card p-10 text-center">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Disponível</p>
                        <h1 class="text-5xl font-black google-blue mb-8">${state.saldo_eur.toFixed(4)}€</h1>
                        <button class="w-full google-bg-blue text-white py-4 rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition">Levantar Saldo</button>
                    </div>
                `;
            } else if (currentTab === 'friends') {
                container.innerHTML = `<div class="card p-6"><h3 class="font-black text-xs uppercase mb-1">Rede de Afiliados</h3><p class="text-[10px] font-mono text-blue-500 truncate">ref/${USER_ID}</p></div>`;
            } else if (currentTab === 'profile') {
                container.innerHTML = `<div class="card p-6 text-center"><p class="font-black text-xs text-gray-400 uppercase tracking-widest">Utilizador: ${USER_ID}</p></div>`;
            } else if (currentTab === 'admin') {
                container.innerHTML = `<div class="card p-4 border-red-500 border-2 bg-red-50 text-center"><p class="text-red-600 font-black text-xs uppercase">Acesso Administrativo Ativo</p></div>`;
            }
        }

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        window.onload = init;
    </script>
</body>
</html>
