<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v39.3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blue: #4285F4; --bg: #f8f9fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-top: 60px; padding-bottom: 20px; }
        
        header { position: fixed; top: 0; width: 100%; height: 55px; background: white; border-bottom: 1px solid #ddd; z-index: 9999; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }

        #feed { display: flex; flex-direction: column; gap: 12px; padding: 10px; max-width: 450px; margin: 0 auto; }

        /* CARTÃO OTIMIZADO: Texto e Imagem em harmonia */
        .post-card { 
            background: white; 
            border-radius: 16px; 
            border: 1px solid #e1e4e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* AJUSTE INTELIGENTE: Limita a altura para telemóvel */
        .post-img-box { 
            width: 100%; 
            max-height: 250px; /* Resolve o problema 'muito comprida na vertical' */
            overflow: hidden;
            background: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #f0f0f0;
        }
        .post-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Mostra a foto inteira centralizada sem esticar */
        }

        .post-body { padding: 12px 16px; }
        .post-text { font-size: 15px; font-weight: 700; color: #1c1e21; line-height: 1.4; margin-bottom: 8px; }
        
        .post-actions { 
            display: flex; 
            justify-content: space-around;
            border-top: 1px solid #f0f2f5; 
            padding: 8px 0;
        }
        .action-item { font-size: 11px; font-weight: 800; color: #65676b; text-transform: uppercase; }

        .btn-pub { background: var(--blue); color: white; border-radius: 10px; font-weight: 800; padding: 12px; width: 100%; transition: scale 0.1s; }
        .btn-pub:active { scale: 0.98; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--blue); font-size: 18px; letter-spacing: -0.5px;">APEX</div>
        <div id="u-saldo" style="color: #34A853; font-weight: 900;">0.0000€</div>
    </header>

    <main>
        <div class="post-card p-4 mx-3 mt-2">
            <textarea id="in-txt" placeholder="O que pretende partilhar?" class="w-full border-none focus:ring-0 font-bold text-sm mb-3" rows="2"></textarea>
            <div id="status" class="hidden text-[10px] font-black text-blue-500 mb-2 uppercase text-center">✨ Foto pronta</div>
            <div class="flex gap-2">
                <label for="in-file" class="bg-gray-100 p-3 rounded-lg cursor-pointer text-[10px] font-black text-gray-500 uppercase flex items-center">📸 Foto</label>
                <input type="file" id="in-file" accept="image/*" class="hidden" onchange="processarFoto()">
                <button onclick="publicar()" id="btn-pub" class="btn-pub uppercase">Publicar</button>
            </div>
        </div>

        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);
        const MASTER_ID = "5401881400";
        let fotoData = "";

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) document.getElementById('u-saldo').innerText = data.saldo.toFixed(4) + "€";
            carregarFeed();
        }

        function processarFoto() {
            const file = document.getElementById('in-file').files[0];
            if (!file) return;
            document.getElementById('status').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 600; // Otimizado para telemóvel
                    const scale = maxW / img.width;
                    canvas.width = maxW;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    fotoData = canvas.toDataURL('image/jpeg', 0.6);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function publicar() {
            const txt = document.getElementById('in-txt').value;
            if(!txt && !fotoData) return;
            const btn = document.getElementById('btn-pub');
            btn.disabled = true; btn.innerText = "A PUBLICAR...";

            const { error } = await _sb.from('posts').insert([{ user_id: MASTER_ID, content: txt, image_url: fotoData }]);
            if(!error) window.location.reload();
            else { btn.disabled = false; btn.innerText = "ERRO"; }
        }

        async function carregarFeed() {
            const { data: posts } = await _sb.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = "";

            posts?.forEach(p => {
                if(!p.content && !p.image_url) return;

                const card = document.createElement('div');
                card.className = "post-card";
                
                // Contentor que isola a imagem e impede que transborde
                let imgHtml = p.image_url ? `
                    <div class="post-img-box">
                        <img src="${p.image_url}" class="post-img" loading="lazy">
                    </div>` : "";

                card.innerHTML = `
                    ${imgHtml}
                    <div class="post-body">
                        ${p.content ? `<p class="post-text">${p.content}</p>` : ''}
                        <div class="post-actions">
                            <span class="action-item">Gosto</span>
                            <span class="action-item">Comentar</span>
                            <span class="action-item">Partilhar</span>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
