<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v35 - Final Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); font-weight: 900; }
        
        /* FIXED HEADER & PUBLISHER SPACE */
        .sticky-publisher { position: fixed; top: 72px; left: 0; right: 0; z-index: 40; background: #f1f3f4; padding: 12px 16px; transition: transform 0.3s; }
        .publisher-hidden { transform: translateY(-135%); }

        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .coin-pop { position: absolute; animation: flyUp 0.6s ease-out forwards; pointer-events: none; color: var(--g-green); font-weight: 900; font-size: 12px; z-index: 100; }
        @keyframes flyUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-40px); opacity: 0; } }
        
        .comment-section { display: none; background: #f8f9fa; border-top: 2px solid #eee; }
        .comment-section.active { display: block; }
        
        .interaction-badge { position: absolute; top: -4px; right: 12%; background: var(--g-red); color: white; font-size: 9px; padding: 1px 5px; border-radius: 10px; font-weight: 900; border: 2px solid white; pointer-events: none; }
        #feed-container { margin-top: 155px; }
        
        /* LOADING STATE */
        .proc-label { color: var(--g-blue); font-size: 9px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="pb-24">

    <div id="ad-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border-4 border-blue-600">
            <div id="ad-decision-ui" class="p-8 text-center">
                <h3 class="text-xl font-black uppercase text-blue-600 mb-2">Sincronização Necessária</h3>
                <p class="text-[10px] font-black uppercase mb-6 text-gray-400">Valide a sua sessão para manter 100% dos ganhos.</p>
                <button onclick="startAdFlow()" class="w-full p-5 bg-blue-600 text-white rounded-2xl shadow-xl uppercase text-xs mb-3 font-black">Ver Anúncio (Full Pay)</button>
                <button onclick="degradeAndContinue()" class="w-full p-4 bg-white border-2 text-gray-400 rounded-2xl uppercase text-[10px] font-black">Continuar com -20%</button>
            </div>
            <div id="ad-player-ui" class="hidden">
                <div class="aspect-video bg-black relative flex items-center justify-center">
                    <img id="ad-img-fs" src="" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <p id="ad-timer" class="relative text-white font-black uppercase text-xs tracking-widest">A validar em 5s...</p>
                </div>
                <div class="p-6">
                    <button id="close-ad-btn" disabled class="w-full py-5 bg-gray-100 text-gray-400 rounded-xl uppercase text-xs font-black">Aguarde...</button>
                </div>
            </div>
        </div>
    </div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-50 px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">A</div>
            <div>
                <h1 class="text-sm font-black uppercase text-blue-600">Apex Social</h1>
                <span id="multiplier-tag" class="text-[8px] font-black text-green-500 uppercase italic">STATUS: 100% OK</span>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-base tracking-tighter">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase italic">0.0000 BRL</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4 mt-[72px]">
        <section id="view-social" class="tab-content active">
            <div id="publisher-box" class="sticky-publisher">
                <div class="google-card p-4 border-t-8 border-blue-600 shadow-xl">
                    <textarea id="post-input" onclick="expandPublisher()" placeholder="PARTILHAR NOVIDADE? (+0.0150€)" class="w-full border-none focus:ring-0 text-xs mb-2 resize-none uppercase font-black" rows="1"></textarea>
                    <div id="expanded-post" class="hidden">
                        <input id="post-url" type="text" placeholder="URL DA IMAGEM (OPCIONAL)" class="w-full bg-gray-100 border-none text-[10px] p-3 rounded-xl mb-4 outline-none uppercase font-black">
                        <button onclick="publish()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[11px] uppercase shadow-lg">Publicar Agora</button>
                    </div>
                </div>
            </div>
            <div id="feed-container" class="space-y-6"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="google-card p-12 text-center border-t-[10px] border-blue-600 mb-8 shadow-2xl mt-4">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2">Saldo em Carteira</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p id="wall-brl" class="text-xs font-black text-gray-500 mt-2 uppercase italic">≈ 0.0000 BRL</p>
            </div>
            <button onclick="shareAffiliate()" class="w-full google-card p-6 flex justify-between items-center border-l-[8px] border-green-500 shadow-lg">
                <div class="text-left font-black"><p class="text-sm uppercase">Convidar Amigos</p><p class="text-[9px] text-green-600 uppercase italic">Link de Afiliado Ativo</p></div>
                <span class="text-3xl">👥</span>
            </button>
        </section>

        <section id="view-admin" class="tab-content">
            <div class="google-card border-t-[8px] border-red-600 p-6 mt-4 shadow-2xl">
                <h2 class="text-red-600 font-black text-[10px] uppercase mb-6 tracking-widest">Painel de Controlo Master</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-gray-50 p-4 border rounded-xl text-center"><p class="text-[8px] text-gray-400 font-black uppercase">Dívida Total</p><p id="adm-debt" class="font-black text-blue-700 text-lg">0.00€</p></div>
                    <div class="bg-gray-50 p-4 border rounded-xl text-center"><p class="text-[8px] text-gray-400 font-black uppercase">Lucro Est.</p><p id="adm-profit" class="font-black text-green-700 text-lg">0.00€</p></div>
                </div>
                <input id="del-id" type="text" placeholder="ID DO POST PARA ELIMINAR" class="w-full p-4 border rounded-xl mb-4 font-black uppercase text-[10px] outline-none focus:border-red-500">
                <button onclick="adminDelete()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg">Eliminar Post</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-50 shadow-2xl">
        <button onclick="nav('social')" class="nav-item active flex-1 flex flex-col items-center py-2"><span class="text-[10px] font-black uppercase">Rede</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 flex flex-col items-center py-2 text-gray-400"><span class="text-[10px] font-black uppercase">Ganhos</span></button>
        <button id="adm-btn" onclick="nav('admin')" class="hidden flex-1 flex flex-col items-center py-2 text-red-300"><span class="text-[10px] font-black uppercase italic">Master</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = { saldo: 0, interactions: 0, multiplier: 1.0 };
        let lastScroll = 0;
        let pendingBonus = 0;

        function expandPublisher() {
            document.getElementById('expanded-post').classList.remove('hidden');
            document.getElementById('post-input').rows = 3;
        }

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            const pub = document.getElementById('publisher-box');
            if (currentScroll > lastScroll && currentScroll > 100) pub.classList.add('publisher-hidden');
            else pub.classList.remove('publisher-hidden');
            lastScroll = currentScroll;
        });

        async function init() {
            if(MASTER_ID === "5401881400") document.getElementById('adm-btn').classList.remove('hidden');
            const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
            if(data) { user = {...user, ...data}; user.saldo = Number(data.saldo) || 0; }
            updateUI(); loadFeed();
        }

        function updateUI() {
            const e = Number(user.saldo) || 0;
            const elements = ['main-eur', 'wall-eur'];
            elements.forEach(id => document.getElementById(id).innerText = e.toFixed(4) + "€");
            const brl = (e * 6.12).toFixed(4);
            document.getElementById('main-brl').innerText = brl + " BRL";
            document.getElementById('wall-brl').innerText = "≈ " + brl + " BRL";
            
            const pct = Math.round(user.multiplier * 100);
            const tag = document.getElementById('multiplier-tag');
            tag.innerText = `STATUS: ${pct}% OK`;
            tag.className = pct < 100 ? "text-[8px] font-black text-red-500 italic uppercase" : "text-[8px] font-black text-green-500 italic uppercase";
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!posts) return;
            container.innerHTML = "";

            posts.forEach(async (p, index) => {
                const { count: cCount } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', p.id);
                const lCount = Math.floor(Math.random() * 40) + 10;
                const card = document.createElement('div');
                card.className = "google-card p-6 relative shadow-sm";
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-
