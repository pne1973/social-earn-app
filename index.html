<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; position: relative; }
        .count-badge { position: absolute; top: 2px; right: 28%; background: var(--g-red); color: white; font-size: 9px; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 900; border: 1.5px solid white; }
        .status-header-fixed { position: fixed; top: 72px; left: 0; right: 0; z-index: 300; background: white; border-bottom: 1px solid #dadce0; padding: 8px 16px; display: flex; align-items: center; justify-content: center; min-height: 45px; }
        .publisher-area { margin-top: 130px; padding: 0 16px; margin-bottom: 12px; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
    </style>
</head>
<body class="pb-24">

    <div id="floating-earning"><div class="text-3xl font-black text-green-600" id="earning-val">+0.0000€</div></div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic">S</div>
            <h1 class="text-[12px] font-black uppercase text-blue-600">Social Earn Network</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-header-fixed">
        <div id="status-text" class="text-[9px] font-black uppercase text-green-600">Sincronizado com Supabase</div>
    </div>

    <main class="max-w-lg mx-auto">
        <section id="view-social" class="tab-content active">
            <div class="publisher-area">
                <div class="google-card p-3 border-t-4 border-blue-600">
                    <textarea id="post-input" placeholder="PARTILHE ALGO COM A REDE..." class="w-full border-none focus:ring-0 text-[11px] mb-1 resize-none uppercase font-black" rows="1" onclick="this.rows=3; document.getElementById('expanded-post').classList.remove('hidden')"></textarea>
                    <div id="expanded-post" class="hidden">
                        <input id="post-url" type="text" placeholder="URL DA IMAGEM (OPCIONAL)" class="w-full bg-gray-50 border-none text-[10px] p-2 rounded-lg mb-2 font-black">
                        <button onclick="publishPost()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-black text-[11px] uppercase">Publicar</button>
                    </div>
                </div>
            </div>
            <div id="feed-container" class="px-4">
                </div>
        </section>

        <section id="view-info" class="tab-content px-4 mt-24">
            <div class="google-card p-10 text-center border-t-[10px] border-blue-600">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2">Saldo Total Real</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center font-black text-[11px]">REDE</button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center font-black text-[11px]">GANHOS</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let userSaldo = 0.0000;

        async function init() {
            console.log("A iniciar ligação ao Supabase...");
            // Buscar Saldo Real
            const { data, error } = await sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if (error) console.error("Erro ao ler saldo:", error);
            if (data) userSaldo = parseFloat(data.saldo);
            
            updateUI();
            fetchFeed();
        }

        function updateUI() {
            const val = userSaldo.toFixed(4);
            document.getElementById('main-eur').innerText = val + "€";
            document.getElementById('wall-eur').innerText = val + "€";
            document.getElementById('main-brl').innerText = (userSaldo * 6.12).toFixed(4) + " BRL";
        }

        async function fetchFeed() {
            const { data: posts, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            if (error) console.error("Erro ao ler feed:", error);
            
            const container = document.getElementById('feed-container');
            container.innerHTML = ""; // Limpa dados de exemplo

            if (posts) {
                for (const post of posts) {
                    // Buscar contagem real de comentários para este post
                    const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                    
                    const card = `
                        <div class="google-card shadow-sm p-5">
                            <p class="text-[13px] font-black uppercase text-gray-800 mb-4">${post.content}</p>
                            ${post.image_url ? `<img src="${post.image_url}" class="w-full rounded-xl mb-4 border">` : ''}
                            <div class="flex border-t pt-2">
                                <button onclick="addGain(0.0006)" class="interaction-btn">
                                    <div class="count-badge">0</div><span>👍</span><span class="text-[8px] uppercase text-gray-400">Gostar</span>
                                </button>
                                <button class="interaction-btn border-x">
                                    <div class="count-badge">${count || 0}</div><span>💬</span><span class="text-[8px] uppercase text-gray-400">Comentar</span>
                                </button>
                                <button onclick="addGain(0.0020)" class="interaction-btn">
                                    <div class="count-badge">0</div><span>🔗</span><span class="text-[8px] uppercase text-gray-400">Partilhar</span>
                                </button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }
            }
        }

        async function addGain(val) {
            userSaldo += val;
            updateUI();
            showPopup(val);
            await sb.from('perfis').update({ saldo: userSaldo }).eq('id', MASTER_ID);
        }

        async function publishPost() {
            const content = document.getElementById('post-input').value;
            const img = document.getElementById('post-url').value;
            if (!content) return;

            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content, image_url: img }]);
            if (!error) {
                document.getElementById('post-input').value = "";
                document.getElementById('expanded-post').classList.add('hidden');
                addGain(0.0150);
                fetchFeed();
            }
        }

        function showPopup(val) {
            const p = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            p.style.display = 'block';
            setTimeout(() => p.style.display = 'none', 800);
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
