<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pine Social Master Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; --bg: #F8F9FA; --txt: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 100px 0 90px; }
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-bottom: 1px solid #dadce0; z-index: 1000; box-sizing: border-box; }
        .logo { font-weight: bold; font-size: 20px; }
        .logo span:nth-child(1) { color: var(--g-blue); } .logo span:nth-child(2) { color: var(--g-red); } .logo span:nth-child(3) { color: var(--g-yellow); } .logo span:nth-child(4) { color: var(--g-blue); } .logo span:nth-child(5) { color: var(--g-green); }
        .xp-badge { background: var(--g-blue); color: #fff; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .ad-container { background: #fff; border: 1px solid #dadce0; border-radius: 12px; padding: 15px; margin-bottom: 16px; }
        .ad-top-banner { background: linear-gradient(90deg, #fff3cd 0%, #fff 100%); border: 1px dashed var(--g-yellow); cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #dadce0; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #5f6368; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--g-blue); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
        .card { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #dadce0; box-shadow: 0 1px 2px rgba(60,64,67,0.1); position: relative; }
        .btn { width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-blue { background: var(--g-blue); color: #fff; }
        textarea { width: 100%; border: 1px solid #f1f3f4; padding: 12px; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; background: #f8f9fa; }
        .hidden { display: none !important; }
        #loading-feed { text-align: center; padding: 20px; color: #5f6368; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>P</span><span>i</span><span>n</span><span>e</span> <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span></div>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <div id="feed-tab" class="container">
        <div class="ad-container ad-top-banner" onclick="tab('invite-tab', document.querySelectorAll('.nav-item')[3])">
            <span style="font-size:9px; color:#70757a; font-weight:bold; text-transform:uppercase;">Destaque</span><br>
            <span style="font-weight:600; color:var(--g-blue)">Ganha 100 XP por cada amigo! 🚀</span>
        </div>

        <div class="card">
            <textarea id="postText" rows="3" placeholder="O que tens em mente?"></textarea>
            <div id="upload-status" style="display:none; font-size:11px; color:var(--g-blue); margin-top:5px;">A processar...</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;">
                <button onclick="document.getElementById('fileInput').click()" style="color:var(--g-blue); background:none; border:none; font-size:14px; font-weight:600;"><i class="fas fa-image"></i> Foto</button>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
                <button class="btn btn-blue" style="width:auto; padding:8px 25px;" id="pubBtn" onclick="publish()">Publicar</button>
            </div>
        </div>
        <div id="feed"></div>
        <div id="loading-feed"><i class="fas fa-spinner fa-spin"></i> Carregar feed...</div>
    </div>

    <div id="info-tab" class="container hidden"></div>
    <div id="rank-tab" class="container hidden"></div>
    <div id="invite-tab" class="container hidden"></div>
    <div id="wallet-tab" class="container hidden"></div>
    <div id="admin-tab" class="container hidden"></div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('feed-tab', this)"><i class="fas fa-home"></i>Feed</div>
        <div class="nav-item" onclick="tab('info-tab', this)"><i class="fas fa-coins"></i>Ganhos</div>
        <div class="nav-item" onclick="tab('rank-tab', this)"><i class="fas fa-trophy"></i>Rank</div>
        <div class="nav-item" onclick="tab('invite-tab', this)"><i class="fas fa-user-plus"></i>Amigos</div>
        <div class="nav-item" onclick="tab('wallet-tab', this)"><i class="fas fa-wallet"></i>Saque</div>
    </nav>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const userId = 5401881400;

        let page = 0; let loading = false; let compressedImg = null;

        async function init() {
            if(userId === 5401881400) {
                const nav = document.querySelector('.nav');
                const btn = document.createElement('div'); btn.className="nav-item"; btn.innerHTML='<i class="fas fa-user-shield"></i>Admin';
                btn.onclick = () => tab('admin-tab', btn); nav.appendChild(btn);
            }
            loadProfile(); 
            loadFeed(true); // Chamada inicial garantida
        }

        async function loadFeed(reset=false) {
            if(loading) return;
            loading = true;
            const fDiv = document.getElementById('feed');
            if(reset) { page = 0; fDiv.innerHTML = ''; }
            
            // Lógica de "Fail-safe" para o username
            const { data, error } = await supabaseClient.from('posts').select('*, profiles(username)').order('created_at', {ascending:false}).range(page*10, (page+1)*10-1);
            
            if(error) console.error("Erro Feed:", error);

            if(data && data.length > 0) {
                data.forEach((p, idx) => {
                    // INJEÇÃO DE ANÚNCIOS (LISTA MESTRE)
                    if(idx > 0 && idx % 3 === 0) {
                        fDiv.innerHTML += `<div class="ad-container"><span style="font-size:9px; color:#999; font-weight:bold;">PATROCINADO</span><p style="margin:5px 0; font-weight:600; color:var(--g-blue);">💰 Ganha Dinheiro a Testar Apps</p></div>`;
                    }
                    
                    const user = p.profiles?.username || 'user_' + p.user_id;
                    fDiv.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:8px;">
                            <b style="color:var(--g-blue)">@${user}</b>
                            <span style="color:#bdc1c6;">ID: ${p.id}</span>
                        </div>
                        <p style="margin:0; font-size:15px; line-height:1.4;">${p.content || ''}</p>
                        ${p.image_url ? `<img src="${p.image_url}" style="width:calc(100% + 32px); margin:12px -16px 0; border-top:1px solid #eee;">` : ''}
                        <div style="margin-top:12px; border-top:1px solid #f8f8f8; padding-top:8px;">
                            <button style="background:none; border:none; color:#5f6368; font-weight:bold; font-size:13px;" onclick="toggleLike(${p.id}, this)"><i class="far fa-heart"></i> Like</button>
                        </div>
                    </div>`;
                });
                page++;
                document.getElementById('loading-feed').style.display = 'none';
            } else if(page === 0) {
                fDiv.innerHTML = '<p style="text-align:center; padding:40px; color:#999;">Ainda não há posts. Sê o primeiro!</p>';
                document.getElementById('loading-feed').style.display = 'none';
            }
            loading = false;
        }

        // SCROLL INFINITO (LISTA MESTRE)
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                loadFeed();
            }
        };

        // ... Resto das funções (publish, loadProfile, tab, etc.) mantidas e gravadas ...
        async function loadProfile() {
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if(data) document.getElementById('userXP').innerText = data.points + " XP";
        }

        function tab(id, el) { 
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden')); 
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden'); el.classList.add('active');
        }

        init();
    </script>
</body>
</html>
