<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pine Social Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; --bg: #F8F9FA; --txt: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 80px 0 95px; }
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-bottom: 1px solid #dadce0; z-index: 2000; box-sizing: border-box; }
        .logo { font-weight: bold; font-size: 20px; }
        .logo span:nth-child(1) { color: var(--g-blue); } .logo span:nth-child(2) { color: var(--g-red); } .logo span:nth-child(3) { color: var(--g-yellow); } .logo span:nth-child(4) { color: var(--g-blue); } .logo span:nth-child(5) { color: var(--g-green); }
        .xp-badge { background: var(--g-blue); color: #fff; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #dadce0; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #5f6368; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--g-blue); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; box-sizing: border-box; width: 100%; }
        .card { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #dadce0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn { width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-blue { background: var(--g-blue); color: #fff; }
        .hidden { display: none !important; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .admin-stat { background: #fff5f5; border: 1px solid var(--g-red); padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>P</span><span>i</span><span>n</span><span>e</span> <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span></div>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <section id="feed-tab" class="tab-content container">
        <div class="card">
            <textarea id="postText" rows="3" placeholder="O que tens em mente?" style="width:100%; border:1px solid #eee; padding:10px; border-radius:8px; outline:none;"></textarea>
            <button class="btn btn-blue" style="margin-top:10px;" id="pubBtn" onclick="publish()">Publicar</button>
        </div>
        <div id="feed-list"></div>
    </section>

    <section id="rank-tab" class="tab-content container hidden">
        <div class="card">
            <h3>🏆 Top 10 Elite</h3>
            <div id="rank-list">A carregar ranking...</div>
        </div>
    </section>

    <section id="admin-tab" class="tab-content container hidden">
        <div class="card" style="border-top: 4px solid var(--g-red);">
            <h3 style="color:var(--g-red)">Painel Admin</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <div class="admin-stat">Utilizadores<br><b id="adm-u">-</b></div>
                <div class="admin-stat">Posts<br><b id="adm-p">-</b></div>
            </div>
            <h4>Saques Pendentes</h4>
            <div id="adm-w"></div>
        </div>
    </section>

    <section id="info-tab" class="tab-content container hidden"><div class="card"><h3>Economia</h3><p>1000 XP = 1.0000€</p></div></section>
    <section id="wallet-tab" class="tab-content container hidden"><div class="card"><h3>Saque</h3><p>Mínimo 5000 XP</p></div></section>

    <nav class="nav">
        <div class="nav-item active" data-tab="feed-tab"><i class="fas fa-home"></i>Feed</div>
        <div class="nav-item" data-tab="rank-tab"><i class="fas fa-trophy"></i>Rank</div>
        <div class="nav-item" data-tab="admin-tab"><i class="fas fa-shield-alt"></i>Admin</div>
        <div class="nav-item" data-tab="info-tab"><i class="fas fa-coins"></i>Ganhos</div>
        <div class="nav-item" data-tab="wallet-tab"><i class="fas fa-wallet"></i>Saque</div>
    </nav>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const userId = 5401881400;

        async function init() {
            setupNav();
            loadProfile();
            loadFeed();
        }

        function setupNav() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const tabId = item.getAttribute('data-tab');
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    document.getElementById(tabId).classList.remove('hidden');
                    item.classList.add('active');
                    if(tabId === 'rank-tab') loadRanking();
                    if(tabId === 'admin-tab') loadAdmin();
                });
            });
        }

        async function loadFeed() {
            const { data } = await supabaseClient.from('posts').select('*').order('created_at', {ascending:false});
            const list = document.getElementById('feed-list');
            list.innerHTML = data?.length ? '' : '<p style="text-align:center;color:#999;">Feed vazio.</p>';
            data?.forEach(p => {
                list.innerHTML += `<div class="card"><small>ID: ${p.id}</small><p>${p.content}</p></div>`;
            });
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            if(!txt) return;
            const { error } = await supabaseClient.from('posts').insert([{ user_id: userId, content: txt }]);
            if(!error) {
                await supabaseClient.rpc('increment_points', { user_id: userId, amount: 15 });
                alert("Publicado!");
                location.reload();
            }
        }

        async function loadRanking() {
            const { data } = await supabaseClient.from('profiles').select('username, points').order('points', {ascending:false}).limit(10);
            const rList = document.getElementById('rank-list');
            rList.innerHTML = '';
            data?.forEach((u, i) => {
                rList.innerHTML += `<div class="rank-item"><span>${i+1}. @${u.username || 'user'}</span><b>${u.points} XP</b></div>`;
            });
        }

        async function loadAdmin() {
            const { count: u } = await supabaseClient.from('profiles').select('*', {count:'exact', head:true});
            const { count: p } = await supabaseClient.from('posts').select('*', {count:'exact', head:true});
            document.getElementById('adm-u').innerText = u;
            document.getElementById('adm-p').innerText = p;
        }

        async function loadProfile() {
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if(data) document.getElementById('userXP').innerText = data.points + " XP";
        }

        init();
    </script>
</body>
</html>
