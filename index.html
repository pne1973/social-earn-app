<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v34.520</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; margin: 0; padding-bottom: 80px; }
        
        /* Header Fixo */
        header { position: fixed; top: 0; width: 100%; height: 65px; background: white; border-bottom: 2px solid #dadce0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        
        /* Publisher Area */
        .publisher { margin-top: 80px; padding: 15px; }
        .card { background: white; border-radius: 12px; border: 1px solid #dadce0; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Feed */
        #feed-container { padding: 0 15px; }
        .post-card { background: white; border-radius: 12px; border: 1px solid #dadce0; margin-bottom: 20px; overflow: hidden; }
        .post-img { width: 100%; display: block; background: #eee; min-height: 200px; object-fit: cover; }
        
        /* Interações Estilo Google */
        .btn-interact { flex: 1; padding: 12px 0; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; color: #5f6368; border: none; background: transparent; }
        .badge { background: var(--g-red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        /* Tabs */
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 2px solid #dadce0; display: flex; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #5f6368; text-transform: uppercase; }
        .nav-btn.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="background: var(--g-blue); color: white; padding: 8px 12px; border-radius: 8px; font-weight: 900;">A</div>
            <span style="color: var(--g-blue); font-weight: 900; font-size: 14px;">APEX SOCIAL</span>
        </div>
        <div id="saldo-header" style="color: var(--g-green); font-weight: 900; font-size: 16px;">0.0000€</div>
    </header>

    <main id="tab-rede">
        <div class="publisher">
            <div class="card p-4" style="border-top: 8px solid var(--g-blue);">
                <textarea id="post-text" placeholder="O QUE PRETENDE PARTILHAR?" class="w-full border-none focus:ring-0 font-black uppercase text-xs mb-3" rows="2"></textarea>
                <div id="upload-preview" class="hidden mb-3 text-[10px] text-green-600 font-bold text-center">✅ IMAGEM PRONTA</div>
                <div class="flex gap-2">
                    <label for="file-in" class="flex-1 bg-gray-100 p-3 rounded-lg text-center text-[10px] font-black cursor-pointer uppercase">📸 FOTO</label>
                    <input type="file" id="file-in" accept="image/*" class="hidden" onchange="document.getElementById('upload-preview').classList.remove('hidden')">
                    <button onclick="enviarPost()" id="btn-envio" class="flex-[2] bg-blue-600 text-white rounded-lg font-black text-[10px] uppercase">Publicar (+0.0150€)</button>
                </div>
            </div>
        </div>

        <div id="feed-container">
            </div>
    </main>

    <main id="tab-ganhos" class="hidden p-10 mt-20 text-center">
        <div class="card p-10 border-t-[10px] border-blue-600">
            <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Carteira Total</p>
            <h1 id="saldo-total" class="text-4xl font-black text-blue-600">0.0000€</h1>
        </div>
    </main>

    <nav>
        <button onclick="mudarTab('rede')" id="nav-rede" class="nav-btn active">Rede</button>
        <button onclick="mudarTab('ganhos')" id="nav-ganhos" class="nav-btn">Ganhos</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);

        let saldo = 0;

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) saldo = data.saldo;
            atualizarUI();
            carregarFeed();
        }

        async function enviarPost() {
            const txt = document.getElementById('post-text').value;
            const file = document.getElementById('file-in').files[0];
            const btn = document.getElementById('btn-envio');
            if(!txt) return;

            btn.disabled = true;
            btn.innerText = "A ENVIAR...";

            let url = "";
            if(file) {
                const fd = new FormData();
                fd.append("image", file);
                try {
                    const res = await fetch("https://api.imgbb.com/1/upload?key=90868f06f74304629e474585642d627c", { method: "POST", body: fd });
                    const resJ = await res.json();
                    url = resJ.data.url;
                } catch(e) { console.log("Erro no ImgBB"); }
            }

            const { error } = await _sb.from('posts').insert([{ user_id: MASTER_ID, content: txt, image_url: url, likes: 0, shares: 0 }]);
            
            if(!error) {
                saldo += 0.0150;
                await _sb.from('perfis').update({ saldo: saldo }).eq('id', MASTER_ID);
                location.reload(); // Recarrega para limpar tudo e mostrar o post
            }
        }

        async function carregarFeed() {
            const { data: posts } = await _sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = "";

            for(const p of posts) {
                const { count } = await _sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', p.id);
                
                const card = document.createElement('div');
                card.className = "post-card shadow-sm";
                card.innerHTML = `
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img" loading="lazy">` : ''}
                    <div class="p-4">
                        <p class="text-xs font-black uppercase text-gray-800 mb-4">${p.content}</p>
                        <div class="flex border-t pt-2 gap-1">
                            <button onclick="reagir('${p.id}', 'likes', 0.0006)" class="btn-interact">
                                <span>👍</span> <div class="badge">${p.likes || 0}</div>
                            </button>
                            <button class="btn-interact" style="border-left: 1px solid #eee; border-right: 1px solid #eee;">
                                <span>💬</span> <div class="badge">${count || 0}</div>
                            </button>
                            <button onclick="reagir('${p.id}', 'shares', 0.0020)" class="btn-interact">
                                <span>🔗</span> <div class="badge">${p.shares || 0}</div>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        async function reagir(id, tipo, valor) {
            const { data } = await _sb.from('posts').select(tipo).eq('id', id).single();
            const novo = (data[tipo] || 0) + 1;
            await _sb.from('posts').update({ [tipo]: novo }).eq('id', id);
            
            saldo += valor;
            await _sb.from('perfis').update({ saldo: saldo }).eq('id', MASTER_ID);
            atualizarUI();
            carregarFeed(); // Atualiza os números no ecrã
        }

        function atualizarUI() {
            document.getElementById('saldo-header').innerText = saldo.toFixed(4) + "€";
            document.getElementById('saldo-total').innerText = saldo.toFixed(4) + "€";
        }

        function mudarTab(tab) {
            document.getElementById('tab-rede').classList.toggle('hidden', tab !== 'rede');
            document.getElementById('tab-ganhos').classList.toggle('hidden', tab !== 'ganhos');
            document.getElementById('nav-rede').classList.toggle('active', tab === 'rede');
            document.getElementById('nav-ganhos').classList.toggle('active', tab === 'ganhos');
        }

        window.onload = init;
    </script>
</body>
</html>
