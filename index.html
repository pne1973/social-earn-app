<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v32.280</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #4285F4; --green: #34A853; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; margin: 0; }
        .tab { display: none; }
        .tab.active { display: block; padding-bottom: 90px; }
        .nav-active { color: var(--blue); border-top: 3px solid var(--blue); }
        .post-card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; margin-bottom: 12px; padding: 16px; }
    </style>
</head>
<body>

    <header class="sticky top-0 bg-white border-b z-50 px-5 py-3 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-lg font-black italic text-blue-600">APEX SOCIAL</h1>
            <p class="text-[7px] font-bold text-gray-400 uppercase tracking-widest">Master Production v32.280</p>
        </div>
        <div class="text-right">
            <div id="bal-eur" class="font-black text-green-600 text-base">0.0000€</div>
            <div id="bal-brl" class="text-[8px] font-bold text-gray-400 uppercase">0.0000 BRL</div>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <section id="view-social" class="tab active">
            <div id="ranking" class="mb-4 text-[9px] font-bold text-blue-500 overflow-x-auto whitespace-nowrap py-2 bg-blue-50 rounded-lg px-3">
                CARREGANDO RANKING...
            </div>

            <div class="bg-white rounded-xl p-4 mb-4 border shadow-sm">
                <textarea id="post-input" placeholder="Partilha algo novo... (+15 XP)" class="w-full border-none focus:ring-0 text-sm p-0 mb-3 resize-none" rows="2"></textarea>
                <div class="flex justify-between items-center pt-3 border-t">
                    <button class="text-gray-400"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"></path></svg></button>
                    <button onclick="publish()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-black text-[10px] uppercase">Publicar</button>
                </div>
            </div>

            <div id="feed-container" class="space-y-3">
                <p class="text-center py-10 text-[10px] font-black text-gray-300 uppercase italic">Sincronizando com a Vercel...</p>
            </div>
        </section>

        <section id="view-wallet" class="tab">
            <div class="bg-white p-8 text-center rounded-2xl border shadow-lg border-t-4 border-blue-600">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-2">Teu Saldo</p>
                <h1 id="wall-eur" class="text-4xl font-black text-blue-600">0.0000€</h1>
                <p id="wall-brl" class="text-[10px] font-bold text-gray-400 mt-1 uppercase">≈ 0.0000 BRL</p>
            </div>
            <button onclick="checkIn()" class="w-full border-2 border-green-500 text-green-600 py-3 rounded-xl font-black text-[10px] uppercase mt-4">Check-in Diário (+0.0500€)</button>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50">
        <button onclick="nav('social')" id="btn-social" class="flex-1 py-2 text-[10px] font-black uppercase nav-active">Social</button>
        <button onclick="nav('wallet')" id="btn-wallet" class="flex-1 py-2 text-[10px] font-black uppercase text-gray-400">Carteira</button>
    </nav>

    <script>
        // LIGAÇÃO DIRETA (HARDCODED PARA VERCEL)
        const URL = "https://fickstyevektwbgimapy.supabase.co";
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const UID = "5401881400"; // Teu ID Admin
        const sb = window.supabase.createClient(URL, KEY);

        let user = { saldo: 0 };

        function nav(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active', 'text-gray-400'));
            document.getElementById('view-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('nav-active');
            if(t !== 'social') document.getElementById('btn-social').classList.add('text-gray-400');
        }

        async function init() {
            try {
                const { data } = await sb.from('perfis').select('*').eq('id', UID).single();
                if(data) user = data;
                updateUI();
                loadRanking();
                loadFeed();
            } catch(e) { console.error(e); }
        }

        function updateUI() {
            const e = user.saldo.toFixed(4);
            const b = (user.saldo * 6.1245).toFixed(4);
            document.getElementById('bal-eur').innerText = e + "€";
            document.getElementById('wall-eur').innerText = e + "€";
            document.getElementById('bal-brl').innerText = b + " BRL";
            document.getElementById('wall-brl').innerText = "≈ " + b + " BRL";
        }

        async function loadFeed() {
            const { data } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            if(data) {
                document.getElementById('feed-container').innerHTML = data.map((p, i) => `
                    <div class="post-card">
                        <div class="flex justify-between text-[8px] font-black text-gray-300 uppercase mb-2">
                            <span>User #${p.user_id.slice(-4)}</span>
                            <span>ID: ${p.id}</span>
                        </div>
                        <p class="text-sm text-gray-700 mb-4">${p.content}</p>
                        <div class="flex justify-between pt-3 border-t">
                            <button onclick="like()" class="text-[9px] font-black text-gray-400 uppercase hover:text-blue-500">👍 Like (+2 XP)</button>
                            <button onclick="alert('Link de convite copiado!')" class="text-[9px] font-black text-blue-400 uppercase italic">🔗 Partilhar</button>
                        </div>
                    </div>
                    ${i % 3 === 2 ? '<div class="bg-blue-50 text-center py-3 text-[8px] font-black text-blue-600 rounded-lg mb-3 uppercase tracking-tighter">Sponsored Ad Slot</div>' : ''}
                `).join('');
            }
        }

        async function publish() {
            const t = document.getElementById('post-input').value;
            if(!t) return;
            const { error } = await sb.from('posts').insert([{ user_id: UID, content: t }]);
            if(!error) {
                user.saldo += 0.0150;
                await sb.from('perfis').upsert({ id: UID, saldo: user.saldo });
                document.getElementById('post-input').value = "";
                init();
            }
        }

        async function like() {
            user.saldo += 0.0020;
            updateUI();
            await sb.from('perfis').upsert({ id: UID, saldo: user.saldo });
        }

        async function checkIn() {
            user.saldo += 0.0500;
            updateUI();
            await sb.from('perfis').upsert({ id: UID, saldo: user.saldo });
        }

        async function loadRanking() {
            const { data } = await sb.from('perfis').select('id, saldo').order('saldo', {ascending: false}).limit(10);
            if(data) document.getElementById('ranking').innerHTML = "TOP RANKING: " + data.map((u, i) => `#${i+1} User..${u.id.slice(-3)}`).join(' • ');
        }

        window.onload = init;
    </script>
</body>
</html>
