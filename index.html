<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.12 - Produção</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; margin: 0; padding-top: 180px; padding-bottom: 70px; }

        /* Headers e Fixed Areas */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; height: 60px; background: white; border-bottom: 1px solid #dadce0; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { position: fixed; top: 60px; width: 100%; z-index: 950; height: 35px; background: white; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--g-green); text-transform: uppercase; }
        .ad-banner-top { position: fixed; top: 95px; width: 100%; z-index: 900; height: 30px; background: #f8f9fa; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #bdc1c6; text-transform: uppercase; letter-spacing: 1px; }
        .publisher-zone { position: fixed; top: 125px; width: 100%; z-index: 850; background: white; border-bottom: 1px solid #dadce0; padding: 12px 16px; }

        /* Estilo dos Cards (Exatamente como a imagem) */
        .feed-container { max-width: 500px; margin: 0 auto; padding: 0 12px; }
        .feed-item { 
            background: white; border-radius: 20px; border: 1px solid #e8eaed; 
            margin-bottom: 16px; display: flex; overflow: hidden; 
            box-shadow: 0 1px 2px rgba(60,64,67,0.08); 
        }
        
        .item-main { flex: 1; padding: 16px; }
        .item-sidebar { 
            width: 70px; background: #f8f9fa; border-left: 1px solid #f1f3f4; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 10px 0;
        }

        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-avatar { width: 32px; height: 32px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--g-blue); font-weight: bold; font-size: 12px; }
        .user-name { font-size: 11px; font-weight: 900; color: var(--g-blue); text-transform: uppercase; }
        .post-text { font-size: 14px; font-weight: 700; color: #202124; line-height: 1.4; }
        .post-image { width: 100%; border-radius: 12px; margin-top: 12px; object-fit: cover; }

        /* Botões Laterais */
        .side-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .btn-circle { width: 38px; height: 38px; background: white; border-radius: 50%; border: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-label { font-size: 8px; font-weight: 900; color: #70757a; text-transform: uppercase; }

        /* Publicidade Intercalada */
        .ad-card { border: 1px dashed #dadce0; background: #fafafa; }
        .ad-tag { font-size: 8px; font-weight: 900; color: var(--g-blue); text-transform: uppercase; margin-bottom: 8px; }

        /* Navegação Inferior */
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #dadce0; display: flex; z-index: 2000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; text-transform: uppercase; color: #5f6368; }
        .nav-link.active { color: var(--g-blue); border-top: 3px solid var(--g-blue); }

        #login-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black italic shadow-xl mb-8">S</div>
        <h1 class="text-xl font-black uppercase mb-6">Bem-vindo</h1>
        <input id="user-id-input" type="text" placeholder="ID DE UTILIZADOR" class="w-full max-w-xs bg-gray-50 border border-gray-200 rounded-xl p-5 text-center font-black text-sm mb-4 outline-none">
        <button onclick="handleLogin()" class="w-full max-w-xs bg-blue-600 text-white py-5 rounded-xl font-black uppercase text-xs shadow-lg">Entrar na Conta</button>
    </div>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">S</div>
            <span class="text-[11px] font-black uppercase text-blue-600 tracking-tighter">Apex Social</span>
        </div>
        <div id="top-bal" class="text-xl font-black text-green-600">0.0000€</div>
    </header>

    <div class="status-bar">Modo Produção • 100% Ganhos</div>
    <div class="ad-banner-top">Google Adsense Partner</div>

    <div id="pub-area" class="publisher-zone">
        <div id="mini-input" onclick="setEditor(true)" class="bg-gray-100 rounded-full px-5 py-3 border border-gray-200 cursor-pointer flex items-center gap-3">
            <div class="w-6 h-6 bg-gray-300 rounded-full"></div>
            <span class="text-[11px] text-gray-500 font-bold uppercase italic">Escreva aqui a sua publicação...</span>
        </div>
        <div id="full-input" class="hidden">
            <textarea id="p-content" placeholder="O QUE QUER PARTILHAR?" class="w-full border-none outline-none font-bold uppercase text-xs p-2 mb-2" rows="2"></textarea>
            <div class="flex gap-2">
                <button onclick="setEditor(false)" class="flex-1 text-[9px] font-black text-gray-400 uppercase">Voltar</button>
                <button onclick="handleSend()" class="flex-[3] bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase">Publicar (+0.0150€)</button>
            </div>
        </div>
    </div>

    <main class="feed-container">
        <div id="feed-list">
            </div>
    </main>

    <nav>
        <div onclick="switchView('feed')" class="nav-link active">Feed</div>
        <div onclick="switchView('wallet')" class="nav-link">Carteira</div>
        <div onclick="switchView('menu')" class="nav-link">Sair</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        let uID = localStorage.getItem('apex_uid');
        let bal = 0;

        function handleLogin() {
            const input = document.getElementById('user-id-input').value.trim();
            if(!input) return;
            localStorage.setItem('apex_uid', input);
            location.reload();
        }

        async function init() {
            if(!uID) return;
            document.getElementById('login-screen').classList.add('hidden');
            const { data } = await sb.from('perfis').select('saldo').eq('id', uID).single();
            if(data) bal = Number(data.saldo);
            updateUI();
            fetchPosts();
        }

        async function fetchPosts() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-list');
            container.innerHTML = "";
            
            posts.forEach((p, i) => {
                // Template de Post (Igual à imagem)
                container.innerHTML += `
                <div class="feed-item">
                    <div class="item-main">
                        <div class="user-info">
                            <div class="user-avatar">${p.user_id.toString().substring(0,1)}</div>
                            <span class="user-name">Utilizador ${p.user_id}</span>
                        </div>
                        <p class="post-text">${p.content}</p>
                        ${i % 2 !== 0 ? '<img src="https://picsum.photos/seed/'+i+'/400/250" class="post-image">' : ''}
                    </div>
                    <div class="item-sidebar">
                        <div class="side-btn" onclick="gain(0.0006)">
                            <div class="btn-circle">👍</div>
                            <span class="btn-label">${Math.floor(Math.random()*50)}</span>
                        </div>
                        <div class="side-btn">
                            <div class="btn-circle">💬</div>
                            <span class="btn-label">0</span>
                        </div>
                        <div class="side-btn" onclick="gain(0.0020)">
                            <div class="btn-circle">🔗</div>
                            <span class="btn-label">Share</span>
                        </div>
                    </div>
                </div>`;

                if((i + 1) % 3 === 0) {
                    container.innerHTML += `
                    <div class="feed-item ad-card">
                        <div class="item-main">
                            <div class="ad-tag">Publicidade de Rede</div>
                            <p class="text-[11px] font-black text-gray-400 uppercase italic">Anúncio Patrocinado</p>
                        </div>
                        <div class="item-sidebar">
                            <div class="btn-circle text-blue-500">ℹ️</div>
                        </div>
                    </div>`;
                }
            });
        }

        async function handleSend() {
            const txt = document.getElementById('p-content').value;
            if(!txt) return;
            await sb.from('posts').insert([{ user_id: uID, content: txt }]);
            gain(0.0150);
            setEditor(false);
            fetchPosts();
        }

        function gain(v) {
            bal += v;
            updateUI();
            sb.from('perfis').upsert({ id: uID, saldo: bal });
        }

        function updateUI() {
            document.getElementById('top-bal').innerText = bal.toFixed(4) + "€";
        }

        function setEditor(s) {
            document.getElementById('mini-input').classList.toggle('hidden', s);
            document.getElementById('full-input').classList.toggle('hidden', !s);
        }

        init();
    </script>
</body>
</html>
