<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network v33.11 - Official Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --g-yellow: #FBBC05; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER E STATUS */
        header { height: 60px; }
        .status-header-fixed { position: fixed; top: 60px; left: 0; right: 0; z-index: 300; background: white; border-bottom: 1px solid #dadce0; padding: 4px 16px; display: flex; align-items: center; min-height: 32px; }

        /* PUBLICADOR FIXO REDUZIDO */
        .publisher-fixed { position: fixed; top: 92px; left: 0; right: 0; z-index: 280; background: #f1f3f4; padding: 8px 12px; }
        .google-card-mini { background: white; border: 1px solid #dadce0; border-radius: 24px; padding: 8px 16px; display: flex; align-items: center; gap: 10px; transition: all 0.3s; }
        .expanded-area { background: white; border: 1px solid #dadce0; border-radius: 16px; padding: 16px; margin-top: 8px; display: none; }

        /* ESPAÇAMENTO DO FEED */
        #feed-container { margin-top: 160px; padding: 0 12px; }
        .has-banner #feed-container { margin-top: 220px; }

        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
        
        /* ANÚNCIOS */
        .ad-banner-fixed { position: fixed; top: 124px; left: 0; right: 0; background: #fff; z-index: 250; padding: 6px 12px; border-bottom: 1px solid #eee; }
        .ad-placeholder { background: #f8f9fa; border: 1px dashed #ddd; border-radius: 8px; height: 40px; display: flex; align-items: center; justify-content: center; }

        /* FLOATING GAINS */
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
        .earning-text { font-size: 3rem; font-weight: 900; color: var(--g-green); -webkit-text-stroke: 1px white; }

        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #auth-screen { position: fixed; inset: 0; background: white; z-index: 6000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" style="display:none;">
        <div class="w-12 h-12 bg-blue-600 rounded-xl mb-4 flex items-center justify-center text-white font-black italic text-2xl">S</div>
        <input type="text" id="login-id" placeholder="ID UTILIZADOR" class="w-full max-w-xs border-2 border-gray-100 rounded-xl p-4 text-center mb-4 uppercase font-black outline-none shadow-sm">
        <button onclick="doLogin()" class="w-full max-w-xs bg-blue-600 text-white font-black py-4 rounded-xl uppercase shadow-lg active:scale-95">Entrar</button>
    </div>

    <div id="top-ad-banner" class="ad-banner-fixed hidden">
        <div class="ad-placeholder">
            <span class="text-[7px] text-gray-400 font-black uppercase tracking-widest">Publicidade</span>
        </div>
    </div>

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b z-[310] px-4 flex justify-between items-center">

            <h1 class="text-[10px] font-black uppercase text-blue-600 leading-none">Social Earn</h1>
        </div>
        <div class="text-right">

        </div>
    </header>

    <div class="status-header-fixed">
        <div id="status-text" class="text-[8px] font-black uppercase text-green-600">GANHOS ATIVOS</div>
        <button id="restore-btn" onclick="startAdFlow(true)" class="hidden bg-red-600 text-white px-2 py-1 rounded text-[7px] font-black uppercase ml-2">Restaurar</button>
        <button onclick="doLogout()" class="ml-auto text-[8px] text-gray-300 uppercase font-black">Sair</button>

    <div id="pub-container" class="publisher-fixed">

            <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 text-xs">👤</div>
            <div class="text-[10px] text-gray-400 font-black uppercase">O que quer partilhar agora?</div>
        </div>
        
        <div id="expanded-pub" class="expanded-area shadow-lg">
            <textarea id="post-input" placeholder="ESCREVA AQUI..." class="w-full border-none focus:ring-0 text-[11px] mb-3 resize-none uppercase font-black placeholder-gray-300" rows="3"></textarea>
            <input id="post-url" type="text" placeholder="LINK DA IMAGEM (OPCIONAL)" class="w-full bg-gray-50 border-none text-[9px] p-3 rounded-lg mb-3 font-black uppercase outline-none">
            <div class="flex gap-2">
                <button onclick="toggleExpand(false)" class="flex-1 text-[9px] font-black text-gray-400 uppercase">Cancelar</button>
                <button onclick="handleInteraction('post')" class="flex-[2] bg-blue-600 text-white py-3 rounded-lg font-black text-[10px] uppercase">Publicar (+0.0150€)</button>
            </div>
        </div>
    </div>

    <main class="max-w-lg mx-auto">
        <section id="view-social" class="tab-content active">
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content px-4 mt-32">
            <div class="google-card p-10 text-center border-t-8 border-blue-600">
                <p id="wall-eur" class="text-5xl font-black text-blue-600 tracking-tighter mb-2">0.0000€</p>
                <div id="withdraw-area" class="mt-4 hidden">
                    <input id="pp-email" type="email" placeholder="EMAIL PAYPAL" class="w-full border rounded-xl p-4 text-center mb-3 font-black uppercase text-xs">
                    <button onclick="requestWithdraw()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[11px] uppercase shadow-lg">Levantar</button>
                </div>
            </div>
        </section>

        <section id="view-admin" class="tab-content px-4 mt-32">
            <h2 class="font-black uppercase text-blue-600 mb-4 text-xs">Painel Admin</h2>
            <div id="adm-user-list-container" class="google-card shadow-sm border-none overflow-hidden">
                <table class="w-full text-left text-[9px]">
                    <tbody id="adm-user-list" class="font-bold uppercase"></tbody>
                </table>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-16 z-[300]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center font-black text-[9px] uppercase">Feed</button>
        <button id="nav-wallet-btn" onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center font-black text-[9px] uppercase">Carteira</button>
        <button id="nav-admin-btn" onclick="nav('admin')" class="hidden flex-1 py-2 flex flex-col items-center font-black text-[9px] uppercase text-red-600">Admin</button>
    </nav>
