<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v34.526</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blue: #4285F4; --red: #EA4335; --green: #34A853; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f3f4; margin: 0; padding-bottom: 80px; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: white; border-bottom: 1px solid #ddd; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .feed { margin-top: 75px; padding: 0 15px; }
        .card { background: white; border-radius: 15px; border: 1px solid #e0e0e0; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .img-box { background: #eee; width: 100%; min-height: 200px; }
        .img-box img { width: 100%; height: auto; display: block; }
        .btn-act { flex: 1; padding: 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; font-weight: 900; color: #666; background: none; border: none; }
        .badge-red { background: var(--red); color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #ddd; display: flex; z-index: 1000; }
        .nav-link { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: #999; text-transform: uppercase; }
        .nav-link.active { color: var(--blue); border-top: 4px solid var(--blue); }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--blue); font-size: 20px;">APEX</div>
        <div id="u-saldo" style="color: var(--green); font-weight: 900; font-size: 18px;">0.0000€</div>
    </header>

    <div class="feed">
        <div class="card p-5" style="border-top: 8px solid var(--blue);">
            <textarea id="p-txt" placeholder="NOVA PUBLICAÇÃO..." class="w-full border-none focus:ring-0 text-sm font-bold mb-4" rows="2"></textarea>
            <div id="p-msg" class="hidden text-center text-green-600 font-black text-[10px] mb-3">✅ FOTO PRONTA</div>
            <div class="flex gap-3">
                <label for="p-img" class="flex-1 bg-gray-100 p-4 rounded-2xl text-center text-[11px] font-black cursor-pointer">📸 FOTO</label>
                <input type="file" id="p-img" accept="image/*" class="hidden" onchange="document.getElementById('p-msg').classList.remove('hidden')">
                <button onclick="enviar()" id="p-btn" class="flex-[2] bg-blue-600 text-white rounded-2xl font-black text-[11px] uppercase shadow-lg">Publicar agora</button>
            </div>
        </div>

        <div id="p-lista"></div>
    </div>

    <nav>
        <div class="nav-link active">Rede</div>
        <div class="nav-link">Ganhos</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const _api = window.supabase.createClient(SB_URL, SB_KEY);

        let sld = 0;

        async function init() {
            const { data } = await _api.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) sld = data.saldo;
            document.getElementById('u-saldo').innerText = sld.toFixed(4) + "€";
            carregar();
        }

        async function enviar() {
            const t = document.getElementById('p-txt').value;
            const f = document.getElementById('p-img').files[0];
            const b = document.getElementById('p-btn');
            if(!t) return;

            b.disabled = true;
            b.innerText = "A ENVIAR...";

            let url = "";
            if(f) {
                const fd = new FormData();
                fd.append("image", f);
                try {
                    const r = await fetch("https://api.imgbb.com/1/upload?key=90868f06f74304629e474585642d627c", { method: "POST", body: fd });
                    const j = await r.json();
                    url = j.data.url;
                } catch(e) {}
            }

            // Inserção com valores padrão forçados para evitar erro de coluna ausente
            await _api.from('posts').insert([{ 
                user_id: MASTER_ID, content: t, image_url: url, likes: 0, shares: 0 
            }]);

            sld += 0.0150;
            await _api.from('perfis').update({ saldo: sld }).eq('id', MASTER_ID);
            window.location.reload(); 
        }

        async function carregar() {
            const { data: posts } = await _api.from('posts').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('p-lista');
            list.innerHTML = "";

            if(!posts) return;

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    ${p.image_url ? `<div class="img-box"><img src="${p.image_url}"></div>` : ''}
                    <div class="p-5">
                        <div class="text-[13px] font-bold text-gray-800 mb-4 uppercase">${p.content}</div>
                        <div class="flex border-t pt-3">
                            <button onclick="upd('${p.id}','likes',0.0006)" class="btn-act">👍 <span class="badge-red">${p.likes || 0}</span></button>
                            <button class="btn-act" style="border-left:1px solid #eee; border-right:1px solid #eee;">💬 <span class="badge-red">0</span></button>
                            <button onclick="upd('${p.id}','shares',0.0020)" class="btn-act">🔗 <span class="badge-red">${p.shares || 0}</span></button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function upd(id, col, v) {
            const { data } = await _api.from('posts').select(col).eq('id', id).single();
            const n = (data && data[col] ? data[col] : 0) + 1;
            await _api.from('posts').update({ [col]: n }).eq('id', id);
            sld += v;
            await _api.from('perfis').update({ saldo: sld }).eq('id', MASTER_ID);
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
