<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v34.900 - Stability</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); font-weight: 900; }
        
        .sticky-publisher { position: fixed; top: 72px; left: 0; right: 0; z-index: 40; background: #f1f3f4; padding: 12px 16px; transition: transform 0.3s ease; }
        .publisher-hidden { transform: translateY(-150%); }

        /* SEÇÃO DE COMENTÁRIOS CORRIGIDA */
        .comment-section { display: none; background: #f8f9fa; border-top: 2px solid #eee; padding: 15px; }
        .comment-section.active { display: block; }
        .comment-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        
        .comment-bubble { background: white; padding: 8px 12px; border-radius: 12px; border: 1px solid #e0e0e0; font-size: 11px; }
        .interaction-badge { position: absolute; top: -5px; right: 15%; background: var(--g-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 900; border: 2px solid white; }
        
        #feed-container { margin-top: 150px; }
        input, textarea, button { font-weight: 900 !important; }
    </style>
</head>
<body class="pb-24">

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-50 px-4 py-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">A</div>
            <h1 class="text-sm font-black uppercase text-blue-600">Apex Social</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-base">0.0000€</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4 mt-[72px]">
        <section id="view-social" class="tab-content active">
            <div id="publisher-box" class="sticky-publisher">
                <div class="google-card p-4 border-t-8 border-blue-600 shadow-xl">
                    <textarea id="post-input" onclick="this.rows=3; document.getElementById('exp-p').classList.remove('hidden')" placeholder="PARTILHE ALGO... (+0.0150€)" class="w-full border-none focus:ring-0 text-xs mb-2 resize-none uppercase font-black" rows="1"></textarea>
                    <div id="exp-p" class="hidden">
                        <input id="post-url" type="text" placeholder="URL DA IMAGEM" class="w-full bg-gray-100 border-none text-[10px] p-3 rounded-xl mb-4 outline-none uppercase font-black">
                        <button onclick="publish()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[11px] uppercase">Publicar</button>
                    </div>
                </div>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="google-card p-12 text-center border-t-[10px] border-blue-600 mt-4 shadow-2xl">
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p class="text-[10px] font-black text-gray-400 uppercase mt-4">SALDO ATUALIZADO</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-50">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 font-black text-[10px] uppercase">REDE</button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 font-black text-[10px] uppercase text-gray-400">GANHOS</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = { saldo: 0 };
        let lastScroll = 0;

        window.addEventListener('scroll', () => {
            const current = window.pageYOffset;
            const pub = document.getElementById('publisher-box');
            if (current > lastScroll && current > 150) pub.classList.add('publisher-hidden');
            else pub.classList.remove('publisher-hidden');
            lastScroll = current;
        });

        async function init() {
            const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            updateUI(); loadFeed();
        }

        function updateUI() {
            const v = Number(user.saldo).toFixed(4);
            document.getElementById('main-eur').innerText = v + "€";
            document.getElementById('wall-eur').innerText = v + "€";
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!posts) return;

            container.innerHTML = "";
            for (const p of posts) {
                const { count: cCount } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', p.id);
                
                const card = document.createElement('div');
                card.className = "google-card p-6 relative post-card";
                card.dataset.id = p.id;
                card.innerHTML = `
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2">ID..${String(p.user_id).slice(-4)}</p>
                    <p class="text-[13px] font-black uppercase text-gray-800 mb-3">${p.content}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-xl mb-4 border shadow-sm">` : ''}
                    <div class="flex justify-between border-t pt-4 relative">
                        <button onclick="addCoin(0.0006)" class="flex-1 flex flex-col items-center"><span class="text-xl">👍</span><span class="text-[8px] font-black uppercase text-gray-500">GOSTAR</span></button>
                        <button onclick="toggleComments(this)" class="flex-1 flex flex-col items-center relative border-x">
                            <div class="interaction-badge c-count">${cCount || 0}</div>
                            <span class="text-xl">💬</span><span class="text-[8px] font-black uppercase text-gray-500">COMENTAR</span>
                        </button>
                        <button onclick="addCoin(0.0002)" class="flex-1 flex flex-col items-center"><span class="text-xl">🔗</span><span class="text-[8px] font-black uppercase text-gray-500">PARTILHAR</span></button>
                    </div>
                    <div class="comment-section mt-4">
                        <div class="comment-list"></div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="DIGITE..." class="flex-1 text-[11px] p-3 border-2 rounded-xl outline-none uppercase font-black">
                            <button onclick="submitComment(this, '${p.id}')" class="bg-blue-600 text-white px-5 rounded-xl text-[10px] font-black uppercase">OK</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        async function toggleComments(btn) {
            const card = btn.closest('.post-card');
            const postId = card.dataset.id;
            const section = card.querySelector('.comment-section');
            const list = card.querySelector('.comment-list');
            
            if(section.classList.contains('active')) {
                section.classList.remove('active');
            } else {
                section.classList.add('active');
                list.innerHTML = "<p class='text-[9px] uppercase font-black text-center py-2'>Carregando...</p>";
                const { data } = await sb.from('comentarios').select('*').eq('post_id', postId).order('created_at', {ascending: true});
                list.innerHTML = data.map(c => `
                    <div class="comment-bubble">
                        <p class="text-[8px] text-blue-600 font-black uppercase mb-1">ID..${String(c.user_id).slice(-4)}</p>
                        <p class="font-black uppercase">${c.content}</p>
                    </div>
                `).join('') || "<p class='text-[9px] uppercase font-black text-center py-2 empty-txt'>Sem comentários.</p>";
                list.scrollTop = list.scrollHeight;
            }
        }

        async function submitComment(btn, postId) {
            const card = btn.closest('.post-card');
            const input = card.querySelector('input');
            const list = card.querySelector('.comment-list');
            const val = input.value.trim();
            if(!val) return;

            // Bloqueio visual para evitar cliques duplos
            btn.disabled = true;

            const { error } = await sb.from('comentarios').insert([{ post_id: postId, user_id: MASTER_ID, content: val }]);
            
            if(!error) {
                // Injetar o comentário manualmente no DOM
                const empty = list.querySelector('.empty-txt');
                if(empty) empty.remove();

                const div = document.createElement('div');
                div.className = "comment-bubble";
                div.innerHTML = `<p class="text-[8px] text-blue-600 font-black uppercase mb-1">ID..${String(MASTER_ID).slice(-4)}</p><p class="font-black uppercase">${val}</p>`;
                list.appendChild(div);
                
                input.value = "";
                const badge = card.querySelector('.c-count');
                badge.innerText = parseInt(badge.innerText) + 1;
                
                list.scrollTop = list.scrollHeight;
                
                // Pagar ao utilizador
                await addCoin(0.0010);
            }
            btn.disabled = false;
        }

        async function addCoin(amount) {
            user.saldo += amount;
            updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        async function publish() {
            const t = document.getElementById('post-input').value;
            const i = document.getElementById('post-url').value;
            if(!t) return;
            await sb.from('posts').insert([{ user_id: MASTER_ID, content: t, image_url: i }]);
            location.reload();
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
