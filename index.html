<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pine Social Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #121212; color: #fff; font-family: sans-serif; padding-top: 170px; }
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
        .nav-main { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .xp-badge { background: #ffcc00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .tabs { display: flex; background: #1a1a1a; }
        .tab-item { flex: 1; padding: 15px; text-align: center; color: #888; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-item.active { color: #ffcc00; border-bottom: 2px solid #ffcc00; }
        .content { padding: 15px; max-width: 500px; margin: 0 auto; }
        
        /* POST STYLE - ANTI-ESMAGAMENTO */
        .post { background: #1e1e1e; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; display: block; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 35px; height: 35px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffcc00; font-weight: bold; }
        .post-body { padding: 12px; color: #eee; font-size: 15px; line-height: 1.4; }
        .img-box { width: 100%; background: #000; display: block; }
        .post-img { width: 100%; height: auto; max-height: 500px; object-fit: contain; display: block; }
        
        .btn-pub { background: #ffcc00; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; }
        #error-msg { color: #ff4444; text-align: center; padding: 10px; font-size: 13px; display: none; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="nav-main">
            <h3>PINE <span style="color:#ffcc00">SOCIAL</span></h3>
            <div id="userXP" class="xp-badge">-- XP</div>
        </div>
        <div class="tabs">
            <div class="tab-item active" onclick="switchTab('feed-page', this)">Feed</div>
            <div class="tab-item" onclick="switchTab('earn-page', this)">Ranking</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div style="background:#1e1e1e; padding:15px; border-radius:12px; border:1px solid #333; margin-bottom:20px;">
                <textarea id="postText" style="width:100%; background:#2a2a2a; border:1px solid #444; color:#fff; padding:10px; border-radius:8px; height:70px; outline:none;" placeholder="No que estás a pensar?"></textarea>
                <input type="file" id="fileInput" hidden accept="image/*">
                <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:#888; margin-top:10px;"><i class="fas fa-camera"></i> Adicionar Foto</button>
                <button class="btn-pub" onclick="handlePublish()" id="pubBtn">Publicar</button>
            </div>
            
            <div id="error-msg"></div>
            <div id="feed-items">A ligar ao Supabase...</div>
        </div>
    </main>

    <script>
        // --- CONFIGURAÇÃO (COPIA E COLA DO PAINEL SUPABASE) ---
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co".trim();
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QQ".trim();
        // -----------------------------------------------------

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const myId = 5401881400;

        async function fetchFeed() {
            const list = document.getElementById('feed-items');
            const errDiv = document.getElementById('error-msg');
            
            try {
                const { data, error } = await client.from('posts').select('*').order('created_at', {ascending: false});
                
                if(error) {
                    errDiv.style.display = 'block';
                    errDiv.innerHTML = `Erro: ${error.message} (${error.status})`;
                    list.innerHTML = "";
                    return;
                }

                errDiv.style.display = 'none';
                list.innerHTML = '';
                
                data.forEach(p => {
                    const el = document.createElement('div');
                    el.className = 'post';
                    el.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">U</div>
                            <span style="font-weight:bold; font-size:13px;">User #${p.user_id.toString().slice(-4)}</span>
                        </div>
                        <div class="post-body">${p.content || ''}</div>
                        ${p.image_url ? `<div class="img-box"><img src="${p.image_url}" class="post-img"></div>` : ''}
                        <div style="padding:12px; color:#888; font-size:12px; border-top:1px solid #252525;">
                            <i class="fas fa-heart"></i> ${p.likes || 0} Likes
                        </div>
                    `;
                    list.appendChild(el);
                });
            } catch (e) {
                list.innerHTML = "Erro de rede crítico.";
            }
        }

        async function handlePublish() {
            const txt = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('pubBtn');
            if(!txt && !file) return;

            btn.innerText = "A publicar...";
            btn.disabled = true;

            try {
                let imgUrl = null;
                if(file) {
                    const name = `${Date.now()}.jpg`;
                    const { data } = await client.storage.from('post-images').upload(name, file);
                    if(data) imgUrl = client.storage.from('post-images').getPublicUrl(name).data.publicUrl;
                }

                await client.from('posts').insert([{ user_id: myId, content: txt, image_url: imgUrl }]);
                document.getElementById('postText').value = '';
                fetchFeed();
            } catch (err) {
                alert("Falha ao publicar.");
            } finally {
                btn.innerText = "Publicar";
                btn.disabled = false;
            }
        }

        fetchFeed();
    </script>
</body>
</html>
