<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social - Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RESET & GOOGLE SYSTEM */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8f9fa; color: #202124; font-family: 'Roboto', sans-serif; padding-top: 175px; }

        /* HEADER FIXO */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #dadce0; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #fff; padding: 10px 0; border-bottom: 1px solid #f1f3f4; }
        .stat-item { text-align: center; border-right: 1px solid #f1f3f4; }
        .stat-item:last-child { border-right: none; }
        .stat-item label { display: block; font-size: 8px; color: #70757a; text-transform: uppercase; margin-bottom: 2px; }
        .stat-item b { font-size: 11px; color: #1a73e8; }
        
        .tabs { display: flex; background: #fff; }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; color: #5f6368; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }

        /* FEED E CARDS */
        .container { max-width: 500px; margin: 0 auto; padding: 12px; }
        .card { background: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        /* CORREÇÃO DA FOTO NO FEED */
        .post-img-container { width: 100%; max-height: 350px; overflow: hidden; border-radius: 6px; margin: 12px 0; background: #f1f3f4; display: flex; align-items: center; justify-content: center; }
        .post-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        /* POST INFO */
        .post-header { font-size: 11px; color: #70757a; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .post-text { font-size: 15px; line-height: 1.5; color: #3c4043; word-wrap: break-word; }

        /* INTERAÇÕES */
        .actions-row { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #f1f3f4; padding-top: 12px; margin-top: 12px; }
        .action-btn { background: none; border: none; color: #5f6368; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .action-btn i { font-size: 14px; color: #1a73e8; }

        /* UI PUBLISH */
        .input-google { width: 100%; border: none; outline: none; font-size: 16px; margin-bottom: 15px; resize: none; min-height: 60px; }
        .btn-post { background: #1a73e8; color: #fff; border: none; padding: 8px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .adm-only { display: none !important; }
        body.is-master .adm-only { display: block !important; }
    </style>
</head>
<body id="appBody">

    <header class="header-fixed">
        <div class="blue-bar" id="headerTitle">Apex Social</div>
        <div class="stats-grid">
            <div class="stat-item"><label>Meus XP</label><b id="valXP">0</b></div>
            <div class="stat-item"><label>Saldo</label><b id="valEUR">0.0000€</b></div>
            <div class="stat-item adm-only"><label>Dívida</label><b id="valDebt" style="color:#d93025;">0.00€</b></div>
            <div class="stat-item"><label>Estado</label><b style="color:#1e8e3e;">ONLINE</b></div>
        </div>
        <nav class="tabs">
            <div class="tab active">Explorar</div>
            <div class="tab">Rede</div>
            <div class="tab">Info</div>
            <div class="tab adm-only" style="color:#d93025;">Master</div>
        </nav>
    </header>

    <main class="container">
        <div class="card">
            <textarea id="postInput" class="input-google" placeholder="O que pretende partilhar?"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f1f3f4; padding-top:12px;">
                <label style="color:#1a73e8; cursor:pointer; font-size:13px; font-weight:500;" for="fileInput">
                    <i class="fas fa-camera"></i> Foto (+15 XP)
                </label>
                <input type="file" id="fileInput" hidden onchange="handleFile(this)">
                <button class="btn-post" onclick="sendPost()">Publicar</button>
            </div>
            <img id="previewImg" style="display:none; width:100%; margin-top:15px; border-radius:6px; max-height:200px; object-fit:cover;">
        </div>

        <div id="feedContent">
            </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        const MY_ID = 5401881400; 
        let currentPhoto = null;

        async function init() {
            if(MY_ID === 5401881400) {
                document.getElementById('appBody').classList.add('is-master');
                document.getElementById('headerTitle').innerText = "Apex Business Control";
            }
            loadProfile();
            loadPosts();
        }

        async function loadProfile() {
            const { data } = await client.from('profiles').select('*').eq('id', MY_ID).single();
            if(data) {
                document.getElementById('valXP').innerText = data.points.toLocaleString();
                document.getElementById('valEUR').innerText = (data.points * 0.0001).toFixed(4) + "€";
            }
        }

        async function loadPosts() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feedContent');
            container.innerHTML = "";

            posts.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <div class="post-header">
                            <span>ID #${p.id}</span>
                            <span style="color:#1a73e8; font-weight:bold;">${new Date(p.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="post-text">${p.content || ''}</div>
                        
                        ${p.image_url ? `
                        <div class="post-img-container">
                            <img src="${p.image_url}" class="post-img">
                        </div>` : ''}

                        <div class="actions-row">
                            <button class="action-btn"><i class="far fa-heart"></i> Gosto (${p.likes || 0})</button>
                            <button class="action-btn"><i class="far fa-comment"></i> Comentar</button>
                            <button class="action-btn"><i class="fas fa-share-alt"></i> Redes</button>
                        </div>
                    </div>
                `;
            });
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentPhoto = e.target.result;
                    document.getElementById('previewImg').src = currentPhoto;
                    document.getElementById('previewImg').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function sendPost() {
            const text = document.getElementById('postInput').value;
            if(!text && !currentPhoto) return;

            const { error } = await client.from('posts').insert([{ 
                user_id: MY_ID, 
                content: text, 
                image_url: currentPhoto,
                likes: 0 
            }]);

            if(!error) {
                await client.rpc('increment_points', { user_id: MY_ID, amount: 15 });
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
