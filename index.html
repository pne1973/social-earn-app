<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network Web App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #ffffff; --yellow: #ffcf05; --gray: #888; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Header & Admin */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .xp-badge { background: var(--yellow); color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .admin-bar { background: #ff4d4d; color: white; padding: 5px; text-align: center; font-size: 11px; font-weight: bold; }

        /* Post Box */
        .post-box { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 16px; resize: none; outline: none; min-height: 60px; }
        .post-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-photo { background: #333; padding: 8px 15px; border-radius: 10px; font-size: 14px; cursor: pointer; }
        .btn-publish { background: var(--yellow); color: #000; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Feed Items */
        .feed-item { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #222; animation: fadeIn 0.5s ease; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
        .actions-bar { display: flex; gap: 20px; margin-top: 15px; font-size: 14px; color: var(--gray); }
        .action-btn { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        /* Comments Section */
        .comment-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid #222; display: none; }
        .comment-item { font-size: 13px; margin-bottom: 8px; color: #ddd; }
        .comment-input-area { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; font-size: 13px; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(22,22,22,0.95); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; backdrop-filter: blur(10px); }
        .nav-item { font-size: 24px; cursor: pointer; transition: 0.2s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="adminPanel" class="admin-bar" style="display:none;">🛡️ MODO ADMIN ATIVO</div>

    <div class="header">
        <h3 style="margin:0; font-size: 18px;">SOCIAL NETWORK</h3>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <div class="post-box">
        <textarea id="postInput" placeholder="Partilha algo com a rede..."></textarea>
        <div id="previewArea"></div>
        <div class="post-actions">
            <label class="btn-photo">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage()">
                📷 Foto
            </label>
            <button id="publishBtn" class="btn-publish" onclick="publishPost()">Publicar</button>
        </div>
    </div>

    <div id="mainFeed"></div>

    <div class="nav">
        <div class="nav-item" onclick="loadTab('home')">🏠</div>
        <div class="nav-item" onclick="loadTab('ranking')">🏆</div>
        <div class="nav-item" onclick="loadTab('wallet')">💰</div>
    </div>

<script>
    // 1. CONFIGURAÇÃO VIA URL (Segurança Render)
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = params.get('url');
    const SUPABASE_KEY = params.get('key');
    const BOT_TOKEN = params.get('bot_token');
    const ADMIN_ID = 5401881400;

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. DADOS DO TELEGRAM
    const tg = window.Telegram?.WebApp;
    const user = tg?.initDataUnsafe?.user || { id: 5401881400, username: "Admin_Test" };
    const userId = user.id;
    const username = user.username || "User_"+userId;

    if (userId === ADMIN_ID) document.getElementById('adminPanel').style.display = 'block';

    // 3. INICIALIZAÇÃO
    async function init() {
        await checkProfile();
        loadFeed();
    }

    async function checkProfile() {
        let { data } = await supabaseClient.from('profiles').select('*').eq('user_id', userId).single();
        if (!data) {
            await supabaseClient.from('profiles').insert([{ user_id: userId, username: username, xp: 0 }]);
            data = { xp: 0 };
        }
        document.getElementById('userXP').innerText = `${data.xp} XP`;
    }

    // 4. FUNÇÃO PUBLIKAR (COM FIX DE FOTO)
    async function publishPost() {
        const text = document.getElementById('postInput').value;
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('publishBtn');
        let imgUrl = null;

        if (!text && !file) return;
        btn.disabled = true;
        btn.innerText = "A enviar...";

        try {
            if (file) {
                const fName = `${Date.now()}_${userId}.jpg`;
                const { error: upErr } = await supabaseClient.storage.from('post-images').upload(fName, file);
                if (upErr) throw upErr;

                const { data: urlData } = supabaseClient.storage.from('post-images').getPublicUrl(fName);
                imgUrl = urlData.publicUrl;
            }

            await supabaseClient.from('posts').insert([{ 
                user_id: userId, username: username, content: text, image_url: imgUrl 
            }]);

            // Ganhar XP
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: imgUrl ? 10 : 5 });
            
            location.reload();
        } catch (e) {
            alert("Erro: " + e.message);
            btn.disabled = false;
            btn.innerText = "Publicar";
        }
    }

    // 5. CARREGAR FEED + ADSTERRA
    async function loadFeed() {
        const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
        let html = "";
        
        posts?.forEach((p, index) => {
            html += `
            <div class="feed-item">
                <div style="display:flex; justify-content:space-between">
                    <b style="color:var(--yellow)">@${p.username}</b>
                    ${userId === ADMIN_ID ? `<span style="color:red; font-size:10px" onclick="deletePost(${p.id})">APAGAR</span>` : ''}
                </div>
                <p>${p.content || ''}</p>
                ${p.image_url ? `<img src="${p.image_url}" class="post-img" onerror="this.style.display='none'">` : ''}
                
                <div class="actions-bar">
                    <div class="action-btn" onclick="likePost(${p.id}, ${p.user_id})">❤️ ${p.likes || 0}</div>
                    <div class="action-btn" onclick="toggleComments(${p.id})">💬 Comentar</div>
                </div>

                <div id="box-${p.id}" class="comment-section">
                    <div id="list-${p.id}"></div>
                    <div class="comment-input-area">
                        <input id="in-${p.id}" class="comment-input" placeholder="Escreve um comentário...">
                        <button class="btn-publish" style="padding:5px 10px" onclick="addComment(${p.id}, ${p.user_id})">OK</button>
                    </div>
                </div>
            </div>`;

            // Inserir Anúncio Adsterra a cada 3 posts
            if ((index + 1) % 3 === 0) {
                html += `<div style="text-align:center; margin:15px;">
                    <small style="color:#666; display:block; margin-bottom:5px;">Publicidade</small>
                    <div style="background:#222; height:50px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:10px; color:#555;">ADSTERRA BANNER AREA</div>
                </div>`;
            }
        });
        document.getElementById('mainFeed').innerHTML = html || "<p style='text-align:center; margin-top:50px; opacity:0.5;'>O feed está vazio.</p>";
    }

    // 6. COMENTÁRIOS E NOTIFICAÇÕES
    async function toggleComments(postId) {
        const box = document.getElementById(`box-${postId}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
        if(box.style.display === 'block') {
            const { data } = await supabaseClient.from('post_comments').select('*').eq('post_id', postId).order('created_at', {ascending: true});
            document.getElementById(`list-${postId}`).innerHTML = data.map(c => `<div class="comment-item"><b>@${c.username}:</b> ${c.content}</div>`).join('');
        }
    }

    async function addComment(postId, ownerId) {
        const input = document.getElementById(`in-${postId}`);
        const text = input.value;
        if(!text) return;

        await supabaseClient.from('post_comments').insert([{ post_id: postId, user_id: userId, username: username, content: text }]);
        
        // Notificar via Telegram
        if(BOT_TOKEN && userId !== ownerId) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ownerId}&text=💬 @${username} comentou no teu post!`);
        }

        input.value = "";
        toggleComments(postId);
    }

    async function likePost(postId, ownerId) {
        await supabaseClient.rpc('increment_likes', { row_id: postId });
        if(BOT_TOKEN && userId !== ownerId) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ownerId}&text=❤️ @${username} deu like no teu post!`);
        }
        loadFeed();
    }

    async function deletePost(postId) {
        if(confirm("Apagar post?")) {
            await supabaseClient.from('posts').delete().eq('id', postId);
            loadFeed();
        }
    }

    function previewImage() {
        const file = document.getElementById('fileInput').files[0];
        if(file) document.getElementById('previewArea').innerHTML = `<p style="font-size:10px; color:var(--yellow)">✓ Imagem selecionada</p>`;
    }

    init();
</script>
</body>
</html>
