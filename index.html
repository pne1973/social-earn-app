<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Apex Social</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* DESIGN SYSTEM - GOOGLE EDITION */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { background-color: #121212; height: 100%; }
body {
background-color: #121212; color: #ffffff;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
min-height: 100vh; padding-top: 165px; padding-bottom: 20px;
}
/* HEADER & MONETIZATION */
.header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
.ad-top { background: #1a1a1a; color: #ffcc00; padding: 10px; text-align: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #333; letter-spacing: 0.5px; }
.nav-main { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
.xp-pill { background: #ffcc00; color: #000; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; box-shadow: 0 2px 8px rgba(255,204,0,0.2); white-space: nowrap; }
/* TABS NAVIGATION */
.tabs { display: flex; background: #1a1a1a; border-top: 1px solid #333; width: 100%; justify-content: space-around; }
.tab-item { flex: 1; padding: 14px 5px; text-align: center; color: #888; font-size: 9px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
.tab-item.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: rgba(255,204,0,0.05); }
/* LAYOUT */
.content { padding: 15px; max-width: 500px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }
.card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
/* POSTS & ACTIONS */
.post { background: #1e1e1e; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
.post-header { padding: 12px; display: flex; align-items: center; gap: 10px; background: #1a1a1a; border-bottom: 1px solid #252525; }
.post-avatar { width: 34px; height: 34px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffcc00; font-weight: bold; border: 1px solid #444; }
.post-text { padding: 15px; font-size: 15px; line-height: 1.5; color: #f0f0f0; }
.post-img { width: 100%; height: 300px; object-fit: cover; display: block; background: #000; border-top: 1px solid #252525; }
.post-actions { display: flex; padding: 12px 15px; border-top: 1px solid #252525; gap: 18px; color: #aaa; font-size: 13px; }
.action-btn { cursor: pointer; display: flex; align-items: center; gap: 6px; }
/* COMMENTS */
.comment-section { background: #161616; padding: 12px; display: none; border-top: 1px solid #252525; }
.comment-list { max-height: 180px; overflow-y: auto; margin-bottom: 12px; }
.comment-item { font-size: 12px; color: #ccc; padding: 6px 0; border-bottom: 1px solid #222; }
.comment-item b { color: #ffcc00; margin-right: 4px; }
.comment-input-wrap { display: flex; gap: 8px; }
.comment-input { flex: 1; background: #252525; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-size: 13px; outline: none; }
/* ADMIN DASHBOARD STYLES */
.admin-stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 10px; background: #111; border-radius: 8px; border: 1px solid #222; }
.admin-stat-card { flex: 1; text-align: center; border-right: 1px solid #333; padding: 0 10px; }
.admin-stat-card:last-child { border-right: none; }
.admin-stat-title { font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
.admin-stat-value { font-size: 20px; font-weight: bold; color: #fff; }
.finance-positive { color: #00ff00; }
.finance-negative { color: #ff4444; }
.btn-pub { background: #ffcc00; color: #000; border: none; padding: 10px 22px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-share-alt { background: #333; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.admin-link { display: none; }
</style>
</head>
<body>
<div class="header-fixed">
<div class="ad-top">📢 APEX SOCIAL: Ganhe dinheiro real interagindo!</div>
<div class="nav-main">
<h3 style="font-size: 18px;">APEX <span style="color:#ffcc00">SOCIAL</span></h3>
<div id="userXP" class="xp-pill">0 XP • 0.00€</div>
</div>
</body>
</html>
