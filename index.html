<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social - Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8f9fa; color: #202124; font-family: 'Roboto', sans-serif; padding-top: 180px; }

        /* HEADER */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #dadce0; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #fff; padding: 10px 0; border-bottom: 1px solid #f1f3f4; }
        .stat-item { text-align: center; border-right: 1px solid #f1f3f4; }
        .stat-item:last-child { border-right: none; }
        .stat-item label { display: block; font-size: 8px; color: #70757a; text-transform: uppercase; margin-bottom: 2px; }
        .stat-item b { font-size: 11px; color: #1a73e8; }
        
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #dadce0; }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; color: #5f6368; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }

        /* CONTENT */
        .container { max-width: 500px; margin: 0 auto; padding: 12px; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* CARDS */
        .card { background: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        h3 { font-size: 16px; margin-bottom: 15px; color: #3c4043; }

        /* ADMIN & TABLES */
        .earnings-table { width: 100%; border-collapse: collapse; }
        .earnings-table td { padding: 10px 0; border-bottom: 1px solid #f1f3f4; font-size: 13px; }
        .adm-only { display: none; }
        body.is-master .adm-only { display: block; }
        
        .btn-google { background: #1a73e8; color: #fff; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body id="appBody">

    <header class="header-fixed">
        <div class="blue-bar" id="headerTitle">Apex Social</div>
        <div class="stats-grid">
            <div class="stat-item"><label>Meus XP</label><b id="valXP">0</b></div>
            <div class="stat-item"><label>Saldo</label><b id="valEUR">0.0000€</b></div>
            <div class="stat-item adm-only"><label>Dívida</label><b id="valDebt" style="color:#d93025;">0.00€</b></div>
            <div class="stat-item"><label>Estado</label><b style="color:#1e8e3e;">ONLINE</b></div>
        </div>
        <nav class="tabs">
            <div class="tab active" data-target="page-explorar" onclick="nav(this)">Explorar</div>
            <div class="tab" data-target="page-rede" onclick="nav(this)">Rede</div>
            <div class="tab" data-target="page-info" onclick="nav(this)">Info</div>
            <div class="tab adm-only" data-target="page-master" onclick="nav(this)" style="color:#d93025;">Master</div>
        </nav>
    </header>

    <main class="container">
        
        <div id="page-explorar" class="page-content active">
            <div id="feedContent"></div>
        </div>

        <div id="page-rede" class="page-content">
            <div class="card">
                <h3>Ranking</h3>
                <div id="rankingList"></div>
            </div>
        </div>

        <div id="page-info" class="page-content">
            <div class="card">
                <h3>Ganhos</h3>
                <table class="earnings-table">
                    <tr><td>Post Foto</td><td align="right"><b>+15 XP</b></td></tr>
                    <tr><td>Check-in</td><td align="right"><b>+5 XP</b></td></tr>
                </table>
            </div>
        </div>

        <div id="page-master" class="page-content adm-only">
            <div class="card">
                <h3 style="color:#d93025;">Painel Admin</h3>
                <div id="adminStats"></div>
            </div>
        </div>

    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const MASTER_ID = 5401881400; 

        async function init() {
            if(MASTER_ID === 5401881400) document.body.classList.add('is-master');
            loadPosts();
        }

        function nav(el) {
            const target = el.getAttribute('data-target');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(target).classList.add('active');
        }

        async function loadPosts() {
            const { data } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const cont = document.getElementById('feedContent');
            cont.innerHTML = "";
            data.forEach(p => {
                cont.innerHTML += `<div class="card"><b>ID #${p.id}</b><p>${p.content || ''}</p></div>`;
            });
        }

        init();
    </script>
</body>
</html>
