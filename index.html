<style>
    .event-alert {
        background: var(--google-red);
        color: white;
        padding: 10px;
        border-radius: 8px;
        margin-top: 10px;
        font-size: 12px;
        text-align: center;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }
    .level-badge {
        background: #e8f0fe;
        color: var(--google-blue);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: bold;
    }
</style>

<div class="card-google">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span class="level-badge" id="location-name">📍 GARAGEM (LISBOA)</span>
        <span id="p-level" style="font-size: 11px; font-weight: bold;">NÍVEL 1</span>
    </div>

    <div id="hacker-alert" class="hidden event-alert">
        ⚠️ ATAQUE HACKER EM CURSO! 
        <button onclick="defendSystem()" style="background: white; color: var(--google-red); border: none; padding: 4px 8px; border-radius: 4px; margin-left: 10px; font-weight: bold; cursor: pointer;">DEFENDER</button>
    </div>

    <div class="balance-display">€ <span id="p-balance">0.0000</span></div>
    
    <div id="actions-zone">
        <button id="btn-upgrade" onclick="upgradeServer()" class="btn-google btn-outline">EXPANDIR DATACENTER (€<span id="up-cost">0.0500</span>)</button>
    </div>
</div>

<script>
    // Novas variáveis de estado
    let cityLevel = 1;
    let locations = ["Garagem (Lisboa)", "Escritório (Porto)", "Bunker (Londres)", "Data Center (Frankfurt)"];
    
    // Função de Evento Aleatório (Executada a cada 1 minuto)
    function randomEvent() {
        if (Math.random() > 0.8 && !isBroken) { // 20% de chance
            document.getElementById('hacker-alert').classList.remove('hidden');
            // Se não defender em 15 segundos, perde saldo
            setTimeout(() => {
                if (!document.getElementById('hacker-alert').classList.contains('hidden')) {
                    balance *= 0.95; // Perde 5%
                    alert("Ataque bem sucedido! Perdeu 5% do saldo.");
                    document.getElementById('hacker-alert').classList.add('hidden');
                    render();
                }
            }, 15000);
        }
    }

    function defendSystem() {
        document.getElementById('hacker-alert').classList.add('hidden');
        alert("Ataque repelido com sucesso!");
    }

    // Melhoria na função de Upgrade
    function upgradeServer() {
        if (balance >= upgradeCost) {
            balance -= upgradeCost;
            pSpeed *= 2.2;
            upgradeCost *= 3;
            
            cityLevel++;
            if(cityLevel <= locations.length) {
                document.getElementById('location-name').innerText = "📍 " + locations[cityLevel-1].toUpperCase();
                document.getElementById('p-level').innerText = "NÍVEL " + cityLevel;
            }

            document.getElementById('up-cost').innerText = upgradeCost.toFixed(4);
            render();
        } else {
            alert("Saldo insuficiente para expandir a infraestrutura.");
        }
    }

    // Iniciar monitor de eventos
    setInterval(randomEvent, 60000);
</script>
