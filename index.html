<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Social - Functional Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8f9fa; color: #202124; font-family: 'Roboto', sans-serif; padding-top: 235px; }

        /* HEADER & ADS */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 99999; background: #fff; border-bottom: 1px solid #dadce0; }
        .ad-top { background: #ffd600; color: #000; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #000; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0; text-align: center; border-bottom: 1px solid #f1f3f4; background: #fff; }
        .stats b { display: block; color: #1a73e8; font-size: 11px; }
        .stats label { font-size: 8px; color: #70757a; text-transform: uppercase; margin-bottom: 2px; }

        .tabs { display: flex; background: #fff; border-bottom: 1px solid #dadce0; }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; color: #5f6368; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; }
        .tab.admin-tab { color: #d93025; }

        .container { max-width: 500px; margin: 0 auto; padding: 12px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* POSTS */
        .card { background: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #f1f3f4; padding-bottom: 8px; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 32px; height: 32px; background: #e8f0fe; border: 2px solid #1a73e8; border-radius: 50%; color: #1a73e8; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .user-name { font-size: 13px; font-weight: bold; color: #1a73e8; }
        
        /* FOTOS 150PX */
        .post-img-box { width: 100%; height: 150px; overflow: hidden; border-radius: 6px; margin: 10px 0; border: 1px solid #eee; background: #f8f9fa; }
        .post-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .post-actions { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #f1f3f4; padding-top: 12px; margin-top: 10px; }
        .btn-act { background: none; border: none; font-size: 11px; color: #5f6368; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-act i { color: #1a73e8; font-size: 16px; }

        /* ADS */
        .ad-container { background: #fff; border: 1px solid #dadce0; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
        .ad-content { padding: 12px; position: relative; }
        .ad-tag { position: absolute; top: 8px; right: 8px; background: #1a73e8; color: #fff; font-size: 8px; padding: 2px 6px; border-radius: 3px; font-weight: bold; }

        /* TABLES */
        .earn-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .earn-table td { padding: 12px; border: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="ad-top">▲ ESPAÇO PUBLICITÁRIO: 10.000 XP = 1.00€ ▲</div>
        <div class="blue-bar">APEX SOCIAL NETWORK</div>
        <div class="stats">
            <div><label>Meus XP</label><b id="displayXP">0</b></div>
            <div><label>Saldo EUR</label><b id="displayEUR">0.0000€</b></div>
            <div><label>Dívida</label><b id="displayDebt" style="color:#d93025;">0.00€</b></div>
            <div><label>Estado</label><b style="color:#1e8e3e;">ONLINE</b></div>
        </div>
        <nav class="tabs">
            <div class="tab active" onclick="showTab('explorar', this)">Explorar</div>
            <div class="tab" onclick="showTab('rede', this)">Rede</div>
            <div class="tab" onclick="showTab('info', this)">Info</div>
            <div class="tab admin-tab" onclick="showTab('master', this)">Master</div>
        </nav>
    </header>

    <main class="container">
        
        <section id="view-explorar" class="view-section active">
            <div class="card">
                <textarea id="postText" style="width:100%; border:none; outline:none; font-size:15px; min-height:40px;" placeholder="No que está a pensar?"></textarea>
                <div style="text-align:right; margin-top:10px;"><button onclick="addXP(15)" style="background:#1a73e8; color:#fff; border:none; padding:8px 18px; border-radius:5px; font-weight:bold; cursor:pointer;">Publicar (+15 XP)</button></div>
            </div>
            <div id="mainFeed"></div>
        </section>

        <section id="view-rede" class="view-section">
            <div class="card">
                <h3>Afiliados</h3>
                <p style="font-size:11px; margin:10px 0;">Partilhe o seu link para ganhar 100 XP por cada amigo.</p>
                <button onclick="addXP(100)" style="width:100%; background:#1a73e8; color:#fff; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">CONVIDAR AMIGO (+100 XP)</button>
            </div>
        </section>

        <section id="view-info" class="view-section">
            <div class="card">
                <h3>Tabela de Conversão</h3>
                <table class="earn-table">
                    <tr><td>Saldo Mínimo</td><td style="text-align:right;">5.000 XP</td></tr>
                    <tr><td>Taxa de Câmbio</td><td style="text-align:right; color:#1a73e8; font-weight:bold;">1 XP = 0.0001€</td></tr>
                </table>
            </div>
        </section>

        <section id="view-master" class="view-section">
            <div class="card" style="border:1px solid #d93025;">
                <h3 style="color:#d93025;">Consola Master</h3>
                <p style="font-size:12px; margin-top:10px;">Dívida Total da Rede: <b id="masterDebt">0.00€</b></p>
            </div>
        </section>

    </main>

    <script>
        // CONFIGURAÇÕES SUPABASE
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);

        // VARIÁVEIS DE ECONOMIA
        let userXP = 80;
        const conversionRate = 0.0001;

        // FUNÇÃO DE ATUALIZAÇÃO DE SALDO (REAL-TIME)
        function updateEconomy() {
            const eurValue = (userXP * conversionRate).toFixed(4);
            document.getElementById('displayXP').innerText = userXP;
            document.getElementById('displayEUR').innerText = eurValue + "€";
            
            // Simulação da Dívida na Consola Master (Soma de utilizadores)
            document.getElementById('masterDebt').innerText = eurValue + "€";
        }

        function addXP(amount) {
            userXP += amount;
            updateEconomy();
            alert("Ganhou " + amount + " XP!");
        }

        function showTab(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            el.classList.add('active');
        }

        async function loadFeed() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const f = document.getElementById('mainFeed');
            f.innerHTML = "";
            posts?.forEach((p, i) => {
                if (i > 0 && i % 3 === 0) {
                    f.innerHTML += `
                        <div class="ad-container">
                            <div class="ad-content">
                                <span class="ad-tag">ANÚNCIO</span>
                                <div style="font-size:13px; font-weight:bold;">Patrocínio Apex</div>
                                <div style="font-size:11px; color:#5f6368;">Clique aqui para ganhar XP extra.</div>
                            </div>
                        </div>`;
                }
                f.innerHTML += `
                    <div class="card">
                        <div class="post-header">
                            <div class="user-info"><div class="avatar">A</div><span class="user-name">Apex User</span></div>
                            <span style="font-size:9px; color:#777;">#${p.id.toString().slice(-4)}</span>
                        </div>
                        <p style="font-size:14px;">${p.content || ''}</p>
                        ${p.image_url ? `<div class="post-img-box"><img src="${p.image_url}"></div>` : ''}
                        <div class="post-actions">
                            <button class="btn-act" onclick="addXP(2)"><i class="far fa-heart"></i> Like (+2)</button>
                            <button class="btn-act"><i class="far fa-comment"></i> Comentar</button>
                            <button class="btn-act" style="color:#d93025"><i class="fas fa-times"></i> Apagar</button>
                        </div>
                    </div>`;
            });
        }

        // INICIALIZAÇÃO
        updateEconomy();
        loadFeed();
    </script>
</body>
</html>
