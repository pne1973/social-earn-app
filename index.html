<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social v32.7 - Production Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --google-blue: #1a73e8; --google-red: #ea4335; --google-yellow: #fbbc04; --google-green: #34a853; --bg: #f8f9fa; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; color: #202124; padding-bottom: 60px; }
        
        /* AUTH & TUTORIAL */
        #auth-screen, #tutorial { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; text-align: center; }
        
        /* HEADER STYLE GOOGLE */
        header { background: white; padding: 12px; border-bottom: 1px solid #dadce0; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(60,64,67,0.1); }
        .nav-container { max-width: 500px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .balance-box { text-align: center; flex-grow: 1; }
        .main-balance { font-size: 1.6rem; font-weight: 700; color: var(--google-green); }
        
        /* FEED & POSTS */
        .feed { max-width: 500px; margin: 15px auto; padding: 0 10px; }
        .post { background: white; border: 1px solid #dadce0; border-radius: 12px; margin-bottom: 15px; overflow: hidden; transition: 0.2s; }
        .post-content { padding: 15px; font-size: 1rem; line-height: 1.5; }
        .post img { width: 100%; display: block; border-top: 1px solid #f1f3f4; }
        
        /* GAMIFICATION BUTTONS */
        .actions { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #f1f3f4; }
        .btn-act { padding: 12px; border: none; background: white; cursor: pointer; font-weight: 500; color: #5f6368; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-act:active { background: #f1f3f4; }
        .btn-act.like { color: var(--google-blue); }

        /* EARNINGS TABLE */
        .earnings-info { font-size: 0.75rem; color: #70757a; margin-top: 4px; }
        .logout-btn { font-size: 0.7rem; color: var(--google-red); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-screen" style="display:none;">
    <h1 style="color:var(--google-blue); margin-bottom:10px;">Apex Social</h1>
    <p>Introduza o seu ID Único</p>
    <input type="text" id="uid-input" placeholder="ID ou Username" style="padding:12px; border-radius:8px; border:1px solid #dadce0; width:280px; margin-bottom:15px;">
    <button onclick="login()" style="background:var(--google-blue); color:white; border:none; padding:12px 40px; border-radius:24px; font-weight:bold; cursor:pointer;">ACEDER</button>
</div>

<header id="main-header" style="display:none;">
    <div class="nav-container">
        <div class="logout-btn" onclick="logout()">SAIR</div>
        <div class="balance-box">
            <div class="main-balance" id="balance-display">0.0000€</div>
            <div class="earnings-info" id="conversion-display">R$ 0.00</div>
        </div>
        <div style="width:30px;"></div> 
    </div>
</header>

<div class="feed" id="main-feed" style="display:none;">
    </div>

<script>
    // CONFIGURAÇÃO MASTER
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const GAMIFICATION = { POST: 0.0015, LIKE: 0.0002, SHARE: 0.0005, CHECKIN: 0.0005 }; //
    const RATE_BRL = 6.1245; // 4 casas decimais conforme especificação
    
    let currentUID = localStorage.getItem('apex_uid');
    let user = { saldo: 0.0000 };

    function login() {
        const val = document.getElementById('uid-input').value.trim();
        if(val) { localStorage.setItem('apex_uid', val); location.reload(); }
    }
    function logout() { localStorage.removeItem('apex_uid'); location.reload(); }

    async function init() {
        if (!currentUID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
        
        document.getElementById('main-header').style.display = 'block';
        document.getElementById('main-feed').style.display = 'block';

        // Sincronização com Supabase (v32.6 fix)
        const { data } = await sb.from('perfis').select('saldo').eq('id', currentUID).single();
        if (data) {
            user.saldo = parseFloat(data.saldo) || 0;
        } else {
            await sb.from('perfis').insert([{ id: currentUID, saldo: 0.0000 }]);
        }

        updateDisplay();
        loadContent();
    }

    function updateDisplay() {
        const brl = (user.saldo * RATE_BRL).toFixed(2);
        document.getElementById('balance-display').innerText = user.saldo.toFixed(4) + "€";
        document.getElementById('conversion-display').innerText = "R$ " + brl + " • ID: " + currentUID;
    }

    async function applyGain(type) {
        const value = GAMIFICATION[type] || 0;
        user.saldo = parseFloat((user.saldo + value).toFixed(4));
        updateDisplay();
        
        // Gravação garantida via Upsert
        await sb.from('perfis').upsert({ id: currentUID, saldo: user.saldo });
    }

    async function loadContent() {
        const { data: posts } = await sb.from('posts').select('*').order('id', { ascending: false }).limit(10);
        const feed = document.getElementById('main-feed');
        
        if (posts) {
            feed.innerHTML = posts.map(p => `
                <div class="post">
                    <div class="post-content">${p.content || ''}</div>
                    ${p.image_url ? `<img src="${p.image_url}" alt="Post Image">` : ''}
                    <div class="actions">
                        <button class="btn-act like" onclick="applyGain('LIKE')">👍 Like (+0.0002€)</button>
                        <button class="btn-act" onclick="applyGain('SHARE')">💬 Share (+0.0005€)</button>
                    </div>
                </div>
            `).join('');
        }
    }

    init();
</script>
</body>
</html>
