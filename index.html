<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v32.5 - Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --g-yellow: #FBBC04; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; overflow-x: hidden; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; transition: all 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--g-blue); border-top: 3px solid var(--g-blue); background: #f8f9fa; }
        .gold-comment { background: #fffdf2; border-left: 4px solid var(--g-yellow); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sync-animation { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }
        .btn-active:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <header class="sticky top-0 bg-white border-b z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">A</div>
            <div>
                <h1 class="text-sm font-black uppercase tracking-tighter leading-none text-blue-600">Apex Social</h1>
                <span class="text-[7px] font-bold text-gray-400 uppercase tracking-[0.2em]">Enterprise v32.501</span>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-blue-600 text-base tracking-tighter tabular-nums">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">0.0000 BRL</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4 pb-32">
        
        <section id="view-social" class="tab-content active">
            <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar py-1">
                <button class="bg-blue-600 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase shadow-md">Geral</button>
                <button class="bg-white border px-5 py-2 rounded-full text-[10px] font-bold text-gray-500 uppercase">Amigos</button>
            </div>

            <div class="google-card p-3 mb-5 bg-blue-50 border-blue-100 flex items-center">
                <div class="text-[9px] font-black text-blue-600 uppercase italic mr-3 px-2 border-r border-blue-200">Top 10</div>
                <div id="top-rank" class="text-[10px] font-bold text-gray-500 flex gap-4 overflow-hidden whitespace-nowrap italic">Sincronizando XP...</div>
            </div>

            <div class="google-card p-4 mb-6 shadow-md border-t-4 border-blue-500">
                <textarea id="post-input" placeholder="Partilhe algo novo... (+15 XP)" class="w-full border-none focus:ring-0 text-sm p-0 mb-3 resize-none" rows="2"></textarea>
                <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                    <button onclick="publish()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[11px] uppercase shadow-lg btn-active">Publicar na Rede</button>
                </div>
            </div>

            <div id="feed-container" class="space-y-5">
                </div>

            <div id="fatigue-lock" class="hidden google-card p-8 text-center bg-red-50 border-red-100 mt-6">
                <p class="text-red-600 font-black text-[11px] uppercase italic animate-pulse">Segurança Anti-Bot Ativa</p>
                <p class="text-[9px] font-bold text-red-400 uppercase mt-2">Aguarde 5 segundos...</p>
            </div>
        </section>

        <section id="view-wallet" class="tab-content">
            <div class="google-card p-10 text-center border-t-8 border-blue-600 mb-6 shadow-xl">
                <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-2">Balanço</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600 tracking-tighter">0.0000€</h1>
                <p id="wall-brl" class="text-sm font-bold text-gray-400 mt-3">≈ 0.0000 BRL</p>
            </div>
            <button onclick="triggerSync('checkin', 0.0016)" class="w-full google-card p-5 flex justify-between items-center hover:bg-blue-50 mb-3">
                <div class="text-left">
                    <p class="text-xs font-black text-gray-800 uppercase">Check-in Diário</p>
                    <p class="text-[9px] font-bold text-blue-500 uppercase">+5 XP</p>
                </div>
                <span>⚡</span>
            </button>
        </section>

        <section id="view-admin" class="tab-content">
            <div class="google-card p-6 border-t-4 border-red-600">
                <h2 class="text-red-600 font-black text-xs uppercase mb-6">Painel Admin</h2>
                <div class="space-y-3">
                    <input id="del-id" type="text" placeholder="ID do Post" class="w-full p-4 bg-gray-50 border rounded-xl text-xs">
                    <button onclick="adminDelete()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-[11px] uppercase">Eliminar Post</button>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 z-50 px-2 pb-2">
        <button onclick="nav('social')" class="nav-item active flex-1 flex flex-col items-center py-2">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"></path></svg>
            <span class="text-[9px] font-black uppercase">Social</span>
        </button>
        <button onclick="nav('wallet')" class="nav-item flex-1 flex flex-col items-center py-2 text-gray-400">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2"></path></svg>
            <span class="text-[9px] font-black uppercase">Carteira</span>
        </button>
        <button id="adm-btn" onclick="nav('admin')" class="hidden flex-1 flex flex-col items-center py-2 text-red-300">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2z"></path></svg>
            <span class="text-[9px] font-black uppercase italic underline">Admin</span>
        </button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const BRL_FIX = 6.1245;

        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        let user = { id: MASTER_ID, saldo: 0 };
        let scrollCount = 0;
        let isLocked = false;

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            const targetBtn = Array.from(document.querySelectorAll('.nav-item')).find(btn => btn.innerText.toLowerCase().includes(t.substring(0,3)));
            if(targetBtn) targetBtn.classList.add('active');
        }

        async function init() {
            if(MASTER_ID === "5401881400") document.getElementById('adm-btn').classList.remove('hidden');
            try {
                const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
                if(data) user = data;
                updateUI();
                loadRanking();
                loadFeed();
            } catch(e) { console.error("Init Error:", e); }
        }

        function updateUI() {
            const e = user.saldo || 0;
            document.getElementById('main-eur').innerText = e.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = e.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (e * BRL_FIX).toFixed(4) + " BRL";
            document.getElementById('wall-brl').innerText = "≈ " + (e * BRL_FIX).toFixed(4) + " BRL";
        }

        async function loadFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '<p class="text-center text-[10px] font-black text-blue-500 animate-pulse uppercase">A sincronizar rede global...</p>';

            const { data, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            
            if (error) {
                container.innerHTML = `<div class="p-4 bg-red-50 text-red-500 text-[10px] font-black rounded-xl">ERRO DE SINCRO: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 text-[10px] font-bold uppercase py-10">Nenhuma atividade validada.</p>';
                return;
            }

            container.innerHTML = data.map((p, i) => `
                <div class="google-card p-5 relative border-l-4 ${i % 3 === 0 ? 'border-blue-500' : 'border-transparent'}">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-[11px] font-black text-blue-600 border">U</div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black text-gray-800 uppercase tracking-tighter">ID: ..${String(p.user_id).slice(-4)}</span>
                            <span class="text-[7px] font-bold text-gray-300 uppercase italic">Validado via nó seguro</span>
                        </div>
                    </div>
                    <p class="text-[13px] text-gray-700 leading-relaxed mb-5">${p.content}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <button onclick="reagir(0.0006)" class="text-[10px] font-black text-gray-400 uppercase hover:text-blue-600 transition-all flex items-center gap-1">👍 Like <span class="text-blue-500">+2 XP</span></button>
                        <span class="text-[7px] font-bold text-gray-200">#${p.id}</span>
                    </div>
                </div>
                ${(i+1) % 3 === 0 ? '<div class="p-4 bg-gray-50 border-2 border-dashed border-gray-200 text-center rounded-2xl mb-4"><p class="text-[9px] font-black text-gray-400 uppercase italic">A carregar bónus de rede...</p></div>' : ''}
            `).join('');
        }

        async function publish() {
            const txt = document.getElementById('post-input').value;
            if(!txt || txt.length < 3) return alert("Conteúdo insuficiente.");
            
            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content: txt }]);
            if(!error) {
                user.saldo += 0.0050; // +15 XP
                await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
                document.getElementById('post-input').value = "";
                updateUI();
                loadFeed();
            } else {
                alert("Erro ao publicar: " + error.message);
            }
        }

        async function reagir(val) {
            user.saldo += val;
            updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        function triggerSync(type, val) {
            alert("Protocolo Omni: Sincronizando " + type.toUpperCase());
            if(val > 0) reagir(val);
        }

        async function loadRanking() {
            const { data } = await sb.from('perfis').select('id, saldo').order('saldo', {ascending: false}).limit(10);
            if(data) document.getElementById('top-rank').innerHTML = data.map((u, i) => `<span>#${i+1} ..${String(u.id).slice(-3)}</span>`).join(' • ');
        }

        async function adminDelete() {
            const id = document.getElementById('del-id').value;
            const { error } = await sb.from('posts').delete().eq('id', id);
            if(!error) { alert("Removido."); loadFeed(); }
        }

        window.onload = init;
    </script>
</body>
</html>
