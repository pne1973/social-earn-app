<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v34.508</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
        
        /* Efeito de Ganhos */
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5000; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
        .earning-text { font-size: 4rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 20px rgba(52, 168, 83, 0.4); -webkit-text-stroke: 2px white; }

        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; position: relative; border: none; background: none; }
        .interaction-badge { position: absolute; top: 4px; right: 15%; background: var(--g-red); color: white; font-size: 9px; padding: 1px 5px; border-radius: 10px; border: 2px solid white; }
        
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .sticky-publisher { position: fixed; top: 72px; left: 0; right: 0; z-index: 100; background: #f1f3f4; padding: 12px 16px; }
        #feed-container { margin-top: 165px; }
        
        /* Correção de Imagem */
        .post-image-container { width: 100%; background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-h-[180px]; margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .post-image-container img { width: 100%; height: auto; object-fit: contain; max-height: 400px; }
    </style>
</head>
<body class="pb-24">

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <div id="ad-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center border-4 border-blue-600 shadow-2xl">
            <div id="ad-decision-ui">
                <h3 class="text-xl font-black text-blue-600 mb-2 uppercase">Atenção</h3>
                <p class="text-[10px] text-gray-400 font-black mb-6 uppercase">Vê o anúncio completo para validar os teus ganhos.</p>
                <button onclick="startAdFlow()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg mb-3">Ver Anúncio (15 seg)</button>
                <button onclick="degradeAndContinue()" class="w-full p-4 text-gray-400 font-black uppercase text-[9px]">Pular (-20% bónus)</button>
            </div>
            <div id="ad-player-ui" class="hidden">
                <div class="aspect-video bg-black rounded-xl mb-6 flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-blue-900 opacity-20 animate-pulse"></div>
                    <p id="ad-timer" class="text-white font-black text-4xl z-10">15</p>
                </div>
                <button id="close-ad-btn" disabled class="w-full py-5 bg-gray-100 text-gray-400 rounded-xl font-black uppercase text-xs">Visualização Obrigatória</button>
            </div>
        </div>
    </div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-md">A</div>
            <h1 class="text-sm font-black uppercase text-blue-600">Apex Social</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg leading-none">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase italic">0.0000 BRL</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4 mt-[72px]">
        <section id="view-social" class="tab-content active">
            <div class="sticky-publisher">
                <div class="google-card p-4 border-t-8 border-blue-600 shadow-xl">
                    <textarea id="post-input" onclick="expandPublisher()" placeholder="O QUE PRETENDE PARTILHAR? (+0.0150€)" class="w-full border-none text-xs font-black uppercase focus:ring-0" rows="1"></textarea>
                    <div id="expanded-post" class="hidden">
                        <input id="post-url" type="text" placeholder="URL DA IMAGEM (JPG/PNG)" class="w-full bg-gray-50 p-4 rounded-xl mb-4 text-[10px] font-black uppercase outline-none border border-gray-100">
                        <button onclick="publish()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-[11px] shadow-lg">Publicar Agora</button>
                    </div>
                </div>
            </div>
            <div id="feed-container" class="space-y-6"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="google-card p-12 text-center border-t-[10px] border-blue-600 mt-4 shadow-2xl">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2 italic">Saldo Disponível</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center"><span class="text-[10px] font-black uppercase">REDE</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center"><span class="text-[10px] font-black uppercase">GANHOS</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = { saldo: 0, interactions: 0, multiplier: 1.0 };
        let pendingVal = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            updateUI(); loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (user.saldo * 6.12).toFixed(4) + " BRL";
        }

        function showBigNumber(val) {
            const container = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            container.style.display = 'block';
            setTimeout(() => { container.style.display = 'none'; }, 800);
        }

        async function reagir(val) {
            if(user.interactions >= 4) {
                pendingVal = val;
                document.getElementById('ad-overlay').style.display = 'flex';
                return;
            }
            user.interactions++;
            const ganhar = val * user.multiplier;
            user.saldo += ganhar;
            showBigNumber(ganhar); updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            
            posts.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = "google-card shadow-sm mb-6";
                card.innerHTML = `
                    <div class="p-5">
                        <p class="text-[13px] font-black uppercase text-gray-800 mb-4">${p.content}</p>
                        ${p.image_url ? `
                            <div class="post-image-container">
                                <img src="${p.image_url}" onerror="this.closest('.post-image-container').style.display='none'">
                            </div>
                        ` : ''}
                        <div class="flex border-t pt-2">
                            <button onclick="reagir(0.0006)" class="interaction-btn">
                                <div class="interaction-badge">${Math.floor(Math.random()*99)}</div>
                                <span class="text-xl">👍</span><span class="text-[8px] font-black text-gray-400 mt-1 uppercase">Gostar</span>
                            </button>
                            <button onclick="reagir(0.0010)" class="interaction-btn border-x border-gray-100">
                                <div class="interaction-badge">0</div>
                                <span class="text-xl">💬</span><span class="text-[8px] font-black text-gray-400 mt-1 uppercase">Comentar</span>
                            </button>
                            <button onclick="reagir(0.0020)" class="interaction-btn">
                                <div class="interaction-badge">${Math.floor(Math.random()*20)}</div>
                                <span class="text-xl">🔗</span><span class="text-[8px] font-black text-gray-400 mt-1 uppercase">Partilhar</span>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                if((idx + 1) % 3 === 0) {
                    const ad = document.createElement('div');
                    ad.className = "google-card p-6 bg-blue-50 border-2 border-blue-200 text-center mb-6";
                    ad.innerHTML = `<h4 class="text-[10px] font-black uppercase text-blue-600 mb-4 italic">Publicidade Parceira</h4>
                                    <button onclick="startAdFlow()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md">Ver Anúncio e Ganhar</button>`;
                    container.appendChild(ad);
                }
            });
        }

        function startAdFlow() {
            document.getElementById('ad-decision-ui').classList.add('hidden');
            document.getElementById('ad-player-ui').classList.remove('hidden');
            let t = 15;
            const timerText = document.getElementById('ad-timer');
            const btn = document.getElementById('close-ad-btn');
            const interval = setInterval(() => {
                t--; timerText.innerText = t;
                if(t <= 0) {
                    clearInterval(interval);
                    btn.disabled = false; btn.innerText = "VALIDAR RECOMPENSA";
                    btn.className = "w-full py-5 bg-green-600 text-white rounded-xl font-black uppercase text-xs shadow-xl";
                    btn.onclick = () => { user.multiplier = 1.0; user.interactions = 0; finalize(); };
                }
            }, 1000);
        }

        function degradeAndContinue() { user.multiplier = Math.max(0.2, user.multiplier - 0.2); user.interactions++; finalize(); }

        async function finalize() {
            document.getElementById('ad-overlay').style.display = 'none';
            document.getElementById('ad-decision-ui').classList.remove('hidden');
            document.getElementById('ad-player-ui').classList.add('hidden');
            const b = pendingVal * user.multiplier;
            user.saldo += b; showBigNumber(b); updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        async function publish() {
            const c = document.getElementById('post-input').value;
            const i = document.getElementById('post-url').value;
            if(!c) return;
            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content: c, image_url: i }]);
            if(!error) { user.saldo += 0.0150; showBigNumber(0.0150); updateUI(); await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID); document.getElementById('post-input').value = ""; loadFeed(); }
        }

        function expandPublisher() { document.getElementById('expanded-post').classList.remove('hidden'); document.getElementById('post-input').rows = 3; }
        function nav(t) { document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById('view-'+t).classList.add('active'); event.currentTarget.classList.add('active'); }

        window.onload = init;
    </script>
</body>
</html>
