<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v32.800 - Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; color: #3c4043; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--g-blue); border-top: 3px solid var(--g-blue); font-weight: 900; }
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .coin-pop { position: absolute; animation: flyUp 0.6s ease-out forwards; pointer-events: none; color: var(--g-green); font-weight: 900; font-size: 11px; z-index: 50; }
        @keyframes flyUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-40px); opacity: 0; } }
        .post-img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; }
    </style>
</head>
<body class="pb-24">

    <div id="ad-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border-2 border-blue-600">
            <div id="ad-decision-ui" class="p-8 text-center">
                <div class="text-3xl mb-4">⚙️</div>
                <h3 class="text-sm font-black uppercase mb-2">Sincronização Necessária</h3>
                <p class="text-[10px] text-gray-500 font-bold uppercase leading-relaxed mb-6">Limite de tráfego gratuito atingido. Escolha a sua rota de rede:</p>
                <div class="space-y-3">
                    <button onclick="startAdFlow()" class="w-full p-4 bg-blue-600 text-white rounded-2xl shadow-lg">
                        <p class="text-[10px] font-black uppercase">Validar com Anúncio</p>
                        <p class="text-[8px] opacity-80 uppercase">Mantém Ganhos a 100%</p>
                    </button>
                    <button onclick="degradeAndContinue()" class="w-full p-4 bg-gray-50 border text-gray-600 rounded-2xl">
                        <p class="text-[10px] font-black uppercase">Ignorar Validação</p>
                        <p class="text-[8px] text-red-400 uppercase">Penalização de -20% nos Ganhos</p>
                    </button>
                </div>
            </div>
            <div id="ad-player-ui" class="hidden">
                <div class="bg-black aspect-video flex items-center justify-center relative">
                    <div class="text-white text-center">
                        <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
                        <p id="ad-timer-text" class="text-[9px] font-black uppercase tracking-widest">Sincronizando (5s)...</p>
                    </div>
                </div>
                <div class="p-6">
                    <button id="close-ad-btn" disabled class="w-full py-4 bg-gray-100 text-gray-400 rounded-xl font-black text-[10px] uppercase shadow-inner">Processando...</button>
                </div>
            </div>
        </div>
    </div>

    <header class="sticky top-0 bg-white border-b z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-md">A</div>
            <div>
                <h1 class="text-xs font-black uppercase text-blue-600 leading-none">Apex Social</h1>
                <span id="multiplier-tag" class="text-[7px] font-bold text-green-500 uppercase italic">Taxa: 100%</span>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-sm tracking-tighter tabular-nums">0.0000€</div>
            <div id="main-brl" class="text-[8px] font-bold text-gray-400 uppercase">0.0000 BRL</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-3">
        <section id="view-social" class="tab-content active">
            <div class="google-card p-4 mb-5 border-t-4 border-blue-500 shadow-sm">
                <textarea id="post-input" placeholder="O que pretende validar? (+0.0150€)" class="w-full border-none focus:ring-0 text-sm mb-2 resize-none" rows="2"></textarea>
                <input id="post-url" type="text" placeholder="URL da Imagem (Ex: https://...)" class="w-full bg-gray-50 border-none text-[10px] p-2.5 rounded-lg mb-3 outline-none">
                <button onclick="publish()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">Publicar</button>
            </div>
            <div id="feed-container" class="space-y-4"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="google-card p-10 text-center border-t-8 border-blue-600 mb-6 shadow-xl">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Saldo Master</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p id="wall-brl" class="text-[10px] font-bold text-gray-400 mt-2 uppercase italic tracking-tighter">≈ 0.0000 BRL</p>
            </div>
            <div class="space-y-3">
                <button onclick="openDecisionModal(0.0050)" class="w-full google-card p-5 flex justify-between items-center border-l-4 border-blue-500 hover:bg-gray-50 transition-all">
                    <div class="text-left"><p class="text-xs font-black uppercase">Check-in Diário</p><p class="text-[8px] text-blue-500 font-bold uppercase">+0.0050€ Garantidos</p></div>
                    <span>⚡</span>
                </button>
                <button onclick="shareAffiliate()" class="w-full google-card p-5 flex justify-between items-center border-l-4 border-green-500 hover:bg-gray-50 transition-all">
                    <div class="text-left"><p class="text-xs font-black uppercase">Convidar Amigos</p><p class="text-[8px] text-green-500 font-bold uppercase">Ganhe 5% do Lucro Deles</p></div>
                    <span>👥</span>
                </button>
            </div>
        </section>

        <section id="view-admin" class="tab-content">
            <div class="google-card border-t-4 border-red-600 p-5 shadow-lg">
                <h2 class="text-red-600 font-black text-[10px] uppercase mb-4 italic tracking-widest">Painel Admin Master (ID 5401881400)</h2>
                <div class="grid grid-cols-2 gap-3 mb-4 text-center">
                    <div class="bg-gray-50 p-4 rounded-xl border"><p class="text-[7px] text-gray-400 uppercase font-black">Dívida Rede</p><p id="adm-debt" class="font-black text-blue-700 text-lg">0.0000€</p></div>
                    <div class="bg-gray-50 p-4 rounded-xl border"><p class="text-[7px] text-gray-400 uppercase font-black">Teu Lucro (40%)</p><p id="adm-profit" class="font-black text-green-700 text-lg">0.0000€</p></div>
                </div>
                <input id="del-id" type="text" placeholder="ID do Post" class="w-full p-3 bg-gray-50 border rounded-lg text-xs mb-3 font-bold outline-none">
                <button onclick="adminDelete()" class="w-full bg-red-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">Eliminar Conteúdo</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 z-50">
        <button onclick="nav('social')" class="nav-item active flex-1 flex flex-col items-center py-2"><span class="text-[9px] font-black uppercase">Rede</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 flex flex-col items-center py-2 text-gray-400"><span class="text-[9px] font-black uppercase">Ganhos</span></button>
        <button id="adm-btn" onclick="nav('admin')" class="hidden flex-1 flex flex-col items-center py-2 text-red-300"><span class="text-[9px] font-black uppercase italic underline">Admin</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const BRL_FIX = 6.1245;
        const MAX_FREE = 1; // LIMITE DE TESTE

        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        let user = { saldo: 0, interactions: 0, multiplier: 1.0 };
        let pendingBonus = 0;

        async function init() {
            if(MASTER_ID === "5401881400") document.getElementById('adm-btn').classList.remove('hidden');
            const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
            if(data) { user = {...user, ...data}; user.saldo = Number(data.saldo) || 0; }
            updateUI();
            loadFeed();
            checkAffiliate();
        }

        function updateUI() {
            const e = Number(user.saldo) || 0;
            document.getElementById('main-eur').innerText = e.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = e.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (e * BRL_FIX).toFixed(4) + " BRL";
            document.getElementById('wall-brl').innerText = "≈ " + (e * BRL_FIX).toFixed(4) + " BRL";
            
            const pct = Math.round(user.multiplier * 100);
            const tag = document.getElementById('multiplier-tag');
            tag.innerText = `Taxa: ${pct}%`;
            tag.className = pct < 100 ? "text-[7px] font-black text-red-500 uppercase italic" : "text-[7px] font-black text-green-500 uppercase italic";
        }

        async function loadFeed() {
            const { data } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!data) return;

            container.innerHTML = data.map((p, i) => `
                <div class="google-card p-5 relative">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-black text-white italic shadow-sm">U</div>
                        <span class="text-[10px] font-black text-gray-800 italic uppercase">ID..${String(p.user_id).slice(-4)}</span>
                    </div>
                    <p class="text-[13px] text-gray-700 leading-relaxed">${p.content}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img shadow-sm" onerror="this.style.display='none'">` : ''}
                    <div class="flex justify-between items-center mt-5 pt-1 border-t border-gray-100">
                        <button onclick="reagir(this, 0.0006)" class="flex-1 flex flex-col items-center py-2">
                            <span class="text-sm">👍</span>
                            <span class="text-[7px] font-black text-gray-400 uppercase tracking-tighter">Gostar <span class="text-green-600">+${(0.0006 * user.multiplier).toFixed(4)}€</span></span>
                        </button>
                        <button onclick="openDecisionModal(0.0010)" class="flex-1 flex flex-col items-center py-2 border-x border-gray-50">
                            <span class="text-sm">💬</span>
                            <span class="text-[7px] font-black text-gray-400 uppercase tracking-tighter">Comentar <span class="text-blue-500">+${(0.0010 * user.multiplier).toFixed(4)}€</span></span>
                        </button>
                        <button onclick="shareAffiliate()" class="flex-1 flex flex-col items-center py-2">
                            <span class="text-sm">🔗</span>
                            <span class="text-[7px] font-black text-gray-400 uppercase tracking-tighter">Partilhar <span class="text-blue-600">+0.0020€</span></span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function reagir(btn, val) {
            if(user.interactions >= MAX_FREE) {
                openDecisionModal(val);
            } else {
                user.interactions++;
                const valorFinal = Number(val) * user.multiplier;
                
                const pop = document.createElement('span');
                pop.className = 'coin-pop';
                pop.innerText = '+' + valorFinal.toFixed(4) + '€';
                btn.style.position = 'relative';
                btn.appendChild(pop);
                setTimeout(() => pop.remove(), 600);
                
                user.saldo += valorFinal;
                await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
                updateUI();
            }
        }

        function openDecisionModal(val) {
            pendingBonus = val;
            document.getElementById('ad-overlay').style.display = 'flex';
            document.getElementById('ad-decision-ui').classList.remove('hidden');
            document.getElementById('ad-player-ui').classList.add('hidden');
        }

        function startAdFlow() {
            document.getElementById('ad-decision-ui').classList.add('hidden');
            document.getElementById('ad-player-ui').classList.remove('hidden');
            let count = 5;
            const timer = document.getElementById('ad-timer-text');
            const btn = document.getElementById('close-ad-btn');
            const int = setInterval(() => {
                count--;
                timer.innerText = "Sincronizando Nó (" + count + "s)...";
                if(count <= 0) {
                    clearInterval(int);
                    timer.innerText = "Nó Restaurado!";
                    btn.disabled = false;
                    btn.className = "w-full py-4 bg-green-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg";
                    btn.innerText = "Finalizar e Ganhar Total";
                    btn.onclick = () => { user.multiplier = 1.0; user.interactions = 0; finalizeGains(); };
                }
            }, 1000);
        }

        function degradeAndContinue() {
            user.multiplier = Math.max(0.1, user.multiplier - 0.20);
            user.interactions++;
            finalizeGains();
        }

        async function finalizeGains() {
            document.getElementById('ad-overlay').style.display = 'none';
            const v = Number(pendingBonus) * user.multiplier;
            user.saldo += v;
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
            pendingBonus = 0;
            updateUI();
            loadFeed();
        }

        function shareAffiliate() {
            const aff = window.location.href.split('?')[0] + "?ref=" + MASTER_ID;
            navigator.clipboard.writeText(aff);
            alert("Link de Convite Ativado! 5% dos ganhos deste amigo serão seus.");
            openDecisionModal(0.0020);
        }

        function checkAffiliate() {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref');
            if(ref && ref !== MASTER_ID) {
                console.log("Afiliado de: " + ref);
                // Aqui o sistema enviaria 5% do bónus inicial ao 'ref' no futuro
            }
        }

        async function publish() {
            const t = document.getElementById('post-input').value;
            const i = document.getElementById('post-url').value;
            if(!t) return;
            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content: t, image_url: i }]);
            if(!error) { 
                reagir({appendChild:()=>{}, style:{}}, 0.0150); 
                document.getElementById('post-input').value = ""; 
                document.getElementById('post-url').value = "";
                loadFeed();
            }
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            if(t === 'admin') loadAdminStats();
        }

        async function loadAdminStats() {
            const { data } = await sb.from('perfis').select('saldo');
            if(!data) return;
            let total = data.reduce((acc, u) => acc + (Number(u.saldo) || 0), 0);
            document.getElementById('adm-debt').innerText = total.toFixed(4) + "€";
            document.getElementById('adm-profit').innerText = (total / 0.6 * 0.4).toFixed(4) + "€";
        }

        async function adminDelete() {
            const id = document.getElementById('del-id').value;
            await sb.from('posts').delete().eq('id', id);
            loadFeed();
        }

        window.onload = init;
    </script>
</body>
</html>
