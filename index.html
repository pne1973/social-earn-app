<script>
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const MASTER_ID = "5401881400"; // Este é um BIGINT
    const sb = window.supabase.createClient(SB_URL, SB_KEY);
    
    let userSaldo = 0;

    async function init() {
        const { data } = await sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
        if(data) userSaldo = parseFloat(data.saldo);
        updateUI(); 
        loadFeed();
    }

    // --- GERADOR CORRIGIDO: IDS SÃO NÚMEROS ---
    async function injectMassiveTest() {
        if(!confirm("AVISO: Vou criar 100 posts com IDs numéricos (1001 a 1100). Continuar?")) return;
        
        // Limpeza prévia
        await sb.from('comentarios').delete().neq('user_id', 0);
        await sb.from('posts').delete().neq('user_id', 0);

        const massivePosts = [];
        const frases = ["Olá a todos!", "Apex Social é o futuro.", "A testar o feed massivo.", "Ganhos em tempo real!", "Braga, Portugal!"];
        
        for(let i=1; i<=100; i++) {
            massivePosts.push({
                user_id: 1000 + i, // RESULTADO: 1001, 1002... (Válido para bigint)
                content: `${frases[Math.floor(Math.random() * frases.length)]} (Post Global #${i})`,
                image_url: `https://picsum.photos/seed/${i}/400/300`
            });
        }

        const { error } = await sb.from('posts').insert(massivePosts);
        
        if(!error) {
            alert("Sucesso! 100 utilizadores numéricos criados.");
            loadFeed();
        } else {
            console.error(error);
            alert("Erro: " + error.message);
        }
    }

    async function loadFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = "<div class='p-10 text-center font-black animate-pulse'>A SINCRONIZAR 100 UTILIZADORES...</div>";

        const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
        
        if(!posts) {
            container.innerHTML = "<div class='p-10 text-center text-red-500'>ERRO AO CARREGAR. VERIFIQUE A CONSOLA.</div>";
            return;
        }

        container.innerHTML = "";
        // Usar for...of para garantir que os contadores carregam por ordem
        for (const p of posts) {
            const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', p.id);
            
            container.innerHTML += `
            <div class="google-card shadow-sm p-4">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-black text-[10px]">
                        ${String(p.user_id).slice(-2)}
                    </div>
                    <span class="text-[10px] font-black uppercase text-gray-400">User ID: ${p.user_id}</span>
                </div>
                <p class="text-[13px] font-black uppercase mb-4">${p.content}</p>
                <img src="${p.image_url}" class="w-full rounded-lg mb-4 border shadow-sm">
                <div class="flex border-t pt-2">
                    <button onclick="earn(0.0006)" class="interaction-btn">
                        <div class="count-badge">0</div><span class="text-xl">👍</span>
                    </button>
                    <button onclick="toggleComments('${p.id}')" class="interaction-btn border-x">
                        <div class="count-badge" id="badge-${p.id}">${count || 0}</div><span class="text-xl">💬</span>
                    </button>
                    <button onclick="earn(0.0020)" class="interaction-btn">
                        <div class="count-badge">0</div><span class="text-xl">🔗</span>
                    </button>
                </div>
                <div id="comments-${p.id}" class="comment-section p-2">
                    <div id="list-${p.id}" class="text-[9px] font-bold uppercase space-y-1 mb-2"></div>
                    <input id="in-${p.id}" type="text" placeholder="COMENTAR..." class="w-full bg-gray-100 p-2 rounded text-[10px] font-black border-none">
                    <button onclick="addComment('${p.id}')" class="w-full bg-blue-600 text-white text-[9px] py-2 mt-1 rounded font-black">ENVIAR</button>
                </div>
            </div>`;
        }
    }

    async function earn(val) {
        userSaldo += val;
        updateUI();
        await sb.from('perfis').update({ saldo: userSaldo }).eq('id', MASTER_ID);
    }

    async function addComment(pid) {
        const input = document.getElementById(`in-${pid}`);
        if(!input.value) return;
        const { error } = await sb.from('comentarios').insert([{ 
            post_id: pid, 
            user_id: MASTER_ID, // Enviando MASTER_ID que é bigint
            content: input.value 
        }]);
        if(!error) { input.value = ""; loadFeed(); }
    }

    function updateUI() {
        document.getElementById('main-eur').innerText = userSaldo.toFixed(4) + "€";
        document.getElementById('wall-eur').innerText = userSaldo.toFixed(4) + "€";
        document.getElementById('main-brl').innerText = (userSaldo * 6.12).toFixed(4) + " BRL";
    }

    function nav(t) {
        document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('view-'+t).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function toggleComments(id) { document.getElementById(`comments-${id}`).classList.toggle('active'); }
    window.onload = init;
</script>
