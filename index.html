<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RESET & GOOGLE SYSTEM */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8f9fa; color: #202124; font-family: 'Roboto', sans-serif; padding-top: 175px; }

        /* HEADER FIXO */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #dadce0; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        /* GRID DE STATS (Apenas o essencial) */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; padding: 10px 0; border-bottom: 1px solid #f1f3f4; }
        .stat-item { text-align: center; border-right: 1px solid #f1f3f4; }
        .stat-item:last-child { border-right: none; }
        .stat-item label { display: block; font-size: 8px; color: #70757a; text-transform: uppercase; margin-bottom: 2px; }
        .stat-item b { font-size: 11px; color: #1a73e8; }
        
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #dadce0; }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; color: #5f6368; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }

        /* CONTENT ENGINE */
        .container { max-width: 500px; margin: 0 auto; padding: 12px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* CARDS & FEED */
        .card { background: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .post-text { font-size: 15px; line-height: 1.5; color: #3c4043; }
        .post-img-container { width: 100%; max-height: 400px; overflow: hidden; border-radius: 6px; margin: 12px 0; background: #f8f9fa; display: flex; align-items: center; justify-content: center; border: 1px solid #f1f3f4; }
        .post-img { width: 100%; height: auto; max-height: 400px; object-fit: contain; }

        /* INTERAÇÕES */
        .actions-row { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #f1f3f4; padding-top: 12px; margin-top: 12px; }
        .action-btn { background: none; border: none; color: #5f6368; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .action-btn i { font-size: 16px; color: #1a73e8; }

        /* UI ELEMENTS */
        .input-google { width: 100%; border: none; outline: none; font-size: 16px; margin-bottom: 15px; resize: none; min-height: 60px; }
        .btn-post { background: #1a73e8; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body id="appBody">

    <header class="header-fixed">
        <div class="blue-bar" id="headerTitle">Apex Social</div>
        <div class="stats-grid">
            <div class="stat-item"><label>Meus XP</label><b id="valXP">0</b></div>
            <div class="stat-item"><label>Saldo</label><b id="valEUR">0.0000€</b></div>
            <div class="stat-item"><label>Estado</label><b style="color:#1e8e3e;">ONLINE</b></div>
        </div>
        <nav class="tabs">
            <div class="tab active" onclick="changeTab('explorar', this)">Explorar</div>
            <div class="tab" onclick="changeTab('rede', this)">Rede</div>
            <div class="tab" onclick="changeTab('info', this)">Info</div>
        </nav>
    </header>

    <main class="container">
        
        <section id="view-explorar" class="view-section active">
            <div class="card">
                <textarea id="postInput" class="input-google" placeholder="O que pretende partilhar?"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f1f3f4; padding-top:12px;">
                    <label style="color:#1a73e8; cursor:pointer; font-size:13px;" for="fileInput"><i class="fas fa-camera"></i> Foto (+15 XP)</label>
                    <input type="file" id="fileInput" hidden onchange="handleFile(this)">
                    <button class="btn-post" style="width:auto; margin:0;" onclick="sendPost()">Publicar</button>
                </div>
            </div>
            <div id="feedContent"></div>
        </section>

        <section id="view-rede" class="view-section">
            <div class="card">
                <h3 style="font-size:16px; margin-bottom:15px;">Rede de Amigos</h3>
                <div id="refLink" style="font-size:12px; color:#1a73e8; background:#f8f9fa; padding:15px; border-radius:6px; border:1px dashed #dadce0;">...</div>
                <button class="btn-post" style="background:#fff; color:#1a73e8; border:1px solid #1a73e8;" onclick="copyRef()">Copiar Link</button>
            </div>
        </section>

        <section id="view-info" class="view-section">
            <div class="card">
                <h3 style="font-size:16px; margin-bottom:15px;">Manual de Ganhos</h3>
                <p style="font-size:13px; color:#5f6368;">Ganha XP através de publicações e convites.</p>
            </div>
        </section>

    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        const MY_ID = 5401881400; 

        async function init() {
            loadProfile();
            loadPosts();
        }

        function changeTab(target, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + target).classList.add('active');
            el.classList.add('active');
        }

        async function loadProfile() {
            const { data } = await client.from('profiles').select('*').eq('id', MY_ID).single();
            if(data) {
                document.getElementById('valXP').innerText = data.points.toLocaleString();
                document.getElementById('valEUR').innerText = (data.points * 0.0001).toFixed(4) + "€";
                document.getElementById('refLink').innerText = "https://apexsocial.app/?ref=" + MY_ID;
            }
        }

        async function loadPosts() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feedContent');
            container.innerHTML = "";
            posts.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <div class="post-text">${p.content || ''}</div>
                        ${p.image_url ? `<div class="post-img-container"><img src="${p.image_url}" class="post-img"></div>` : ''}
                        <div class="actions-row">
                            <button class="action-btn"><i class="far fa-heart"></i> Gosto</button>
                            <button class="action-btn"><i class="far fa-comment"></i> Coment.</button>
                            <button class="action-btn"><i class="fas fa-share-alt"></i> Partilhar</button>
                        </div>
                    </div>`;
            });
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('refLink').innerText);
            alert("Link copiado!");
        }

        init();
    </script>
</body>
</html>
