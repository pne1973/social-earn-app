<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pine Social Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; --bg: #F1F3F4; --border: #dadce0; }
        body { font-family: 'Google Sans', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 75px 0 90px; }
        
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #fff; border-bottom: 1px solid var(--border); z-index: 2000; box-sizing: border-box; height: 65px; }
        .logo { font-weight: bold; font-size: 22px; }
        .logo span:nth-child(1) { color: var(--g-blue); } .logo span:nth-child(2) { color: var(--g-red); } .logo span:nth-child(3) { color: var(--g-yellow); } .logo span:nth-child(4) { color: var(--g-blue); } .logo span:nth-child(5) { color: var(--g-green); }
        .xp-badge { background: var(--g-blue); color: #fff; padding: 8px 16px; border-radius: 24px; font-weight: bold; font-size: 13px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid var(--border); z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #5f6368; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: var(--g-blue); font-weight: bold; border-top: 3px solid var(--g-blue); }

        .tab-content { display: none; width: 100%; box-sizing: border-box; }
        .tab-content.active { display: block; }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        
        .card { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 12px; border-radius: 24px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-blue { background: var(--g-blue); color: #fff; }
        
        textarea { width: 100%; border: 1px solid #f1f3f4; padding: 12px; border-radius: 12px; font-size: 16px; outline: none; background: #f8f9fa; margin-bottom: 10px; resize: none; box-sizing: border-box; }
        .post-img { width: calc(100% + 32px); margin: 12px -16px; display: block; max-height: 400px; object-fit: cover; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        
        .post-actions { display: flex; gap: 20px; border-top: 1px solid #f1f3f4; padding-top: 12px; margin-top: 10px; }
        .act-btn { background: none; border: none; color: #5f6368; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .act-btn.liked { color: var(--g-red); }

        #img-preview-box { width: 100%; height: 150px; background: #f8f9fa; border-radius: 12px; margin-bottom: 10px; display: none; overflow: hidden; position: relative; border: 1px dashed #ccc; }
        #img-preview-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>P</span><span>i</span><span>n</span><span>e</span> <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span></div>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <section id="feed-tab" class="tab-content container active">
        <div class="card">
            <textarea id="postText" rows="3" placeholder="No que estás a pensar?"></textarea>
            <div id="img-preview-box"><img id="img-preview" src=""></div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:var(--g-green); font-weight:bold; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImg(this)">
                <button class="btn btn-blue" style="width:auto; padding:8px 30px;" id="pubBtn" onclick="publish()">Publicar</button>
            </div>
        </div>
        <div id="feed-list">Carregando feed...</div>
    </section>

    <section id="rank-tab" class="tab-content container">
        <div class="card"><h3>🏆 Top Rankings</h3><div id="rank-list"></div></div>
    </section>

    <section id="wallet-tab" class="tab-content container">
        <div class="card" style="text-align:center;">
            <p>Saldo Estimado</p>
            <h1 id="cash-val" style="color:var(--g-green)">0.0000€</h1>
            <input type="email" placeholder="PayPal E-mail" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px;">
            <button class="btn btn-blue" onclick="alert('Mínimo 5000 XP')">Solicitar Saque</button>
        </div>
    </section>

    <section id="admin-tab" class="tab-content container">
        <div class="card" style="border-top: 5px solid var(--g-red);">
            <h3 style="color:var(--g-red)">Painel Administrativo</h3>
            <div id="adm-stats"></div>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" onclick="showTab('feed-tab', this)"><i class="fas fa-home"></i>Feed</div>
        <div class="nav-item" onclick="showTab('rank-tab', this)"><i class="fas fa-trophy"></i>Rank</div>
        <div class="nav-item" onclick="showTab('wallet-tab', this)"><i class="fas fa-wallet"></i>Saque</div>
        <div id="adm-nav" class="nav-item" onclick="showTab('admin-tab', this)"><i class="fas fa-user-shield"></i>Admin</div>
    </nav>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const myId = 5401881400;

        let selectedImgBlob = null;

        async function init() {
            if(myId !== 5401881400) document.getElementById('adm-nav').style.display = 'none';
            loadProfile();
            loadFeed();
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'rank-tab') loadRanking();
            if(id === 'admin-tab') loadAdmin();
        }

        async function loadFeed() {
            const list = document.getElementById('feed-list');
            const { data, error } = await supabaseClient.from('posts').select('*').order('created_at', {ascending:false});
            if(error) return;
            list.innerHTML = '';
            data.forEach(p => {
                list.innerHTML += `
                <div class="card">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <div style="width:30px; height:30px; background:var(--g-blue); border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px;">${p.user_id.toString().slice(-1)}</div>
                        <b>Utilizador #${p.user_id.toString().slice(-4)}</b>
                    </div>
                    <p>${p.content}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div class="post-actions">
                        <button class="act-btn" onclick="likePost(this)"><i class="far fa-heart"></i> Gostar</button>
                        <button class="act-btn" onclick="commentPrompt(${p.id})"><i class="far fa-comment"></i> Comentar</button>
                    </div>
                </div>`;
            });
        }

        function handleImg(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview-box').style.display = 'block';
                selectedImgBlob = file;
            }
            reader.readAsDataURL(file);
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            if(!txt && !selectedImgBlob) return;
            
            const btn = document.getElementById('pubBtn');
            btn.disabled = true; btn.innerText = "Processando...";

            let imgUrl = null;
            if(selectedImgBlob) {
                const fileName = `img_${Date.now()}.jpg`;
                const { data, error } = await supabaseClient.storage.from('post-images').upload(fileName, selectedImgBlob);
                if(!error) imgUrl = SUPABASE_URL + "/storage/v1/object/public/post-images/" + fileName;
            }

            const { error } = await supabaseClient.from('posts').insert([{ user_id: myId, content: txt, image_url: imgUrl }]);
            if(!error) {
                await supabaseClient.rpc('increment_points', { user_id: myId, amount: 15 });
                location.reload();
            } else { alert("Erro ao publicar."); btn.disabled = false; btn.innerText = "Publicar"; }
        }

        async function likePost(btn) {
            btn.classList.add('liked'); btn.innerHTML = '<i class="fas fa-heart"></i> +2 XP';
            await supabaseClient.rpc('increment_points', { user_id: myId, amount: 2 });
            loadProfile();
        }

        async function commentPrompt(pid) {
            const msg = prompt("Escreve o teu comentário:");
            if(msg) {
                await supabaseClient.rpc('increment_points', { user_id: myId, amount: 5 });
                alert("Comentário enviado! +5 XP");
                loadProfile();
            }
        }

        async function loadProfile() {
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', myId).single();
            if(data) {
                document.getElementById('userXP').innerText = data.points + " XP";
                document.getElementById('cash-val').innerText = (data.points * 0.001).toFixed(4) + "€";
            }
        }

        async function loadRanking() {
            const { data } = await supabaseClient.from('profiles').select('username, points').order('points', {ascending:false}).limit(10);
            document.getElementById('rank-list').innerHTML = data?.map((u, i) => `<div>${i+1}. @${u.username} (${u.points} XP)</div>`).join('') || 'Sem dados.';
        }

        async function loadAdmin() {
            const { count: u } = await supabaseClient.from('profiles').select('*', {count:'exact', head:true});
            document.getElementById('adm-stats').innerText = `Total de Utilizadores: ${u}`;
        }

        init();
    </script>
</body>
</html>
