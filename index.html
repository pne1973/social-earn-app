<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Social - Admin v13</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f2f5; color: #1c1e21; font-family: -apple-system, sans-serif; padding-top: 140px; padding-bottom: 70px; }
        
        /* HEADER */
        .header-fixed { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; border-bottom: 1px solid #ddd; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .stats-top { display: flex; justify-content: center; padding: 15px 0; border-bottom: 1px solid #eee; background: #fff; }
        .top-ad { background: #fff9c4; padding: 10px; text-align: center; border-bottom: 1px solid #fbc02d; font-size: 12px; font-weight: bold; color: #f57f17; }

        /* CONTAINER */
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; }
        
        /* ADMIN STYLES */
        .admin-section { display: none; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #1a73e8; }
        .stat-card small { font-size: 10px; color: #65676b; font-weight: bold; text-transform: uppercase; }
        .stat-card h2 { font-size: 18px; color: #1c1e21; margin-top: 5px; }

        .finance-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .finance-table th { text-align: left; padding: 8px; background: #eee; }
        .finance-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .btn-pay { background: #34a853; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* FEED ELEMENTS */
        .post-img-container { width: 100%; height: 300px; overflow: hidden; border-radius: 8px; margin: 12px 0; background: #f8f9fa; }
        .post-img-res { width: 100%; height: 100%; object-fit: cover; }
        .post-actions { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid #f0f2f5; margin-top: 10px; padding-top: 10px; }
        .btn-act { background: none; border: none; color: #65676b; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* BOTTOM NAV */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #65676b; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-btn.active { color: #1a73e8; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="blue-bar">APEX SOCIAL NETWORK</div>
        <div class="stats-top">
            <div style="text-align:center;"><label style="font-size:10px; font-weight:bold; color:#65676b;">SALDO</label><b id="stEUR" style="display:block; color:#1a73e8; font-size:18px;">0.0000€</b></div>
        </div>
        <div class="top-ad">📢 PAINEL DE CONTROLO DE ADMINISTRAÇÃO ATIVO</div>
    </header>

    <main class="container">
        
        <div id="view-feed" class="admin-section" style="display: block;">
            <div class="card">
                <textarea id="postTxt" style="width:100%; height:60px; border:1px solid #ddd; border-radius:8px; padding:10px; outline:none;" placeholder="Novidades para a rede?"></textarea>
                <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center;">
                    <label style="cursor:pointer; color:#1a73e8; font-size:24px;"><i class="fas fa-camera"></i><input type="file" id="fileIn" accept="image/*" style="display:none;" onchange="handleFile(this)"></label>
                    <button onclick="send()" id="btnSend" style="background:#1a73e8; color:#fff; border:none; padding:8px 20px; border-radius:6px; font-weight:bold;">PUBLICAR</button>
                </div>
            </div>
            <div id="feed"></div>
        </div>

        <div id="view-admin" class="admin-section">
            <h3 style="margin-bottom:15px;">Dashboard Admin</h3>
            
            <div class="grid-stats">
                <div class="stat-card">
                    <small>Total de Posts</small>
                    <h2 id="admTotalPosts">0</h2>
                </div>
                <div class="stat-card">
                    <small>Interações (Likes)</small>
                    <h2 id="admTotalLikes">0</h2>
                </div>
            </div>

            <div class="card">
                <h4 style="font-size:14px; margin-bottom:10px;"><i class="fas fa-wallet"></i> Gestão de Pagamentos (PayPal)</h4>
                <div class="grid-stats">
                    <div class="stat-card" style="border-left-color: #34a853;">
                        <small>Reserva Total</small>
                        <h2>140.50€</h2>
                    </div>
                    <div class="stat-card" style="border-left-color: #ea4335;">
                        <small>Levantamentos Pendentes</small>
                        <h2>12.00€</h2>
                    </div>
                </div>
                
                <table class="finance-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Valor</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="payList">
                        <tr><td>#5401...</td><td>5.50€</td><td><button class="btn-pay" onclick="alert('A abrir PayPal...')">Pagar</button></td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h4 style="font-size:14px; margin-bottom:10px;"><i class="fas fa-tools"></i> Moderação Rápida</h4>
                <input type="number" id="delID" placeholder="ID do Post a apagar" style="width:70%; padding:8px; border:1px solid #ddd; border-radius:4px;">
                <button onclick="delById()" style="background:#ea4335; color:#fff; border:none; padding:8px; border-radius:4px; font-weight:bold;">Apagar</button>
            </div>
        </div>

    </main>

    <nav class="nav-bottom">
        <button class="nav-btn active" onclick="switchTab('feed', this)"><i class="fas fa-home"></i>FEED</button>
        <button class="nav-btn" onclick="switchTab('admin', this)"><i class="fas fa-user-shield"></i>ADMIN</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);

        let saldo = 0.0080;
        let imgBase64 = null;

        // Troca de Abas
        function switchTab(tab, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + tab).style.display = 'block';
            btn.classList.add('active');
            if(tab === 'admin') loadAdminData();
        }

        async function loadAdminData() {
            const { data: posts } = await client.from('posts').select('*');
            if(posts) {
                document.getElementById('admTotalPosts').innerText = posts.length;
                const totalLikes = posts.reduce((acc, p) => acc + (p.likes || 0), 0);
                document.getElementById('admTotalLikes').innerText = totalLikes;
            }
        }

        async function delById() {
            const id = document.getElementById('delID').value;
            if(!id) return;
            if(confirm("Apagar post #" + id + "?")) {
                await client.from('posts').delete().eq('id', id);
                alert("Eliminado.");
                loadAdminData();
            }
        }

        // --- LÓGICA DO FEED (Mantida e Estável) ---
        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; canvas.height = (img.height/img.width)*600;
                    canvas.getContext('2d').drawImage(img,0,0,600,canvas.height);
                    imgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function send() {
            const txt = document.getElementById('postTxt').value;
            const { error } = await client.from('posts').insert([{ content: txt, image_url: imgBase64, likes: 0, comments_data: [] }]);
            if(!error) location.reload();
        }

        async function loadFeed() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            posts.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <small style="color:#999">Post #${p.id}</small>
                    <p style="margin:8px 0;">${p.content || ''}</p>
                    ${p.image_url ? `<div class="post-img-container"><img src="${p.image_url}" class="post-img-res"></div>` : ''}
                    <div class="post-actions">
                        <button class="btn-act" onclick="doLike(${p.id}, ${p.likes || 0})"><i class="fas fa-heart"></i> ${p.likes || 0}</button>
                        <button class="btn-act"><i class="fas fa-comment"></i> ${Array.isArray(p.comments_data) ? p.comments_data.length : 0}</button>
                    </div>`;
                feed.appendChild(div);
            });
        }

        async function doLike(id, cur) {
            await client.from('posts').update({ likes: cur + 1 }).eq('id', id);
            loadFeed();
        }

        document.getElementById('stEUR').innerText = saldo.toFixed(4) + "€";
        loadFeed();
    </script>
</body>
</html>
