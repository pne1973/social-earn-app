<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* DESIGN SYSTEM - GOOGLE DARK */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { background-color: #121212; height: 100%; }
        body { background-color: #121212; color: #ffffff; font-family: -apple-system, sans-serif; padding-top: 185px; padding-bottom: 20px; }

        /* HEADER & TABS */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
        .ad-top { background: #1a1a1a; color: #ffcc00; padding: 8px; text-align: center; font-size: 10px; font-weight: bold; border-bottom: 1px solid #333; }
        .user-stats-bar { display: flex; justify-content: space-around; background: #1a1a1a; padding: 12px 5px; border-bottom: 1px solid #252525; }
        .stat-pill { text-align: center; flex: 1; }
        .stat-pill span { display: block; font-size: 9px; color: #888; text-transform: uppercase; }
        .stat-pill b { font-size: 14px; color: #ffcc00; }
        .tabs { display: flex; background: #121212; }
        .tab-item { flex: 1; padding: 14px 5px; text-align: center; color: #888; font-size: 9px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-item.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: rgba(255,204,0,0.05); }

        /* CONTENT */
        .content { padding: 15px; max-width: 500px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* PUBLISH CARD */
        .publish-card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        #imagePreview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #444; }
        .file-label { display: inline-block; padding: 8px 15px; background: #252525; border-radius: 20px; font-size: 11px; cursor: pointer; color: #aaa; margin-top: 10px; border: 1px solid #333; }

        /* POST ITEM */
        .post-item { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .post-user { font-size: 11px; color: #ffcc00; font-weight: bold; margin-bottom: 10px; }
        .post-img { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #252525; }
        .post-content { font-size: 14px; color: #eee; line-height: 1.5; margin-bottom: 15px; }
        
        /* ACTIONS & COMMENTS */
        .post-actions { display: flex; justify-content: space-between; border-top: 1px solid #252525; padding-top: 12px; }
        .action-btn { background: transparent; border: none; color: #888; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .action-btn:active { transform: scale(0.9); }
        
        .comment-area { margin-top: 15px; border-top: 1px dashed #252525; padding-top: 10px; }
        .comment-input-group { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; background: #111; border: 1px solid #333; border-radius: 20px; padding: 8px 15px; color: #fff; font-size: 12px; outline: none; }
        
        /* BUTTONS */
        .btn-gold { background: #ffcc00; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .admin-link { display: none; color: #ff4444 !important; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="ad-top">📢 APEX: Poste fotos e ganhe +15.0 XP por publicação!</div>
        <div class="user-stats-bar">
            <div class="stat-pill"><span>Saldo</span><b id="topBalance">0.0000€</b></div>
            <div class="stat-pill"><span>Amigos</span><b id="topRefs">0</b></div>
            <div class="stat-pill"><span>Rede</span><b id="topRefGains">0.0000€</b></div>
        </div>
        <div class="tabs">
            <div class="tab-item active" onclick="openTab('feed-page', this)">Feed</div>
            <div class="tab-item" onclick="openTab('wallet-page', this)">Rede</div>
            <div class="tab-item" onclick="openTab('info-page', this)">Info</div>
            <div id="adm-tab" class="tab-item admin-link" onclick="openTab('admin-page', this)">Admin</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div class="publish-card">
                <textarea id="postText" style="width:100%; background:transparent; border:none; color:#fff; outline:none; font-size:15px; min-height:50px;" placeholder="O que está a acontecer?"></textarea>
                <img id="imagePreview">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label class="file-label" for="fileInput"><i class="fas fa-image"></i> Adicionar Foto</label>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImg(this)">
                    <span id="statusTxt" style="font-size:10px; color:#555;">Status: Pronto</span>
                </div>
                <button class="btn-gold" id="btnPublish" onclick="publish()">Publicar Post (+15 XP)</button>
            </div>
            <div id="feed-items">A carregar publicações...</div>
        </div>

        <div id="info-page" class="page">
            <div class="publish-card">
                <h4 style="color:#ffcc00; margin-bottom:10px;">Como ganhar?</h4>
                <p style="font-size:12px; color:#aaa;">• Post com Foto: +15.0 XP<br>• Like: +2.0 XP<br>• Comentário: +5.0 XP<br>• Convite: 100 XP + 10% Vitalício</p>
            </div>
        </div>

        <div id="wallet-page" class="page">
            <div class="publish-card" style="text-align:center;">
                <h4 style="color:#ffcc00;">Convidar Amigos</h4>
                <div id="refLink" style="background:#111; padding:12px; margin:15px 0; font-size:11px; border:1px dashed #444; color:#ffcc00; word-break:break-all;">...</div>
                <button class="btn-gold" onclick="copyRef()">Copiar Link</button>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const myId = 5401881400; 
        let currentImgBase64 = null;

        async function init() {
            getProfile();
            loadFeed();
        }

        // PREVIEW E COMPRESSÃO DA IMAGEM
        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > 800) { height *= 800 / width; width = 800; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        currentImgBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('imagePreview').src = currentImgBase64;
                        document.getElementById('imagePreview').style.display = 'block';
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            if(!txt && !currentImgBase64) return;
            
            document.getElementById('btnPublish').disabled = true;
            document.getElementById('statusTxt').innerText = "A processar...";

            const { error } = await client.from('posts').insert([{ 
                user_id: myId, 
                content: txt, 
                image_url: currentImgBase64 
            }]);

            if(!error) {
                await client.rpc('increment_points', { user_id: myId, amount: 15.0 });
                location.reload(); // Recarrega para limpar tudo
            }
        }

        async function loadFeed() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feed-items');
            
            container.innerHTML = posts.map(p => `
                <div class="post-item">
                    <div class="post-user">USER #${p.user_id.toString().slice(-4)}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div class="post-content">${p.content || ''}</div>
                    
                    <div class="post-actions">
                        <button class="action-btn" onclick="handleLike(${p.id})"><i class="fas fa-heart"></i> ${p.likes || 0}</button>
                        <button class="action-btn" onclick="sharePost('${p.content}')"><i class="fas fa-share"></i> Partilhar</button>
                    </div>

                    <div class="comment-area">
                        <div class="comment-input-group">
                            <input type="text" id="com-${p.id}" class="comment-input" placeholder="Escreve um comentário...">
                            <button onclick="sendComment(${p.id})" style="background:none; border:none; color:#ffcc00; font-weight:bold;">Enviar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function sharePost(text) {
            if (navigator.share) {
                navigator.share({ title: 'Apex Social', text: text, url: window.location.href });
            } else {
                alert("Link de partilha copiado!");
            }
        }

        async function sendComment(postId) {
            const val = document.getElementById(`com-${postId}`).value;
            if(!val) return;
            await client.rpc('increment_points', { user_id: myId, amount: 5.0 });
            alert("Comentário enviado! +5.0 XP");
            document.getElementById(`com-${postId}`).value = '';
            getProfile();
        }

        async function getProfile() {
            const { data } = await client.from('profiles').select('*').eq('id', myId).single();
            if (data) {
                document.getElementById('topBalance').innerText = (data.points * 0.0010).toFixed(4) + "€";
                document.getElementById('topRefs').innerText = data.referrals_count || 0;
                document.getElementById('topRefGains').innerText = (data.referral_points * 0.0010).toFixed(4) + "€";
                document.getElementById('refLink').innerText = `https://apexsocial.app/?ref=${myId}`;
                if(myId === 5401881400) document.getElementById('adm-tab').style.display = 'block';
            }
        }

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        init();
    </script>
</body>
</html>
