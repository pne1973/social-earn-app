<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social - Production v33.25</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root { --blue: #4285F4; --admin-red: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); }

        /* TELA DE LOGIN */
        #login-screen { 
            position: fixed; inset: 0; background: #fff; z-index: 5000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .login-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; margin: 15px 0; font-size: 16px; text-align: center; }
        .login-btn { width: 100%; padding: 15px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-weight: 800; }

        /* ESTRUTURA GERAL */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #ddd; z-index: 1000; }
        .main-content { padding: 75px 15px 90px 15px; max-width: 500px; margin: 0 auto; display: none; }
        
        /* UI UTILIZADOR (CARDS DE SALDO) */
        .user-stats-bar { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-around; border: 1px solid #ddd; }
        .stat-item { text-align: center; }
        .stat-item small { font-size: 10px; color: #666; text-transform: uppercase; }
        .stat-item p { font-size: 18px; font-weight: 800; color: var(--blue); }

        /* FEED (LIMPO) */
        .post-card { background: #fff; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; overflow: hidden; }
        .post-img { width: 100%; background: #eee; display: block; }
        .post-txt { padding: 15px; font-size: 15px; }
        .post-actions { padding: 10px 15px; border-top: 1px solid #eee; display: flex; gap: 20px; font-weight: 700; color: #65676B; }

        /* NAVBAR DINÂMICA */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #fff; border-top: 1px solid #ddd; display: none; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #666; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: var(--blue); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:var(--blue); font-weight:900;">APEX SOCIAL</h2>
        <input type="number" id="user-id-input" class="login-input" placeholder="Insira o seu ID">
        <button class="login-btn" onclick="autenticar()">ENTRAR</button>
    </div>

    <header><b id="header-label">APEX SOCIAL</b></header>

    <main id="app-container" class="main-content">
        <div id="user-view" style="display:none;">
            <div class="user-stats-bar">
                <div class="stat-item"><small>Saldo</small><p id="u-saldo">0.0000€</p></div>
                <div class="stat-item"><small>XP</small><p id="u-xp">0</p></div>
            </div>
            <div id="user-feed"></div>
        </div>

        <div id="admin-view" style="display:none;">
            <h3 style="color:var(--admin-red); margin-bottom:15px;">PAINEL DE CONTROLO</h3>
            <div id="admin-stats-grid"></div>
            <div id="admin-user-list"></div>
        </div>
    </main>

    <nav id="main-nav" class="nav-bar"></nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        const ADMIN_ID = "5401881400";

        async function autenticar() {
            const id = document.getElementById('user-id-input').value;
            if(!id) return alert("Insira um ID");

            const { data, error } = await sb.from('perfis').select('*').eq('id', id).single();
            
            if(error) return alert("ID não encontrado.");

            currentUser = data;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';

            if(id === ADMIN_ID) {
                setupAdmin();
            } else {
                setupUser();
            }
        }

        function setupUser() {
            document.getElementById('header-label').innerText = "FEED SOCIAL";
            document.getElementById('user-view').style.display = 'block';
            document.getElementById('u-saldo').innerText = currentUser.saldo.toFixed(4) + "€";
            document.getElementById('main-nav').innerHTML = `
                <a href="#" class="nav-btn active">🏠<br>HOME</a>
                <a href="#" class="nav-btn">➕<br>POSTAR</a>
                <a href="#" class="nav-btn">👤<br>PERFIL</a>
            `;
            loadUserFeed();
        }

        function setupAdmin() {
            document.getElementById('header-label').innerText = "ADMIN COMMAND";
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('main-nav').innerHTML = `
                <a href="#" class="nav-btn active">📊<br>STATS</a>
                <a href="#" class="nav-btn">⚙️<br>GESTÃO</a>
            `;
            // Aqui chamamos as suas funções de Admin criadas anteriormente
        }

        async function loadUserFeed() {
            const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            document.getElementById('user-feed').innerHTML = data.map(p => `
                <div class="post-card">
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div class="post-txt">${p.content || ''}</div>
                    <div class="post-actions" onclick="likePost('${p.id}')">❤️ Curtir (+2 XP)</div>
                </div>
            `).join('');
        }

        async function likePost(postId) {
            // Lógica de gamificação: +2 XP para quem curte
            alert("Você ganhou +2 XP por curtir!");
            // Aqui entraria o update no Supabase
        }
    </script>
</body>
</html>
