<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social - v33.14</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --google-blue: #4285F4;
            --fb-bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-main: #1C1E21;
            --text-secondary: #65676B;
            --border-color: #CED0D4;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fb-bg);
            color: var(--text-main);
            margin: 0;
            padding-top: 80px; /* Ajuste para o Header e Status */
            padding-bottom: 90px;
        }

        /* HEADER & STATUS FIXED (Base v33) */
        header {
            position: fixed; top: 0; left: 0; right: 0;
            background: #fff; border-bottom: 1px solid var(--border-color);
            z-index: 1000; height: 60px; display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px;
        }

        .status-header-fixed {
            position: fixed; top: 60px; left: 0; right: 0;
            background: #fff; border-bottom: 1px solid var(--border-color);
            z-index: 999; height: 30px; display: flex;
            align-items: center; padding: 0 15px; font-size: 10px; font-weight: 800;
        }

        /* FEED CONTAINER */
        .feed-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 10px;
        }

        /* CARD DE POST ESTILO FACEBOOK */
        .post-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
            padding: 12px;
            border: 1px solid var(--border-color);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #e4e6eb; margin-right: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        .post-meta { display: flex; flex-direction: column; }
        .user-name { font-weight: 600; font-size: 14px; }
        .post-time { font-size: 12px; color: var(--text-secondary); }

        .post-content {
            font-size: 14px; line-height: 1.4;
            margin-bottom: 12px; word-wrap: break-word;
        }

        .post-image {
            width: calc(100% + 24px); margin-left: -12px;
            max-height: 450px; object-fit: cover;
            border-top: 1px solid #eee; border-bottom: 1px solid #eee;
        }

        .post-actions {
            display: flex; border-top: 1px solid #eee;
            margin-top: 10px; padding-top: 4px;
        }

        .action-btn {
            flex: 1; background: none; border: none; padding: 8px;
            color: var(--text-secondary); font-weight: 600; cursor: pointer;
            font-size: 13px; border-radius: 4px;
        }

        .action-btn:hover { background-color: rgba(0,0,0,0.05); }

        /* PUBLISHER BOX */
        .publisher-card {
            background: #fff; border-radius: 8px; padding: 12px;
            margin-bottom: 16px; border: 1px solid var(--border-color);
        }

        #post-input {
            width: 100%; border: none; background: #f0f2f5;
            padding: 12px; border-radius: 20px; outline: none;
            font-size: 14px; cursor: pointer; margin-bottom: 10px;
        }

        /* ADS */
        .ad-card {
            background: #f9f9f9; text-align: center; padding: 12px;
            margin-bottom: 16px; border-radius: 8px; font-size: 11px;
            color: #999; border: 1px dashed #ccc;
        }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed; inset: 0; background: white; z-index: 6000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" style="display:none;">
        <div style="background:#4285F4; width:64px; height:64px; border-radius:16px; margin-bottom:24px;"></div>
        <h2 style="color:#4285F4; font-weight:900; font-size:12px; margin-bottom:32px;">SOCIAL EARN NETWORK</h2>
        <input type="text" id="login-id" placeholder="ID DE UTILIZADOR" style="width:100%; max-width:280px; border:2px solid #eee; padding:15px; border-radius:16px; text-align:center; margin-bottom:16px; font-weight:900;">
        <button onclick="doLogin()" style="width:100%; max-width:280px; bg:#4285F4; background:#4285F4; color:white; padding:15px; border-radius:16px; font-weight:900; border:none; cursor:pointer;">Entrar no Sistema</button>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:8px;">
            <div style="background:#4285F4; color:white; padding:8px; border-radius:8px; font-weight:900; font-style:italic;">S</div>
            <div>
                <h1 style="font-size:11px; font-weight:900; color:#4285F4; margin:0;">Social Earn</h1>
                <p style="font-size:8px; color:#ccc; margin:0; letter-spacing:1px;">Official Network</p>
            </div>
        </div>
        <div style="text-align:right;">
            <div id="main-eur" style="font-weight:900; color:#16a34a; font-size:18px;">0.0000€</div>
            <div id="main-brl" style="font-size:9px; color:#9ca3af; font-weight:900;">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-header-fixed">
        <span id="status-text" style="color:#16a34a;">GANHOS ATIVOS: 100% (MODO NORMAL)</span>
        <button onclick="doLogout()" style="margin-left:auto; background:none; border:none; font-size:8px; color:#ccc; font-weight:900; cursor:pointer;">SAIR</button>
    </div>

    <main class="feed-container">
        <div class="publisher-card">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="user-avatar">👤</div>
                <textarea id="post-input" placeholder="No que estás a pensar?" rows="1" onclick="expandPublisher()"></textarea>
            </div>
            <div id="expanded-post" class="hidden">
                <input id="post-url" type="text" placeholder="URL da Imagem (Opcional)" style="width:100%; background:#f0f2f5; border:none; padding:10px; border-radius:10px; margin-bottom:10px; font-size:12px;">
                <button onclick="handleInteraction('post')" style="width:100%; background:#4285F4; color:white; padding:12px; border-radius:10px; border:none; font-weight:900;">Publicar (+15 XP)</button>
            </div>
        </div>

        <div id="feed-container">
            </div>
    </main>

    <script>
        // CONFIGURAÇÕES SUPABASE 
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_MASTER = "5401881400";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let activeID = localStorage.getItem('apex_uid');
        let user = { saldo: 0, interactions: 0 };

        function doLogin() {
            const id = document.getElementById('login-id').value.trim();
            if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
        }

        function doLogout() { localStorage.removeItem('apex_uid'); location.reload(); }

        async function init() {
            if (!activeID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
            
            // Carrega perfil [cite: 15]
            const { data } = await sb.from('perfis').select('*').eq('id', activeID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            else await sb.from('perfis').insert([{ id: activeID, saldo: 0.0000 }]);

            updateUI();
            loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (user.saldo * 6.1245).toFixed(4) + " BRL";
        }

        async function loadFeed() {
            const { data: posts, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            if (error) return;

            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            posts.forEach((post, index) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <div class="user-avatar">👤</div>
                        <div class="post-meta">
                            <span class="user-name">Utilizador ${post.user_id}</span>
                            <span class="post-time">${new Date(post.created_at).toLocaleString()}</span>
                        </div>
                        ${activeID === ADMIN_MASTER ? `<button onclick="deletePost('${post.id}')" style="margin-left:auto; color:red; border:none; background:none; cursor:pointer; font-weight:900;">EXCLUIR</button>` : ''}
                    </div>
                    <div class="post-content">${post.content || post.texto || ''}</div>
                    ${post.image_url || post.url ? `<img src="${post.image_url || post.url}" class="post-image">` : ''}
                    <div class="post-actions">
                        <button class="action-btn" onclick="handleInteraction('like')">👍 Gosto (+2 XP)</button>
                        <button class="action-btn">💬 Comentar</button>
                    </div>
                `;
                container.appendChild(card);

                // Ad Injection a cada 3 posts
                if ((index + 1) % 3 === 0) {
                    const ad = document.createElement('div');
                    ad.className = 'ad-card';
                    ad.innerText = "ESPAÇO PUBLICITÁRIO APEX SOCIAL";
                    container.appendChild(ad);
                }
            });
        }

        function expandPublisher() {
            document.getElementById('expanded-post').classList.remove('hidden');
            document.getElementById('post-input').rows = 3;
        }

        async function handleInteraction(type) {
            // Lógica de XP e Saldo baseada na sua Master List
            const reward = type === 'post' ? 0.0150 : 0.0020;
            user.saldo += reward;
            
            // Atualiza Supabase 
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', activeID);
            
            if(type === 'post') {
                const content = document.getElementById('post-input').value;
                const url = document.getElementById('post-url').value;
                await sb.from('posts').insert([{ user_id: activeID, content: content, image_url: url }]);
                location.reload();
            }
            updateUI();
        }

        async function deletePost(id) {
            if(activeID === ADMIN_MASTER) {
                await sb.from('posts').delete().eq('id', id);
                loadFeed();
            }
        }

        init();
    </script>
</body>
</html>
