<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX C&C CENTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff00; padding-bottom: 90px; }

        /* HEADER */
        header { 
            background: #000; padding: 15px; border-bottom: 2px solid #004400; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header-title { font-size: 14px; font-weight: bold; letter-spacing: 2px; }
        .status-dot { color: #00ff00; font-size: 10px; animation: blink 1.5s infinite; }

        /* ABAS */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }

        /* MONITOR (LOGS) */
        .log-container { background: #000; border: 1px solid #004400; padding: 10px; border-radius: 4px; height: 60vh; overflow-y: auto; font-size: 12px; }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #002200; padding-bottom: 4px; }
        .log-time { color: #888; }

        /* STATS CARDS */
        .stat-card { background: #111; border: 1px solid #004400; padding: 20px; margin-bottom: 15px; border-radius: 8px; }
        .stat-val { font-size: 24px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #00ff00; }

        /* ADMIN TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { background: #002200; text-align: left; padding: 12px; color: #00ff00; }
        td { padding: 12px; border-bottom: 1px solid #002200; color: #fff; }
        .btn-ban { color: #ff0000; background: none; border: 1px solid #ff0000; padding: 4px 8px; cursor: pointer; font-weight: bold; }
        .btn-pay { color: #00ff00; background: none; border: 1px solid #00ff00; padding: 4px 8px; cursor: pointer; margin-right: 5px; }

        /* NAVBAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; height: 75px; display: flex; border-top: 2px solid #004400; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #004400; font-size: 10px; font-weight: bold; }
        .nav-btn.active { color: #00ff00; background: rgba(0, 255, 0, 0.05); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="header-title">APEX C&C CENTER</div>
    <div class="status-dot">● SB_LIVE_FEED</div>
</header>

<section id="p-monitor" class="page active">
    <h3 style="margin-bottom:10px">SISTEMA_LOGS_POSTS</h3>
    <div id="log-list" class="log-container">> Inicializando terminal...</div>
</section>

<section id="p-stats" class="page">
    <div class="stat-card">
        <div class="stat-label">Utilizadores Ativos</div>
        <div id="count-users" class="stat-val">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Conteúdo Global (Posts)</div>
        <div id="count-posts" class="stat-val">0</div>
    </div>
    <div class="stat-card" style="border-left: 4px solid #00ff00;">
        <div class="stat-label">Dívida Total (EUR)</div>
        <div id="total-debt" class="stat-val">0.0000€</div>
    </div>
</section>

<section id="p-admin" class="page">
    <h3 style="color:#ff0000; margin-bottom:15px">CONTROLO_DE_CARTEIRAS</h3>
    <div style="overflow-x:auto">
        <table>
            <thead>
                <tr>
                    <th>UID</th>
                    <th>SALDO</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
        </table>
    </div>
</section>

<nav class="nav-bar">
    <a href="#" class="nav-btn active" onclick="nav('monitor', this)"><span class="nav-icon">🖥️</span>MONITOR</a>
    <a href="#" class="nav-btn" onclick="nav('stats', this)"><span class="nav-icon">📊</span>STATS</a>
    <a href="#" class="nav-btn" onclick="nav('admin', this)"><span class="nav-icon">⚔️</span>ADMIN</a>
</nav>

<script>
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + page).classList.add('active');
        el.classList.add('active');

        if(page === 'monitor') loadLogs();
        if(page === 'stats') loadStats();
        if(page === 'admin') loadAdmin();
    }

    async function loadLogs() {
        const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false }).limit(30);
        const container = document.getElementById('log-list');
        container.innerHTML = data.map(p => `
            <div class="log-entry">
                <span class="log-time">[${new Date(p.created_at).toLocaleTimeString()}]</span> 
                USER_ID: <b style="color:#fff">${p.user_id}</b> postou: "${p.content || 'Sem texto'}"
            </div>
        `).join('') || '> Nenhum post encontrado no banco de dados.';
    }

    async function loadStats() {
        const { data: users } = await sb.from('perfis').select('saldo');
        const { count: postCount } = await sb.from('posts').select('*', { count: 'exact', head: true });
        
        let debt = users.reduce((acc, u) => acc + (u.saldo || 0), 0);
        
        document.getElementById('count-users').innerText = users.length;
        document.getElementById('count-posts').innerText = postCount;
        document.getElementById('total-debt').innerText = debt.toFixed(4) + "€";
    }

    async function loadAdmin() {
        const { data: users } = await sb.from('perfis').select('*').order('saldo', { ascending: false });
        const tbody = document.getElementById('admin-tbody');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td style="color:${u.saldo > 5 ? '#00ff00' : '#fff'}">${(u.saldo || 0).toFixed(4)}€</td>
                <td>
                    <button class="btn-pay" onclick="resetSaldo('${u.id}')">PAY</button>
                    <button class="btn-ban" onclick="banUser('${u.id}')">BAN</button>
                </td>
            </tr>
        `).join('');
    }

    async function resetSaldo(id) {
        if(confirm("Confirmar pagamento e zerar saldo do ID " + id + "?")) {
            await sb.from('perfis').update({ saldo: 0 }).eq('id', id);
            loadAdmin();
        }
    }

    async function banUser(id) {
        if(confirm("Deseja expulsar permanentemente o ID " + id + "?")) {
            await sb.from('perfis').delete().eq('id', id);
            loadAdmin();
        }
    }

    // Init
    loadLogs();
</script>

</body>
</html>
