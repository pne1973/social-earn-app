<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Social Network Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #ffcc00; --dark: #000; --card: #121212; --red: #ff4444; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Header */
        .header { background: #000; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .points-badge { background: var(--yellow); color: black; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        
        /* Admin Panel */
        #adminPanel { background: var(--red); margin: 10px; padding: 10px; border-radius: 12px; display: none; font-size: 12px; text-align: center; }
        
        /* Post Box */
        .post-box { background: var(--card); padding: 15px; margin: 10px; border-radius: 15px; border: 1px solid #222; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; height: 60px; resize: none; }
        .btn-post { background: var(--yellow); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; float: right; cursor: pointer; }
        .btn-post:disabled { opacity: 0.5; cursor: not-allowed; }
        .img-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #333; }
        
        /* Feed */
        .feed-item { background: var(--card); border-bottom: 1px solid #222; padding: 15px; position: relative; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; display: block; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--yellow); }

        .loading-spinner { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: bold; letter-spacing: 1px;">SOCIAL NETWORK</span>
        <div class="points-badge" id="userXP">0 XP</div>
    </div>

    <div id="adminPanel">🛡️ ADMIN: <span id="statUsers">0</span> Users | <span id="statPts">0</span> XP</div>

    <div id="walletSection" style="display:none; padding:20px; text-align:center;">
        <button onclick="dailyCheckin()" style="width:100%; background:#222; color:var(--yellow); border:1px solid var(--yellow); padding:12px; border-radius:12px; font-weight:bold; margin-bottom:20px;">🎁 Check-in Diário (+20 XP)</button>
        <div style="font-size:12px; color:#888;">SALDO ESTIMADO</div>
        <div id="realBalance" style="font-size:32px; font-weight:bold; color:var(--yellow); margin:10px 0;">€0.0000</div>
    </div>

    <div id="postSection" class="post-box">
        <textarea id="postInput" placeholder="Partilha algo com a rede..."></textarea>
        <img id="preview" class="img-preview">
        <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(this)">
            <button onclick="document.getElementById('fileInput').click()" style="background:#222; color:white; border:none; padding:10px; border-radius:12px; font-size:14px; cursor:pointer;">📷 Foto</button>
            <button class="btn-post" id="publishBtn" onclick="publishPost()">Publicar</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="loading-spinner">A carregar feed...</div>
    </div>

    <div class="nav-bar">
        <span class="nav-item active" onclick="changeTab('home', this)">🏠</span>
        <span class="nav-item" onclick="changeTab('rank', this)">🏆</span>
        <span class="nav-item" onclick="changeTab('wallet', this)">💰</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const urlParams = new URLSearchParams(window.location.search);
        const supabaseUrl = urlParams.get('url');
        const supabaseKey = urlParams.get('key');
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        const userId = tg.initDataUnsafe.user?.id || 12345; // 12345 para testes fora do TG
        const ADMIN_ID = 5401881400;

        // Preview da imagem selecionada
        function previewImage(input) {
            const preview = document.getElementById('preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    preview.src = e.target.result; 
                    preview.style.display = 'block'; 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Compressor de Imagem (converte para JPEG 60% qualidade, max 800px)
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.6); 
                    };
                };
            });
        }

        async function publishPost() {
            const text = document.getElementById('postInput').value;
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const btn = document.getElementById('publishBtn');
            let imgUrl = null;

            if (!text && !file) return;

            btn.innerText = "A enviar...";
            btn.disabled = true;

            try {
                if (file) {
                    const compressedFile = await compressImage(file);
                    const fileName = `${Date.now()}_${userId}.jpg`;
                    const { data, error } = await supabaseClient.storage
                        .from('post-images')
                        .upload(fileName, compressedFile);
                    
                    if (error) throw error;
                    imgUrl = supabaseClient.storage.from('post-images').getPublicUrl(fileName).data.publicUrl;
                }

                await supabaseClient.from('posts').insert([{ 
                    user_id: userId, 
                    username: tg.initDataUnsafe.user?.username || 'Utilizador',
                    content: text,
                    image_url: imgUrl
                }]);

                await supabaseClient.rpc('increment_points', { user_id: userId, amount: imgUrl ? 10 : 5 });
                location.reload(); 
            } catch (err) {
                alert("Erro ao publicar: " + err.message);
                btn.innerText = "Publicar";
                btn.disabled = false;
            }
        }

        async function loadFeed() {
            const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            let html = "";
            if (!posts || posts.length === 0) {
                html = "<div style='text-align:center; padding:50px; color:#555;'>Ainda não há posts.</div>";
            } else {
                posts.forEach(p => {
                    html += `<div class="feed-item">
                        ${userId === ADMIN_ID ? `<span onclick="deletePost(${p.id})" style="color:red; float:right; font-size:12px; font-weight:bold;">APAGAR</span>` : ''}
                        <b style="color:var(--yellow)">@${p.username}</b>
                        <p style="margin:10px 0; line-height:1.4;">${p.content || ''}</p>
                        ${p.image_url ? `<img src="${p.image_url}" class="post-img" loading="lazy">` : ''}
                        <div style="margin-top:10px; font-size:13px; color:#888; display:inline-block;" onclick="likePost(${p.id})">❤️ ${p.likes || 0} Likes</div>
                    </div>`;
                });
            }
            document.getElementById('mainContent').innerHTML = html;
        }

        async function changeTab(tab, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('postSection').style.display = tab === 'home' ? 'block' : 'none';
            document.getElementById('walletSection').style.display = tab === 'wallet' ? 'block' : 'none';
            document.getElementById('mainContent').style.display = (tab === 'home' || tab === 'rank') ? 'block' : 'none';
            
            if (tab === 'home') loadFeed();
            if (tab === 'rank') loadRank();
        }

        async function updateStats() {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if (data) {
                document.getElementById('userXP').innerText = `${data.points} XP`;
                document.getElementById('realBalance').innerText = `€${(data.points * 0.0005).toFixed(4)}`;
            }
        }

        async function deletePost(id) {
            if(confirm("Desejas apagar este post permanentemente?")) {
                await supabaseClient.from('posts').delete().eq('id', id);
                loadFeed();
            }
        }

        async function likePost(id) {
            await supabaseClient.rpc('increment_likes', { post_id: id });
            loadFeed();
        }

        async function dailyCheckin() {
            const { error } = await supabaseClient.rpc('increment_points', { user_id: userId, amount: 20 });
            if (!error) {
                alert("Check-in realizado! +20 XP");
                updateStats();
            }
        }
        
        async function loadAdmin() {
            if (userId !== ADMIN_ID) return;
            document.getElementById('adminPanel').style.display = 'block';
            const { data } = await supabaseClient.from('profiles').select('points');
            if (data) {
                document.getElementById('statUsers').innerText = data.length;
                document.getElementById('statPts').innerText = data.reduce((a, b) => a + b.points, 0);
            }
        }

        // Inicialização
        updateStats(); loadFeed(); loadAdmin();
    </script>
</body>
</html>
