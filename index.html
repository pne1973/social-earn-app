<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn v33.12 - Final Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; }
        body { font-family: 'Roboto', sans-serif; background: var(--fb-bg); margin: 0; padding-top: 175px; padding-bottom: 95px; font-weight: 700; color: #1c1e21; }
        
        /* UI FIXA */
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 1px solid #ddd; z-index: 2000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-bar { position: fixed; top: 72px; width: 100%; height: 40px; background: white; border-bottom: 1px solid #eee; z-index: 1999; display: flex; align-items: center; padding: 0 16px; font-size: 10px; color: #34A853; text-transform: uppercase; font-weight: 900; }
        .publisher { position: fixed; top: 112px; width: 100%; background: white; padding: 12px; z-index: 1998; border-bottom: 8px solid #ddd; }
        
        /* POSTS */
        .fb-post { background: white; margin-bottom: 8px; border-bottom: 1px solid #ddd; width: 100%; }
        .fb-h { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .fb-avatar { width: 38px; height: 38px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .fb-c { padding: 0 12px 12px; font-size: 15px; font-weight: 400; line-height: 1.4; }
        .fb-img { width: 100%; max-height: 450px; object-fit: cover; display: block; }
        .fb-a { display: flex; border-top: 1px solid #eee; margin: 0 12px; padding: 4px 0; }
        .fb-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; color: #65676b; font-size: 13px; font-weight: 700; }

        /* COMMENTS SECTION */
        .comment-box { background: #f0f2f5; padding: 8px 12px; border-radius: 18px; margin: 4px 12px; font-size: 13px; font-weight: 400; }

        /* NAV & BADGES */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 1px solid #ddd; display: flex; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #65676b; font-weight: 900; position: relative; }
        .nav-item.active { color: var(--fb-blue); }
        .badge { position: absolute; top: 8px; right: 22%; background: #fa3e3e; color: white; font-size: 9px; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white italic font-black text-2xl">S</div>
            <span class="text-blue-600 font-black text-xs leading-none uppercase">Social<br>Earn</span>
        </div>
        <div class="text-right">
            <div id="top-saldo" class="text-green-600 text-2xl font-black tracking-tighter">0.0000</div>
            <div id="top-cur" class="text-gray-400 text-[9px] font-black uppercase">Detectando...</div>
        </div>
    </header>

    <div class="status-bar">
        <span id="mult-status">Ganhos Ativos: 100%</span>
        <button onclick="logout()" class="ml-auto text-gray-300">Sair</button>
    </div>

    <main id="view-feed" class="tab-content active">
        <div class="publisher">
            <div onclick="openPost()" class="bg-gray-100 rounded-full px-4 py-3 text-gray-400 text-sm font-bold flex items-center gap-3">
                <div class="fb-avatar" style="width:24px; height:24px; font-size:10px;">👤</div>
                O que estás a pensar?
            </div>
        </div>
        <div id="feed-container"></div>
    </main>

    <main id="view-ganhos" class="tab-content px-6 pt-12">
        <div class="bg-white p-10 text-center rounded-[40px] shadow-sm border border-gray-100">
            <p id="wall-saldo" class="text-5xl font-black text-blue-600 mb-8">0.0000</p>
            <div class="w-full bg-gray-100 h-3 rounded-full mb-4">
                <div id="progress-bar" class="bg-blue-600 h-full rounded-full transition-all duration-1000"></div>
            </div>
            <p id="min-text" class="text-[9px] text-gray-400 font-black uppercase"></p>
        </div>
    </main>

    <nav>
        <button onclick="changeTab('feed')" class="nav-item active">🏠<span>Feed</span></button>
        <button onclick="changeTab('ganhos')" class="nav-item">💰<span>Ganhos</span><div class="badge">9+</div></button>
        <button id="nav-admin" onclick="changeTab('admin')" class="nav-item hidden text-red-600">⚙️<span>BI Admin</span></button>
    </nav>

    <div id="ad-overlay">
        <div class="bg-white rounded-[32px] p-8 text-center max-w-xs w-full shadow-2xl">
            <p class="text-[10px] font-black text-blue-600 uppercase mb-2">Manter Ganhos 100%</p>
            <p class="text-sm text-gray-400 mb-8 font-bold">Vê um anúncio curto para continuar a ganhar o valor máximo!</p>
            <button onclick="startAd()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs mb-4">Ver Anúncio (15s)</button>
            <button onclick="applyPenalty()" class="text-[10px] text-gray-300 font-black uppercase">Recusar (-50%)</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";
        
        let app = {
            uid: localStorage.getItem('apex_uid'),
            saldo: 0, mult: 1.0, actions: 0,
            cur: { sym: '€', code: 'EUR', min: 5.0 },
            pending: null
        };

        async function init() {
            if (!app.uid) {
                const id = prompt("ID DE UTILIZADOR:");
                if (id) { localStorage.setItem('apex_uid', id); location.reload(); }
                return;
            }
            if (navigator.language === 'pt-BR') app.cur = { sym: 'R$', code: 'BRL', min: 25.0 };
            document.getElementById('top-cur').innerText = app.cur.code;
            document.getElementById('min-text').innerText = `Saque Mínimo: ${app.cur.sym}${app.cur.min.toFixed(2)}`;
            if (app.uid === ADMIN_ID) document.getElementById('nav-admin').classList.remove('hidden');

            const { data } = await sb.from('perfis').select('*').eq('id', app.uid).single();
            if (data) app.saldo = Number(data.saldo);
            else await sb.from('perfis').insert({ id: app.uid, saldo: 0 });

            updateUI();
            loadFeed();
        }

        async function loadFeed() {
            const container = document.getElementById('feed-container');
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            
            let html = "";
            posts.forEach((p, idx) => {
                const safeId = String(p.user_id).slice(0, 5);
                const comments = p.comment_data || []; // Array de textos

                html += `
                <div class="fb-post">
                    <div class="fb-h">
                        <div class="fb-avatar">👤</div>
                        <div class="flex flex-col"><span class="text-sm font-bold">User ${safeId}</span><span class="text-[11px] text-gray-400">Online</span></div>
                    </div>
                    <div class="fb-c">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="fb-img">` : ''}
                    <div class="px-3 py-2 text-[11px] text-gray-400 border-b border-gray-50 mx-3 flex justify-between">
                        <span>👍 ${p.likes || 0}</span>
                        <span>${comments.length} comentários</span>
                    </div>
                    <div class="fb-a">
                        <button onclick="handleLike('${p.id}', ${p.likes || 0})" class="fb-btn">👍 Gosto</button>
                        <button onclick="handleComment('${p.id}')" class="fb-btn">💬 Comentar</button>
                    </div>
                    <div id="comments-${p.id}" class="pb-3">
                        ${comments.slice(-2).map(c => `<div class="comment-box"><b>User:</b> ${c}</div>`).join('')}
                    </div>
                </div>`;
                if((idx+1)%3 === 0) html += `<div class="p-10 bg-white mb-2 text-center text-[8px] text-gray-300 font-black uppercase tracking-widest">Sponsored Ads</div>`;
            });
            container.innerHTML = html;
        }

        async function handleLike(postId, current) {
            if(app.actions >= 2 && app.mult === 1.0) { app.pending = { type: 'like', id: postId, val: current }; document.getElementById('ad-overlay').style.display = 'flex'; return; }
            await sb.from('posts').update({ likes: current + 1 }).eq('id', postId);
            earn(0.0006);
            loadFeed();
        }

        async function handleComment(postId) {
            const txt = prompt("Escreve o teu comentário:");
            if(!txt) return;
            if(app.actions >= 2 && app.mult === 1.0) { alert("Vê um anúncio primeiro!"); return; }
            
            const { data } = await sb.from('posts').select('comment_data').eq('id', postId).single();
            let list = data.comment_data || [];
            list.push(txt);
            
            await sb.from('posts').update({ comment_data: list }).eq('id', postId);
            earn(0.0100);
            loadFeed();
        }

        async function earn(v) {
            app.actions++;
            app.saldo += (v * app.mult);
            updateUI();
            await sb.from('perfis').update({ saldo: app.saldo }).eq('id', app.uid);
        }

        function updateUI() {
            const val = `${app.cur.sym}${app.saldo.toFixed(4)}`;
            document.getElementById('top-saldo').innerText = val;
            document.getElementById('wall-saldo').innerText = val;
            let p = (app.saldo / app.cur.min) * 100;
            document.getElementById('progress-bar').style.width = Math.min(p, 100) + "%";
            document.getElementById('mult-status').innerText = `Ganhos: ${Math.round(app.mult * 100)}%`;
        }

        function changeTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(t === 'feed') document.getElementById('view-feed').classList.add('active');
            if(t === 'ganhos') document.getElementById('view-ganhos').classList.add('active');
            window.scrollTo(0,0);
        }

        async function openPost() {
            const txt = prompt("No que estás a pensar?");
            if (txt) {
                await sb.from('posts').insert({ user_id: app.uid, content: txt, likes: 0, comment_data: [] });
                earn(0.0150);
                loadFeed();
            }
        }

        function startAd() { app.mult = 1.0; app.actions = 0; document.getElementById('ad-overlay').style.display = 'none'; }
        function applyPenalty() { app.mult = 0.5; document.getElementById('ad-overlay').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
