<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
        
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 4000; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
        .earning-text { font-size: 3rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 20px rgba(52, 168, 83, 0.4); -webkit-text-stroke: 1.5px white; }

        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 12px 0; border: none; background: transparent; }
        .interaction-badge { position: absolute; top: 4px; right: 15%; background: var(--g-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 900; border: 2px solid white; z-index: 10; min-width: 20px; text-align: center; }
        
        .comment-section { display: none; background: #f8f9fa; border-top: 1px solid #eee; width: 100%; }
        .comment-section.active { display: flex; flex-direction: column; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        
        /* Modais de 300x250 conforme solicitado */
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; }
        .modal-300-250 { width: 300px; height: 250px; background: white; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }

        .sticky-publisher { position: fixed; top: 72px; left: 0; right: 0; z-index: 100; background: #f1f3f4; padding: 8px 16px; }
        #feed-container { margin-top: 120px; }
    </style>
</head>
<body class="pb-24">

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <div id="ad-overlay">
        <div id="ad-decision-ui" class="modal-300-250 p-6 text-center">
            <h3 class="text-sm font-black uppercase text-blue-600 mb-2">Limite de Interações</h3>
            <p class="text-[10px] leading-tight font-bold mb-4 text-gray-500">Vê um anúncio para manter 100% dos teus ganhos por interação.</p>
            <button onclick="startAdFlow()" class="w-full py-3 bg-blue-600 text-white rounded-lg shadow-md uppercase text-[10px] mb-2 font-black">Ver Anúncio (15s)</button>
            <button onclick="degradeAndContinue()" class="w-full py-2 bg-gray-100 text-gray-400 rounded-lg uppercase text-[9px] font-black">Não, reduzir ganhos 50%</button>
        </div>

        <div id="ad-player-ui" class="modal-300-250 hidden">
            <div class="flex-1 bg-black flex items-center justify-center relative">
                <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=300" class="absolute inset-0 w-full h-full object-cover opacity-40">
                <div id="ad-timer-circle" class="relative z-10 text-white font-black text-3xl">15</div>
            </div>
            <button id="close-ad-btn" disabled class="h-12 bg-gray-200 text-gray-400 uppercase text-[10px] font-black">Aguarde o fim...</button>
        </div>

        <div id="ad-penalty-ui" class="modal-300-250 p-6 text-center hidden">
            <div class="text-3xl mb-2">⚠️</div>
            <h3 class="text-sm font-black uppercase text-red-500 mb-2">Ganhos Reduzidos</h3>
            <p class="text-[10px] leading-tight font-bold mb-6 text-gray-500">Como optaste por não ver o anúncio, o valor das tuas interações foi reduzido em 50%.</p>
            <button onclick="closePenalty()" class="w-full py-3 bg-gray-800 text-white rounded-lg uppercase text-[10px] font-black">Entendido</button>
        </div>
    </div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic">S</div>
            <div>
                <h1 class="text-sm font-black uppercase text-blue-600">Social Earn</h1>
                <span id="multiplier-tag" class="text-[8px] font-black text-green-500 uppercase italic">STATUS: 100% OK</span>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-base">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase italic">0.0000 BRL</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4 mt-[72px]">
        <section id="view-social" class="tab-content active">
            <div class="sticky-publisher">
                <div class="google-card p-3 border-t-4 border-blue-600 shadow-lg">
                    <textarea id="post-input" onclick="expandPublisher()" placeholder="O QUE PRETENDE PARTILHAR?" class="w-full border-none focus:ring-0 text-[11px] mb-1 resize-none uppercase font-black" rows="1"></textarea>
                    <div id="expanded-post" class="hidden">
                        <input id="post-url" type="text" placeholder="URL DA IMAGEM (OPCIONAL)" class="w-full bg-gray-50 border-none text-[9px] p-2 rounded-lg mb-2 font-black uppercase outline-none">
                        <button onclick="publish()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Publicar</button>
                    </div>
                </div>
            </div>
            <div id="feed-container" class="space-y-6"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="google-card p-12 text-center border-t-[10px] border-blue-600 mt-4 shadow-2xl">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2 italic">Saldo Disponível</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p id="wall-brl" class="text-xs font-black text-gray-500 mt-2 uppercase italic">≈ 0.0000 BRL</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center"><span class="text-[10px] font-black uppercase">REDE</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center"><span class="text-[10px] font-black uppercase">GANHOS</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = { saldo: 0, interactions: 0, multiplier: 1.0 };
        let pendingVal = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            updateUI(); loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (user.saldo * 6.12).toFixed(4) + " BRL";
            const tag = document.getElementById('multiplier-tag');
            tag.innerText = `STATUS: ${Math.round(user.multiplier * 100)}% OK`;
            tag.className = user.multiplier < 1.0 ? "text-[8px] font-black text-red-500 uppercase italic" : "text-[8px] font-black text-green-500 uppercase italic";
        }

        function showBigNumber(val) {
            const container = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            container.style.display = 'block';
            setTimeout(() => { container.style.display = 'none'; }, 800);
        }

        async function reagir(val) {
            // Limite de 2 interações antes de pedir anúncio
            if(user.interactions >= 2) {
                pendingVal = val;
                document.getElementById('ad-overlay').style.display = 'flex';
                document.getElementById('ad-decision-ui').classList.remove('hidden');
                document.getElementById('ad-player-ui').classList.add('hidden');
                document.getElementById('ad-penalty-ui').classList.add('hidden');
                return;
            }
            
            user.interactions++;
            const ganhar = val * user.multiplier;
            user.saldo += ganhar;
            showBigNumber(ganhar);
            updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        function startAdFlow() {
            document.getElementById('ad-decision-ui').classList.add('hidden');
            document.getElementById('ad-player-ui').classList.remove('hidden');
            let time = 15;
            const btn = document.getElementById('close-ad-btn');
            const timerText = document.getElementById('ad-timer-circle');
            
            const timer = setInterval(() => {
                time--;
                timerText.innerText = time;
                btn.innerText = `Aguarde ${time}s...`;
                if(time <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "FECHAR E RECEBER 100%";
                    btn.className = "h-12 bg-green-600 text-white font-black uppercase text-[10px]";
                    btn.onclick = () => { 
                        user.multiplier = 1.0; 
                        user.interactions = 0; 
                        finalize(); 
                    };
                }
            }, 1000);
        }

        function degradeAndContinue() { 
            user.multiplier = 0.5; // Redução de 50%
            document.getElementById('ad-decision-ui').classList.add('hidden');
            document.getElementById('ad-penalty-ui').classList.remove('hidden');
        }

        function closePenalty() {
            user.interactions = 0;
            finalize();
        }

        async function finalize() {
            document.getElementById('ad-overlay').style.display = 'none';
            const bonus = pendingVal * user.multiplier;
            user.saldo += bonus;
            showBigNumber(bonus);
            updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!posts) return;
            container.innerHTML = "";
            
            posts.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = "google-card shadow-sm mb-6";
                card.innerHTML = `
                    <div class="p-5">
                        <p class="text-[13px] font-black uppercase text-gray-800 mb-4">${p.content}</p>
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-xl mb-4 border border-gray-100">` : ''}
                        <div class="flex border-t pt-2">
                            <button onclick="reagir(0.0006)" class="interaction-btn">
                                <div class="interaction-badge">${Math.floor(Math.random()*50)}</div>
                                <span class="text-xl">👍</span><span class="text-[8px] font-black text-gray-400 uppercase mt-1">Gostar</span>
                            </button>
                            <button onclick="toggleComments('${p.id}')" class="interaction-btn border-x border-gray-100">
                                <div class="interaction-badge" id="badge-${p.id}">0</div>
                                <span class="text-xl">💬</span><span class="text-[8px] font-black text-gray-400 uppercase mt-1">Comentar</span>
                            </button>
                            <button onclick="reagir(0.0020)" class="interaction-btn">
                                <div class="interaction-badge">${Math.floor(Math.random()*15)}</div>
                                <span class="text-xl">🔗</span><span class="text-[8px] font-black text-gray-400 uppercase mt-1">Partilhar</span>
                            </button>
                        </div>
                    </div>
                    <div id="comments-${p.id}" class="comment-section">
                        <div id="list-${p.id}" class="p-4 space-y-2 max-h-48 overflow-y-auto bg-gray-50"></div>
                        <div class="p-3 bg-white border-t flex gap-2">
                            <input id="in-${p.id}" type="text" placeholder="MENSAGEM..." class="flex-1 bg-gray-100 rounded-xl p-3 text-[10px] font-black uppercase border-none">
                            <button onclick="addComment('${p.id}')" class="bg-blue-600 text-white px-5 rounded-xl font-black text-[10px] uppercase">OK</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                updateCommentCount(p.id);
            });
        }

        async function addComment(pid) {
            const input = document.getElementById(`in-${pid}`);
            if(!input.value) return;
            const { error } = await sb.from('comentarios').insert([{ post_id: pid, user_id: MASTER_ID, content: input.value }]);
            if(!error) { input.value = ""; await reagir(0.0010); updateCommentList(pid); }
        }

        async function updateCommentList(pid) {
            const { data } = await sb.from('comentarios').select('*').eq('post_id', pid).order('created_at', {ascending: true});
            const list = document.getElementById(`list-${pid}`);
            list.innerHTML = data.length ? data.map(c => `<div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm"><p class="text-[7px] text-blue-600 font-black italic">ID..${String(c.user_id).slice(-4)}</p><p class="text-[10px] font-black uppercase text-gray-700">${c.content}</p></div>`).join('') : '<p class="text-[8px] text-gray-400 text-center font-black py-4 uppercase">Sem comentários</p>';
            updateCommentCount(pid);
        }

        async function updateCommentCount(pid) {
            const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', pid);
            const badge = document.getElementById(`badge-${pid}`);
            if(badge) badge.innerText = count || 0;
        }

        async function publish() {
            const c = document.getElementById('post-input').value;
            const i = document.getElementById('post-url').value;
            if(!c) return;
            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content: c, image_url: i }]);
            if(!error) { 
                user.saldo += 0.0150; 
                showBigNumber(0.0150); 
                updateUI(); 
                await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID); 
                document.getElementById('post-input').value = ""; 
                document.getElementById('expanded-post').classList.add('hidden');
                document.getElementById('post-input').rows = 1;
                loadFeed(); 
            }
        }

        function toggleComments(id) { document.getElementById(`comments-${id}`).classList.toggle('active'); updateCommentList(id); }
        function nav(t) { document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById('view-'+t).classList.add('active'); event.currentTarget.classList.add('active'); }
        function expandPublisher() { document.getElementById('expanded-post').classList.remove('hidden'); document.getElementById('post-input').rows = 3; }

        window.onload = init;
    </script>
</body>
</html>
