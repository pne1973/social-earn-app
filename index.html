<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network v33.12 - Production Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --g-yellow: #FBBC05; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; transition: transform 0.2s; }
        
        .feed-ad-unit { background: #ffffff; border: 2px dashed var(--g-blue); border-radius: 12px; padding: 20px; margin-bottom: 12px; text-align: center; }

        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
        .earning-text { font-size: 3.5rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 20px rgba(52,168,83,0.4); -webkit-text-stroke: 1.5px white; }

        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-300-250 { width: 310px; background: white; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        .status-header-fixed { position: fixed; top: 72px; left: 0; right: 0; z-index: 300; background: white; border-bottom: 1px solid #dadce0; padding: 8px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 48px; }
        .publisher-fixed { position: fixed; top: 120px; left: 0; right: 0; z-index: 280; background: #f1f3f4; padding: 8px 16px; border-bottom: 1px solid #dadce0; }
        .mini-input-box { background: white; border: 1px solid #dadce0; border-radius: 24px; padding: 8px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        #feed-container { margin-top: 185px; padding: 0 16px; }
        .nav-item { transition: all 0.3s; color: #5f6368; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .profit-card { background: #1a0b2e; color: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .admin-stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; border-bottom: 4px solid #eee; }
        
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; position: relative; border: none; background: transparent; cursor: pointer; border-radius: 8px; }
        .count-badge { position: absolute; top: 4px; right: 25%; background: var(--g-red); color: white; font-size: 10px; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 900; border: 2px solid white; }

        #auth-screen { position: fixed; inset: 0; background: white; z-index: 6000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" style="display:none;">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center text-white font-black italic text-3xl">S</div>
        <input type="text" id="login-id" placeholder="ID DE UTILIZADOR" class="w-full max-w-xs border-2 border-gray-100 rounded-2xl p-5 text-center mb-4 uppercase font-black focus:border-blue-600 outline-none">
        <button onclick="doLogin()" class="w-full max-w-xs bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase">Entrar</button>
    </div>

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <div id="ad-overlay">
        <div id="ad-decision-ui" class="modal-300-250 p-8 text-center">
            <h3 class="text-xs font-black uppercase text-blue-600 mb-3">Manter Ganhos 1.0x</h3>
            <p class="text-[10px] font-bold mb-8 text-gray-400 uppercase">Vê um anúncio para manter os ganhos no máximo.</p>
            <button onclick="startAdFlow()" class="w-full py-4 bg-blue-600 text-white rounded-xl shadow-lg uppercase text-[11px] font-black mb-3">Ver Anúncio (15s)</button>
            <button onclick="degradeGains()" class="w-full py-2 text-gray-300 uppercase text-[9px] font-black italic">Aceitar redução</button>
        </div>
        <div id="ad-player-ui" class="modal-300-250 hidden">
            <div class="flex-1 bg-black flex flex-col items-center justify-center text-white p-6">
                <div id="ad-timer-circle" class="font-black text-6xl mb-2">15</div>
                <p class="text-[9px] text-blue-400 uppercase font-black">Monetizando...</p>
            </div>
            <button id="close-ad-btn" disabled class="h-16 bg-gray-100 text-gray-400 uppercase text-[10px] font-black">Processando...</button>
        </div>
    </div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-5 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-md">S</div>
            <h1 class="text-[11px] font-black uppercase text-blue-600">Social Earn</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-xl tracking-tighter">0.0000€</div>
        </div>
    </header>

    <div class="status-header-fixed">
        <div id="status-text" class="text-[9px] font-black uppercase text-green-600">Ganhos Ativos: 100%</div>
        <button id="restore-btn" onclick="startAdFlow(true)" class="hidden bg-red-600 text-white px-3 py-1 rounded-lg text-[8px] font-black uppercase ml-2 animate-pulse">Restaurar</button>
        <button onclick="doLogout()" class="ml-auto text-[8px] text-gray-300 uppercase font-black">Sair</button>
    </div>

    <div id="pub-fixed-container" class="publisher-fixed">
        <div id="mini-pub" onclick="expandPublisher()" class="mini-input-box shadow-sm">
            <div class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-[10px]">👤</div>
            <div class="text-[10px] text-gray-300 font-black uppercase">O que quer partilhar?</div>
        </div>
        <div id="expanded-post" class="hidden google-card p-4 border-t-4 border-blue-600 mt-2">
            <textarea id="post-input" placeholder="ESCREVA AQUI..." class="w-full border-none focus:ring-0 text-xs mb-2 uppercase font-black" rows="3"></textarea>
            <input id="post-url" type="text" placeholder="URL DA IMAGEM" class="w-full bg-gray-50 p-3 rounded-xl mb-3 text-[10px] outline-none uppercase font-black">
            <div class="flex gap-2">
                <button onclick="collapsePublisher()" class="flex-1 text-[9px] font-black text-gray-400 uppercase">Sair</button>
                <button onclick="handleInteraction('post')" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-black text-[11px] uppercase">Publicar</button>
            </div>
        </div>
    </div>

    <main class="max-w-lg mx-auto">
        <section id="view-social" class="tab-content active"><div id="feed-container"></div></section>
        <section id="view-info" class="tab-content px-4 mt-32">
            <div class="google-card p-12 text-center border-t-[12px] border-blue-600">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3">ID: <span id="display-uid" class="text-blue-600">---</span></p>
                <h1 id="wall-eur" class="text-6xl font-black text-blue-600 mb-2">0.0000€</h1>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden mt-6">
                    <div id="withdraw-progress" class="bg-blue-600 h-full w-0 transition-all"></div>
                </div>
            </div>
        </section>
        <section id="view-admin" class="tab-content px-4 mt-32 pb-10">
            <div class="profit-card"><div id="adm-gross-revenue" class="text-3xl font-black">0.0000€</div></div>
            <div class="google-card"><table class="w-full"><tbody id="adm-user-list"></tbody></table></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active flex-1 flex flex-col items-center font-black text-[10px] uppercase">Feed</button>
        <button id="nav-wallet-btn" onclick="nav('info')" class="nav-item flex-1 flex flex-col items-center font-black text-[10px] uppercase">Carteira</button>
        <button id="nav-admin-btn" onclick="nav('admin')" class="hidden flex-1 flex flex-col items-center font-black text-[10px] uppercase text-red-600">Admin</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_MASTER = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let activeID = localStorage.getItem('apex_uid');
        let user = { saldo: 0, interactions: 0, multiplier: 1.0 };
        let pendingAction = null;

        function doLogin() { const id = document.getElementById('login-id').value.trim(); if(id) { localStorage.setItem('apex_uid', id); location.reload(); } }
        function doLogout() { localStorage.removeItem('apex_uid'); location.reload(); }

        async function init() {
            if (!activeID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
            document.getElementById('display-uid').innerText = activeID;
            if(activeID === ADMIN_MASTER) {
                document.getElementById('nav-admin-btn').classList.remove('hidden');
                document.getElementById('nav-wallet-btn').classList.add('hidden');
            }
            const { data } = await sb.from('perfis').select('*').eq('id', activeID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            updateUI(); loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('withdraw-progress').style.width = Math.min((user.saldo/5)*100, 100) + "%";
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            let html = "";
            posts.forEach((p, index) => {
                html += `
                <div class="google-card p-5 shadow-sm">
                    <p class="text-[13px] font-black uppercase mb-4">${p.content}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-2xl mb-4">` : ''}
                    <div class="flex border-t pt-2">
                        <button onclick="handleInteraction('like', 0.0006)" class="interaction-btn"><span class="text-xl">👍</span></button>
                        <button onclick="toggleComments('${p.id}')" class="interaction-btn"><span class="text-xl">💬</span></button>
                        <button onclick="socialShare('${p.id}')" class="interaction-btn"><span class="text-xl">🔗</span></button>
                    </div>
                </div>`;
                
                // CONDITIONAL ADS: ONLY FOR NON-ADMIN USERS
                if (activeID !== ADMIN_MASTER && (index + 1) % 3 === 0) {
                    html += `<div class="feed-ad-unit"><p class="text-[9px] font-black text-gray-400 uppercase">Anúncio Patrocinado</p></div>`;
                }
            });
            container.innerHTML = html;
        }

        function handleInteraction(type, val = 0) {
            if (activeID !== ADMIN_MASTER && user.interactions >= 2 && user.multiplier === 1.0) {
                pendingAction = { type, val };
                document.getElementById('ad-overlay').style.display = 'flex';
            } else { executeAction(type, val); }
        }

        function executeAction(t, v) { 
            if(t === 'post') publish(); 
            else { user.interactions++; applyGain(v); } 
        }

        async function applyGain(v) {
            user.saldo += (v * user.multiplier);
            showBigNumber(v * user.multiplier); updateUI();
            await sb.from('perfis').upsert({ id: activeID, saldo: user.saldo });
        }

        function showBigNumber(v) {
            const el = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + v.toFixed(4) + "€";
            el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800);
        }

        function startAdFlow() {
            document.getElementById('ad-decision-ui').classList.add('hidden');
            document.getElementById('ad-player-ui').classList.remove('hidden');
            let t = 15; const timer = setInterval(() => {
                t--; document.getElementById('ad-timer-circle').innerText = t;
                if(t<=0) {
                    clearInterval(timer); const b = document.getElementById('close-ad-btn');
                    b.disabled = false; b.innerText = "FECHAR";
                    b.onclick = () => { user.multiplier = 1.0; user.interactions = 0; closeAd(); if(pendingAction) executeAction(pendingAction.type, pendingAction.val); };
                }
            }, 1000);
        }

        function degradeGains() { user.multiplier = 0.5; closeAd(); if(pendingAction) executeAction(pendingAction.type, pendingAction.val); }
        function closeAd() { document.getElementById('ad-overlay').style.display = 'none'; }
        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function expandPublisher() { document.getElementById('mini-pub').classList.add('hidden'); document.getElementById('expanded-post').classList.remove('hidden'); }
        function collapsePublisher() { document.getElementById('mini-pub').classList.remove('hidden'); document.getElementById('expanded-post').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
