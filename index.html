<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pine Social</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RESET E DESIGN BASE - MANTIDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background-color: #121212; height: 100%; }
        body { 
            background-color: #121212; color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh; padding-top: 165px; -webkit-font-smoothing: antialiased;
        }

        /* HEADER E NAVEGAÇÃO */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
        .ad-top { background: #1a1a1a; color: #ffcc00; padding: 8px; text-align: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #333; }
        .nav-main { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .xp-pill { background: #ffcc00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .tabs { display: flex; background: #1a1a1a; border-top: 1px solid #333; }
        .tab-item { flex: 1; padding: 14px; text-align: center; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-item.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; }

        /* CONTENT */
        .content { padding: 15px; max-width: 550px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* CARDS E POSTS */
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .post { background: #1e1e1e; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; background: #1a1a1a; }
        .post-avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffcc00; font-weight: bold; }
        .post-text { padding: 15px; font-size: 15px; line-height: 1.5; color: #eee; }
        .post-img { width: 100%; height: 300px; object-fit: cover; display: block; border-top: 1px solid #252525; background: #000; }

        /* INTERAÇÃO SOCIAL (NOVO) */
        .post-actions { display: flex; padding: 10px 15px; border-top: 1px solid #252525; gap: 20px; color: #888; font-size: 13px; }
        .action-btn { cursor: pointer; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
        .action-btn:hover { color: #ffcc00; }
        .comment-section { background: #161616; padding: 10px 15px; display: none; border-top: 1px solid #252525; }
        .comment-input { width: 100%; background: #252525; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; font-size: 13px; margin-top: 5px; outline: none; }

        /* INPUTS E ADMIN */
        .input-area { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; resize: none; min-height: 80px; font-size: 15px; outline: none; }
        .btn-pub { background: #ffcc00; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .admin-link { display: none; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="ad-top">📢 PINE SOCIAL: Ganha +100 XP por cada amigo convidado!</div>
        <div class="nav-main">
            <h3>PINE <span style="color:#ffcc00">SOCIAL</span></h3>
            <div id="userXP" class="xp-pill">0 XP</div>
        </div>
        <div class="tabs">
            <div class="tab-item active" onclick="openTab('feed-page', this)">Feed</div>
            <div class="tab-item" onclick="openTab('earn-page', this)">Ranking</div>
            <div class="tab-item" onclick="openTab('wallet-page', this)">Saque</div>
            <div id="adm-tab" class="tab-item admin-link" onclick="openTab('admin-page', this)">Admin</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div class="card">
                <textarea id="postText" class="input-area" placeholder="O que queres partilhar?"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:#888; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                    <span id="procStatus" style="display:none; color:#ffcc00; font-size:11px;">A processar...</span>
                    <button class="btn-pub" id="pubBtn" onclick="publish()">Publicar</button>
                </div>
            </div>
            <div id="feed-items">A carregar publicações...</div>
        </div>

        <div id="earn-page" class="page">
            <div class="card"><h3 style="color:#ffcc00">Top 10 Ranking</h3><div id="rankingList">...</div></div>
        </div>

        <div id="wallet-page" class="page">
            <div class="card" style="text-align:center;">
                <p>Saldo (EUR/BRL)</p>
                <h1 style="color:#ffcc00;"><span id="eurVal">0.0000</span>€</h1>
                <h3 style="color:#888;"><span id="brlVal">0.0000</span> R$</h3>
            </div>
        </div>

        <div id="admin-page" class="page">
            <div class="card" style="border:1px solid #ff4444">
                <button class="btn-pub" style="background:#ff4444; color:#fff; width:100%;" onclick="clearAll()">APAGAR TODOS OS POSTS</button>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const myId = 5401881400;

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'feed-page') fetchFeed();
            window.scrollTo(0,0);
        }

        async function getProfile() {
            const { data } = await client.from('profiles').select('points').eq('id', myId).single();
            if (data) {
                document.getElementById('userXP').innerText = (data.points || 0) + " XP";
                document.getElementById('eurVal').innerText = (data.points * 0.0010).toFixed(4);
                document.getElementById('brlVal').innerText = (data.points * 0.0010 * 6.15).toFixed(4);
            }
            if(myId === 5401881400) document.getElementById('adm-tab').style.display = 'block';
        }

        // FUNÇÃO DE LIKES (GAMIFICATION: +2 XP)
        async function likePost(postId) {
            await client.rpc('increment_points', { user_id: myId, amount: 2 });
            alert("Ganhaste +2 XP pelo Like!");
            getProfile();
        }

        // ABRIR ESPAÇO DE COMENTÁRIOS
        function toggleComments(id) {
            const el = document.getElementById(`box-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        // PARTILHA NAS REDES SOCIAIS
        function sharePost(id) {
            const url = `https://pinesocial.app/post/${id}`;
            if (navigator.share) {
                navigator.share({ title: 'Pine Social', url: url });
            } else {
                prompt("Copia o link para partilhar:", url);
            }
        }

        async function fetchFeed() {
            const { data } = await client.from('posts').select('*').order('created_at', {ascending: false}).limit(10);
            const list = document.getElementById('feed-items');
            list.innerHTML = '';
            if(data) {
                data.forEach((p, index) => {
                    const el = document.createElement('div');
                    el.className = 'post';
                    el.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">${p.user_id.toString().slice(-1)}</div>
                            <span style="font-size:13px; font-weight:bold;">User #${p.user_id.toString().slice(-4)}</span>
                        </div>
                        <div class="post-text">${p.content || ''}</div>
                        ${p.image_url ? `<img src="${p.image_url}" class="post-img" loading="lazy">` : ''}
                        
                        <div class="post-actions">
                            <div class="action-btn" onclick="likePost('${p.id}')"><i class="far fa-heart"></i> <span>0</span></div>
                            <div class="action-btn" onclick="toggleComments('${p.id}')"><i class="far fa-comment"></i> <span>0</span></div>
                            <div class="action-btn" onclick="sharePost('${p.id}')"><i class="fas fa-share-nodes"></i></div>
                        </div>
                        
                        <div id="box-${p.id}" class="comment-section">
                            <input type="text" class="comment-input" placeholder="Escreve um comentário...">
                        </div>
                    `;
                    list.appendChild(el);
                    if((index+1)%3 === 0) list.innerHTML += `<div class="card" style="text-align:center; color:#ffcc00; font-size:10px; border:1px dashed #444;">📢 ANÚNCIO: Pine Social Pro</div>`;
                });
            }
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            if(!txt && !file) return;
            document.getElementById('procStatus').style.display = 'inline';
            
            let img = null;
            if(file) {
                const name = `p_${Date.now()}.jpg`;
                const { data } = await client.storage.from('post-images').upload(name, file);
                img = client.storage.from('post-images').getPublicUrl(name).data.publicUrl;
            }

            await client.from('posts').insert([{ user_id: myId, content: txt, image_url: img }]);
            await client.rpc('increment_points', { user_id: myId, amount: 15 });
            
            document.getElementById('postText').value = '';
            document.getElementById('procStatus').style.display = 'none';
            fetchFeed(); getProfile();
        }

        getProfile(); fetchFeed();
    </script>
</body>
</html>
