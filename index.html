<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social - Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GOOGLE CLEAN DESIGN SYSTEM */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background-color: #f8f9fa; color: #202124; font-family: 'Roboto', Arial, sans-serif; height: 100%; }
        body { padding-top: 175px; padding-bottom: 20px; }

        /* HEADER */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #fff; border-bottom: 1px solid #dadce0; }
        .ad-banner-top { background: #1a73e8; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 700; text-transform: uppercase; }
        
        .user-stats-bar { display: flex; justify-content: space-around; background: #fff; padding: 12px 5px; border-bottom: 1px solid #f1f3f4; }
        .stat-pill { text-align: center; flex: 1; border-right: 1px solid #f1f3f4; }
        .stat-pill:last-child { border-right: none; }
        .stat-pill span { display: block; font-size: 9px; color: #70757a; text-transform: uppercase; margin-bottom: 2px; }
        .stat-pill b { font-size: 12px; color: #1a73e8; }
        
        .tabs { display: flex; background: #fff; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; color: #5f6368; font-size: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; border-bottom: 3px solid transparent; }
        .tab-item.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; }

        /* CONTENT AREA */
        .content { padding: 12px; max-width: 550px; margin: 0 auto; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block !important; }

        /* FEED CARDS */
        .card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; border: 1px solid #dadce0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .post-header { font-size: 11px; color: #70757a; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #f1f3f4; padding-bottom: 8px; }
        .post-content { font-size: 15px; color: #3c4043; line-height: 1.6; word-wrap: break-word; }
        .post-img { width: 100%; border-radius: 6px; margin-top: 12px; border: 1px solid #f1f3f4; }
        .post-actions { margin-top: 15px; display: flex; gap: 20px; border-top: 1px solid #f1f3f4; padding-top: 12px; }
        .action-btn { color: #1a73e8; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* AD INJECTION */
        .ad-inject { background: #f1f3f4; border: 1px dashed #dadce0; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 12px; font-size: 10px; color: #70757a; font-weight: bold; }

        /* UI ELEMENTS */
        .input-google { width: 100%; border: 1px solid #dadce0; padding: 14px; border-radius: 4px; font-size: 14px; margin-bottom: 10px; outline: none; background: #fff; }
        .btn-google { background: #1a73e8; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; }
        
        /* ADMIN PROTECTION */
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: flex !important; }
        div.is-admin .admin-only { display: block !important; }
    </style>
</head>
<body id="mainBody">

    <div class="header-fixed">
        <div class="ad-banner-top" id="topTag">Apex Social</div>
        <div class="user-stats-bar">
            <div class="stat-pill"><span>Meus XP</span><b id="topXP">0</b></div>
            <div class="stat-pill"><span>Saldo</span><b id="topBalance">0.0000€</b></div>
            <div class="stat-pill admin-only"><span>Dívida</span><b id="topBurn" style="color:#d93025;">0.00€</b></div>
            <div class="stat-pill"><span>Estado</span><b style="color:#1e8e3e;">ONLINE</b></div>
        </div>
        <div class="tabs">
            <div class="tab-item active" onclick="openTab('feed-page', this)">Explorar</div>
            <div class="tab-item" onclick="openTab('wallet-page', this)">Minha Rede</div>
            <div class="tab-item" onclick="openTab('info-page', this)">Info</div>
            <div id="adm-tab" class="tab-item admin-only" style="color:#d93025;" onclick="openTab('admin-page', this)">Consola</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div class="card">
                <textarea id="postText" class="input-google" style="min-height: 60px; border:none; padding:0; resize:none;" placeholder="No que está a pensar?"></textarea>
                <div id="previewBox" style="display:none; position:relative;">
                    <img id="imagePreview" class="post-img" style="margin-bottom:15px;">
                    <button onclick="cancelImg()" style="position:absolute; top:20px; right:10px; background:rgba(0,0,0,0.5); color:#fff; border:none; border-radius:50%; width:25px; height:25px;">×</button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label class="action-btn" for="fileInput"><i class="fas fa-image"></i> Foto (+15 XP)</label>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImg(this)">
                    <button onclick="publish()" class="btn-google" style="width:auto; padding:8px 20px;">Publicar</button>
                </div>
            </div>
            <div id="feed-container"></div>
            <div id="loading-trigger" style="text-align:center; padding:20px; color:#1a73e8; font-size:12px;">
                <i class="fas fa-spinner fa-spin"></i> A carregar...
            </div>
        </div>

        <div id="info-page" class="page">
            <div class="card">
                <h3 style="margin-bottom:15px;">Economia da Rede</h3>
                <p style="font-size:14px; color:#5f6368; margin-bottom:15px;">Conversão: <b>10.000 XP = 1,00€</b></p>
                <table style="width:100%; font-size:13px; border-collapse: collapse;">
                    <tr style="border-bottom: 1px solid #f1f3f4;"><td style="padding:10px 0;">Post com Foto</td><td align="right" style="color:#1a73e8;"><b>+15 XP</b></td></tr>
                    <tr style="border-bottom: 1px solid #f1f3f4;"><td style="padding:10px 0;">Novo Amigo</td><td align="right" style="color:#1a73e8;"><b>+100 XP</b></td></tr>
                    <tr style="border-bottom: 1px solid #f1f3f4;"><td style="padding:10px 0;">Like Recebido</td><td align="right" style="color:#1a73e8;"><b>+2 XP</b></td></tr>
                    <tr><td style="padding:10px 0;">Check-in Diário</td><td align="right" style="color:#1a73e8;"><b>+5 XP</b></td></tr>
                </table>
                <p style="margin-top:20px; font-size:11px; color:#d93025; font-weight:bold;">Levantamento mínimo: 5.000 XP (5,00€)</p>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        const myId = 5401881400; 
        const isAdmin = (myId === 5401881400);
        let currentPage = 0;
        let isLoading = false;

        async function init() {
            if(isAdmin) {
                document.getElementById('mainBody').classList.add('is-admin');
                document.getElementById('topTag').innerText = "Apex Business Control";
            }
            getProfile();
            loadFeed(0);
        }

        async function getProfile() {
            const { data: u } = await client.from('profiles').select('*').eq('id', myId).single();
            if(u) {
                document.getElementById('topXP').innerText = Math.floor(u.points).toLocaleString();
                document.getElementById('topBalance').innerText = (u.points * 0.0001).toFixed(4) + "€";
            }
        }

        async function loadFeed(page = 0) {
            if (isLoading) return;
            isLoading = true;
            
            const { data: posts } = await client
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false })
                .range(page * 10, (page + 1) * 10 - 1);

            if (posts && posts.length > 0) {
                const container = document.getElementById('feed-container');
                let html = '';
                posts.forEach((p, i) => {
                    if (i > 0 && i % 3 === 0) html += `<div class="ad-inject">PUBLICIDADE • MONETIZAÇÃO ATIVA</div>`;
                    html += `
                        <div class="card">
                            <div class="post-header">
                                <span>Publicação #${p.id}</span>
                                <span onclick="reportPost(${p.id})" style="color:#d93025; cursor:pointer;"><i class="fas fa-flag"></i> Report</span>
                            </div>
                            <div class="post-content">${p.content || ''}</div>
                            ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                            <div class="post-actions">
                                <div class="action-btn" onclick="handleLike(${p.id})"><i class="fas fa-heart"></i> Like (${p.likes || 0})</div>
                            </div>
                        </div>`;
                });
                container.innerHTML += html;
                currentPage++;
            } else {
                document.getElementById('loading-trigger').innerText = "Fim das publicações.";
            }
            isLoading = false;
        }

        // Infinite Scroll Observer
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) loadFeed(currentPage);
        }, { threshold: 0.1 });
        observer.observe(document.getElementById('loading-trigger'));

        // Like & Publish Functions
        async function handleLike(pId) {
            await client.rpc('increment_post_likes', { post_id: pId });
            await client.rpc('increment_points', { user_id: myId, amount: 2.0 });
            location.reload(); 
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            if(!txt) return;
            await client.from('posts').insert([{ user_id: myId, content: txt }]);
            await client.rpc('increment_points', { user_id: myId, amount: 15.0 });
            location.reload();
        }

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        init();
    </script>
</body>
</html>
