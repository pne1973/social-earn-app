<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v37.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blue: #4285F4; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding-top: 60px; padding-bottom: 70px; }
        
        /* Card Ajustado: Remove espaços fantasmas */
        .card { background: white; border-radius: 12px; margin: 12px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #e0e0e0; }
        
        /* Contentor de Imagem com Proporção Fixa mas Flexível */
        .feed-img-box { 
            width: 100%; 
            max-height: 300px; /* Altura ideal para telemóvel */
            display: block;
            background: #000;
        }
        .feed-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        /* Área de Texto: Colada à imagem como no print */
        .post-content { padding: 12px 16px; border-top: 1px solid #f0f0f0; }
        .post-text { font-size: 14px; font-weight: 600; color: #1c1e21; line-height: 1.4; }

        /* Botão Publicar Estilo Google */
        .btn-main { background: var(--blue); color: white; border-radius: 8px; font-weight: 700; transition: opacity 0.2s; }
        .btn-main:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-[55px] bg-white border-b flex items-center justify-between px-5 z-50">
        <span style="font-weight: 900; color: var(--blue); letter-spacing: -1px; font-size: 20px;">APEX</span>
        <div id="u-saldo" style="color: #34A853; font-weight: 800;">0.0000€</div>
    </header>

    <main class="max-w-md mx-auto">
        <div class="card p-4 shadow-sm">
            <textarea id="in-txt" placeholder="O que está a pensar?" class="w-full border-none focus:ring-0 text-sm font-medium mb-2" rows="2"></textarea>
            
            <div id="status" class="hidden text-[10px] font-bold text-blue-500 mb-2 uppercase">Imagem processada com sucesso</div>
            
            <div class="flex items-center gap-2">
                <label for="in-file" class="bg-gray-100 p-3 rounded-lg cursor-pointer text-[11px] font-bold uppercase text-gray-600">📸 Foto</label>
                <input type="file" id="in-file" accept="image/*" class="hidden" onchange="processarFoto()">
                
                <button onclick="publicar()" id="btn-pub" class="flex-1 btn-main py-3 text-[11px] uppercase">Publicar</button>
            </div>
        </div>

        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);
        const MASTER_ID = "5401881400";
        let fotoData = "";

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) document.getElementById('u-saldo').innerText = data.saldo.toFixed(4) + "€";
            carregarFeed();
        }

        function processarFoto() {
            const file = document.getElementById('in-file').files[0];
            if (!file) return;
            document.getElementById('status').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 800; // Melhor qualidade para evitar pixelização
                    const scale = maxW / img.width;
                    canvas.width = maxW;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    fotoData = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function publicar() {
            const txt = document.getElementById('in-txt').value;
            if(!txt) return;
            const btn = document.getElementById('btn-pub');
            btn.disabled = true;
            btn.innerText = "A ENVIAR...";

            const { error } = await _sb.from('posts').insert([{ user_id: MASTER_ID, content: txt, image_url: fotoData }]);
            if(!error) window.location.reload();
            else { btn.disabled = false; btn.innerText = "ERRO"; }
        }

        async function carregarFeed() {
            const { data: posts } = await _sb.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = "";

            posts?.forEach(p => {
                if(!p.content && !p.image_url) return; // Limpa posts fantasmas

                const div = document.createElement('div');
                div.className = "card shadow-sm";
                
                const imgHtml = p.image_url ? `
                    <div class="feed-img-box">
                        <img src="${p.image_url}" class="feed-img">
                    </div>` : "";

                div.innerHTML = `
                    ${imgHtml}
                    <div class="post-content">
                        <p class="post-text">${p.content}</p>
                    </div>
                `;
                feed.appendChild(div);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
