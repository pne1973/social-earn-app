<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v35.6</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blue: #4285F4; --green: #34A853; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-top: 65px; padding-bottom: 80px; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: white; border-bottom: 1px solid #ddd; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .post-card { background: white; border-radius: 12px; border: 1px solid #ddd; margin: 10px; overflow: hidden; }
        .img-feed { width: 100%; max-height: 350px; object-fit: cover; display: block; background: #eee; }
        .btn-blue { background: var(--blue); color: white; border-radius: 8px; font-weight: 900; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight: 900; color: var(--blue); font-size: 18px;">APEX SOCIAL</div>
        <div id="u-saldo" style="color: var(--green); font-weight: 900;">0.0000€</div>
    </header>

    <main>
        <div class="post-card p-4" style="border-top: 6px solid var(--blue);">
            <textarea id="in-txt" placeholder="O QUE PRETENDE PARTILHAR?" class="w-full border-none focus:ring-0 font-bold text-sm mb-3" rows="2"></textarea>
            
            <div id="in-info" class="hidden text-center text-[10px] font-black mb-2 text-blue-500 uppercase">Otimizando para poupar espaço...</div>

            <div class="flex gap-2">
                <label for="in-img" class="flex-1 bg-gray-100 p-3 rounded-lg text-center text-[10px] font-black cursor-pointer uppercase">📸 FOTO</label>
                <input type="file" id="in-img" accept="image/*" class="hidden" onchange="document.getElementById('in-info').classList.remove('hidden'); document.getElementById('in-info').innerText='✅ FOTO PRONTA'">
                <button onclick="enviarApenasUrl()" id="btn-pub" class="flex-[2] btn-blue p-3">Publicar agora</button>
            </div>
        </div>
        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400"; //
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);
        let sld = 0;

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) sld = data.saldo;
            document.getElementById('u-saldo').innerText = sld.toFixed(4) + "€";
            render();
        }

        async function enviarApenasUrl() {
            const txt = document.getElementById('in-txt').value;
            const file = document.getElementById('in-img').files[0];
            const btn = document.getElementById('btn-pub');
            if(!txt) return;

            btn.disabled = true;
            btn.innerText = "A PROCESSAR...";

            let publicUrl = "";

            if(file) {
                // 1. Upload do ficheiro para o STORAGE (Balde de ficheiros)
                const fileName = `post_${Date.now()}.jpg`;
                const { data: upData, error: upErr } = await _sb.storage.from('images').upload(fileName, file);
                
                if(!upErr) {
                    // 2. Gerar a URL pública do ficheiro que acabámos de enviar
                    const { data: urlData } = _sb.storage.from('images').getPublicUrl(fileName);
                    publicUrl = urlData.publicUrl; // Aqui temos apenas o TEXTO do link
                }
            }

            // 3. Enviar apenas a URL (Texto) para a TABELA posts
            const { error: dbErr } = await _sb.from('posts').insert([{ 
                user_id: MASTER_ID, 
                content: txt, 
                image_url: publicUrl // Enviando apenas a string da URL
            }]);

            if(!dbErr) {
                sld += 0.0150;
                await _sb.from('perfis').update({ saldo: sld }).eq('id', MASTER_ID);
                window.location.reload();
            } else {
                btn.disabled = false;
                btn.innerText = "ERRO NA TABELA";
            }
        }

        async function render() {
            const { data } = await _sb.from('posts').select('*').order('created_at', {ascending: false});
            const f = document.getElementById('feed');
            f.innerHTML = data?.map(p => `
                <div class="post-card">
                    ${p.image_url ? `<img src="${p.image_url}" class="img-feed">` : ''}
                    <div class="p-4">
                        <p class="text-xs font-bold uppercase text-gray-800">${p.content}</p>
                    </div>
                </div>
            `).join('') || "";
        }

        window.onload = init;
    </script>
</body>
</html>
