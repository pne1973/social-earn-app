<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.21</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS ORIGINAL RESTRUTURADO */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --google-blue: #4285F4;
            --fb-bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --border: #CED0D4;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--fb-bg); 
            margin: 0; padding-top: 95px; padding-bottom: 80px; 
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; background: #fff;
            height: 65px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .status-header-fixed {
            position: fixed; top: 65px; left: 0; right: 0; background: #fff;
            height: 30px; display: flex; align-items: center; padding: 0 15px;
            font-size: 10px; font-weight: 800; border-bottom: 1px solid var(--border); z-index: 999;
        }

        /* FEED EM CARDS (ESTILO FACEBOOK) */
        .post-card {
            background: var(--card-bg); border-radius: 8px; margin: 10px auto;
            max-width: 500px; padding: 12px; border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e4e6eb; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-content { font-size: 14px; line-height: 1.4; margin-bottom: 10px; }
        .post-image { width: calc(100% + 24px); margin-left: -12px; max-height: 450px; object-fit: cover; }
        
        .post-actions { display: flex; border-top: 1px solid #eee; margin-top: 10px; padding-top: 5px; }
        .action-btn { flex: 1; background: none; border: none; padding: 10px; color: #65676B; font-weight: 600; font-size: 13px; cursor: pointer; }

        /* NAVEGAÇÃO ORIGINAL */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
            height: 70px; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: 900; color: #9ca3af; cursor: pointer; }
        .nav-item.active { color: var(--google-blue); }

        .tab-content { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 10px; }
        .tab-content.active { display: block; }
        
        .btn-apex { width: 100%; background: var(--google-blue); color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 900; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 11px; font-weight: 900; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:8px;">
            <div style="background:var(--google-blue); color:white; padding:8px; border-radius:8px; font-weight:900;">S</div>
            <div>
                <h1 style="font-size:11px; font-weight:900; color:var(--google-blue); margin:0;">Social Earn</h1>
                <p id="loc-tag" style="font-size:8px; color:#ccc; margin:0;">REGION DETECTING...</p>
            </div>
        </div>
        <div style="text-align:right;">
            <div id="header-val" style="font-weight:900; color:#16a34a; font-size:18px;">0.0000€</div>
        </div>
    </header>

    <div class="status-header-fixed">
        <span id="status-text" style="color:#16a34a;">SISTEMA ONLINE - GANHOS ATIVOS</span>
        <button onclick="doLogout()" style="margin-left:auto; background:none; border:none; font-size:8px; color:#ccc; font-weight:900;">SAIR</button>
    </div>

    <main>
        <section id="tab-feed" class="tab-content active">
            <div id="feed-render"></div>
        </section>

        <section id="tab-ranking" class="tab-content">
            <h2 style="font-size:12px; font-weight:900;">TOP 10 UTILIZADORES</h2>
            <table id="table-ranking">
                <thead><tr><th>#</th><th>Utilizador</th><th>Ganhos</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="tab-wallet" class="tab-content">
            <div style="background:white; padding:25px; border-radius:20px; text-align:center;">
                <p style="font-size:10px; color:#999; font-weight:900;">SALDO (XP: <span id="user-xp">0</span>)</p>
                <h3 id="wallet-val" style="font-size:28px; color:#16a34a; margin:15px 0;">0.0000€</h3>
                <button class="btn-apex">LEVANTAR (Mín. 5000 XP)</button>
            </div>
            <h3 style="font-size:10px; margin-top:20px; font-weight:900;">TABELA DE GANHOS:</h3>
            <table>
                <tr><td>Postagem</td><td>+15 XP</td></tr>
                <tr><td>Curtida</td><td>+2 XP</td></tr>
                <tr><td>Convite</td><td>+100 XP</td></tr>
            </table>
        </section>

        <section id="tab-admin" class="tab-content">
            <h2 style="font-size:12px; font-weight:900;">PAINEL ADMIN</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div style="background:white; padding:15px; border-radius:12px; text-align:center;">
                    <p style="font-size:9px; color:#999;">USERS</p><b id="adm-u">0</b>
                </div>
                <div style="background:white; padding:15px; border-radius:12px; text-align:center;">
                    <p style="font-size:9px; color:#999;">POSTS</p><b id="adm-p">0</b>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('feed')">🏠<br>FEED</div>
        <div class="nav-item" onclick="nav('ranking')">🏆<br>RANKING</div>
        <div class="nav-item" onclick="nav('wallet')">💰<br>CARTEIRA</div>
        <div id="nav-admin" class="nav-item hidden" onclick="nav('admin')">⚙️<br>ADMIN</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";
        const XP_RATE = 0.0001;
        
        let myID = localStorage.getItem('apex_uid');
        let mySaldo = 0;
        let locale = { rate: 1, symbol: '€', lang: 'pt' };

        async function init() {
            if(!myID) { 
                let id = prompt("ID:"); 
                if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
                return;
            }
            if(myID === ADMIN_ID) document.getElementById('nav-admin').classList.remove('hidden');
            
            await detect();
            await sync();
            renderFeed();
            renderRanking();
        }

        async function detect() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if(data.country_code === 'BR') { locale = { rate: 6.1245, symbol: 'R$', lang: 'pt' }; }
                document.getElementById('loc-tag').innerText = `REGION: ${data.country_code}`;
            } catch(e) {}
        }

        async function sync() {
            const { data } = await sb.from('perfis').select('*').eq('id', myID).single();
            if(data) mySaldo = parseFloat(data.saldo);
            else await sb.from('perfis').insert([{ id: myID, saldo: 0 }]);
            updateUI();
        }

        function updateUI() {
            const val = (mySaldo * locale.rate).toFixed(4);
            const xp = Math.floor(mySaldo / XP_RATE);
            document.getElementById('header-val').innerText = `${locale.symbol}${val}`;
            document.getElementById('wallet-val').innerText = `${locale.symbol}${val}`;
            document.getElementById('user-xp').innerText = xp;
        }

        async function addXP(pts) {
            mySaldo += (pts * XP_RATE);
            await sb.from('perfis').update({ saldo: mySaldo }).eq('id', myID);
            updateUI();
        }

        async function renderFeed() {
            const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            const cont = document.getElementById('feed-render');
            cont.innerHTML = '';
            data.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <div class="user-avatar">👤</div>
                        <div><div style="font-weight:600; font-size:14px;">Membro ${p.user_id}</div><div style="font-size:11px; color:#65676B;">há pouco</div></div>
                    </div>
                    <div class="post-content">${p.content || ''}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-image">` : ''}
                    <div class="post-actions">
                        <button class="action-btn" onclick="addXP(2); this.style.color='#4285F4'">👍 Gosto (+2 XP)</button>
                        <button class="action-btn" onclick="prompt('Comentário:')">💬 Comentar</button>
                        <button class="action-btn" onclick="alert('Link copiado!')">↗ Partilhar</button>
                    </div>
                `;
                cont.appendChild(card);
                if((i+1)%3===0) cont.innerHTML += `<div class="ad-card">PATROCINADO - AD INJECTION</div>`;
            });
        }

        async function renderRanking() {
            const { data } = await sb.from('perfis').select('*').order('saldo', { ascending: false }).limit(10);
            const body = document.querySelector('#table-ranking tbody');
            body.innerHTML = data.map((u, i) => `<tr><td>${i+1}</td><td>ID: ${u.id}</td><td>${locale.symbol}${(u.saldo * locale.rate).toFixed(4)}</td></tr>`).join('');
        }

        function nav(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function doLogout() { localStorage.removeItem('apex_uid'); location.reload(); }

        init();
    </script>
</body>
</html>
