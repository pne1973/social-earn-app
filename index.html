<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v77 - Dossiê v60</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; color: #202124; -webkit-tap-highlight-color: transparent; }
        .google-blue { color: #4285F4; }
        .google-bg-blue { background-color: #4285F4; }
        .nav-active { color: #4285F4 !important; border-top: 3px solid #4285F4; font-weight: 900; }
        .card { background: white; border-radius: 12px; border: 1px solid #dadce0; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
        .btn-turbo { background: linear-gradient(135deg, #4285F4, #34a853); color: white; font-weight: 900; }
        .ad-slot { background: #f1f3f4; border: 1px dashed #bdc1c6; border-radius: 8px; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #70757a; text-transform: uppercase; margin: 10px 0; }
    </style>
</head>
<body class="pb-24">

    <div id="loader">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-500 mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-blue-600">Sincronizando Servidor...</p>
    </div>

    <div class="ad-slot m-0 rounded-none border-x-0 border-t-0 bg-yellow-50">
        [Adsterra: Autenticação de Sessão Obrigatória - 728x90]
    </div>

    <header class="sticky top-0 bg-white border-b z-50 px-4 py-3 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black google-blue tracking-tighter uppercase leading-none">Apex Social</h1>
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mt-1">Sessão Segura v60</p>
        </div>
        <div class="text-right">
            <span id="main-balance" class="font-black text-green-700 text-lg">0,0000€</span>
            <p id="brl-balance" class="text-[9px] font-black text-gray-400 uppercase">0,0000 BRL</p>
        </div>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto min-h-screen space-y-4"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-lg">
        <button onclick="switchTab('feed')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-feed"><span class="text-[10px] font-black uppercase">Feed</span></button>
        <button onclick="switchTab('wallet')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-wallet"><span class="text-[10px] font-black uppercase">Carteira</span></button>
        <button onclick="switchTab('friends')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-friends"><span class="text-[10px] font-black uppercase">Amigos</span></button>
        <button onclick="switchTab('profile')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-profile"><span class="text-[10px] font-black uppercase">Perfil</span></button>
        <button onclick="switchTab('admin')" class="flex flex-col items-center p-2 text-red-300 nav-btn" id="btn-admin" style="display:none;"><span class="text-[10px] font-black uppercase">Admin</span></button>
    </nav>

    <script>
        // CONFIGURAÇÃO DOS PILARES v60
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "COLA_AQUI_A_TUA_KEY_DO_SUPABASE"; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const USER_ID = "5401881400";
        const EUR_BRL = 6.12; 
        
        let state = { saldo_eur: 0, bonus_cliques: 0, is_turbo: false };

        async function init() {
            showLoader(true);
            try {
                let { data } = await supabaseClient.from('perfis').select('*').eq('id', USER_ID).single();
                if (data) state = data;
                else await supabaseClient.from('perfis').insert([{ id: USER_ID }]);
            } catch (e) {}
            if (USER_ID === "5401881400") document.getElementById('btn-admin').style.display = 'flex';
            showLoader(false);
            switchTab('feed');
        }

        // ENGENHARIA DE GANHOS (v60)
        async function doAction(type) {
            if (!state.is_turbo && state.bonus_cliques <= 0) {
                alert("Sincronize o servidor para ativar os Ganhos Turbo!");
                return;
            }

            showLoader(true);
            let reward = 0;
            if (type === 'like') reward = 0.0015;
            if (type === 'comment') reward = 0.0030;
            if (type === 'post') reward = 0.0150;

            state.saldo_eur = parseFloat(state.saldo_eur) + reward;
            state.bonus_cliques--;

            if (state.bonus_cliques <= 0) state.is_turbo = false;

            setTimeout(async () => {
                updateUI();
                await supabaseClient.from('perfis').update(state).eq('id', USER_ID);
                showLoader(false);
            }, 600);
        }

        // NARRATIVA DE NÃO-CHATEAR: Sincronização de Servidor
        function syncServer() {
            showLoader(true);
            setTimeout(() => {
                state.is_turbo = true;
                state.bonus_cliques = 15; // Bónus por 15 interações
                updateUI();
                showLoader(false);
                render(currentTab);
            }, 2000); // Simula visualização de vídeo/ad
        }

        function switchTab(tab) {
            window.currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(`btn-${tab}`).classList.add('nav-active');
            render(tab);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = parseFloat(state.saldo_eur).toFixed(4) + '€';
            document.getElementById('brl-balance').innerText = (state.saldo_eur * EUR_BRL).toFixed(4) + ' BRL';
        }

        function render(tab) {
            const container = document.getElementById('app-content');
            updateUI();
            
            if (tab === 'feed') {
                container.innerHTML = `
                    <div class="card p-4 btn-turbo flex justify-between items-center shadow-lg">
                        <div>
                            <p class="text-[10px] font-black uppercase opacity-80">Contador de Bónus</p>
                            <p class="text-sm font-black italic">🔥 ${state.bonus_cliques} interações restantes</p>
                        </div>
                        <button onclick="syncServer()" class="bg-white text-blue-600 px-4 py-2 rounded font-black text-[9px] uppercase shadow">Sincronizar</button>
                    </div>

                    <div class="card p-4">
                        <div class="flex items-center space-x-2 mb-4"><div class="w-8 h-8 rounded-full bg-gray-100 border"></div><p class="text-xs font-black uppercase text-gray-500">Membro Premium</p></div>
                        <p class="text-sm text-gray-700 mb-6 font-medium leading-relaxed">"Otimizando os ganhos diários através da nova API do Apex Social."</p>
                        <div class="flex space-x-2">
                            <button onclick="doAction('like')" class="flex-1 google-bg-blue text-white py-3 rounded font-black text-[10px] uppercase shadow-md active:scale-95">Like (+0,0015€)</button>
                            <button onclick="doAction('comment')" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded font-black text-[10px] uppercase border active:scale-95">Comentar</button>
                        </div>
                    </div>
                    <div class="ad-slot">[Validar Agendamento - Adsterra Native]</div>
                `;
            } else if (tab === 'wallet') {
                container.innerHTML = `
                    <div class="card p-8 text-center border-b-4 border-blue-500">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Saldo Total (Auditado)</p>
                        <h1 class="text-5xl font-black google-blue tracking-tighter">${state.saldo_eur.toFixed(4)}€</h1>
                    </div>
                    <div class="card p-4">
                        <p class="text-[10px] font-black uppercase mb-4 text-gray-400">Engenharia de Ganhos Agressiva</p>
                        <button onclick="syncServer()" class="w-full btn-turbo py-4 rounded-xl font-black text-xs uppercase shadow-xl mb-4 italic">Sincronizar Sessão (Ganhos Turbo)</button>
                        <p class="text-[9px] text-center text-gray-400 font-bold uppercase">Saque Mínimo: 10,00€ | Prazo: 15 dias úteis</p>
                    </div>
                `;
            } else if (tab === 'friends') {
                container.innerHTML = `
                    <div class="card p-6">
                        <h3 class="font-black text-xs uppercase google-blue mb-4 tracking-widest border-b pb-2">Impulso de Rede</h3>
                        <p class="text-[10px] font-bold text-gray-500 mb-6">Convide amigos e ganhe 10% de comissão vitalícia.</p>
                        <div class="bg-gray-50 p-3 rounded border border-dashed border-blue-300 mb-6">
                            <p class="text-[9px] font-mono text-blue-600 truncate uppercase">https://apex-social.onrender.com/?ref=${USER_ID}</p>
                        </div>
                        <button onclick="syncServer()" class="w-full bg-blue-50 text-blue-600 py-3 rounded font-black text-[10px] uppercase border border-blue-200">Impulsionar Rede (Vídeo)</button>
                    </div>
                `;
            } else if (tab === 'profile') {
                container.innerHTML = `
                    <div class="card p-6 text-center">
                        <div class="w-16 h-16 bg-gray-100 rounded-full mx-auto mb-4 border-2 border-white shadow flex items-center justify-center font-black text-gray-300">#</div>
                        <p class="font-black text-xs text-gray-800 uppercase tracking-tighter italic">Utilizador #${USER_ID}</p>
                        
                        <div class="mt-8 space-y-2">
                            <button onclick="syncServer()" class="w-full bg-gray-50 text-gray-600 py-3 rounded border text-[9px] font-black uppercase">Autopost de Repetição (Sincronizar)</button>
                            <button onclick="syncServer()" class="w-full bg-gray-50 text-gray-600 py-3 rounded border text-[9px] font-black uppercase">Validar Bio Clicável (48h)</button>
                        </div>
                    </div>
                `;
            } else if (tab === 'admin') {
                container.innerHTML = `
                    <div class="card p-6 border-2 border-red-500 bg-red-50">
                        <h2 class="text-red-600 font-black text-xs uppercase mb-6 text-center tracking-widest">Painel Admin (Margem 40%)</h2>
                        <div class="space-y-4">
                            <div class="bg-white p-3 rounded border text-center">
                                <p class="text-[8px] font-black text-gray-400 uppercase">eCPM Global</p>
                                <p class="text-lg font-black text-red-600">0.0025€</p>
                            </div>
                            <button class="w-full bg-red-600 text-white py-3 rounded font-black text-[10px] uppercase shadow-md">Ver Pedidos de Levantamento</button>
                        </div>
                    </div>
                `;
            }
        }

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        window.onload = init;
    </script>
</body>
</html>
