<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network v33.12 - Facebook Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; }
        body { font-family: 'Roboto', sans-serif; background: var(--fb-bg); margin: 0; padding-top: 185px; padding-bottom: 90px; }
        
        /* HEADER E STATUS FIXOS */
        header { position: fixed; top: 0; left: 0; right: 0; height: 72px; background: white; border-bottom: 1px solid #ddd; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-bar { position: fixed; top: 72px; left: 0; right: 0; height: 40px; background: white; border-bottom: 1px solid #eee; z-index: 999; display: flex; align-items: center; padding: 0 16px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        
        /* PUBLISHER ESTILO FACEBOOK LITE */
        .publisher-container { position: fixed; top: 112px; left: 0; right: 0; background: white; padding: 12px; z-index: 998; border-bottom: 8px solid #ddd; }
        .pub-input-box { background: #f0f2f5; border-radius: 20px; padding: 10px 16px; color: #65676b; font-size: 14px; display: flex; align-items: center; gap: 10px; cursor: text; }

        /* POSTS (FEED) */
        .post-card { background: white; margin-bottom: 8px; border-bottom: 1px solid #ddd; }
        .post-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .avatar-circle { width: 40px; height: 40px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #4b4f56; }
        .post-content { padding: 0 12px 12px 12px; font-size: 15px; font-weight: 400; line-height: 1.4; }
        .post-image { width: 100%; max-height: 500px; object-fit: cover; display: block; }
        .post-actions { display: flex; border-top: 1px solid #f0f2f5; padding: 4px 0; margin: 0 12px; }
        .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; color: #65676b; font-size: 13px; font-weight: 700; }

        /* NAVEGAÇÃO INFERIOR */
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: white; border-top: 1px solid #ddd; display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #65676b; text-transform: uppercase; gap: 4px; }
        .nav-item.active { color: var(--fb-blue); }
        .nav-indicator { width: 30px; height: 3px; background: transparent; border-radius: 4px; }
        .nav-item.active .nav-indicator { background: var(--fb-blue); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white italic font-black text-2xl">S</div>
            <div>
                <h1 class="text-blue-600 font-black text-xs leading-none">SOCIAL EARN</h1>
                <p class="text-[8px] text-gray-300 font-bold uppercase">Official Network</p>
            </div>
        </div>
        <div class="text-right">
            <div id="top-saldo" class="text-green-600 text-xl font-black tracking-tighter">0.0000€</div>
            <div id="currency-tag" class="text-gray-400 text-[8px] font-black uppercase">EUR (PT)</div>
        </div>
    </header>

    <div class="status-bar">
        <span id="status-label" class="text-green-600">Ganhos Ativos: 100%</span>
        <button onclick="logout()" class="ml-auto text-gray-300">Sair</button>
    </div>

    <main id="view-feed" class="tab-content active">
        <div class="publisher-container">
            <div onclick="openModalPost()" class="pub-input-box">
                <div class="avatar-circle" style="width:24px; height:24px; font-size:10px;">👤</div>
                <span>O que estás a pensar?</span>
            </div>
        </div>
        <div id="posts-container">
            </div>
    </main>

    <main id="view-ganhos" class="tab-content px-6 pt-10">
        <div class="bg-white rounded-3xl p-10 text-center shadow-sm border border-gray-100">
            <h2 class="text-[10px] font-black text-gray-300 uppercase mb-4 tracking-widest">Saldo Total</h2>
            <h1 id="wall-saldo" class="text-5xl font-black text-blue-600 mb-8">0.0000€</h1>
            <div class="w-full bg-gray-100 h-2 rounded-full mb-2">
                <div id="withdraw-progress" class="bg-blue-600 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="text-[9px] font-black text-gray-400 uppercase">Saque mínimo via PayPal: <span id="min-withdrawal">5.00€</span></p>
        </div>
    </main>

    <main id="view-admin" class="tab-content px-4 pt-10">
        <div class="bg-slate-900 rounded-2xl p-6 text-white mb-6">
            <div class="grid grid-cols-2 gap-4">
                <div><p class="text-[8px] uppercase opacity-50">Rev. Bruta</p><p id="adm-rev" class="text-lg font-black text-blue-400">0.00€</p></div>
                <div class="text-right"><p class="text-[8px] uppercase opacity-50">Dívida</p><p id="adm-debt" class="text-lg font-black text-red-400">0.00€</p></div>
            </div>
            <hr class="my-4 border-white/10">
            <div class="text-center"><p class="text-[8px] uppercase opacity-50">Lucro Líquido</p><p id="adm-profit" class="text-3xl font-black text-green-400">0.00€</p></div>
        </div>
        <div id="user-list-admin" class="space-y-2 pb-20"></div>
    </main>

    <nav>
        <button onclick="changeTab('feed')" id="nav-feed" class="nav-item active"><div class="nav-indicator"></div><span>Feed</span></button>
        <button onclick="changeTab('ganhos')" id="nav-ganhos" class="nav-item"><div class="nav-indicator"></div><span>Carteira</span></button>
        <button onclick="changeTab('admin')" id="nav-admin" class="nav-item hidden text-red-600"><div class="nav-indicator"></div><span>Admin</span></button>
    </nav>

    <div id="ad-overlay">
        <div class="bg-white w-[300px] rounded-3xl p-8 text-center shadow-2xl">
            <p class="text-[10px] font-black text-blue-600 uppercase mb-4">Multiplicador x1.0</p>
            <p class="text-sm font-bold text-gray-400 mb-8">Vê um anúncio para manter teus ganhos!</p>
            <button onclick="watchAd()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs mb-4">Ver Anúncio (15s)</button>
            <button onclick="skipAd()" class="text-[10px] text-gray-300 font-black uppercase tracking-widest">Pular (-50% Ganhos)</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";

        let app = {
            uid: localStorage.getItem('apex_uid'),
            saldo: 0,
            mult: 1.0,
            actions: 0,
            currency: { sym: '€', min: 5.0, code: 'EUR' }
        };

        // AUTO-DETECÇÃO DE MOEDA (PORTUGAL VS BRASIL VS MUNDO)
        function detectLocation() {
            const locale = navigator.language;
            if (locale === 'pt-BR') app.currency = { sym: 'R$', min: 25.0, code: 'BRL' };
            document.getElementById('currency-tag').innerText = `${app.currency.code} (${locale.toUpperCase()})`;
            document.getElementById('min-withdrawal').innerText = `${app.currency.sym}${app.currency.min.toFixed(2)}`;
        }

        async function init() {
            if (!app.uid) {
                let id = prompt("ID DE UTILIZADOR:");
                if (id) { localStorage.setItem('apex_uid', id); location.reload(); }
                return;
            }
            detectLocation();
            if (app.uid === ADMIN_ID) document.getElementById('nav-admin').classList.remove('hidden');

            const { data } = await sb.from('perfis').select('*').eq('id', app.uid).single();
            if (data) app.saldo = Number(data.saldo);
            else await sb.from('perfis').insert({ id: app.uid, saldo: 0 });

            loadFeed();
            updateUI();
        }

        async function loadFeed() {
            const { data: posts, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('posts-container');
            
            if (error) { container.innerHTML = "<p class='p-10 text-center'>Erro ao carregar feed.</p>"; return; }

            let html = "";
            posts.forEach((p, idx) => {
                html += `
                <div class="post-card">
                    <div class="post-header">
                        <div class="avatar-circle">👤</div>
                        <div class="flex flex-col">
                            <span class="text-[14px] font-bold">Utilizador ${p.user_id.slice(0,5)}</span>
                            <span class="text-[11px] text-gray-500 font-normal">Publicado agora • <span class="text-blue-600 font-bold">Seguir</span></span>
                        </div>
                    </div>
                    <div class="post-content">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-image" loading="lazy">` : ''}
                    <div class="flex justify-between px-3 py-2 text-[12px] text-gray-500">
                        <div class="flex items-center gap-1">👍 <span>0</span></div>
                        <div>0 comentários</div>
                    </div>
                    <div class="post-actions">
                        <button onclick="earn(0.0006)" class="action-btn">👍 Gosto</button>
                        <button onclick="earn(0.0010)" class="action-btn">💬 Comentar</button>
                        <button onclick="earn(0.0020)" class="action-btn">🔗 Partilhar</button>
                    </div>
                </div>`;
                
                if ((idx + 1) % 3 === 0) {
                    html += `<div class="p-10 bg-white mb-2 text-center border-y border-gray-100">
                        <p class="text-[8px] font-black text-gray-300 uppercase tracking-widest mb-1">Anúncio Patrocinado</p>
                        <div class="h-20 bg-gray-50 rounded-xl flex items-center justify-center text-[10px] text-gray-200 font-black italic">Google Ads Manager</div>
                    </div>`;
                }
            });
            container.innerHTML = html;
        }

        async function earn(val) {
            if (app.uid === ADMIN_ID) return;
            if (app.actions >= 2 && app.mult === 1.0) {
                document.getElementById('ad-overlay').style.display = 'flex';
                return;
            }
            app.actions++;
            app.saldo += (val * app.mult);
            await sb.from('perfis').update({ saldo: app.saldo }).eq('id', app.uid);
            updateUI();
        }

        function updateUI() {
            const s = `${app.currency.sym}${app.saldo.toFixed(4)}`;
            document.getElementById('top-saldo').innerText = s;
            document.getElementById('wall-saldo').innerText = s;
            let p = (app.saldo / app.currency.min) * 100;
            document.getElementById('withdraw-progress').style.width = Math.min(p, 100) + "%";
            
            const label = document.getElementById('status-label');
            if (app.mult < 1) {
                label.innerText = `GANHOS REDUZIDOS: ${app.mult * 100}%`;
                label.classList.replace('text-green-600', 'text-red-500');
            }
        }

        async function loadAdminBI() {
            const { data: users } = await sb.from('perfis').select('*');
            const { count: posts } = await sb.from('posts').select('*', { count: 'exact', head: true });
            let debt = users.reduce((a, b) => a + Number(b.saldo), 0);
            let rev = posts * 0.045;
            document.getElementById('adm-debt').innerText = `${app.currency.sym}${debt.toFixed(4)}`;
            document.getElementById('adm-rev').innerText = `${app.currency.sym}${rev.toFixed(4)}`;
            document.getElementById('adm-profit').innerText = `${app.currency.sym}${(rev - debt).toFixed(4)}`;
            
            document.getElementById('user-list-admin').innerHTML = users.map(u => `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <span class="text-xs font-black text-blue-600">${u.id}</span>
                    <span class="text-xs font-bold">${app.currency.sym}${u.saldo.toFixed(4)}</span>
                </div>
            `).join('');
        }

        function changeTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.getElementById('nav-' + t).classList.add('active');
            if (t === 'admin') loadAdminBI();
            if (t === 'feed') loadFeed();
            window.scrollTo(0,0);
        }

        async function openModalPost() {
            const text = prompt("NO QUE ESTÁS A PENSAR?");
            if (text) {
                const img = prompt("URL DA IMAGEM (OPCIONAL):");
                await sb.from('posts').insert({ user_id: app.uid, content: text, image_url: img });
                earn(0.0150);
                loadFeed();
            }
        }

        function watchAd() { app.mult = 1.0; app.actions = 0; document.getElementById('ad-overlay').style.display = 'none'; }
        function skipAd() { app.mult = 0.5; document.getElementById('ad-overlay').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
