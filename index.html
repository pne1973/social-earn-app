<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Facebook</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --fb-blue: #1877F2;
            --fb-bg: #F0F2F5;
            --fb-card: #FFFFFF;
            --fb-text-main: #050505;
            --fb-text-sec: #65676B;
            --fb-border: #CED0D4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; }
        body { background-color: var(--fb-bg); color: var(--fb-text-main); }
        .hidden { display: none !important; }

        /* HEADER */
        header {
            background: var(--fb-card);
            height: 56px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--fb-border);
            z-index: 1000;
        }
        .logo-fb { color: var(--fb-blue); font-size: 28px; font-weight: bold; letter-spacing: -1px; text-decoration: none; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .balance-pill { background: #E7F3FF; color: var(--fb-blue); padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .icon-circle { background: #EBEDF0; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        /* LOGIN */
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .fb-logo-lg { color: var(--fb-blue); font-size: 60px; font-weight: bold; margin-bottom: 30px; }
        .fb-input { width: 100%; max-width: 350px; padding: 14px; border: 1px solid var(--fb-border); border-radius: 8px; margin-bottom: 10px; background: #F5F6F7; font-size: 16px; outline: none; }
        .fb-btn { width: 100%; max-width: 350px; padding: 12px; background: var(--fb-blue); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* FEED */
        main { max-width: 500px; margin: 56px auto 0 auto; padding: 10px 0; }
        
        .composer { background: white; padding: 12px 16px; margin-bottom: 10px; border-bottom: 1px solid var(--fb-border); }
        .composer-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ddd; }
        .fake-input { flex: 1; background: #F0F2F5; border-radius: 20px; padding: 10px 16px; color: var(--fb-text-sec); font-size: 15px; border: none; outline: none; }
        
        .composer-btns { display: flex; border-top: 1px solid #E4E6EB; padding-top: 10px; }
        .comp-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--fb-text-sec); cursor: pointer; }

        .fb-card { background: white; margin-bottom: 10px; border-top: 1px solid var(--fb-border); border-bottom: 1px solid var(--fb-border); }
        .card-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
        .user-name { font-weight: bold; font-size: 15px; }
        .post-meta { font-size: 12px; color: var(--fb-text-sec); }
        .card-body { padding: 4px 16px 12px 16px; font-size: 15px; line-height: 1.4; }
        .card-img { width: 100%; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        
        .card-stats { padding: 10px 16px; display: flex; justify-content: space-between; font-size: 13px; color: var(--fb-text-sec); }
        .card-actions { display: flex; border-top: 1px solid #E4E6EB; padding: 4px 0; }
        .act-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 0; color: var(--fb-text-sec); font-weight: 600; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="fb-logo-lg">facebook</div>
        <input type="text" id="login-id" class="fb-input" placeholder="Telemóvel ou e-mail (ID)">
        <button class="fb-btn" onclick="entrar()">Iniciar sessão</button>
    </div>

    <header class="hidden" id="nav-header">
        <a href="#" class="logo-fb">facebook</a>
        <div class="header-right">
            <div class="balance-pill">€ <span id="val-saldo">0.0000</span></div>
            <div class="icon-circle"><i class="fa-solid fa-search"></i></div>
            <div class="icon-circle"><i class="fa-solid fa-bars"></i></div>
        </div>
    </header>

    <main class="hidden" id="app-content">
        <div class="composer">
            <div class="composer-row">
                <div class="avatar"></div>
                <input type="text" id="new-post-text" class="fake-input" placeholder="No que está a pensar?">
            </div>
            <div class="composer-btns">
                <div class="comp-btn" onclick="postar()"><i class="fa-solid fa-paper-plane" style="color: #45bd62;"></i> Publicar</div>
                <div class="comp-btn"><i class="fa-solid fa-image" style="color: #45bd62;"></i> Foto</div>
            </div>
        </div>
        <div id="feed-container"></div>
    </main>

    <script>
        const SB_URL = 'https://fickstyevektwbdgimapy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let user = null;

        async function entrar() {
            const id = document.getElementById('login-id').value;
            if(!id) return;

            // Busca na tabela 'perfis' (conforme o print de 13 tabelas)
            let { data: perfil, error: fetchError } = await sb.from('perfis').select('*').eq('id', id).maybeSingle();

            if(!perfil) {
                // Criar novo perfil respeitando a estrutura do print (saldo_eur)
                const { data: novo, error: createError } = await sb.from('perfis')
                    .insert([{ id: id, nome: 'User_'+id, saldo_eur: 0 }])
                    .select().single();
                
                if(createError) return alert("Erro ao criar perfil. Verifique as RLS.");
                perfil = novo;
            }

            user = perfil;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('nav-header').classList.remove('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            
            document.getElementById('val-saldo').innerText = Number(user.saldo_eur || 0).toFixed(4);
            carregarFeed();
        }

        async function carregarFeed() {
            // Lendo da tabela 'posts' com as colunas reais do seu print
            const { data: posts, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            
            const container = document.getElementById('feed-container');
            if(error || !posts) {
                container.innerHTML = "<p style='text-align:center; padding:20px;'>Sem publicações no momento.</p>";
                return;
            }

            container.innerHTML = posts.map(p => `
                <div class="fb-card">
                    <div class="card-header">
                        <div class="avatar"></div>
                        <div class="user-info">
                            <div class="user-name">${p.username || 'Utilizador'}</div>
                            <div class="post-meta">Agora · <i class="fa-solid fa-earth-americas"></i></div>
                        </div>
                    </div>
                    <div class="card-body">${p.content || ''}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="card-img">` : ''}
                    
                    <div class="card-stats">
                        <span><i class="fa-solid fa-thumbs-up" style="color: var(--fb-blue);"></i> ${p.likes || 0}</span>
                        <span>${p.comments_count || 0} comentários</span>
                    </div>

                    <div class="card-actions">
                        <div class="act-btn" onclick="interagir(0.0006)"><i class="fa-regular fa-thumbs-up"></i> Gosto</div>
                        <div class="act-btn"><i class="fa-regular fa-comment"></i> Comentar</div>
                        <div class="act-btn"><i class="fa-solid fa-share"></i> Partilhar</div>
                    </div>
                </div>
            `).join('');
        }

        async function postar() {
            const txt = document.getElementById('new-post-text').value;
            if(!txt) return;

            // Inserindo na tabela 'posts' usando as colunas corretas (username, user_id, content)
            const { error } = await sb.from('posts').insert([{ 
                user_id: user.id, 
                username: user.nome, 
                content: txt,
                likes: 0,
                comments_count: 0
            }]);

            if(!error) {
                document.getElementById('new-post-text').value = '';
                interagir(0.0150);
                carregarFeed();
            } else {
                alert("Erro ao publicar. Verifique se a coluna 'user_id' aceita o formato do seu ID.");
            }
        }

        async function interagir(valor) {
            user.saldo_eur = (Number(user.saldo_eur) || 0) + valor;
            await sb.from('perfis').update({ saldo_eur: user.saldo_eur }).eq('id', user.id);
            document.getElementById('val-saldo').innerText = user.saldo_eur.toFixed(4);
        }
    </script>
</body>
</html>
