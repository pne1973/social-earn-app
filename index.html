<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v175</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=175"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; margin: 0; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; padding-bottom: 120px; }
        .nav-btn.active { color: #4285F4; border-top: 3px solid #4285F4; font-weight: 900; background: #f1f3f4; }
        .card { background: white; border-radius: 14px; border: 1px solid #dadce0; margin-bottom: 12px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <header class="sticky top-0 bg-white border-b z-50 px-5 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black text-blue-600 italic uppercase">Apex Social</h1>
            <p class="text-[10px] font-black text-orange-500 uppercase italic">Vercel Force v175</p>
        </div>
        <div class="text-right">
            <span id="bal-eur" class="font-black text-green-600 text-lg">0.0000€</span>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <section id="view-feed" class="tab-content active">
            <div class="card bg-blue-600 text-white flex justify-between items-center mb-4">
                <div><p class="text-[9px] font-bold uppercase opacity-80">Ações Turbo</p><p id="bonus-display" class="font-black italic text-sm">🔥 15 Restantes</p></div>
                <button onclick="nav('wallet')" class="bg-white text-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">Recarregar</button>
            </div>
            <div id="posts-list" class="space-y-4">
                <div class="card text-center"><p class="text-[10px] text-gray-400 font-black uppercase italic py-4">A atualizar rede...</p></div>
            </div>
        </section>

        <section id="view-wallet" class="tab-content">
            <div class="card text-center border-b-4 border-blue-500">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Saldo</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600 tracking-tighter">0.0000€</h1>
            </div>
            <div class="mt-4 space-y-3">
                <button onclick="sync()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-xs uppercase italic">Sincronizar Bónus</button>
                <button onclick="add(0.05)" class="w-full border-2 border-green-500 text-green-600 py-4 rounded-2xl font-black text-[10px] uppercase">Check-in (+0,0500€)</button>
            </div>
        </section>

        <section id="view-friends" class="tab-content">
            <div class="card border-l-4 border-blue-500">
                <h2 class="font-black text-sm uppercase text-blue-600">O Teu Link</h2>
                <div class="bg-gray-100 p-4 rounded-xl my-4 text-[10px] font-mono break-all text-center" id="ref-box">Gerando link...</div>
                <button onclick="share()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase">Convidar no WhatsApp</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-1 z-40 shadow-2xl">
        <button onclick="nav('feed')" id="btn-feed" class="nav-btn flex-1 p-3 text-gray-400 active"><span class="text-[10px] font-black">FEED</span></button>
        <button onclick="nav('wallet')" id="btn-wallet" class="nav-btn flex-1 p-3 text-gray-400"><span class="text-[10px] font-black">GANHOS</span></button>
        <button onclick="nav('friends')" id="btn-friends" class="nav-btn flex-1 p-3 text-gray-400"><span class="text-[10px] font-black">REDE</span></button>
    </nav>

    <script>
        // Usei nomes de variáveis diferentes para evitar conflito com o cache antigo
        const URL_DB = "https://fickstyevektwbgimapy.supabase.co";
        const KEY_DB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY"; 
        const USER_ID = "5401881400";

        const db = window.supabase.createClient(URL_DB, KEY_DB);
        let wallet = { saldo: 0, bonus: 15 };

        function nav(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
        }

        async function setup() {
            document.getElementById('ref-box').innerText = window.location.origin + "/?ref=" + USER_ID;
            try {
                const { data } = await db.from('perfis').select('*').eq('id', USER_ID).single();
                if (data) wallet = data;
                
                const { data: ps } = await db.from('posts').select('*').limit(3);
                if (ps) {
                    document.getElementById('posts-list').innerHTML = ps.map(p => `
                        <div class="card"><p class="text-xs text-gray-700">${p.content}</p></div>
                    `).join('');
                }
            } catch (e) { console.log("Offline"); }
            ui();
        }

        function ui() {
            const s = wallet.saldo.toFixed(4);
            document.getElementById('bal-eur').innerText = s + "€";
            document.getElementById('wall-eur').innerText = s + "€";
            document.getElementById('bonus-display').innerText = "🔥 " + wallet.bonus + " Restantes";
        }

        async function add(n) {
            wallet.saldo += n;
            ui();
            await db.from('perfis').upsert({ id: USER_ID, saldo: wallet.saldo });
        }

        function sync() {
            wallet.bonus = 15;
            ui();
            alert("Sincronizado!");
        }

        function share() {
            const m = "Ganha comigo: " + window.location.origin + "/?ref=" + USER_ID;
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(m));
        }

        window.onload = setup;
    </script>
</body>
</html>
