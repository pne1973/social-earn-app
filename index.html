<div id="feed-container" class="space-y-4">
    </div>

<script>
// 1. SISTEMA DE LIKES (+2 XP)
async function handleLike(postId) {
    try {
        // Feedback visual imediato
        user.saldo += 0.0020; // Recompensa de +2 XP
        updateUI(); 
        
        // Grava no Supabase (Opcional: tabela de likes para evitar duplicados)
        await supabase.from('perfis').update({ saldo: user.saldo }).eq('id', UID);
        console.log("Like computado no post:", postId);
    } catch (e) { console.error("Erro no Like", e); }
}

// 2. SISTEMA DE COMENTÁRIOS (Expansível)
function toggleComments(postId) {
    const section = document.getElementById(`comments-${postId}`);
    section.classList.toggle('hidden');
}

// 3. PARTILHA NAS REDES (Link Único v32)
function sharePost(postId) {
    const shareText = `Vê este post na Apex Social! Ganha dinheiro a interagir: https://social-earn-app.vercel.app/?ref=${UID}`;
    
    if (navigator.share) {
        navigator.share({
            title: 'Apex Social',
            text: shareText,
            url: window.location.href
        });
    } else {
        // Fallback para cópia de link
        navigator.clipboard.writeText(shareText);
        alert("Link de convite copiado para a área de transferência!");
    }
}

// FUNÇÃO DE RENDERIZAÇÃO DO FEED (ATUALIZADA)
async function renderFeed() {
    const { data } = await supabase.from('posts').select('*').order('created_at', {ascending: false});
    const cont = document.getElementById('feed-container');
    
    cont.innerHTML = data.map((p, i) => `
        <div class="card p-5 shadow-sm border-l-4 border-blue-500 bg-white mb-4">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[9px] font-black text-blue-600 uppercase">User #${p.user_id.slice(-4)}</span>
                <span class="text-[8px] text-gray-300 font-bold uppercase italic">ID: ${p.id}</span>
            </div>

            <p class="text-sm text-gray-700 leading-relaxed mb-4">${p.content}</p>

            <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                <div class="flex space-x-5">
                    <button onclick="handleLike('${p.id}')" class="flex items-center text-[10px] font-black text-gray-400 uppercase hover:text-blue-500 transition-colors">
                        <span class="text-base mr-1">👍</span> Like <span class="ml-1 text-blue-500">+2 XP</span>
                    </button>
                    
                    <button onclick="toggleComments('${p.id}')" class="flex items-center text-[10px] font-black text-gray-400 uppercase hover:text-green-500 transition-colors">
                        <span class="text-base mr-1">💬</span> Comentar
                    </button>
                </div>

                <button onclick="sharePost('${p.id}')" class="flex items-center text-[10px] font-black text-blue-400 uppercase italic">
                    <span class="text-base mr-1">🔗</span> Partilhar
                </button>
            </div>

            <div id="comments-${p.id}" class="hidden mt-4 pt-3 border-t border-dashed border-gray-100 animate-fade-in">
                <input type="text" placeholder="Escreve um comentário..." class="w-full bg-gray-50 border-none rounded-lg p-2 text-xs focus:ring-1 focus:ring-blue-200">
                <p class="text-[8px] text-gray-400 mt-2 uppercase font-bold text-center">Os comentários serão ativados na v33 (Full Social)</p>
            </div>
        </div>

        ${i % 3 === 2 ? '<div class="ad-slot bg-yellow-50 border-2 border-dashed border-yellow-100 p-4 text-center rounded-xl mb-4 text-[9px] font-black text-yellow-600 uppercase italic tracking-widest">Sponsored Advertisement</div>' : ''}
    `).join('');
}
</script>
