<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Social Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #ffcc00; --dark: #000; --card: #121212; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: #000; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .points-badge { background: var(--yellow); color: black; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .post-box { background: var(--card); padding: 15px; margin: 10px; border-radius: 15px; border: 1px solid #222; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; height: 60px; }
        .btn-post { background: var(--yellow); color: black; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; float: right; cursor: pointer; }
        .feed-item { background: var(--card); border-bottom: 1px solid #222; padding: 15px; }
        .ad-card { background: #1a1a1a; margin: 10px; border-radius: 12px; padding: 20px; border: 1px dashed var(--yellow); text-align: center; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-weight: bold;">Social Network</span>
        <div class="points-badge" id="userXP">-- XP</div>
    </div>
    <div class="post-box">
        <textarea id="postInput" placeholder="No que estás a pensar?"></textarea>
        <button class="btn-post" onclick="publishPost()">Publicar</button>
        <div style="clear:both;"></div>
    </div>
    <div id="feed"></div>
    <div class="nav-bar">
        <span style="color:var(--yellow); font-size:24px;">🏠</span>
        <span style="color:#555; font-size:24px;">🏆</span>
        <span style="color:#555; font-size:24px;">💰</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const sbUrl = urlParams.get('url');
        const sbKey = urlParams.get('key');
        let supabaseClient;
        if (sbUrl && sbKey) { supabaseClient = supabase.createClient(sbUrl, sbKey); }
        const userId = tg.initDataUnsafe.user?.id;

        async function getXP() {
            if(!supabaseClient) return;
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if (data) document.getElementById('userXP').innerText = `${data.points} XP`;
        }

        async function loadFeed() {
            if(!supabaseClient) return;
            const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = "";
            posts?.forEach((post, index) => {
                feedDiv.innerHTML += `<div class="feed-item">
                    <div style="color:var(--yellow); font-weight:bold; font-size:13px;">@${post.username}</div>
                    <div style="margin:10px 0; font-size:15px;">${post.content}</div>
                    <div style="color:#888; font-size:14px;" onclick="likePost(${post.id})">❤️ ${post.likes || 0} Likes</div>
                </div>`;
                if ((index + 1) % 3 === 0) {
                    feedDiv.innerHTML += `<div class="ad-card"><div style="font-size:10px; color:var(--yellow);">ANÚNCIO</div><button onclick="tg.openLink('https://google.com')" style="background:var(--yellow); border:none; padding:5px 15px; border-radius:5px; margin-top:10px; font-weight:bold;">GANHAR XP</button></div>`;
                }
            });
        }

        async function publishPost() {
            const text = document.getElementById('postInput').value;
            if(!text || !supabaseClient) return;
            await supabaseClient.from('posts').insert([{ user_id: userId, username: tg.initDataUnsafe.user?.username || 'User', content: text }]);
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: 5 });
            document.getElementById('postInput').value = "";
            loadFeed(); getXP();
        }

        async function likePost(postId) {
            if(!supabaseClient) return;
            await supabaseClient.rpc('increment_likes', { post_id: postId });
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: 1 });
            loadFeed(); getXP();
        }

        if(supabaseClient) { getXP(); loadFeed(); }
    </script>
</body>
</html>
