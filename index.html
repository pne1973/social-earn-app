<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; margin: 0; padding-bottom: 100px; }
        
        /* CORREÇÃO DO TEXTO LONGO: Impede que o card estique horizontalmente */
        .post-card { 
            background: white; 
            border: 1px solid #dadce0; 
            border-radius: 12px; 
            margin: 16px; 
            display: flex; 
            flex-direction: column;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .post-text {
            padding: 16px;
            font-size: 14px;
            line-height: 1.5;
            text-transform: uppercase;
            font-weight: 900;
            white-space: normal; /* Garante que o texto quebre linhas */
        }

        /* Header e Nav Fixos para evitar sobreposição */
        .app-header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 1px solid #dadce0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-sizing: border-box; }
        .app-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; border-top: 1px solid #dadce0; z-index: 1000; display: flex; }
        
        .nav-btn { flex: 1; border: none; background: none; font-weight: 900; font-size: 11px; color: #5f6368; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }

        .main-content { margin-top: 140px; } /* Espaço para Header + Banner */
        
        .monetization-bar { position: fixed; top: 72px; width: 100%; background: #fff; padding: 8px 16px; border-bottom: 1px solid #eee; z-index: 999; text-align: center; font-size: 10px; color: var(--g-green); box-sizing: border-box; }

        .interaction-bar { display: flex; border-top: 1px solid #f1f3f4; }
        .int-btn { flex: 1; padding: 12px; border: none; background: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .int-btn span:last-child { font-size: 9px; margin-top: 4px; color: #5f6368; }

        #floating-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; display: none; pointer-events: none; }
        .gain-pop { color: var(--g-green); font-size: 40px; font-weight: 900; animation: pop 0.8s ease-out; }
        @keyframes pop { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>

    <div id="floating-msg"><div class="gain-pop" id="gain-txt">+0.0000€</div></div>

    <header class="app-header">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black">S</div>
            <span class="text-blue-600 text-[12px] font-black uppercase">Social Earn Network</span>
        </div>
        <div class="text-right">
            <div id="top-eur" class="text-green-600 font-black text-lg leading-none">0.0000€</div>
            <div id="top-brl" class="text-gray-400 font-black text-[9px] uppercase">0.0000 BRL</div>
        </div>
    </header>

    <div class="monetization-bar uppercase font-black">
        <span id="status-label">100% de Ganhos Ativos</span>
    </div>

    <main class="main-content">
        <div id="tab-social" class="tab-pane">
            <div class="post-card p-4 shadow-sm border-t-4 border-blue-600">
                <textarea id="post-input" placeholder="O QUE PRETENDE PARTILHAR?" class="w-full border-none outline-none resize-none font-black text-sm uppercase" rows="2"></textarea>
                <button onclick="publishPost()" class="w-full mt-2 bg-blue-600 text-white py-3 rounded-lg font-black text-xs uppercase shadow-md">Publicar Agora</button>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="tab-earnings" class="tab-pane hidden p-4">
            <div class="post-card p-8 text-center border-t-8 border-blue-600 shadow-xl">
                <p class="text-xs text-gray-400 font-black uppercase mb-2">Carteira Total</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p class="text-[10px] text-red-500 font-black mt-4 uppercase italic">Mínimo de levantamento: 5000 XP</p>
            </div>
        </div>
    </main>

    <nav class="app-nav">
        <button onclick="showTab('social')" id="nav-soc" class="nav-btn active"><span>📱</span><span>REDE</span></button>
        <button onclick="showTab('earnings')" id="nav-earn" class="nav-btn"><span>💰</span><span>GANHOS</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const USER_ID = "5401881400";

        let currentBalance = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', USER_ID).single();
            if(data) currentBalance = parseFloat(data.saldo) || 0;
            updateUI();
            loadPosts();
        }

        function updateUI() {
            const eur = currentBalance.toFixed(4);
            document.getElementById('top-eur').innerText = eur + "€";
            document.getElementById('wall-eur').innerText = eur + "€";
            document.getElementById('top-brl').innerText = (currentBalance * 6.12).toFixed(4) + " BRL";
        }

        async function addGain(val) {
            currentBalance = parseFloat((currentBalance + val).toFixed(4));
            showPop(val);
            updateUI();
            await sb.from('perfis').update({ saldo: currentBalance }).eq('id', USER_ID);
        }

        async function publishPost() {
            const txt = document.getElementById('post-input').value;
            if(!txt) return;
            const { error } = await sb.from('posts').insert([{ user_id: USER_ID, content: txt }]);
            if(!error) {
                document.getElementById('post-input').value = "";
                await addGain(0.0150);
                loadPosts();
            }
        }

        async function loadPosts() {
            const { data } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = data.map(p => `
                <div class="post-card shadow-sm">
                    <div class="post-text">${p.content}</div>
                    <div class="interaction-bar">
                        <button onclick="addGain(0.0010)" class="int-btn"><span>👍</span><span>GOSTAR</span></button>
                        <button onclick="addGain(0.0020)" class="int-btn border-x"><span>🔗</span><span>PARTILHAR</span></button>
                    </div>
                </div>
            `).join('');
        }

        function showPop(v) {
            const el = document.getElementById('floating-msg');
            document.getElementById('gain-txt').innerText = "+" + v.toFixed(4) + "€";
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 800);
        }

        function showTab(t) {
            document.querySelectorAll('.tab-pane, .nav-btn').forEach(el => el.classList.remove('active', 'hidden'));
            if(t === 'social') {
                document.getElementById('tab-earnings').classList.add('hidden');
                document.getElementById('nav-soc').classList.add('active');
            } else {
                document.getElementById('tab-social').classList.add('hidden');
                document.getElementById('nav-earn').classList.add('active');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
