<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Social Network Extreme</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #ffcc00; --dark: #000; --card: #121212; --red: #ff4444; --gray: #888; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .header { background: #000; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .points-badge { background: var(--yellow); color: black; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        #adminPanel { background: var(--red); margin: 10px; padding: 10px; border-radius: 12px; display: none; font-size: 12px; text-align: center; }
        .post-box { background: var(--card); padding: 15px; margin: 10px; border-radius: 15px; border: 1px solid #222; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; height: 60px; resize: none; }
        .btn-post { background: var(--yellow); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; float: right; cursor: pointer; }
        .img-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #333; }
        .feed-item { background: var(--card); border-bottom: 1px solid #222; padding: 15px; margin-bottom: 5px; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
        
        /* Secção de Comentários */
        .comment-section { background: #0a0a0a; margin-top: 10px; border-radius: 8px; padding: 10px; display: none; }
        .comment-item { font-size: 13px; border-bottom: 1px solid #1a1a1a; padding: 5px 0; }
        .comment-input { width: 70%; background: #1a1a1a; border: none; color: white; padding: 5px; border-radius: 5px; font-size: 12px; }
        .comment-btn { width: 25%; background: var(--yellow); border: none; font-size: 11px; padding: 5px; border-radius: 5px; font-weight: bold; }

        .ad-box { background: #080808; padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--yellow); }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: bold;">SOCIAL NETWORK</span>
        <div class="points-badge" id="userXP">0 XP</div>
    </div>

    <div id="adminPanel">🛡️ ADMIN: <span id="statUsers">0</span> Users | <span id="statPts">0</span> XP</div>

    <div id="homeTab">
        <div class="post-box">
            <textarea id="postInput" maxlength="300" placeholder="Partilha algo novo..."></textarea>
            <img id="preview" class="img-preview">
            <div style="margin-top:10px; display:flex; justify-content:space-between;">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(this)">
                <button onclick="document.getElementById('fileInput').click()" style="background:#222; color:white; border:none; padding:8px 15px; border-radius:10px;">📷 Foto</button>
                <button class="btn-post" id="publishBtn" onclick="publishPost()">Publicar</button>
            </div>
        </div>
        <div id="mainContent"></div>
    </div>

    <div id="rankTab" style="display:none;"><div id="rankContent"></div></div>
    <div id="walletTab" style="display:none; padding:20px; text-align:center;">
        <div id="realBalance" style="font-size:35px; font-weight:bold; color:var(--yellow); margin:20px 0;">€0.0000</div>
        <button onclick="dailyCheckin()" style="width:100%; background:var(--yellow); color:black; border:none; padding:15px; border-radius:12px; font-weight:bold;">🎁 Check-in Diário</button>
    </div>

    <div class="nav-bar">
        <span class="nav-item active" onclick="changeTab('home', this)">🏠</span>
        <span class="nav-item" onclick="changeTab('rank', this)">🏆</span>
        <span class="nav-item" onclick="changeTab('wallet', this)">💰</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const urlParams = new URLSearchParams(window.location.search);
        const supabaseClient = supabase.createClient(urlParams.get('url'), urlParams.get('key'));
        const userId = tg.initDataUnsafe.user?.id;
        const username = tg.initDataUnsafe.user?.username || 'User';
        const BOT_TOKEN = 'TEU_TOKEN_AQUI'; // <--- COLOCA O TEU TOKEN DO BOTFATHER AQUI
        const ADMIN_ID = 5401881400;

        function getAdHtml() {
            return `<div class="ad-box"><script type="text/javascript">atOptions = { 'key' : '96a0945958564a02377033580552718e', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };<\/script><script type="text/javascript" src="//www.highperformanceformat.com/96a0945958564a02377033580552718e/invoke.js"><\/script></div>`;
        }

        async function sendNotification(targetId, message) {
            if (!BOT_TOKEN || BOT_TOKEN === 'TEU_TOKEN_AQUI') return;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${targetId}&text=${encodeURIComponent(message)}`);
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.6);
                    };
                };
            });
        }

        async function publishPost() {
            const text = document.getElementById('postInput').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('publishBtn');
            let imgUrl = null;
            if (!text && !file) return;
            btn.innerText = "..."; btn.disabled = true;
            if (file) {
                const compressed = await compressImage(file);
                const fName = `${Date.now()}_${userId}.jpg`;
                const { data } = await supabaseClient.storage.from('post-images').upload(fName, compressed);
                if (data) imgUrl = supabaseClient.storage.from('post-images').getPublicUrl(fName).data.publicUrl;
            }
            await supabaseClient.from('posts').insert([{ user_id: userId, username: username, content: text, image_url: imgUrl }]);
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: imgUrl ? 10 : 5 });
            location.reload();
        }

        async function loadFeed() {
            const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            let html = "";
            posts?.forEach(async (p, i) => {
                html += `<div class="feed-item">
                    <b style="color:var(--yellow)">@${p.username}</b>
                    <p style="margin:10px 0;">${p.content || ''}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div style="margin-top:10px; font-size:13px; display:flex; gap:15px;">
                        <span onclick="likePost(${p.id}, ${p.user_id})">❤️ ${p.likes || 0}</span>
                        <span onclick="toggleComments(${p.id})">💬 Comentar</span>
                    </div>
                    <div id="comm-${p.id}" class="comment-section">
                        <div id="list-${p.id}"></div>
                        <div style="margin-top:10px;">
                            <input id="in-${p.id}" class="comment-input" placeholder="Escreve...">
                            <button class="comment-btn" onclick="addComment(${p.id}, ${p.user_id})">Enviar</button>
                        </div>
                    </div>
                </div>`;
                if ((i + 1) % 3 === 0) html += getAdHtml();
            });
            document.getElementById('mainContent').innerHTML = html;
        }

        async function toggleComments(postId) {
            const div = document.getElementById(`comm-${postId}`);
            div.style.display = div.style.display === 'none' ? 'block' : 'none';
            if (div.style.display === 'block') {
                const { data } = await supabaseClient.from('post_comments').select('*').eq('post_id', postId).order('created_at', { ascending: true });
                document.getElementById(`list-${postId}`).innerHTML = data.map(c => `<div class="comment-item"><b>@${c.username}:</b> ${c.content}</div>`).join('');
            }
        }

        async function addComment(postId, postOwnerId) {
            const val = document.getElementById(`in-${postId}`).value;
            if (!val) return;
            await supabaseClient.from('post_comments').insert([{ post_id: postId, user_id: userId, username: username, content: val }]);
            sendNotification(postOwnerId, `@${username} comentou o teu post: "${val}"`);
            toggleComments(postId);
            document.getElementById(`in-${postId}`).value = "";
        }

        async function likePost(id, postOwnerId) {
            await supabaseClient.rpc('increment_likes', { post_id: id });
            if (userId !== postOwnerId) sendNotification(postOwnerId, `@${username} deu Like no teu post! ❤️`);
            loadFeed();
        }

        // Funções Base mantidas (Rank, Wallet, Admin...)
        function changeTab(tab, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('homeTab').style.display = tab === 'home' ? 'block' : 'none';
            document.getElementById('rankTab').style.display = tab === 'rank' ? 'block' : 'none';
            document.getElementById('walletTab').style.display = tab === 'wallet' ? 'block' : 'none';
            if(tab === 'rank') loadRank();
        }

        async function updateStats() {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if (data) {
                document.getElementById('userXP').innerText = `${data.points} XP`;
                document.getElementById('realBalance').innerText = `€${(data.points * 0.0005).toFixed(4)}`;
            }
        }

        updateStats(); loadFeed();
    </script>
</body>
</html>
