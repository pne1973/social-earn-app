<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex v35.400 - Final Stability</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; font-weight: 900; text-transform: uppercase; }
        .card { background: white; border: 1px solid #dadce0; border-radius: 16px; margin-bottom: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .comment-area { display: none; background: #f8f9fa; border-top: 1px solid #eee; padding: 12px; }
        .comment-area.show { display: block; }
        #feed-container { margin-top: 165px; }
        .sticky-top { position: fixed; top: 72px; left: 0; right: 0; z-index: 40; background: #f1f3f4; padding: 10px 16px; }
        .admin-box { border-left: 5px solid #ef4444; background: #fff5f5; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body class="pb-24">

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-50 p-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg text-xl">A</div>
            <span class="text-blue-600 text-sm tracking-tighter">APEX SOCIAL</span>
        </div>
        <div id="val-top" class="text-green-600 text-lg">0.0000€</div>
    </header>

    <main class="max-w-lg mx-auto p-4">
        
        <section id="tab-rede" class="tab-content active">
            <div class="sticky-top">
                <div class="card p-4 border-t-8 border-blue-600 shadow-md">
                    <textarea id="new-post-txt" onclick="this.rows=3; document.getElementById('btn-pub').classList.remove('hidden')" placeholder="PARTILHAR ALGO..." class="w-full border-none focus:ring-0 text-xs mb-2 resize-none uppercase" rows="1"></textarea>
                    <button id="btn-pub" onclick="execPost()" class="hidden w-full bg-blue-600 text-white py-3 rounded-xl text-xs font-black">PUBLICAR AGORA</button>
                </div>
            </div>
            <div id="feed-container">
                <p class="text-center text-gray-400 py-20 text-xs">A CARREGAR FEED...</p>
            </div>
        </section>

        <section id="tab-ganhos" class="tab-content">
            <div class="card p-12 text-center border-t-[10px] border-blue-600 mt-4 shadow-xl">
                <p class="text-[10px] text-gray-400 mb-2 font-black text-blue-600">SALDO DISPONÍVEL</p>
                <h1 id="val-wall" class="text-5xl text-blue-600">0.0000€</h1>
                <div class="mt-8 pt-8 border-t flex justify-between text-[10px]">
                    <span>PAYPAL: ATIVO</span>
                    <span class="text-green-600">MIN: 20.00€</span>
                </div>
            </div>
        </section>

        <section id="tab-gestao" class="tab-content">
            <div class="admin-box mt-4 shadow-lg">
                <h2 class="text-red-600 mb-6 text-center text-sm">PAINEL FINANCEIRO MASTER</h2>
                
                <div class="space-y-4 mb-8">
                    <div class="bg-white p-4 rounded-lg border shadow-sm">
                        <p class="text-[9px] text-gray-400">DÍVIDA TOTAL (EUR)</p>
                        <h3 id="adm-eur" class="text-2xl text-green-600">0.00€</h3>
                    </div>
                    <div class="bg-white p-4 rounded-lg border shadow-sm">
                        <p class="text-[9px] text-gray-400">DÍVIDA TOTAL (BRL)</p>
                        <h3 id="adm-brl" class="text-2xl text-green-600">R$ 0.00</h3>
                    </div>
                    <div class="bg-white p-4 rounded-lg border shadow-sm">
                        <p class="text-[9px] text-gray-400">UTILIZADORES ATIVOS</p>
                        <h3 id="adm-users" class="text-2xl text-blue-600">0</h3>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-lg border shadow-sm">
                    <p class="text-[10px] mb-3">ELIMINAR POST (MODERAÇÃO)</p>
                    <div class="flex gap-2">
                        <input id="adm-del-id" type="text" placeholder="ID DO POST" class="flex-1 p-3 border rounded-xl text-xs outline-none">
                        <button onclick="execDel()" class="bg-red-600 text-white px-6 rounded-xl text-[10px]">APAGAR</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-50">
        <button onclick="nav('rede')" class="flex-1 text-[10px] font-black">REDE</button>
        <button onclick="nav('ganhos')" class="flex-1 text-[10px] font-black text-gray-400">GANHOS</button>
        <button id="nav-adm" onclick="nav('gestao')" class="hidden flex-1 text-[10px] font-black text-red-600">GESTÃO</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let userSaldo = 0;

        async function init() {
            if(MASTER_ID === "5401881400") {
                document.getElementById('nav-adm').classList.remove('hidden');
                loadStats();
            }
            const { data } = await sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) userSaldo = Number(data.saldo);
            updateUI();
            loadFeed();
        }

        async function loadStats() {
            const { data: all } = await sb.from('perfis').select('saldo');
            if(all) {
                let total = all.reduce((a, b) => a + (Number(b.saldo) || 0), 0);
                document.getElementById('adm-eur').innerText = total.toFixed(2) + "€";
                document.getElementById('adm-brl').innerText = "R$ " + (total * 6.12).toFixed(2);
                document.getElementById('adm-users').innerText = all.length;
            }
        }

        async function loadFeed() {
            const container = document.getElementById('feed-container');
            const { data: posts, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            
            if(error) { container.innerHTML = `<p class="text-center text-red-500 py-10 text-[10px]">ERRO: ${error.message}</p>`; return; }
            if(!posts || posts.length === 0) { container.innerHTML = `<p class="text-center text-gray-400 py-10 text-[10px]">SEM CONTEÚDO.</p>`; return; }

            container.innerHTML = "";
            posts.forEach(p => {
                const div = document.createElement('div');
                div.className = "card p-6 shadow-sm";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] text-blue-600 font-black">ID: ${p.id}</span>
                        <span class="text-[8px] text-gray-400 uppercase italic">UTILIZADOR ..${String(p.user_id).slice(-4)}</span>
                    </div>
                    <div class="text-sm text-gray-800 mb-6 font-black leading-tight uppercase">${p.content}</div>
                    <div class="flex border-t pt-4">
                        <button onclick="pay(0.0005)" class="flex-1 text-center text-xl">👍</button>
                        <button onclick="toggleBox('${p.id}')" class="flex-1 text-center border-x text-xl">💬</button>
                        <button onclick="pay(0.0005)" class="flex-1 text-center text-xl">🔗</button>
                    </div>
                    <div id="area-${p.id}" class="comment-area mt-4 rounded-xl">
                        <div id="list-${p.id}" class="text-[10px] space-y-2 mb-4 max-h-40 overflow-y-auto uppercase"></div>
                        <div class="flex gap-2">
                            <input id="in-${p.id}" type="text" placeholder="MENSAGEM..." class="flex-1 p-3 border-2 rounded-xl text-[10px] outline-none">
                            <button onclick="execCmt('${p.id}')" class="bg-blue-600 text-white px-4 rounded-xl text-[10px]">OK</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function toggleBox(id) {
            const area = document.getElementById(`area-${id}`);
            const list = document.getElementById(`list-${id}`);
            area.classList.toggle('show');
            if(area.classList.contains('show')) {
                list.innerHTML = "CARREGANDO...";
                const { data } = await sb.from('comentarios').select('*').eq('post_id', id).order('created_at', {ascending: true});
                list.innerHTML = data && data.length ? data.map(c => `<div class="p-2 border-b bg-white rounded"><b>..${String(c.user_id).slice(-4)}:</b> ${c.content}</div>`).join('') : "SEM COMENTÁRIOS.";
            }
        }

        async function execCmt(id) {
            const inp = document.getElementById(`in-${id}`);
            const list = document.getElementById(`list-${id}`);
            const val = inp.value.trim();
            if(!val) return;

            // Injeção Instantânea (UI First)
            const d = document.createElement('div');
            d.className = "p-2 border-b bg-blue-50 rounded text-blue-700";
            d.innerHTML = `<b>TU:</b> ${val}`;
            if(list.innerText.includes("SEM COMENTÁRIOS")) list.innerHTML = "";
            list.appendChild(d);
            inp.value = "";

            // Envio Real
            await sb.from('comentarios').insert([{ post_id: id, user_id: MASTER_ID, content: val }]);
            pay(0.0010);
        }

        async function pay(v) {
            userSaldo += v;
            updateUI();
            await sb.from('perfis').update({ saldo: userSaldo }).eq('id', MASTER_ID);
        }

        async function execPost() {
            const t = document.getElementById('new-post-txt').value;
            if(!t) return;
            await sb.from('posts').insert([{ user_id: MASTER_ID, content: t }]);
            location.reload();
        }

        async function execDel() {
            const id = document.getElementById('adm-del-id').value;
            if(confirm("Deseja apagar o post "+id+"?")) {
                await sb.from('posts').delete().eq('id', id);
                location.reload();
            }
        }

        function updateUI() {
            const s = userSaldo.toFixed(4) + "€";
            document.getElementById('val-top').innerText = s;
            document.getElementById('val-wall').innerText = s;
        }

        function nav(t) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
