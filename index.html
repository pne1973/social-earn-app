<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v32.2 - Produção Corrigida</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --border: #dadce0; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; margin: 0; padding-top: 72px; padding-bottom: 85px; }
        
        /* Design Google Edition */
        .google-card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
        .ad-banner { background: #fff8e1; border: 2px dashed #fbc02d; padding: 15px; text-align: center; border-radius: 12px; margin: 10px 0; }
        
        /* Ganhos Flutuantes */
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
        .earning-text { font-size: 3rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 15px rgba(52, 168, 83, 0.3); -webkit-text-stroke: 1.5px white; }

        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; cursor: pointer; transition: background 0.2s; }
        .interaction-btn:active { background: #f8f9fa; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
    </style>
</head>
<body>

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[500] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-sm">A</div>
            <h1 class="text-sm font-black uppercase text-blue-600 tracking-tighter">Apex Social</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase italic">0.0000 BRL</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-3">
        <div class="ad-banner mb-4">
            <p class="text-[10px] font-black text-yellow-700 uppercase">Anúncio Patrocinado</p>
            <p class="text-xs font-black">Ganhe mais XP convidando amigos!</p>
        </div>

        <section id="view-social" class="tab-content active">
            <div class="google-card p-4 border-t-8 border-blue-600 shadow-md">
                <textarea id="post-input" placeholder="O QUE PRETENDE PARTILHAR? (+0.0150€)" class="w-full border-none text-xs font-black uppercase outline-none focus:ring-0 mb-3" rows="2"></textarea>
                <button onclick="publish()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-black uppercase text-[11px]">Publicar (+0.0150€)</button>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content hidden">
            <div class="google-card p-10 text-center border-t-[10px] border-blue-600 mt-4 shadow-xl">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2">Carteira Total</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p id="wall-brl" class="text-sm font-black text-gray-400 mt-2">0.0000 BRL</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[500]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black">REDE</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black">GANHOS</span></button>
    </nav>
