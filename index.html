<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v40.4 - Produção Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --border: #dadce0; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; margin: 0; padding-top: 160px; padding-bottom: 85px; }
        
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 1px solid #ddd; z-index: 9999; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .sticky-publisher { position: fixed; top: 72px; left: 0; right: 0; z-index: 999; background: #f1f3f4; padding: 12px 16px; border-bottom: 1px solid #ddd; }
        .google-card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
        
        /* Contador (Badge Vermelho) - Screenshot 23:57:00 */
        .counter-badge { position: absolute; top: 0px; right: 15%; background: var(--g-red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid white; font-weight: 900; z-index: 10; }
        
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; cursor: pointer; position: relative; }
        .interaction-btn span { font-size: 9px; text-transform: uppercase; margin-top: 4px; color: #65676b; }
        .interaction-btn .icon { font-size: 20px; }

        /* Comentários Real-Time */
        .comments-section { background: #f8f9fa; padding: 10px; border-top: 1px solid #eee; }
        .comment-item { font-size: 11px; margin-bottom: 5px; padding: 5px; background: white; border-radius: 6px; border: 1px solid #eee; }
        .comment-input-area { display: flex; gap: 5px; margin-top: 8px; }
        .comment-input-area input { flex: 1; font-size: 11px; padding: 8px; border: 1px solid #ddd; border-radius: 20px; outline: none; }

        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
        .earning-text { font-size: 3rem; font-weight: 900; color: var(--g-green); -webkit-text-stroke: 1.5px white; }

        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { font-[11px] font-black uppercase text-gray-400 cursor: pointer; }
        .nav-item.active { color: var(--g-blue); }
    </style>
</head>
<body>

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-sm">A</div>
            <div>
                <h1 class="text-sm font-black uppercase text-blue-600 tracking-tighter">Apex Social</h1>
                <div class="text-[9px] text-green-500 font-black">STATUS: 100% OK</div>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase italic">0.0000 BRL</div>
        </div>
    </header>

    <main id="view-social">
        <div class="sticky-publisher">
            <div class="google-card p-4 border-t-8 border-blue-600 shadow-md">
                <textarea id="post-input" placeholder="O QUE PRETENDE PARTILHAR? (+0.0150€)" class="w-full border-none text-[11px] font-black uppercase outline-none focus:ring-0 mb-3" rows="1" onclick="this.rows=3"></textarea>
                <div class="flex gap-2">
                    <input type="file" id="post-file" accept="image/*" class="hidden" onchange="processarFoto()">
                    <label for="post-file" class="bg-gray-100 p-3 rounded-lg flex-1 text-center text-[10px] font-black text-gray-500 uppercase cursor-pointer">📸 Anexar Foto</label>
                    <button onclick="publish()" class="bg-blue-600 text-white p-3 rounded-lg flex-1 font-black uppercase text-[10px]">Publicar</button>
                </div>
            </div>
        </div>

        <div id="feed-container" class="max-w-lg mx-auto p-3 space-y-4"></div>
    </main>

    <nav>
        <div class="nav-item active" onclick="nav('social')">Rede</div>
        <div class="nav-item" onclick="nav('ganhos')">Ganhos</div>
        <div class="nav-item" onclick="nav('admin')">Gestão</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);
        const MASTER_ID = "5401881400";
        
        let userBalance = 0;
        let adCounter = 0;
        let fotoData = "";

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) userBalance = data.saldo;
            updateUI(); loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = userBalance.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (userBalance * 6.1245).toFixed(4) + " BRL";
        }

        async function earn(amount, postID = null, type = null) {
            adCounter++;
            userBalance += amount;
            
            // Lógica de Anúncio Explicativa
            if(adCounter % 2 === 0) {
                alert("📢 ANÚNCIO: Esta publicidade ajuda a manter os seus ganhos ativos! Visualize para continuar.");
            }

            const el = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + amount.toFixed(4) + "€";
            el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800);
            
            updateUI();
            await _sb.from('perfis').update({ saldo: userBalance }).eq('id', MASTER_ID);
        }

        async function postComment(postID) {
            const input = document.getElementById(`in-${postID}`);
            const text = input.value;
            if(!text) return;

            const { error } = await _sb.from('comentarios').insert([{ post_id: postID, user_id: MASTER_ID, content: text }]);
            if(!error) {
                input.value = "";
                await earn(0.0005); // Ganho por comentar
                loadFeed();
            }
        }

        async function loadFeed() {
            const { data: posts } = await _sb.from('posts').select('*, comentarios(*)').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = "";

            posts?.forEach(p => {
                const card = document.createElement('div');
                card.className = "google-card shadow-sm p-4";
                
                let imgHtml = p.image_url ? `<img src="${p.image_url}" class="w-full rounded-lg mb-4">` : "";
                let commentsHtml = p.comentarios?.map(c => `<div class="comment-item"><b>Master:</b> ${c.content}</div>`).join('') || "";

                card.innerHTML = `
                    <div class="text-[9px] font-black text-gray-300 mb-2 uppercase italic">Utilizador Master #101</div>
                    ${imgHtml}
                    <p class="text-[13px] font-black uppercase text-gray-800 mb-4">${p.content || ''}</p>
                    
                    <div class="flex border-t border-b py-1 mb-3">
                        <div class="interaction-btn" onclick="earn(0.0002)">
                            <div class="counter-badge">12</div>
                            <div class="icon">👍</div><span>Gostar</span>
                        </div>
                        <div class="interaction-btn border-x" onclick="document.getElementById('in-${p.id}').focus()">
                            <div class="counter-badge">${p.comentarios?.length || 0}</div>
                            <div class="icon">💬</div><span>Comentar</span>
                        </div>
                        <div class="interaction-btn" onclick="earn(0.0010)">
                            <div class="counter-badge">0</div>
                            <div class="icon">🔗</div><span>Partilhar</span>
                        </div>
                    </div>

                    <div class="comments-section">
                        <div id="list-${p.id}">${commentsHtml}</div>
                        <div class="comment-input-area">
                            <input type="text" id="in-${p.id}" placeholder="Escreva um comentário...">
                            <button onclick="postComment(${p.id})" class="text-blue-600 text-[10px] font-black uppercase">Enviar</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function publish() {
            const txt = document.getElementById('post-input').value;
            if(!txt && !fotoData) return;
            const { error } = await _sb.from('posts').insert([{ user_id: MASTER_ID, content: txt, image_url: fotoData }]);
            if(!error) {
                await earn(0.0150);
                window.location.reload();
            }
        }

        function processarFoto() {
            const file = document.getElementById('post-file').files[0];
            const reader = new FileReader();
            reader.onload = (e) => fotoData = e.target.result;
            reader.readAsDataURL(file);
        }

        window.onload = init;
    </script>
</body>
</html>
