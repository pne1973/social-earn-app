<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v35.1 - Data Saver</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blue: #4285F4; --green: #34A853; }
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding-top: 70px; padding-bottom: 80px; }
        .header { position: fixed; top: 0; width: 100%; height: 65px; background: white; border-bottom: 1px solid #eee; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .post-card { background: white; border-radius: 16px; border: 1px solid #e1e4e8; margin: 0 15px 20px 15px; overflow: hidden; }
        .img-container { background: #000; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 100%; height: auto; display: block; }
        .btn-act { flex: 1; padding: 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; color: #5f6368; font-size: 11px; }
        .badge { background: #EA4335; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight: 900; color: var(--blue); font-size: 18px;">APEX SOCIAL</div>
        <div id="u-saldo" style="color: var(--green); font-weight: 900; font-size: 16px;">0.0000€</div>
    </header>

    <main>
        <div class="post-card p-5" style="border-top: 8px solid var(--blue);">
            <textarea id="in-text" placeholder="O QUE PRETENDE PARTILHAR?" class="w-full border-none focus:ring-0 font-bold text-sm mb-4" rows="2"></textarea>
            <div id="status-msg" class="hidden text-center text-blue-600 font-black text-[10px] mb-3 uppercase">Processando Imagem...</div>
            <div class="flex gap-3">
                <label for="in-file" class="flex-1 bg-gray-100 p-4 rounded-2xl text-center text-[10px] font-black cursor-pointer uppercase">📸 FOTO</label>
                <input type="file" id="in-file" accept="image/*" class="hidden" onchange="document.getElementById('status-msg').classList.remove('hidden'); document.getElementById('status-msg').innerText='✅ FOTO PRONTA'">
                <button onclick="publicarComCompressao()" id="btn-pub" class="flex-[2] bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-md">Publicar</button>
            </div>
        </div>
        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let saldo = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) saldo = data.saldo;
            document.getElementById('u-saldo').innerText = saldo.toFixed(4) + "€";
            loadFeed();
        }

        // Função mágica para reduzir o tamanho da imagem antes do upload
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1080; // Resolução padrão Instagram
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Converte para JPEG com 60% de qualidade (gera ficheiros minúsculos)
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', 0.6);
                    };
                };
            });
        }

        async function publicarComCompressao() {
            const txt = document.getElementById('in-text').value;
            const file = document.getElementById('in-file').files[0];
            const btn = document.getElementById('btn-pub');
            if(!txt) return;

            btn.disabled = true;
            document.getElementById('status-msg').classList.remove('hidden');
            document.getElementById('status-msg').innerText = "Otimizando Espaço...";

            let finalUrl = "";
            if(file) {
                const optimizedBlob = await compressImage(file);
                const fName = `post_${Date.now()}.jpg`;
                
                const { data: upData, error: upErr } = await sb.storage.from('images').upload(fName, optimizedBlob);
                if(!upErr) {
                    const { data: urlData } = sb.storage.from('images').getPublicUrl(fName);
                    finalUrl = urlData.publicUrl;
                }
            }

            await sb.from('posts').insert([{ 
                user_id: MASTER_ID, content: txt, image_url: finalUrl, likes: 0, shares: 0 
            }]);

            saldo += 0.0150;
            await sb.from('perfis').update({ saldo: saldo }).eq('id', MASTER_ID);
            window.location.reload();
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            if(!posts) return;

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    ${p.image_url ? `<div class="img-container"><img src="${p.image_url}" loading="lazy"></div>` : ''}
                    <div class="p-5">
                        <p class="text-[12px] font-bold text-gray-800 uppercase mb-4">${p.content}</p>
                        <div class="flex border-t pt-3">
                            <button class="btn-act">👍 <span class="badge">${p.likes || 0}</span></button>
                            <button class="btn-act" style="border-left:1px solid #eee; border-right:1px solid #eee;">💬 <span class="badge">0</span></button>
                            <button class="btn-act">🔗 <span class="badge">${p.shares || 0}</span></button>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
