<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social v32</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-gray: #5f6368;
            --google-light: #f8f9fa;
            --google-border: #dadce0;
            --success-green: #1e8e3e;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--google-light);
            margin: 0;
            color: #202124;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Estilo Google */
        header {
            background: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--google-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: var(--google-blue);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .balance {
            color: var(--success-green);
            font-weight: 500;
            font-size: 1.1rem;
        }

        /* Feed e Cards */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .post-card {
            background: white;
            border: 1px solid var(--google-border);
            border-radius: 8px;
            margin-bottom: 16px;
            padding: 16px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--google-gray);
            margin-bottom: 12px;
        }

        .post-content {
            font-size: 1rem;
            margin-bottom: 16px;
            font-weight: 500;
        }

        /* Ações */
        .post-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-top: 1px solid var(--google-border);
            padding-top: 12px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--google-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* Seção de Comentários Corrigida */
        .comment-section {
            background: #f1f3f4;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }

        .status-text {
            font-size: 0.7rem;
            color: var(--google-blue);
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .comment-list {
            list-style: none;
            padding: 0;
            margin: 0 0 12px 0;
        }

        .comment-item {
            font-size: 0.9rem;
            padding: 4px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .comment-input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            border: 1px solid var(--google-border);
            border-radius: 4px;
            padding: 8px 12px;
            outline: none;
        }

        .send-btn {
            background: var(--google-blue);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0 16px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Bottom Nav */
        nav {
            background: white;
            border-top: 1px solid var(--google-border);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 8px 0;
        }

        .nav-item {
            text-align: center;
            font-size: 0.75rem;
            color: var(--google-gray);
            text-decoration: none;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--google-blue);
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-icon">A</div>
        <span style="font-weight: 500; color: var(--google-blue);">APEX SOCIAL</span>
    </div>
    <div class="balance" id="userBalance">0.0000€</div>
</header>

<div class="feed" id="mainFeed">
    <div class="post-card">
        <div class="post-header">
            <span>ID: #79</span>
            <span>Utilizador #1400</span>
        </div>
        <div class="post-content">TYHHHHH</div>
        <div class="post-actions">
            <button class="action-btn">👍<br>Gostar</button>
            <button class="action-btn">💬<br>Comentar</button>
            <button class="action-btn">🔗<br>Partilhar</button>
        </div>
        
        <div class="comment-section">
            <div class="status-text" id="status-79">Processing...</div>
            <ul class="comment-list" id="list-79">
                <li class="comment-item">Ttgggyy</li>
            </ul>
            <div class="comment-input-group">
                <input type="text" placeholder="A tua mensagem..." id="input-79">
                <button class="send-btn" onclick="addComment(79)">OK</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <a href="#" class="nav-item active">REDE</a>
    <a href="#" class="nav-item">GANHOS</a>
    <a href="#" class="nav-item">GESTÃO</a>
</nav>

<script>
    // Lógica para manter 4 casas decimais e status Processing
    function addComment(postId) {
        const input = document.getElementById(`input-${postId}`);
        const list = document.getElementById(`list-${postId}`);
        const status = document.getElementById(`status-${postId}`);

        if (input.value.trim() !== "") {
            status.innerText = "Processing...";
            
            // Simulação de delay de rede
            setTimeout(() => {
                const li = document.createElement("li");
                li.className = "comment-item";
                li.innerText = input.value;
                list.appendChild(li);
                input.value = "";
                status.innerText = ""; // Limpa após concluir
                
                // Atualização de saldo (Exemplo de Gamification +2)
                // Nota: A lógica real de ganhos deve ser processada via backend
            }, 800);
        }
    }

    // Configuração de Performance: Image Compression < 500KB deve ser tratada no upload
</script>

</body>
</html>
