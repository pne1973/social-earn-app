<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn v33.12 - Edição FB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --fb-blue: #1877F2; --fb-bg: #F0F2F5; --fb-card: #FFFFFF;
            --fb-text: #050505; --fb-secondary: #65676B; --fb-border: #ced0d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; }
        body { background-color: var(--fb-bg); color: var(--fb-text); padding-top: 60px; }
        .hidden { display: none !important; }

        /* Login Screen */
        #auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fb-bg); z-index: 2000; display: flex;
            align-items: center; justify-content: center;
        }
        .login-card {
            background: white; padding: 30px; border-radius: 8px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }

        /* Facebook Style Header */
        header {
            background: var(--fb-card); height: 60px; width: 100%; position: fixed;
            top: 0; left: 0; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid var(--fb-border); z-index: 1000;
        }
        .logo { color: var(--fb-blue); font-size: 28px; font-weight: bold; text-decoration: none; }
        
        /* Inputs & Buttons */
        .fb-input {
            width: 100%; border: 1px solid var(--fb-border); padding: 12px;
            border-radius: 6px; margin-bottom: 15px; outline: none; font-size: 16px;
        }
        .fb-btn {
            background: var(--fb-blue); color: white; border: none;
            padding: 12px; border-radius: 6px; font-weight: bold;
            width: 100%; cursor: pointer; font-size: 16px;
        }

        main { max-width: 600px; margin: 0 auto; padding: 15px; }
        .post-card {
            background: white; border-radius: 8px; border: 1px solid var(--fb-border);
            margin-bottom: 15px; padding: 12px;
        }
    </style>
</head>
<body>

    <div id="auth-modal">
        <div class="login-card">
            <h1 style="color: var(--fb-blue); font-size: 50px;">f</h1>
            <h2 style="margin-bottom: 20px;">Social Earn</h2>
            <input type="text" id="auth-id" class="fb-input" placeholder="Insira o seu ID (ex: 123)">
            <button class="fb-btn" onclick="processAuth()">Entrar</button>
            <p id="status-msg" style="margin-top: 10px; font-size: 13px; color: var(--fb-secondary);"></p>
        </div>
    </div>

    <header class="hidden" id="app-header">
        <a href="#" class="logo">f</a>
        <div id="balance-top" style="font-weight: bold; color: var(--fb-blue);">€ 0.0000</div>
    </header>

    <main class="hidden" id="app-main">
        <div class="post-card">
            <input type="text" id="post-text" class="fb-input" placeholder="No que está a pensar?">
            <button class="fb-btn" onclick="handlePost()">Publicar (+€0.0150)</button>
        </div>
        <div id="feed"></div>
    </main>

    <script>
        // CHAVES DO SEU DOCUMENTO (INDEX 39)
        const S_URL = "https://fickstyevektwbgimapy.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiaW1hcHkiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxMTQ1OTI2OCwiZXhwIjoyMDI3MDE2ODY4fQ.nOQWvUv_r_r_r_r_r_r_r_r_r_r_r_C9QY";
        const _supabase = supabase.createClient(S_URL, S_KEY);

        let currentUser = null;

        async function processAuth() {
            const id = document.getElementById('auth-id').value.trim();
            const status = document.getElementById('status-msg');
            if (!id) return alert("Insira um ID!");

            status.innerText = "A validar acesso...";

            try {
                // CORREÇÃO: Usamos select() sem o .single() para evitar o crash
                let { data, error } = await _supabase.from('profiles').select('*').eq('id', id);
                if (error) throw error;

                if (data.length === 0) {
                    // SE NÃO EXISTE -> CRIA (Lógica Production 1.0)
                    status.innerText = "Novo ID detetado. A criar perfil...";
                    const { data: newUser, error: createError } = await _supabase
                        .from('profiles')
                        .insert([{ id: id, username: 'User_' + id, balance: 0.0 }])
                        .select();
                    
                    if (createError) throw createError;
                    currentUser = newUser[0];
                } else {
                    // SE EXISTE -> ENTRA
                    currentUser = data[0];
                }

                // LIBERAR INTERFACE
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-header').classList.remove('hidden');
                document.getElementById('app-main').classList.remove('hidden');
                
                updateUI();
                renderFeed();

            } catch (err) {
                console.error(err);
                status.innerText = "Erro de ligação. Verifique a tabela no Supabase.";
            }
        }

        function updateUI() {
            document.getElementById('balance-top').innerText = `€ ${currentUser.balance.toFixed(4)}`;
        }

        async function renderFeed() {
            const { data: posts } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            if (!posts) return;

            feed.innerHTML = posts.map(p => `
                <div class="post-card">
                    <div style="font-weight: bold; margin-bottom: 8px;">${p.author_name}</div>
                    <div>${p.content}</div>
                    <div style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; color: var(--fb-secondary); font-size: 13px;">
                        👍 Gostar (+€0.0006)
                    </div>
                </div>
            `).join('');
        }

        async function handlePost() {
            const txt = document.getElementById('post-text').value;
            if (!txt) return;

            await _supabase.from('posts').insert([{
                author_id: currentUser.id,
                author_name: currentUser.username,
                content: txt
            }]);

            currentUser.balance += 0.0150;
            await _supabase.from('profiles').update({ balance: currentUser.balance }).eq('id', currentUser.id);
            
            document.getElementById('post-text').value = "";
            updateUI();
            renderFeed();
        }
    </script>
</body>
</html>
