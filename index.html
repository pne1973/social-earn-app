<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v37.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding-top: 60px; }
        .post-card { background: white; border-radius: 15px; margin: 10px; border: 1px solid #e0e0e0; overflow: hidden; }
        .img-container { width: 100%; background: #f8f8f8; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full h-[55px] bg-white border-b flex items-center justify-between px-4 z-50">
        <div class="font-black text-blue-600 uppercase tracking-taller">APEX SOCIAL</div>
        <div id="u-saldo" class="font-black text-green-600">0.0000€</div>
    </header>

    <main class="max-w-md mx-auto">
        <div class="post-card p-4 border-t-4 border-blue-500">
            <textarea id="txt-input" placeholder="O QUE ESTÁ A PENSAR?" class="w-full border-none focus:ring-0 font-bold text-sm mb-3" rows="2"></textarea>
            
            <div id="status-lab" class="hidden text-center text-[10px] font-black mb-2 text-blue-500 uppercase">A preparar foto...</div>
            
            <div class="flex gap-2">
                <label for="file-input" class="flex-1 bg-gray-100 p-3 rounded-xl text-center text-[10px] font-black cursor-pointer uppercase">📸 Foto</label>
                <input type="file" id="file-input" accept="image/*" class="hidden" onchange="processarFoto()">
                
                <button onclick="enviarPublicacao()" id="btn-post" class="flex-[2] bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg shadow-blue-200">Publicar Agora</button>
            </div>
        </div>

        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const _supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const USER_ID = "5401881400";
        let stringImagem = "";

        async function init() {
            const { data } = await _supabase.from('perfis').select('saldo').eq('id', USER_ID).single();
            if(data) document.getElementById('u-saldo').innerText = data.saldo.toFixed(4) + "€";
            carregarPosts();
        }

        function processarFoto() {
            const file = document.getElementById('file-input').files[0];
            if (!file) return;

            document.getElementById('status-lab').classList.remove('hidden');
            document.getElementById('status-lab').innerText = "✅ Foto Processada";

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Comprimir para 800px de largura mantendo proporção
                    const larguraAlvo = 800;
                    const escala = larguraAlvo / img.width;
                    canvas.width = larguraAlvo;
                    canvas.height = img.height * escala;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Converter para string de texto (JPEG 0.7 de qualidade)
                    stringImagem = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function enviarPublicacao() {
            const texto = document.getElementById('txt-input').value;
            const btn = document.getElementById('btn-post');
            if(!texto) return;

            btn.disabled = true;
            btn.innerText = "A ENVIAR...";

            // Enviamos a string da imagem diretamente para a coluna image_url
            const { error } = await _supabase.from('posts').insert([{ 
                user_id: USER_ID, 
                content: texto, 
                image_url: stringImagem 
            }]);

            if(!error) {
                window.location.reload();
            } else {
                alert("Erro ao publicar. Verifique a sua ligação.");
                btn.disabled = false;
                btn.innerText = "Tentar Novamente";
            }
        }

        async function carregarPosts() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', {ascending: false});
            const feed = document.getElementById('feed');
            feed.innerHTML = data?.map(p => `
                <div class="post-card">
                    ${p.image_url ? `<div class="img-container"><img src="${p.image_url}"></div>` : ''}
                    <div class="p-4 text-xs font-bold text-gray-700 uppercase leading-relaxed">${p.content}</div>
                </div>
            `).join('') || "";
        }

        init();
    </script>
</body>
</html>
