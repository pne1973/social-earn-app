<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pine Social Master Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tg-theme-bg: #121212; --tg-theme-text: #ffffff; --tg-theme-button: #ffcc00; --card-bg: #1e1e1e; --border: #333; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--tg-theme-bg); color: var(--tg-theme-text); margin: 0; padding-top: 120px; padding-bottom: 90px; overflow-x: hidden; }
        
        /* HEADER & ADS */
        .top-ad { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #1a1a1a; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; z-index: 2000; font-size: 11px; color: var(--tg-theme-button); font-weight: bold; padding: 0 10px; text-align: center; box-sizing: border-box; }
        .header { position: fixed; top: 60px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--tg-theme-bg); border-bottom: 1px solid var(--border); z-index: 1000; box-sizing: border-box; }
        .xp-badge { background: var(--tg-theme-button); color: #000; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        /* CONTENT CONTAINERS */
        .container { padding: 15px; display: none; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
        .container.active { display: block !important; }
        
        /* PUBLISH BOX */
        .publish-card { background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; }
        textarea { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; resize: none; min-height: 80px; box-sizing: border-box; font-size: 15px; margin-bottom: 10px; }

        /* FEED CARDS - ORGANIZAÇÃO TOTAL */
        .post-card { background: var(--card-bg); border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; width: 100%; }
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #252525; }
        .avatar { width: 40px; height: 40px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--tg-theme-button); font-weight: bold; flex-shrink: 0; }
        .user-meta { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; font-size: 14px; color: var(--tg-theme-button); }
        .post-date { font-size: 11px; color: #888; }
        
        .post-body { padding: 15px; font-size: 15px; line-height: 1.4; color: #eee; word-wrap: break-word; }
        .post-img { width: 100%; max-height: 400px; object-fit: cover; border-top: 1px solid var(--border); display: block; }
        
        .post-footer { padding: 10px 15px; display: flex; border-top: 1px solid #252525; background: #1a1a1a; }
        .action-btn { background: none; border: none; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; }

        /* NAV */
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #888; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--tg-theme-button); }
        .btn-main { background: var(--tg-theme-button); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-ad">📢 ANÚNCIO: Convida amigos e ganha +100 XP por cada um!</div>

    <div class="header">
        <h4 style="margin:0;">PINE <span style="color:var(--tg-theme-button)">SOCIAL</span></h4>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <div id="feed-tab" class="container active">
        <div class="publish-card">
            <textarea id="postText" placeholder="O que tens em mente?"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <input type="file" id="fileInput" hidden accept="image/*">
                <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:#888; font-size:13px; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                <button class="btn-main" id="pubBtn" onclick="handlePublish()">Publicar</button>
            </div>
            <div id="upStatus" style="font-size:11px; color:var(--tg-theme-button); margin-top:10px; display:none;"><i class="fas fa-spinner fa-spin"></i> A processar...</div>
        </div>
        <div id="feed">Carregando feed organizado...</div>
    </div>

    <div id="info-tab" class="container">
        <div class="publish-card"><h2>💰 Tabela de Ganhos</h2><p>Post: 15 XP | Convite: 100 XP</p></div>
    </div>
    <div id="wallet-tab" class="container">
        <div class="publish-card" style="text-align:center;">
            <p>Saldo (4 decimais)</p>
            <h1 style="color:var(--tg-theme-button)"><span id="euroVal">0.0000</span>€</h1>
        </div>
    </div>
    <div id="admin-tab" class="container">
        <div class="publish-card" style="border:1px solid #EA4335"><h3>🛠 Admin</h3><div id="adm-stats">A carregar...</div></div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" onclick="showTab('feed-tab', this)"><i class="fas fa-home"></i>Feed</div>
        <div class="nav-item" onclick="showTab('info-tab', this)"><i class="fas fa-coins"></i>Ganhos</div>
        <div id="adm-nav" class="nav-item" onclick="showTab('admin-tab', this)"><i class="fas fa-user-shield"></i>Admin</div>
        <div class="nav-item" onclick="showTab('wallet-tab', this)"><i class="fas fa-wallet"></i>Saque</div>
    </nav>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const userId = 5401881400;

        function showTab(tabId, el) {
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
            if(tabId === 'feed-tab') loadFeed();
            loadProfile();
        }

        async function loadProfile() {
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if (data) {
                const pts = data.points || 0;
                document.getElementById('userXP').innerText = pts + " XP";
                document.getElementById('euroVal').innerText = (pts * 0.0010).toFixed(4);
            }
        }

        async function handlePublish() {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('pubBtn');
            const status = document.getElementById('upStatus');

            if(!text && !file) return;
            btn.disabled = true; status.style.display = 'block';

            let url = null;
            if(file) {
                const name = `${Date.now()}.jpg`;
                const { data, error } = await supabaseClient.storage.from('post-images').upload(name, file);
                if(!error) url = supabaseClient.storage.from('post-images').getPublicUrl(name).data.publicUrl;
            }

            await supabaseClient.from('posts').insert([{ user_id: userId, content: text, image_url: url }]);
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: 15 });
            location.reload();
        }

        async function loadFeed() {
            const { data } = await supabaseClient.from('posts').select('*').order('created_at', {ascending: false});
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            data.forEach(p => {
                const date = new Date(p.created_at).toLocaleDateString();
                feed.innerHTML += `
                <div class="post-card">
                    <div class="post-header">
                        <div class="avatar">${p.user_id.toString().slice(-1)}</div>
                        <div class="user-meta">
                            <span class="user-name">Utilizador #${p.user_id.toString().slice(-4)}</span>
                            <span class="post-date">${date}</span>
                        </div>
                    </div>
                    <div class="post-body">${p.content || ''}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div class="post-footer">
                        <button class="action-btn"><i class="far fa-heart"></i> Gostar</button>
                    </div>
                </div>`;
            });
        }

        if(userId !== 5401881400) document.getElementById('adm-nav').style.display = 'none';
        loadProfile();
        loadFeed();
    </script>
</body>
</html>
