<style>
    /* Adição de estilos para os novos elementos do feed */
    .ad-inject { background: #f1f3f4; border: 1px dashed #dadce0; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 12px; font-size: 10px; color: #70757a; font-weight: bold; text-transform: uppercase; }
    .report-btn { color: #d93025; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; opacity: 0.7; }
    .report-btn:hover { opacity: 1; }
    #loading-trigger { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #1a73e8; }
</style>

<main class="content">
    <div id="feed-page" class="page active">
        <div class="card">
            <textarea id="postText" class="input-google" style="min-height: 50px; border:none; padding:0; resize:none;" placeholder="No que está a pensar?"></textarea>
            <div id="previewBox" style="display:none; position:relative;">
                <img id="imagePreview" class="post-img" style="margin-bottom:15px;">
                <button onclick="cancelImg()" style="position:absolute; top:20px; right:10px; background:rgba(0,0,0,0.5); color:#fff; border:none; border-radius:50%; width:25px; height:25px;">×</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label class="action-btn" for="fileInput"><i class="fas fa-image"></i> Foto (+15 XP)</label>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImg(this)">
                <button onclick="publish()" class="btn-google" style="width:auto; padding:8px 20px;">Publicar</button>
            </div>
        </div>

        <div id="feed-container"></div>
        <div id="loading-trigger"><i class="fas fa-spinner fa-spin"></i> A carregar mais publicações...</div>
    </div>
</main>

<script>
    // ... (Configurações Supabase e ID 5401881400) ...

    let currentPage = 0;
    const postsPerPage = 10; // Conforme Master List
    let isLoading = false;

    // Função para renderizar posts com injeção de Ads
    function renderPosts(posts, append = false) {
        const container = document.getElementById('feed-container');
        let html = '';

        posts.forEach((p, index) => {
            // Injeção de Ad a cada 3 posts
            if (index > 0 && index % 3 === 0) {
                html += `<div class="ad-inject">Anúncio • Apex Ads Monetização Ativa</div>`;
            }

            html += `
                <div class="card">
                    <div class="post-header">
                        <span>Publicação #${p.id}</span>
                        <div style="display:flex; gap:15px; align-items:center;">
                            ${isAdmin ? `<span style="color:#d93025; font-weight:bold;">UID: ${p.user_id}</span>` : ''}
                            <span class="report-btn" onclick="reportPost(${p.id})"><i class="fas fa-flag"></i> Reportar</span>
                        </div>
                    </div>
                    <div class="post-content">${p.content || ''}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img" loading="lazy">` : ''}
                    <div class="post-actions">
                        <div class="action-btn" onclick="handleLike(${p.id})"><i class="fas fa-heart"></i> Gosto (${p.likes || 0})</div>
                        <div class="action-btn" style="color:#70757a;"><i class="fas fa-comment"></i> Comentar</div>
                    </div>
                </div>
            `;
        });

        if (append) container.innerHTML += html;
        else container.innerHTML = html;
    }

    // Infinite Scroll Implementation
    async function loadFeed(page = 0) {
        if (isLoading) return;
        isLoading = true;
        
        const { data: posts, error } = await client
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false })
            .range(page * postsPerPage, (page + 1) * postsPerPage - 1);

        if (posts && posts.length > 0) {
            renderPosts(posts, page > 0);
            currentPage++;
        } else {
            document.getElementById('loading-trigger').innerHTML = "Fim das publicações.";
        }
        isLoading = false;
    }

    // Observer para detetar o fim da página
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) loadFeed(currentPage);
    }, { threshold: 1.0 });

    observer.observe(document.getElementById('loading-trigger'));

    async function reportPost(id) {
        // Lógica do Sistema de Reporting (Flag)
        if(confirm("Deseja reportar esta publicação por conteúdo inadequado?")) {
            await client.from('reports').insert([{ post_id: id, reporter_id: myId }]);
            alert("Obrigado. A equipa de moderação irá analisar o post #" + id);
        }
    }

    // ... (Restantes funções: handleLike, publish, previewImg mantidas) ...
</script>
