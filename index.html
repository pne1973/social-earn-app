<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Social - v9 Final Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f2f5; color: #1c1e21; font-family: sans-serif; padding-top: 190px; }
        
        /* HEADERS */
        .header-fixed { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; border-bottom: 1px solid #ddd; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .stats { display: flex; justify-content: space-around; padding: 12px 0; border-bottom: 1px solid #eee; }
        .stats b { display: block; color: #1a73e8; font-size: 14px; }
        .stats label { font-size: 9px; color: #65676b; text-transform: uppercase; font-weight: bold; }

        /* NOVO: ANÚNCIO FIXO NO TOPO */
        .top-ad { background: #fff9c4; padding: 10px; text-align: center; border-bottom: 1px solid #fbc02d; font-size: 12px; font-weight: bold; color: #f57f17; }

        /* CONTENT */
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; }
        
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 10px; min-height: 50px; resize: none; font-size: 14px; outline: none; background: #f5f6f7; }
        .post-img-res { width: 100%; border-radius: 8px; margin: 10px 0; display: block; border: 1px solid #eee; }
        
        .post-actions { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; }
        .btn-act { background: none; border: none; color: #65676b; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-act i { color: #1a73e8; font-size: 16px; }
        
        /* ANÚNCIOS NO FEED */
        .ad-feed { background: #e8f0fe; border: 1px solid #1a73e8; padding: 15px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-size: 13px; color: #1967d2; }

        /* COMENTÁRIOS */
        .comm-box { background: #f0f2f5; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .comm-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; outline: none; margin-top: 8px; }
        .comm-list { margin-bottom: 5px; }
        .comm-item { font-size: 12px; padding: 6px; background: #fff; border-radius: 5px; margin-bottom: 4px; border: 1px solid #eee; color: #333; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="blue-bar">APEX SOCIAL NETWORK</div>
        <div class="stats">
            <div><label>MEU SALDO</label><b id="stEUR">0.0000€</b></div>
            <div><label>DÍVIDA REDE</label><b id="stDebt" style="color:#d93025;">0.0000€</b></div>
        </div>
        <div class="top-ad">📢 ANÚNCIO: Adere ao Apex Pro e duplica os teus ganhos!</div>
    </header>

    <main class="container">
        <div class="card">
            <textarea id="postTxt" placeholder="O que vais partilhar?"></textarea>
            <div id="preDiv" style="display:none; margin-top:10px;"><img id="imgPre" style="width:100%; border-radius:8px;"></div>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
