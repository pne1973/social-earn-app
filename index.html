<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v76 - Official Master Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; -webkit-tap-highlight-color: transparent; }
        .google-blue { color: #4285F4; }
        .google-bg-blue { background-color: #4285F4; }
        .nav-active { color: #4285F4 !important; border-top: 3px solid #4285F4; font-weight: 900; }
        .card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        #loader { display: none; position: fixed; inset: 0; background: white; z-index: 10000; align-items: center; justify-content: center; font-weight: 900; color: #4285F4; }
        
        /* Adsterra Placeholders */
        .ad-banner-top { background: #fffde7; border-bottom: 1px solid #fff59d; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fbc02d; font-weight: 900; text-transform: uppercase; }
        .ad-native-feed { background: #fafafa; border: 1px solid #eee; border-radius: 8px; margin: 15px 0; padding: 12px; }
    </style>
</head>
<body class="pb-24">

    <div id="loader">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-blue-500 mb-2"></div>
            <p class="text-[10px] uppercase tracking-widest">Processing...</p>
        </div>
    </div>

    <div class="ad-banner-top">
        ADSTERRA: FIXED BANNER 728X90 (AUTOMATIC INJECTION)
    </div>

    <header class="sticky top-0 bg-white border-b z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black google-blue tracking-tighter uppercase leading-none">Apex Social</h1>
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Google Edition Style</p>
        </div>
        <div class="text-right">
            <span id="main-balance" class="font-black text-green-700 text-lg leading-none">0,0000€</span>
            <p id="sub-balance" class="text-[9px] font-black text-gray-400 uppercase leading-none mt-1">0,0000 BRL</p>
        </div>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto min-h-screen space-y-4"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-lg">
        <button onclick="switchTab('feed')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-feed"><span class="text-[10px] font-black uppercase">Feed</span></button>
        <button onclick="switchTab('wallet')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-wallet"><span class="text-[10px] font-black uppercase">Economy</span></button>
        <button onclick="switchTab('ranking')" class="flex flex-col items-center p-2 text-gray-400 nav-btn" id="btn-ranking"><span class="text-[10px] font-black uppercase">Social</span></button>
        <button onclick="switchTab('admin')" class="flex flex-col items-center p-2 text-red-300 nav-btn" id="btn-admin" style="display:none;"><span class="text-[10px] font-black uppercase">Admin</span></button>
    </nav>

    <script>
        // CONFIGURAÇÃO DIRETA
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "COLA_AQUI_A_TUA_KEY_DO_SUPABASE"; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const USER_ID = "5401881400";
        
        let state = { saldo_eur: 0, total_users: 1, total_posts: 0 };
        const CONVERSION_RATE = 6.12; // Exemplo EUR/BRL

        async function init() {
            showLoader(true);
            try {
                let { data } = await supabaseClient.from('perfis').select('*').eq('id', USER_ID).single();
                if (data) state = data;
                else await supabaseClient.from('perfis').insert([{ id: USER_ID }]);
            } catch (e) {}
            if (USER_ID === "5401881400") document.getElementById('btn-admin').style.display = 'flex';
            showLoader(false);
            switchTab('feed');
        }

        // GAMIFICATION: Points System
        async function doAction(type) {
            showLoader(true);
            let reward = 0;
            if (type === 'post') reward = 0.0015; // Simulação de valor baseado em pontos
            if (type === 'like') reward = 0.0002;
            
            state.saldo_eur = parseFloat(state.saldo_eur) + reward;
            state.total_posts++;

            setTimeout(async () => {
                updateUI();
                await supabaseClient.from('perfis').update(state).eq('id', USER_ID);
                showLoader(false);
            }, 500);
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(`btn-${tab}`).classList.add('nav-active');
            render(tab);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = parseFloat(state.saldo_eur).toFixed(4) + '€';
            document.getElementById('sub-balance').innerText = (state.saldo_eur * CONVERSION_RATE).toFixed(4) + ' BRL';
        }

        function render(tab) {
            const container = document.getElementById('app-content');
            updateUI();
            
            if (tab === 'feed') {
                container.innerHTML = `
                    <div class="card p-4">
                        <div class="flex items-center space-x-2 mb-3">
                            <div class="w-8 h-8 rounded-full google-bg-blue"></div>
                            <p class="text-xs font-black uppercase text-gray-700">Official Post</p>
                        </div>
                        <p class="text-sm text-gray-600 mb-6 font-medium leading-relaxed italic">"Welcome to Apex Social. Start interacting to increase your daily earnings."</p>
                        <div class="flex space-x-2">
                            <button onclick="doAction('post')" class="flex-1 google-bg-blue text-white py-3 rounded text-[10px] font-black uppercase shadow-md">Post Interaction (+15)</button>
                            <button onclick="doAction('like')" class="bg-gray-100 text-gray-700 py-3 px-6 rounded text-[10px] font-black uppercase border">Like (+2)</button>
                        </div>
                    </div>

                    <div class="ad-native-feed">
                        <p class="text-[8px] font-black text-gray-300 uppercase mb-2">Adsterra Native Ad</p>
                        <div class="flex space-x-3 items-center">
                            <div class="w-12 h-12 bg-gray-100 rounded"></div>
                            <div class="flex-1 h-3 bg-gray-100 rounded w-full"></div>
                        </div>
                    </div>
                `;
            } else if (tab === 'wallet') {
                container.innerHTML = `
                    <div class="card p-6 border-b-4 border-blue-500">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-6 tracking-widest">Explanatory Earnings Table</p>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center border-b pb-2">
                                <span class="text-xs font-bold text-gray-600 uppercase">Post Action</span>
                                <span class="text-xs font-black google-blue">+0.0015€</span>
                            </div>
                            <div class="flex justify-between items-center border-b pb-2">
                                <span class="text-xs font-bold text-gray-600 uppercase">Friend Referral</span>
                                <span class="text-xs font-black google-blue">+0.0500€</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-gray-600 uppercase">Daily Check-in</span>
                                <span class="text-xs font-black google-blue">+0.0005€</span>
                            </div>
                        </div>
                        <button class="w-full mt-8 bg-gray-800 text-white py-4 rounded font-black text-[10px] uppercase opacity-50 shadow-lg">Min. Withdrawal: 5000 Pts (5.00€)</button>
                    </div>
                `;
            } else if (tab === 'ranking') {
                container.innerHTML = `
                    <div class="card p-5">
                        <h3 class="font-black text-xs uppercase google-blue mb-4 tracking-widest border-b pb-2">Top 10 Ranking</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center bg-blue-50 p-2 rounded border border-blue-100">
                                <span class="text-xs font-black text-blue-600">1. YOU (#${USER_ID})</span>
                                <span class="text-xs font-black">${state.saldo_eur.toFixed(4)}€</span>
                            </div>
                        </div>
                    </div>
                    <div class="card p-5 border-dashed border-2 border-blue-200">
                        <p class="text-[9px] font-black text-blue-500 uppercase mb-2">Your Unique Invitation Link</p>
                        <input readonly value="https://apex-social.onrender.com/?ref=${USER_ID}" class="w-full bg-gray-50 p-2 rounded text-[9px] font-mono text-gray-500 border">
                    </div>
                `;
            } else if (tab === 'admin') {
                container.innerHTML = `
                    <div class="card p-6 border-2 border-red-500 bg-red-50">
                        <h2 class="text-red-600 font-black text-xs uppercase mb-6 text-center tracking-widest italic underline">Admin Panel</h2>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-white p-4 rounded shadow-sm text-center">
                                <p class="text-[8px] font-black text-gray-400 uppercase">Total Users</p>
                                <p class="text-xl font-black text-red-600">${state.total_users}</p>
                            </div>
                            <div class="bg-white p-4 rounded shadow-sm text-center">
                                <p class="text-[8px] font-black text-gray-400 uppercase">PayPal List</p>
                                <button class="mt-2 bg-red-500 text-white text-[8px] font-black px-3 py-1 rounded uppercase shadow-md">Pay Now</button>
                            </div>
                        </div>
                        <div class="bg-white p-4 rounded shadow-sm">
                            <p class="text-[8px] font-black text-gray-400 uppercase mb-2 text-center">Delete Post by ID</p>
                            <div class="flex space-x-2">
                                <input id="del-id" placeholder="Post ID" class="flex-1 border text-[9px] p-2 rounded">
                                <button onclick="alert('Deleted')" class="bg-red-600 text-white px-4 rounded text-[9px] font-black uppercase">Del</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        window.onload = init;
    </script>
</body>
</html>
