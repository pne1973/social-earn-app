<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pine Social Master Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background-color: #121212; height: 100%; }
        body { 
            background-color: #121212; color: #fff; 
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh; padding-top: 170px; /* Ajuste para header fixo */
        }

        /* HEADER & ADS FIXOS NO TOPO */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
        .ad-top { background: linear-gradient(90deg, #1a1a1a, #252525); color: #ffcc00; padding: 10px; text-align: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #333; }
        .nav-main { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .xp-badge { background: #ffcc00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        /* TABS SUPERIORES */
        .tabs { display: flex; background: #1a1a1a; border-top: 1px solid #333; }
        .tab-item { flex: 1; padding: 14px; text-align: center; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-item.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; }

        /* CONTEÚDO */
        .content { padding: 15px; max-width: 550px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* CARDS E PUBLICAÇÃO */
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .input-area { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; resize: none; min-height: 80px; font-size: 15px; margin-bottom: 10px; outline: none; }
        .btn-pub { background: #ffcc00; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* POSTS - ESTRUTURA BLINDADA (Correção para foto não diminuir campo) */
        .post { background: #1e1e1e; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; width: 100%; }
        
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; background: #1a1a1a; border-bottom: 1px solid #252525; }
        .post-avatar { width: 35px; height: 35px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffcc00; font-weight: bold; font-size: 13px; flex-shrink: 0; }
        
        /* BLOQUEIO DE TEXTO: word-wrap impede que o texto empurre a borda */
        .post-body { padding: 15px; font-size: 15px; line-height: 1.5; color: #eee; word-wrap: break-word; flex-grow: 1; }
        
        /* BLOQUEIO DE IMAGEM: max-height impede que a foto domine o card */
        .post-img-container { width: 100%; background: #000; border-top: 1px solid #252525; border-bottom: 1px solid #252525; line-height: 0; }
        .post-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; display: block; }

        /* AÇÕES */
        .post-actions { display: flex; padding: 10px 15px; gap: 20px; background: #1a1a1a; }
        .action-btn { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .action-btn.liked { color: #ffcc00; }

        /* ADMIN ONLY */
        .admin-link { display: none; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="ad-top">✨ Patrocínio: Ganha 500 XP extra ao convidar 5 amigos!</div>
        <div class="nav-main">
            <h3 style="letter-spacing:1px;">PINE <span style="color:#ffcc00">SOCIAL</span></h3>
            <div id="userXP" class="xp-badge">0 XP</div>
        </div>
        <div class="tabs">
            <div class="tab-item active" onclick="openTab('feed-page', this)">Feed</div>
            <div class="tab-item" onclick="openTab('earn-page', this)">Ganhos</div>
            <div class="tab-item" onclick="openTab('wallet-page', this)">Saque</div>
            <div id="adm-tab" class="tab-item admin-link" onclick="openTab('admin-page', this)">Admin</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div class="card">
                <textarea id="postText" class="input-area" placeholder="O que tens em mente?"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:#888; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                    <button class="btn-pub" id="pubBtn" onclick="publish()">Publicar</button>
                </div>
            </div>
            <div id="feed-items">Carregando publicações organizadas...</div>
        </div>

        <div id="earn-page" class="page">
            <div class="card"><h2>Tabela de XP</h2><p>Interagir rende XP convertível!</p></div>
        </div>

        <div id="wallet-page" class="page">
            <div class="card" style="text-align:center;">
                <p>Saldo Atual (4 decimais)</p>
                <h1 style="color:#ffcc00; font-size:40px; margin:15px 0;"><span id="euroVal">0.0000</span>€</h1>
            </div>
        </div>

        <div id="admin-page" class="page">
            <div class="card" style="border:1px solid #ff4444">
                <h3 style="color:#ff4444">Painel Admin</h3>
                <div id="stats">Estatísticas...</div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QQ";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const myId = 5401881400; // ID Admin

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'feed-page') fetchFeed();
            window.scrollTo(0,0);
        }

        async function fetchFeed() {
            const { data } = await client.from('posts').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('feed-items');
            list.innerHTML = '';
            
            if(data) {
                data.forEach((p, index) => {
                    // Ad a cada 3 posts
                    if (index > 0 && index % 3 === 0) {
                        list.innerHTML += `<div class="post ad-post" style="padding:20px; text-align:center; background:#1a1a1a; border:1px dashed #ffcc00;"><small style="color:#ffcc00">ANÚNCIO</small><br><b>🚀 Plano VIP: Ganhe o dobro do XP!</b></div>`;
                    }

                    const el = document.createElement('div');
                    el.className = 'post';
                    el.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">${p.user_id.toString().slice(-1)}</div>
                            <div>
                                <div style="font-weight:bold; font-size:13px;">User #${p.user_id.toString().slice(-4)}</div>
                                <div style="font-size:10px; color:#888;">${new Date(p.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="post-body">${p.content || ''}</div>
                        
                        ${p.image_url ? `
                        <div class="post-img-container">
                            <img src="${p.image_url}" class="post-img" loading="lazy">
                        </div>` : ''}
                        
                        <div class="post-actions">
                            <button class="action-btn" onclick="likePost('${p.id}', this)"><i class="fas fa-heart"></i> <span class="count">${p.likes || 0}</span></button>
                            <button class="action-btn"><i class="fas fa-comment"></i> Comentar</button>
                            <button class="action-btn" onclick="share()"><i class="fas fa-share-alt"></i></button>
                        </div>
                    `;
                    list.appendChild(el);
                });
            }
        }

        async function likePost(id, btn) {
            const countEl = btn.querySelector('.count');
            countEl.innerText = parseInt(countEl.innerText) + 1;
            btn.classList.add('liked');
            await client.rpc('increment_likes', { post_id: id });
            await client.rpc('increment_points', { user_id: myId, amount: 2 });
            getProfile();
        }

        function share() { if (navigator.share) navigator.share({ title: 'Pine Social', url: window.location.href }); }

        async function publish() {
            const txt = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            if(!txt && !file) return;
            
            let img = null;
            if(file) {
                const name = `${Date.now()}.jpg`;
                const { data } = await client.storage.from('post-images').upload(name, file);
                img = client.storage.from('post-images').getPublicUrl(name).data.publicUrl;
            }

            await client.from('posts').insert([{ user_id: myId, content: txt, image_url: img }]);
            await client.rpc('increment_points', { user_id: myId, amount: 15 });
            document.getElementById('postText').value = '';
            fetchFeed(); getProfile();
        }

        async function getProfile() {
            const { data } = await client.from('profiles').select('points').eq('id', myId).single();
            if (data) {
                document.getElementById('userXP').innerText = data.points + " XP";
                document.getElementById('euroVal').innerText = (data.points * 0.0010).toFixed(4);
            }
            if(myId === 5401881400) document.getElementById('adm-tab').style.display = 'block';
        }

        getProfile(); fetchFeed();
    </script>
</body>
</html>
