<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.9 - Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --g-yellow: #FBBC05; --g-gray: #5f6368; }
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; color: #202124; margin: 0; padding-top: 140px; padding-bottom: 80px; }
        
        /* HEADER & STATUS */
        .master-header { position: fixed; top: 0; left: 0; right: 0; background: white; z-index: 1000; border-bottom: 1px solid #dadce0; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .status-bar { background: #fff; border-bottom: 1px solid #dadce0; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        
        /* GOOGLE STYLE COMPONENTS */
        .g-card { background: white; border: 1px solid #dadce0; border-radius: 8px; margin: 0 12px 12px; overflow: hidden; }
        .g-btn-primary { background: var(--g-blue); color: white; border-radius: 4px; font-weight: 500; padding: 10px 24px; font-size: 14px; }
        
        /* ADS */
        .ad-slot { background: #f1f3f4; border: 1px dashed #dadce0; margin: 0 12px 12px; padding: 12px; text-align: center; border-radius: 8px; }
        .ad-tag { font-size: 9px; color: var(--g-gray); font-weight: 900; text-transform: uppercase; margin-bottom: 4px; display: block; }

        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #dadce0; display: flex; height: 64px; z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--g-gray); text-transform: uppercase; }
        .nav-link.active { color: var(--g-blue); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="master-header">
        <div class="top-bar">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[var(--g-blue)] rounded flex items-center justify-center text-white font-black italic">S</div>
                <span class="font-bold text-lg tracking-tight">Social Earn</span>
            </div>
            <div class="text-right">
                <div id="val-eur" class="text-[var(--g-green)] font-black text-xl leading-none">0.0000€</div>
                <div id="val-brl" class="text-[var(--g-gray)] text-[10px] font-bold">0.0000 BRL</div>
            </div>
        </div>
        <div class="status-bar">
            <span class="text-[var(--g-green)]">● Ganhos Ativos 100%</span>
            <button onclick="logout()" class="text-[var(--g-gray)]">Sair</button>
        </div>
    </div>

    <div id="tab-feed" class="tab-content active">
        <div class="ad-slot">
            <span class="ad-tag">Sponsored</span>
            <p class="text-xs font-medium">Ganhe 10€ ao aderir ao Revolut</p>
        </div>
        <div class="g-card p-4">
            <textarea id="post-text" placeholder="Partilhe algo agora..." class="w-full border-none focus:ring-0 text-sm outline-none resize-none" rows="2"></textarea>
            <div class="flex justify-end mt-2">
                <button onclick="createPost()" class="g-btn-primary text-xs">Publicar</button>
            </div>
        </div>
        <div id="feed-container"></div>
    </div>

    <div id="tab-wallet" class="tab-content">
        <div class="g-card p-6 text-center">
            <span class="text-xs font-bold text-[var(--g-gray)] uppercase">Saldo Disponível</span>
            <div class="text-4xl font-black my-2" id="wallet-eur">0.0000€</div>
            
            <div id="withdraw-box" class="mt-6 border-t pt-6 hidden">
                <input id="pp-email" type="email" placeholder="E-mail PayPal" class="w-full border rounded p-3 mb-3 text-sm">
                <button onclick="sendWithdraw()" class="w-full g-btn-primary">Solicitar Levantamento</button>
            </div>
            
            <div id="min-warning" class="text-[10px] font-bold text-[var(--g-gray)] mt-4">
                Mínimo para levantamento: 5.0000€
            </div>
        </div>
    </div>

    <div id="tab-admin" class="tab-content">
        <div class="g-card p-4 bg-slate-50">
            <h3 class="font-bold text-sm mb-4">Painel Administrativo</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-white p-3 border rounded">
                    <div class="text-[9px] uppercase font-bold text-gray-500">Utilizadores</div>
                    <div id="adm-users" class="text-xl font-black">0</div>
                </div>
                <div class="bg-white p-3 border rounded">
                    <div class="text-[9px] uppercase font-bold text-gray-500">Posts Totais</div>
                    <div id="adm-posts" class="text-xl font-black">0</div>
                </div>
            </div>
            <div class="bg-white border rounded p-4 mb-4 text-center">
                <div class="text-[10px] uppercase font-bold text-gray-500 mb-1">Dívida Total (Saques)</div>
                <div id="adm-debt" class="text-2xl font-black text-[var(--g-red)]">0.0000€</div>
            </div>
            <div class="bg-white border rounded overflow-hidden">
                <table class="w-full text-[11px]">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-2 text-left">ID</th><th class="p-2 text-center">Saldo</th><th class="p-2 text-right">Ação</th></tr>
                    </thead>
                    <tbody id="adm-user-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" onclick="switchTab('feed')" class="nav-link active">Feed</a>
        <a href="#" onclick="switchTab('wallet')" class="nav-link">Carteira</a>
        <a id="admin-nav" href="#" onclick="switchTab('admin')" class="nav-link hidden">Admin</a>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";
        
        let userId = localStorage.getItem('apex_uid') || prompt("ID de Utilizador:");
        if(userId) localStorage.setItem('apex_uid', userId);

        async function init() {
            if(userId === ADMIN_ID) document.getElementById('admin-nav').classList.remove('hidden');
            loadData();
            loadFeed();
        }

        async function loadData() {
            const { data } = await sb.from('perfis').select('*').eq('id', userId).single();
            const saldo = data ? data.saldo : 0;
            
            document.getElementById('val-eur').innerText = saldo.toFixed(4) + "€";
            document.getElementById('wallet-eur').innerText = saldo.toFixed(4) + "€";
            document.getElementById('val-brl').innerText = (saldo * 6.1245).toFixed(4) + " BRL";

            if(saldo >= 5.0) {
                document.getElementById('withdraw-box').classList.remove('hidden');
                document.getElementById('min-warning').classList.add('hidden');
            }
            if(userId === ADMIN_ID) loadAdminData();
        }

        async function loadAdminData() {
            const { data: users } = await sb.from('perfis').select('*');
            const { count: posts } = await sb.from('posts').select('*', { count: 'exact', head: true });
            
            document.getElementById('adm-users').innerText = users.length;
            document.getElementById('adm-posts').innerText = posts;
            
            const debt = users.reduce((acc, u) => acc + u.saldo, 0);
            document.getElementById('adm-debt').innerText = debt.toFixed(4) + "€";

            document.getElementById('adm-user-list').innerHTML = users.map(u => `
                <tr class="border-b">
                    <td class="p-2">${u.id}</td>
                    <td class="p-2 text-center text-[var(--g-green)] font-bold">${u.saldo.toFixed(4)}€</td>
                    <td class="p-2 text-right"><button class="text-[var(--g-red)] font-bold">BAN</button></td>
                </tr>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function logout() { localStorage.removeItem('apex_uid'); location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
