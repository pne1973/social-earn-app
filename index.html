<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pine Social Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; --bg: #F1F3F4; --border: #dadce0; }
        * { box-sizing: border-box; font-family: 'Google Sans', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); margin: 0; padding: 110px 0 85px; color: #202124; }

        /* HEADER & ADS FIXOS */
        .top-container { position: fixed; top: 0; width: 100%; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ad-top { background: #FFF9E6; color: #856404; text-align: center; padding: 8px; font-size: 11px; font-weight: bold; border-bottom: 1px solid var(--g-yellow); }
        .header { background: #fff; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        
        .logo { font-size: 20px; font-weight: bold; }
        .logo span:nth-child(1) { color: var(--g-blue); } .logo span:nth-child(2) { color: var(--g-red); } .logo span:nth-child(3) { color: var(--g-yellow); } .logo span:nth-child(4) { color: var(--g-blue); } .logo span:nth-child(5) { color: var(--g-green); }
        .xp-badge { background: var(--g-blue); color: #fff; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        /* NAVEGAÇÃO */
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); display: flex; height: 75px; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; color: #5f6368; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--g-blue); font-weight: bold; }

        /* CONTEÚDO */
        .tab-content { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 15px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        /* CARDS */
        .card { background: #fff; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; }
        .publish-card { padding: 15px; }
        textarea { width: 100%; border: none; outline: none; font-size: 16px; resize: none; min-height: 50px; color: #3c4043; }
        
        .post-header { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f8f9fa; }
        .u-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; background: #e8f0fe; color: var(--g-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        
        .post-img { width: 100%; max-height: 400px; object-fit: cover; border-top: 1px solid #f1f3f4; }
        .post-body { padding: 15px; font-size: 15px; line-height: 1.4; }

        .post-actions { padding: 8px 15px; border-top: 1px solid #f8f9fa; display: flex; gap: 20px; }
        .act-btn { background: none; border: none; color: #5f6368; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        /* ADMIN */
        .admin-box { background: #fff; border-radius: 16px; padding: 20px; border: 1px solid var(--g-red); }
        .btn-del { color: var(--g-red); border: 1px solid var(--g-red); padding: 4px 8px; border-radius: 6px; font-size: 10px; background: none; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-container">
        <div class="ad-top"><i class="fas fa-bullhorn"></i> GANHA XP: Convida 5 amigos e recebe 500 XP!</div>
        <div class="header">
            <div class="logo"><span>P</span><span>i</span><span>n</span><span>e</span> <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span></div>
            <div id="userXP" class="xp-badge">0 XP</div>
        </div>
    </div>

    <section id="tab-feed" class="tab-content active">
        <div class="card publish-card">
            <textarea id="postText" placeholder="O que tens em mente?"></textarea>
            <div id="prev-area" style="display:none; margin-bottom:10px;"><img id="img-render" style="width:100%; border-radius:10px;"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; border-top: 1px solid #f1f3f4; padding-top:12px;">
                <button onclick="document.getElementById('fileIn').click()" style="background:none; border:none; color:var(--g-green); font-weight:bold; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                <input type="file" id="fileIn" hidden accept="image/*" onchange="preview(this)">
                <button onclick="publish()" id="pubBtn" style="background:var(--g-blue); color:#fff; border:none; padding:8px 22px; border-radius:20px; font-weight:bold;">Publicar</button>
            </div>
        </div>
        <div id="feed-list">A carregar posts...</div>
    </section>

    <section id="tab-admin" class="tab-content">
        <div class="admin-box">
            <h3 style="color:var(--g-red)">🛠 Painel Admin</h3>
            <div id="adm-stats">Utilizadores: -- | Posts: --</div>
            <hr>
            <h4>Levantamentos PayPal</h4>
            <div id="pay-list">Nenhum pedido pendente.</div>
        </div>
    </section>

    <section id="tab-saque" class="tab-content">
        <div class="card" style="padding:30px; text-align:center;">
            <p>O teu saldo</p>
            <h1 id="cash-val" style="color:var(--g-green); font-size:40px;">0.0000€</h1>
            <button style="width:100%; padding:15px; background:var(--g-blue); color:#fff; border:none; border-radius:30px; font-weight:bold;">Levantar via PayPal</button>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" onclick="showTab('tab-feed', this)"><i class="fas fa-home"></i>Feed</div>
        <div class="nav-item" onclick="showTab('tab-saque', this)"><i class="fas fa-wallet"></i>Saque</div>
        <div id="adm-nav" class="nav-item" onclick="showTab('tab-admin', this)"><i class="fas fa-user-shield"></i>Admin</div>
    </nav>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const myId = 5401881400;
        let imgFile = null;

        async function init() {
            if(myId !== 5401881400) document.getElementById('adm-nav').style.display = 'none';
            loadProfile();
            loadFeed();
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'tab-admin') loadAdmin();
        }

        async function loadFeed() {
            const list = document.getElementById('feed-list');
            const { data } = await supabase.from('posts').select('*').order('created_at', {ascending:false});
            list.innerHTML = '';
            
            data?.forEach((p, i) => {
                if(i > 0 && i % 3 === 0) {
                    list.innerHTML += `<div style="background:#FFF9E6; border:1px dashed var(--g-yellow); padding:12px; border-radius:12px; margin-bottom:16px; text-align:center; font-size:12px;"><b>ADS:</b> Ganha 2€ por cada inquérito respondido!</div>`;
                }
                
                list.innerHTML += `
                <div class="card">
                    <div class="post-header">
                        <div class="u-info"><div class="avatar">U</div><b>User #${p.user_id.toString().slice(-4)}</b></div>
                        ${myId === 5401881400 ? `<button class="btn-del" onclick="delPost(${p.id})">Apagar</button>` : ''}
                    </div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div class="post-body">${p.content}</div>
                    <div class="post-actions">
                        <button class="act-btn" onclick="addXP(this, 2)"><i class="far fa-heart"></i> Like</button>
                        <button class="act-btn" onclick="addXP(this, 5)"><i class="far fa-comment"></i> Comentar</button>
                    </div>
                </div>`;
            });
        }

        async function addXP(btn, pts) {
            btn.style.color = pts === 2 ? 'var(--g-red)' : 'var(--g-blue)';
            btn.innerHTML = `<i class="fas fa-check"></i> +${pts} XP`;
            await supabase.rpc('increment_points', { user_id: myId, amount: pts });
            loadProfile();
        }

        function preview(input) {
            if(input.files[0]) {
                imgFile = input.files[0];
                document.getElementById('img-render').src = URL.createObjectURL(imgFile);
                document.getElementById('prev-area').style.display = 'block';
            }
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            if(!txt && !imgFile) return;
            const btn = document.getElementById('pubBtn'); btn.disabled = true;

            let url = null;
            if(imgFile) {
                const name = `p_${Date.now()}.jpg`;
                const { data } = await supabase.storage.from('post-images').upload(name, imgFile);
                if(data) url = `${SUPABASE_URL}/storage/v1/object/public/post-images/${name}`;
            }

            await supabase.from('posts').insert([{ user_id: myId, content: txt, image_url: url }]);
            await supabase.rpc('increment_points', { user_id: myId, amount: 15 });
            location.reload();
        }

        async function loadProfile() {
            const { data } = await supabase.from('profiles').select('points').eq('id', myId).single();
            if(data) {
                document.getElementById('userXP').innerText = data.points + " XP";
                document.getElementById('cash-val').innerText = (data.points * 0.001).toFixed(4) + "€";
            }
        }

        async function delPost(id) {
            if(confirm("Apagar post?")) {
                await supabase.from('posts').delete().eq('id', id);
                loadFeed();
            }
        }

        init();
    </script>
</body>
</html>
