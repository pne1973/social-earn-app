<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social - Master Excelente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* DESIGN APEX EXCELENTE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: #fff; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-top: 160px; padding-bottom: 20px;
        }

        /* HEADER & ICONS NAV */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #000; border-bottom: 1px solid #111; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 18px; font-weight: 900; letter-spacing: -1px; }
        
        .nav-icons { display: flex; justify-content: space-around; padding-bottom: 10px; }
        .icon-tab { color: #444; font-size: 20px; padding: 10px; cursor: pointer; transition: 0.3s; border-bottom: 2px solid transparent; }
        .icon-tab.active { color: #ffcc00; border-bottom-color: #ffcc00; }

        /* BARRA DE GANHOS (DEGRADÊ AMARELO) */
        .gain-bar { 
            background: linear-gradient(90deg, #ffcc00, #ff9900); 
            margin: 0 15px 15px; border-radius: 12px; padding: 12px;
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            text-align: center; color: #000; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
        }
        .gain-item { display: flex; flex-direction: column; }
        .gain-label { font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.7; }
        .gain-val { font-size: 13px; font-weight: 900; }

        /* CONTENT LAYOUT */
        .container { padding: 0 15px; max-width: 500px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        /* POSTS */
        .card-post { background: #0a0a0a; border: 1px solid #111; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; border: 1px solid #ffcc00; color: #ffcc00; font-weight: bold; }
        
        /* ADMIN & LISTS */
        .admin-user-card { background: #0f0f0f; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .btn-pay { background: #ffcc00; color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 800; font-size: 11px; cursor: pointer; }

        .btn-gold { background: #ffcc00; color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="nav-top">
            <div class="logo">APEX <span style="color:#ffcc00">SOCIAL</span></div>
            <div style="font-size:10px; color:#666;">ID: 5401881400</div>
        </div>

        <nav class="nav-icons">
            <div class="icon-tab active" onclick="nav('feed', this)"><i class="fas fa-home"></i></div>
            <div class="icon-tab" onclick="nav('rank', this)"><i class="fas fa-trophy"></i></div>
            <div class="icon-tab" onclick="nav('wallet', this)"><i class="fas fa-wallet"></i></div>
            <div class="icon-tab" onclick="nav('info', this)"><i class="fas fa-info-circle"></i></div>
            <div id="admIcon" class="icon-tab" style="display:none; color:#ff4444;" onclick="nav('admin', this)"><i class="fas fa-user-shield"></i></div>
        </nav>

        <div class="gain-bar">
            <div class="gain-item"><span class="gain-label">Saldo</span><span id="vTotal" class="gain-val">0.0000€</span></div>
            <div class="gain-item"><span class="gain-label">Amigos</span><span id="vAmigos" class="gain-val">0</span></div>
            <div class="gain-item"><span class="gain-label">Rede</span><span id="vRede" class="gain-val">0.0000€</span></div>
        </div>
    </header>

    <main class="container">
        <div id="p-feed" class="page active">
            <div class="card-post">
                <textarea id="postTxt" style="width:100%; background:transparent; border:none; color:#fff; outline:none; font-size:16px; resize:none;" placeholder="No que estás a pensar?"></textarea>
                <button class="btn-gold" style="width:auto; padding: 8px 20px; float:right; margin-top:5px;" onclick="publish()">Publicar</button>
                <div style="clear:both;"></div>
            </div>
            <div id="feedArea">A carregar...</div>
        </div>

        <div id="p-rank" class="page"><div class="card-post"><h4>Top 10 Ganhadores</h4><div id="rankList" style="margin-top:15px;"></div></div></div>

        <div id="p-wallet" class="page">
            <div class="card-post" style="text-align:center;">
                <span style="font-size:10px; color:#666;">DISPONÍVEL PARA SAQUE</span>
                <h1 id="xpBig" style="font-size:40px; color:#ffcc00; margin:5px 0;">0 XP</h1>
                <p id="brlBig" style="font-size:12px; color:#444;">R$ 0.0000</p>
            </div>
            <button class="btn-gold" onclick="copyLink()">Copiar Link de Convite</button>
        </div>

        <div id="p-info" class="page">
            <div class="card-post">
                <h3 style="color:#ffcc00; margin-bottom:15px;">Regras Apex</h3>
                <p style="font-size:13px; line-height:1.8; color:#888;">
                    • <b>Postagem:</b> +15 XP (até 5 posts/dia)<br>
                    • <b>Like:</b> +2 XP por interação<br>
                    • <b>Amigos:</b> +100 XP por indicação<br>
                    • <b>Rede:</b> 10% de comissão vitalícia
                </p>
            </div>
        </div>

        <div id="p-admin" class="page">
            <h4 style="margin-bottom:15px; color:#ff4444;">Gestão de Pagamentos</h4>
            <div id="userList"></div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const myId = 5401881400;

        function nav(name, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.icon-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`p-${name}`).classList.add('active');
            el.classList.add('active');
            if(name === 'admin') loadUsersAdmin();
        }

        async function init() {
            const { data: u } = await client.from('profiles').select('*').eq('id', myId).single();
            if(u) {
                const total = (u.points || 0) + (u.referral_points || 0);
                document.getElementById('vTotal').innerText = (total * 0.001).toFixed(4) + "€";
                document.getElementById('vAmigos').innerText = u.friends_count || 0;
                document.getElementById('vRede').innerText = (u.referral_points * 0.001).toFixed(4) + "€";
                document.getElementById('xpBig').innerText = total + " XP";
                document.getElementById('brlBig').innerText = "R$ " + (total * 0.0062).toFixed(4);
                if(myId === 5401881400) document.getElementById('admIcon').style.display = 'block';
            }
            loadFeed();
        }

        async function loadFeed() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', {ascending: false});
            const area = document.getElementById('feedArea');
            area.innerHTML = '';
            posts.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card-post';
                div.innerHTML = `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;"><div class="avatar">${p.user_id.toString().slice(-1)}</div><span style="font-size:12px; color:#555;">User...${p.user_id.toString().slice(-4)}</span></div><div>${p.content}</div>`;
                area.appendChild(div);
            });
        }

        async function loadUsersAdmin() {
            const { data: users } = await client.from('profiles').select('*');
            const list = document.getElementById('userList');
            list.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'admin-user-card';
                div.innerHTML = `<div><div style="font-size:12px;">ID: ${u.id}</div><div style="color:#ffcc00; font-weight:bold;">${(u.points * 0.001).toFixed(2)}€</div></div><button class="btn-pay" onclick="alert('Pagar para: ${u.paypal_email || 'Não definido'}')">PAGAR</button>`;
                list.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
