    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    async function processAuth() {
        const id = document.getElementById('auth-username').value;
        if (!id) return alert("Digite um ID");

        // 1. Tenta apenas ler o utilizador (Mapeado com as suas colunas do print)
        let { data: profile, error } = await _supabase
            .from('usuarios')
            .select('id, nome, saldo_eur')
            .eq('id', id)
            .maybeSingle(); // maybeSingle não dá erro se não encontrar

        if (error) {
            console.error(error);
            return alert("Erro de ligação ou RLS. Verifique o painel Supabase.");
        }

        // 2. Se o utilizador não existir, tenta criar (precisa de RLS Insert ativa)
        if (!profile) {
            const { data: newUser, error: createError } = await _supabase
                .from('usuarios')
                .insert([{ 
                    id: id, 
                    nome: 'User_' + id, 
                    saldo_eur: 0,
                    bonus_restante: 0,
                    is_turbo: false 
                }])
                .select()
                .single();
            
            if (createError) {
                console.error(createError);
                return alert("Erro ao criar perfil. Ative a política 'INSERT' no Supabase.");
            }
            profile = newUser;
        }

        currentUser = profile;
        document.getElementById('auth-modal').classList.add('hidden');
        document.getElementById('main-header').classList.remove('hidden');
        document.getElementById('main-content').classList.remove('hidden');
