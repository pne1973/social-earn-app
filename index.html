<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX C&C CENTER - ADMIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #fff; padding-bottom: 90px; }

        /* HEADER */
        header { 
            background: #000; padding: 15px; border-bottom: 2px solid #004400; 
            display: flex; justify-content: center; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-title { font-size: 14px; font-weight: 900; letter-spacing: 2px; color: #00ff00; }

        /* ABAS */
        .page { display: none; padding: 15px; width: 100%; max-width: 500px; margin: 0 auto; }
        .page.active { display: block; }

        /* FEED SEM ANÚNCIOS (VISUALIZAÇÃO ADMIN) */
        .post-card { background: #111; border: 1px solid #222; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .post-header { padding: 10px; font-size: 12px; color: #888; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .post-body { padding: 15px; font-size: 15px; line-height: 1.4; }
        .post-img { width: 100%; display: block; background: #1a1a1a; max-height: 400px; object-fit: cover; }
        .post-footer { padding: 10px; background: #0d0d0d; display: flex; gap: 15px; font-size: 13px; color: #00ff00; font-weight: bold; }

        /* STATS CARDS */
        .stat-card { background: #111; border: 1px solid #004400; padding: 20px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #00ff00; }
        .stat-val { font-size: 24px; font-weight: 900; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #00ff00; margin-bottom: 5px; }

        /* ADMIN TABLE */
        .table-wrap { overflow-x: auto; background: #111; border-radius: 8px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #002200; text-align: left; padding: 12px; color: #00ff00; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        .btn-ban { color: #ff3333; background: none; border: 1px solid #ff3333; padding: 5px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .btn-pay { color: #00ff00; background: none; border: 1px solid #00ff00; padding: 5px; border-radius: 4px; font-weight: bold; font-size: 10px; margin-right: 5px; }

        /* NAVBAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; height: 75px; display: flex; border-top: 2px solid #004400; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #444; font-size: 9px; font-weight: 900; }
        .nav-btn.active { color: #00ff00; background: rgba(0, 255, 0, 0.05); }
        .nav-icon { font-size: 18px; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>
    <div class="header-title">APEX SOCIAL :: COMMAND CENTER</div>
</header>

<section id="p-feed" class="page active">
    <div id="feed-list">Carregando feed de monitorização...</div>
</section>

<section id="p-stats" class="page">
    <div class="stat-card">
        <div class="stat-label">Utilizadores Ativos</div>
        <div id="count-users" class="stat-val">0</div>
    </div>
    <div class="stat-card">
        <div id="total-debt" class="stat-val">0.0000€</div>
        <div class="stat-label">Dívida Global (EUR)</div>
    </div>
    <div class="stat-card" style="border-left-color: #555;">
        <div id="count-posts" class="stat-val">0</div>
        <div class="stat-label">Posts Totais</div>
    </div>
</section>

<section id="p-admin" class="page">
    <h3 style="color:#ff3333; margin-bottom:15px; font-size:12px;">GESTOR DE CARTEIRAS</h3>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID_USER</th>
                    <th>SALDO (€)</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
        </table>
    </div>
</section>

<nav class="nav-bar">
    <a href="#" class="nav-btn active" onclick="nav('feed', this)"><span class="nav-icon">📱</span>FEED</a>
    <a href="#" class="nav-btn" onclick="nav('stats', this)"><span class="nav-icon">📊</span>STATS</a>
    <a href="#" class="nav-btn" onclick="nav('admin', this)"><span class="nav-icon">⚙️</span>ADMIN</a>
</nav>

<script>
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + page).classList.add('active');
        el.classList.add('active');

        if(page === 'feed') loadFeed();
        if(page === 'stats') loadStats();
        if(page === 'admin') loadAdmin();
    }

    async function loadFeed() {
        const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('feed-list');
        container.innerHTML = data.map(p => `
            <div class="post-card">
                <div class="post-header">
                    <span>UID: ${p.user_id}</span>
                    <span>${new Date(p.created_at).toLocaleDateString()}</span>
                </div>
                ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                <div class="post-body">${p.content || ''}</div>
                <div class="post-footer">
                    <span>👍 ${p.likes || 0}</span>
                    <span>💬 ${p.comments || 0}</span>
                    <span style="color:#ff3333; margin-left:auto" onclick="deletePost('${p.id}')">APAGAR</span>
                </div>
            </div>
        `).join('') || 'Sem posts para exibir.';
    }

    async function loadStats() {
        const { data: users } = await sb.from('perfis').select('saldo');
        const { count: postCount } = await sb.from('posts').select('*', { count: 'exact', head: true });
        let debt = users.reduce((acc, u) => acc + (u.saldo || 0), 0);
        document.getElementById('count-users').innerText = users.length;
        document.getElementById('count-posts').innerText = postCount;
        document.getElementById('total-debt').innerText = debt.toFixed(4) + "€";
    }

    async function loadAdmin() {
        const { data: users } = await sb.from('perfis').select('*').order('saldo', { ascending: false });
        const tbody = document.getElementById('admin-tbody');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td><b>${(u.saldo || 0).toFixed(4)}€</b></td>
                <td>
                    <button class="btn-pay" onclick="resetSaldo('${u.id}')">PAY</button>
                    <button class="btn-ban" onclick="banUser('${u.id}')">BAN</button>
                </td>
            </tr>
        `).join('');
    }

    async function deletePost(id) {
        if(confirm("Apagar esta publicação definitivamente?")) {
            await sb.from('posts').delete().eq('id', id);
            loadFeed();
        }
    }

    async function resetSaldo(id) {
        if(confirm("Zerar saldo do utilizador?")) {
            await sb.from('perfis').update({ saldo: 0 }).eq('id', id);
            loadAdmin();
        }
    }

    async function banUser(id) {
        if(confirm("Banir utilizador " + id + "?")) {
            await sb.from('perfis').delete().eq('id', id);
            loadAdmin();
        }
    }

    // Inicialização
    loadFeed();
</script>

</body>
</html>
