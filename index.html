<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v34.516 - Real Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; }
        .publisher-area { background: #f1f3f4; padding: 12px 16px; margin-top: 72px; }
        #feed-container { padding: 0 16px 100px 16px; }
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; position: relative; }
        .interaction-badge { position: absolute; top: 4px; right: 15%; background: var(--g-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; border: 2px solid white; min-width: 22px; text-align: center; }
        .comment-section { display: none; background: #f8f9fa; border-top: 1px solid #eee; }
        .comment-section.active { display: flex; flex-direction: column; }
        .post-img { width: 100%; max-height: 400px; object-fit: cover; background: #000; }
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 4000; display: none; animation: popUp 0.8s ease-out; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
    </style>
</head>
<body class="pb-24">

    <div id="floating-earning"><div class="text-4xl font-black text-green-600 shadow-white" id="earning-val">+0.0000€</div></div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black">A</div>
            <h1 class="text-sm font-black uppercase text-blue-600">Apex Social</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-base">0.0000€</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto">
        <section id="view-social">
            <div class="publisher-area">
                <div class="google-card p-4 border-t-8 border-blue-600 shadow-lg">
                    <textarea id="post-input" onclick="this.rows=3; document.getElementById('pub-actions').classList.remove('hidden')" placeholder="PARTILHAR ALGO... (+0.0150€)" class="w-full border-none focus:ring-0 text-xs mb-2 uppercase font-black" rows="1"></textarea>
                    <div id="pub-actions" class="hidden">
                        <input id="file-upload" type="file" accept="image/*" class="hidden" onchange="document.getElementById('lab').innerText='✅ FOTO OK'">
                        <label id="lab" for="file-upload" class="block p-3 bg-gray-50 border-2 border-dashed rounded-xl text-center text-[10px] mb-3">📸 ADICIONAR FOTO</label>
                        <button id="btn-pub" onclick="publish()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase">Publicar</button>
                    </div>
                </div>
            </div>
            <div id="feed-container" class="space-y-6"></div>
        </section>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let userSaldo = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) userSaldo = data.saldo;
            updateUI(); loadFeed();
        }

        async function publish() {
            const content = document.getElementById('post-input').value;
            const file = document.getElementById('file-upload').files[0];
            if(!content) return;

            let imgUrl = "";
            if(file) {
                const formData = new FormData();
                formData.append("image", file);
                const res = await fetch("https://api.imgbb.com/1/upload?key=90868f06f74304629e474585642d627c", { method: "POST", body: formData });
                const json = await res.json();
                imgUrl = json.data.url;
            }

            await sb.from('posts').insert([{ user_id: MASTER_ID, content, image_url: imgUrl, likes: 0, shares: 0 }]);
            userSaldo += 0.0150;
            await sb.from('perfis').update({ saldo: userSaldo }).eq('id', MASTER_ID);
            location.reload();
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            
            for(const p of posts) {
                // Contagem real de comentários da tabela comentarios
                const { count: cCount } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', p.id);
                
                const card = document.createElement('div');
                card.className = "google-card shadow-md";
                card.innerHTML = `
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div class="p-5">
                        <p class="text-xs font-black uppercase mb-4">${p.content}</p>
                        <div class="flex border-t pt-2">
                            <button onclick="interact('${p.id}', 'likes', 0.0006)" class="interaction-btn">
                                <div class="interaction-badge">${p.likes || 0}</div><span>👍</span>
                            </button>
                            <button onclick="toggleComments('${p.id}')" class="interaction-btn border-x border-gray-100">
                                <div class="interaction-badge">${cCount || 0}</div><span>💬</span>
                            </button>
                            <button onclick="interact('${p.id}', 'shares', 0.0020)" class="interaction-btn">
                                <div class="interaction-badge">${p.shares || 0}</div><span>🔗</span>
                            </button>
                        </div>
                    </div>
                    <div id="comments-${p.id}" class="comment-section p-4">
                        <div id="list-${p.id}" class="space-y-2 mb-3"></div>
                        <input id="in-${p.id}" type="text" placeholder="COMENTAR..." class="w-full p-2 text-[10px] border rounded-lg">
                        <button onclick="addComment('${p.id}')" class="w-full mt-2 bg-blue-600 text-white py-2 rounded-lg text-[9px]">ENVIAR</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        async function interact(postId, type, valor) {
            // 1. Vai buscar o valor atual
            const { data } = await sb.from('posts').select(type).eq('id', postId).single();
            const novoValor = (data[type] || 0) + 1;
            
            // 2. Atualiza na Supabase
            await sb.from('posts').update({ [type]: novoValor }).eq('id', postId);
            
            // 3. Paga ao utilizador
            userSaldo += valor;
            await sb.from('perfis').update({ saldo: userSaldo }).eq('id', MASTER_ID);
            
            showEarn(valor);
            updateUI();
            loadFeed(); // Atualiza os balões visualmente
        }

        async function addComment(pid) {
            const val = document.getElementById(`in-${pid}`).value;
            if(!val) return;
            await sb.from('comentarios').insert([{ post_id: pid, user_id: MASTER_ID, content: val }]);
            userSaldo += 0.0010;
            await sb.from('perfis').update({ saldo: userSaldo }).eq('id', MASTER_ID);
            loadFeed();
        }

        function toggleComments(id) { 
            const el = document.getElementById(`comments-${id}`);
            el.classList.toggle('active');
            if(el.classList.contains('active')) fetchComments(id);
        }

        async function fetchComments(pid) {
            const { data } = await sb.from('comentarios').select('content').eq('post_id', pid);
            document.getElementById(`list-${pid}`).innerHTML = data.map(c => `<div class="text-[9px] bg-white p-2 rounded border">${c.content}</div>`).join('');
        }

        function updateUI() { document.getElementById('main-eur').innerText = userSaldo.toFixed(4) + "€"; }
        function showEarn(v) { const e = document.getElementById('floating-earning'); document.getElementById('earning-val').innerText = "+"+v.toFixed(4)+"€"; e.style.display='block'; setTimeout(()=>e.style.display='none', 800); }

        window.onload = init;
    </script>
</body>
</html>
