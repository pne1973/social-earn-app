<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.17</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        :root {
            --google-blue: #4285F4;
            --fb-bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-main: #1C1E21;
            --text-secondary: #65676B;
            --border-color: #CED0D4;
            --success: #16a34a;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--fb-bg); 
            margin: 0; padding-top: 95px; padding-bottom: 80px; 
        }

        /* HEADER DYN */
        header {
            position: fixed; top: 0; left: 0; right: 0; background: #fff;
            height: 65px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border-color);
        }

        .status-header-fixed {
            position: fixed; top: 65px; left: 0; right: 0; background: #fff;
            height: 30px; display: flex; align-items: center; padding: 0 15px;
            font-size: 10px; font-weight: 800; border-bottom: 1px solid var(--border-color); z-index: 999;
        }

        /* NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
            height: 70px; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border-color); z-index: 1000;
        }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: 900; color: #9ca3af; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--google-blue); }

        /* CONTENT */
        .tab-content { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 10px; }
        .tab-content.active { display: block; }

        /* FACEBOOK FEED STYLE */
        .post-card {
            background: var(--card-bg); border-radius: 8px; margin-bottom: 12px;
            padding: 12px; border: 1px solid var(--border-color); box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e4e6eb; margin-right: 10px; display: flex; align-items: center; justify-content: center; }
        .user-name { font-weight: 600; font-size: 14px; }
        .post-time { font-size: 11px; color: var(--text-secondary); }
        .post-content { font-size: 14px; margin-bottom: 10px; word-wrap: break-word; }
        .post-image { width: calc(100% + 24px); margin-left: -12px; max-height: 450px; object-fit: cover; }
        .post-actions { display: flex; border-top: 1px solid #eee; margin-top: 10px; padding-top: 5px; }
        .action-btn { flex: 1; background: none; border: none; padding: 10px; color: var(--text-secondary); font-weight: 600; cursor: pointer; }

        /* PUBLISHER */
        .publisher-container { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .publisher-input { width: 100%; background: #f0f2f5; border: none; padding: 12px 15px; border-radius: 20px; cursor: pointer; }

        .btn-apex { width: 100%; background: var(--google-blue); color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 900; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 12px; overflow: hidden; font-size: 11px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; font-weight: 900; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:8px;">
            <div style="background:var(--google-blue); color:white; padding:8px; border-radius:8px; font-weight:900;">S</div>
            <div>
                <h1 style="font-size:11px; font-weight:900; color:var(--google-blue); margin:0;">Social Earn</h1>
                <p id="loc-tag" style="font-size:8px; color:#ccc; margin:0; letter-spacing:1px;">Detecting region...</p>
            </div>
        </div>
        <div style="text-align:right;">
            <div id="main-balance" style="font-weight:900; color:var(--success); font-size:20px;">0.0000€</div>
        </div>
    </header>

    <div class="status-header-fixed">
        <span id="status-text" style="color:var(--success);">ONLINE</span>
        <button onclick="logout()" style="margin-left:auto; background:none; border:none; font-size:8px; color:#ccc; font-weight:900;">LOGOUT</button>
    </div>

    <main>
        <section id="tab-feed" class="tab-content active">
            <div class="publisher-container">
                <input type="text" class="publisher-input" id="pub-placeholder" placeholder="O que estás a pensar?" onclick="expandPub(true)">
                <div id="pub-expanded" class="hidden" style="margin-top:15px;">
                    <textarea id="post-text" style="width:100%; border:none; background:#f0f2f5; padding:15px; border-radius:15px; min-height:80px;"></textarea>
                    <input type="text" id="post-img" placeholder="Image URL" style="width:100%; border:none; background:#f0f2f5; padding:10px; border-radius:10px; margin-top:10px;">
                    <button class="btn-apex" style="margin-top:10px;" id="btn-publish" onclick="submitPost()">PUBLISH</button>
                </div>
            </div>
            <div id="feed-render"></div>
        </section>

        <section id="tab-ranking" class="tab-content">
            <h2 id="txt-rank-title" style="font-size:12px; font-weight:900;">RANKING</h2>
            <table id="table-ranking"><thead><tr><th>#</th><th id="txt-user-col">USER</th><th id="txt-val-col">EARNINGS</th></tr></thead><tbody></tbody></table>
        </section>

        <section id="tab-wallet" class="tab-content">
            <h2 id="txt-wallet-title" style="font-size:12px; font-weight:900;">WALLET</h2>
            <div style="background:white; padding:25px; border-radius:20px; text-align:center; border:1px solid #eee;">
                <p id="txt-balance-lbl" style="font-size:10px; color:#999; font-weight:900;">AVAILABLE BALANCE</p>
                <h3 id="wallet-balance" style="font-size:28px; color:var(--success); margin:15px 0;">0.0000€</h3>
                <button class="btn-apex" id="btn-withdraw" onclick="alert('Mín. 0.50')">WITHDRAW</button>
            </div>
        </section>

        <section id="tab-admin" class="tab-content">
            <h2 style="font-size:12px; font-weight:900;">ADMIN PANEL</h2>
            <div id="admin-stats" style="display:flex; gap:10px;"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('feed')">🏠<br><span id="nav-feed">FEED</span></div>
        <div class="nav-item" onclick="nav('ranking')">🏆<br><span id="nav-rank">RANKING</span></div>
        <div class="nav-item" onclick="nav('wallet')">💰<br><span id="nav-wallet">WALLET</span></div>
        <div id="nav-admin" class="nav-item hidden" onclick="nav('admin')">⚙️<br>ADMIN</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";
        
        let myID = localStorage.getItem('apex_uid');
        let myEuroSaldo = 0;
        let userLocale = { country: 'PT', currency: 'EUR', rate: 1, symbol: '€', lang: 'pt' };

        const translations = {
            pt: { feed: "FEED", rank: "RANKING", wallet: "CARTEIRA", publish: "PUBLICAR", think: "O que vais partilhar?", user: "UTILIZADOR", earn: "GANHOS", bal: "SALDO DISPONÍVEL", min: "Mín. 0.50", logout: "SAIR" },
            en: { feed: "FEED", rank: "RANKING", wallet: "WALLET", publish: "PUBLISH", think: "What's on your mind?", user: "USER", earn: "EARNINGS", bal: "AVAILABLE BALANCE", min: "Min. 0.50", logout: "LOGOUT" }
        };

        async function init() {
            if(!myID) { 
                let id = prompt("ID DE UTILIZADOR:"); 
                if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
                return;
            }
            await detectLocation();
            await sync();
            renderFeed();
            renderRanking();
            if(myID === ADMIN_ID) document.getElementById('nav-admin').classList.remove('hidden');
        }

        async function detectLocation() {
            try {
                const res = await fetch('http://ip-api.com/json/');
                const data = await res.json();
                userLocale.country = data.countryCode;
                if(data.countryCode === 'BR') { userLocale.currency = 'BRL'; userLocale.rate = 6.12; userLocale.symbol = 'R$'; userLocale.lang = 'pt'; }
                else if(data.countryCode === 'PT') { userLocale.currency = 'EUR'; userLocale.rate = 1; userLocale.symbol = '€'; userLocale.lang = 'pt'; }
                else { userLocale.currency = 'USD'; userLocale.rate = 1.08; userLocale.symbol = '$'; userLocale.lang = 'en'; }
                applyLang();
            } catch(e) { applyLang(); }
        }

        function applyLang() {
            const l = translations[userLocale.lang];
            document.getElementById('nav-feed').innerText = l.feed;
            document.getElementById('nav-rank').innerText = l.rank;
            document.getElementById('nav-wallet').innerText = l.wallet;
            document.getElementById('pub-placeholder').placeholder = l.think;
            document.getElementById('btn-publish').innerText = l.publish;
            document.getElementById('txt-rank-title').innerText = l.rank;
            document.getElementById('txt-user-col').innerText = l.user;
            document.getElementById('txt-val-col').innerText = l.earn;
            document.getElementById('txt-wallet-title').innerText = l.wallet;
            document.getElementById('txt-balance-lbl').innerText = l.bal;
            document.getElementById('btn-withdraw').innerText = l.min;
            document.getElementById('loc-tag').innerText = `REGION: ${userLocale.country} (${userLocale.currency})`;
        }

        async function sync() {
            const { data } = await sb.from('perfis').select('*').eq('id', myID).single();
            if(data) myEuroSaldo = parseFloat(data.saldo);
            else await sb.from('perfis').insert([{ id: myID, saldo: 0 }]);
            updateUI();
        }

        function updateUI() {
            const localVal = (myEuroSaldo * userLocale.rate).toFixed(4);
            document.getElementById('main-balance').innerText = `${userLocale.symbol}${localVal}`;
            document.getElementById('wallet-balance').innerText = `${userLocale.symbol}${localVal}`;
        }

        function nav(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
        }

        function expandPub(s) { document.getElementById('pub-expanded').classList.toggle('hidden', !s); }

        async function submitPost() {
            const txt = document.getElementById('post-text').value;
            const img = document.getElementById('post-img').value;
            if(!txt) return;
            await sb.from('posts').insert([{ user_id: myID, content: txt, image_url: img }]);
            myEuroSaldo += 0.0015;
            await sb.from('perfis').update({ saldo: myEuroSaldo }).eq('id', myID);
            location.reload();
        }

        async function renderFeed() {
            const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            const cont = document.getElementById('feed-render');
            data.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <div class="user-avatar">👤</div>
                        <div><div class="user-name">User ${p.user_id}</div><div class="post-time">${new Date(p.created_at).toLocaleDateString()}</div></div>
                    </div>
                    <div class="post-content">${p.content || ''}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-image">` : ''}
                    <div class="post-actions"><button class="action-btn">LIKE</button><button class="action-btn">REPORT</button></div>
                `;
                cont.appendChild(card);
                if((i+1)%3===0) cont.innerHTML += `<div class="ad-card">ADS SPONSORED</div>`;
            });
        }

        async function renderRanking() {
            const { data } = await sb.from('perfis').select('*').order('saldo', { ascending: false }).limit(10);
            const body = document.querySelector('#table-ranking tbody');
            body.innerHTML = data.map((u, i) => `<tr><td>${i+1}</td><td>ID: ${u.id}</td><td>${userLocale.symbol}${(u.saldo * userLocale.rate).toFixed(4)}</td></tr>`).join('');
        }

        function logout() { localStorage.removeItem('apex_uid'); location.reload(); }

        init();
    </script>
</body>
</html>
