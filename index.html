<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.27</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        :root {
            --google-blue: #4285F4;
            --fb-bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-secondary: #65676B;
            --border: #CED0D4;
            --success: #16a34a;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--fb-bg); 
            margin: 0; padding-top: 110px; padding-bottom: 80px; 
        }

        /* HEADER ESTILO SCREENSHOT */
        header {
            position: fixed; top: 0; left: 0; right: 0; background: #fff;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .ad-banner-top {
            position: fixed; top: 60px; left: 0; right: 0; background: #fff;
            height: 45px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border-bottom: 1px solid var(--border); z-index: 999;
        }

        /* FEED CARDS */
        .post-card {
            background: var(--card-bg); border-radius: 8px; margin: 0 auto 12px auto;
            max-width: 500px; border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .post-header { display: flex; align-items: center; padding: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #e4e6eb; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-content { padding: 0 12px 12px 12px; font-size: 14px; line-height: 1.4; }
        
        /* ACTIONS & BUBBLES */
        .post-actions { display: flex; padding: 4px 12px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .action-btn { flex: 1; background: none; border: none; padding: 10px; color: var(--text-secondary); font-weight: 600; font-size: 13px; cursor: pointer; }
        
        .comments-area { background: #fff; padding: 10px; }
        .comment-bubble { 
            background: #F0F2F5; border-radius: 15px; padding: 8px 12px; 
            margin-bottom: 6px; font-size: 13px; display: block; width: fit-content; max-width: 90%;
        }
        .comment-input-box { display: flex; gap: 8px; margin-top: 8px; }
        .c-input { flex: 1; background: #F0F2F5; border: none; border-radius: 20px; padding: 8px 15px; font-size: 13px; }

        /* BOTTOM NAV ESTILO SCREENSHOT */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; height: 70px; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #9ca3af; cursor: pointer; }
        .nav-item.active { color: var(--google-blue); }

        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--google-blue); font-size: 18px;">Social Earn</div>
        <div id="top-balance" style="font-weight: 900; color: var(--success); font-size: 18px;">€0.0000</div>
    </header>

    <div class="ad-banner-top">Publicidade Oficial Apex</div>

    <main>
        <section id="tab-feed" class="tab-content active">
            <div id="render-feed"></div>
        </section>

        <section id="tab-wallet" class="tab-content">
            <div style="background: #fff; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #ddd;">
                <p style="font-size: 10px; color: #999; font-weight: 900;">CARTEIRA</p>
                <h3 id="wallet-balance" style="font-size: 32px; color: var(--success); margin: 10px 0;">€0.0000</h3>
                <button style="width: 100%; background: var(--google-blue); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900;">LEVANTAR</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('feed', this)">🏠<br>FEED</div>
        <div class="nav-item" onclick="nav('wallet', this)">💰<br>CARTEIRA</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        
        let myID = localStorage.getItem('apex_uid') || "5401881400";
        let mySaldo = 0;

        async function init() {
            await sync();
            renderFeed();
        }

        async function sync() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', myID).single();
            if(data) mySaldo = parseFloat(data.saldo);
            updateUI();
        }

        function updateUI() {
            const display = mySaldo.toFixed(4);
            document.getElementById('top-balance').innerText = `€${display}`;
            document.getElementById('wallet-balance').innerText = `€${display}`;
        }

        async function addCredit(amt) {
            mySaldo += amt;
            await sb.from('perfis').update({ saldo: mySaldo }).eq('id', myID);
            updateUI();
        }

        async function renderFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            const cont = document.getElementById('render-feed');
            cont.innerHTML = '';

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <div class="user-avatar">${p.user_id.charAt(0)}</div>
                        <div style="font-weight:700; font-size:13px;">Membro ${p.user_id}</div>
                    </div>
                    <div class="post-content">${p.content || ''}</div>
                    <div class="post-actions">
                        <button class="action-btn" onclick="handleLike(this)">👍 Gosto</button>
                        <button class="action-btn">💬 Balão</button>
                    </div>
                    <div class="comments-area">
                        <div id="list-${p.id}"></div>
                        <div class="comment-input-box">
                            <input type="text" class="c-input" placeholder="Escreva aqui..." onkeydown="if(event.key==='Enter') sendComment('${p.id}', this)">
                        </div>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        function handleLike(btn) {
            btn.style.color = "#4285F4";
            btn.innerText = "💙 Gostei";
            addCredit(0.0020);
        }

        function sendComment(postId, input) {
            if(!input.value) return;
            const list = document.getElementById('list-'+postId);
            const bubble = document.createElement('div');
            bubble.className = 'comment-bubble';
            bubble.innerText = input.value;
            list.appendChild(bubble);
            input.value = '';
            addCredit(0.0050);
        }

        function nav(id, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            el.classList.add('active');
        }

        init();
    </script>
</body>
</html>
