<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #121212; --tg-theme-text: #ffffff; --tg-theme-button: #ffcc00; }
        body { font-family: sans-serif; background: var(--tg-theme-bg); color: var(--tg-theme-text); margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .xp-badge { background: var(--tg-theme-button); color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold; min-width: 60px; text-align: center; }
        .post-box { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; resize: none; font-size: 16px; outline: none; margin-bottom: 10px; min-height: 60px; }
        .actions { display: flex; justify-content: space-between; align-items: center; }
        .btn-pub { background: var(--tg-theme-button); color: #000; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-file { background: #333; color: #fff; border: none; padding: 10px; border-radius: 10px; cursor: pointer; }
        .feed-post { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; max-height: 300px; object-fit: cover; }
        .btn-delete { color: #ff4444; font-size: 12px; cursor: pointer; float: right; font-weight: bold; }
        .user-info { color: var(--tg-theme-button); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">SOCIAL NETWORK</h2>
        <div id="userXP" class="xp-badge">...</div>
    </div>

    <div class="post-box">
        <textarea id="postText" placeholder="O que estás a pensar?"></textarea>
        <div class="actions">
            <button class="btn-file" onclick="document.getElementById('fileInput').click()">📷 Foto</button>
            <input type="file" id="fileInput" hidden accept="image/*">
            <button class="btn-pub" onclick="handlePublish()">Publicar</button>
        </div>
    </div>

    <div id="feed"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- SUBSTITUI PELOS TEUS DADOS DO SUPABASE ---
        const SUPABASE_URL = "A_TUA_URL_AQUI"; 
        const SUPABASE_KEY = "A_TUA_KEY_AQUI";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FORÇAR O TEU ID PARA GARANTIR CONEXÃO
        const userId = 5401881400; 
        const username = "pine1971";

        async function init() {
            try {
                // Busca pontos na tabela 'profiles' onde a coluna é 'id'
                let { data, error } = await supabaseClient
                    .from('profiles')
                    .select('points')
                    .eq('id', userId)
                    .maybeSingle();

                if (data) {
                    document.getElementById('userXP').innerText = `${data.points} XP`;
                } else {
                    document.getElementById('userXP').innerText = "0 XP";
                }
            } catch (e) {
                document.getElementById('userXP').innerText = "Erro";
            }
            loadFeed();
        }

        async function loadFeed() {
            // Garante que tens uma Policy de SELECT (true) na tabela posts
            const { data: posts } = await supabaseClient
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = '';

            if (posts) {
                posts.forEach(p => {
                    feedDiv.innerHTML += `
                        <div class="feed-post">
                            ${userId === 5401881400 ? `<span class="btn-delete" onclick="deletePost(${p.id})">APAGAR</span>` : ''}
                            <div class="user-info">@${p.username || 'utilizador'}</div>
                            <div>${p.content || ''}</div>
                            ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                        </div>
                    `;
                });
            }
        }

        async function handlePublish() {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            let imageUrl = null;

            if (!text && !file) return;

            try {
                if (file) {
                    const fileName = `${Date.now()}_img.jpg`;
                    const { data: upData, error: upErr } = await supabaseClient.storage
                        .from('post-images')
                        .upload(fileName, file);

                    if (upErr) throw upErr;

                    const { data: urlData } = supabaseClient.storage
                        .from('post-images')
                        .getPublicUrl(fileName);
                    imageUrl = urlData.publicUrl;
                }

                await supabaseClient.from('posts').insert([{
                    user_id: userId,
                    username: username,
                    content: text,
                    image_url: imageUrl
                }]);

                document.getElementById('postText').value = '';
                document.getElementById('fileInput').value = '';
                init();
            } catch (err) {
                alert("Erro: " + err.message);
            }
        }

        async function deletePost(postId) {
            const { error } = await supabaseClient.from('posts').delete().eq('id', postId);
            if (!error) init();
        }

        init();
    </script>
</body>
</html>
