<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #ffffff; --yellow: #ffcf05; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .xp-badge { background: var(--yellow); color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .post-box { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; min-height: 60px; }
        .btn-publish { background: var(--yellow); color: #000; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .feed-item { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #161616; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">SOCIAL NETWORK</h3>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <div class="post-box">
        <textarea id="postInput" placeholder="O que estás a pensar?"></textarea>
        <div id="previewArea"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            <label style="background: #333; padding: 8px 15px; border-radius: 10px; font-size: 14px; cursor: pointer;">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="document.getElementById('previewArea').innerHTML = '<p style=\'color:var(--yellow); font-size:12px\'>✓ Foto selecionada</p>'">
                📷 Foto
            </label>
            <button id="publishBtn" class="btn-publish" onclick="publishPost()">Publicar</button>
        </div>
    </div>

    <div id="mainFeed"></div>

    <div class="nav">
        <div onclick="location.reload()">🏠</div>
        <div onclick="alert('Ranking em breve!')">🏆</div>
        <div onclick="alert('Carteira em breve!')">💰</div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = params.get('url');
    const SUPABASE_KEY = params.get('key');
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const tg = window.Telegram?.WebApp;
    const user = tg?.initDataUnsafe?.user || { id: 5401881400, username: "Admin" };
    const userId = user.id;

    async function init() {
        const { data } = await supabaseClient.from('profiles').select('xp').eq('user_id', userId).single();
        if (data) document.getElementById('userXP').innerText = `${data.xp} XP`;
        loadFeed();
    }

    async function publishPost() {
        const text = document.getElementById('postInput').value;
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('publishBtn');
        let imgUrl = null;

        if (!text && !file) return;
        btn.disabled = true;
        btn.innerText = "A enviar...";

        try {
            if (file) {
                const fName = `${Date.now()}_${userId}.jpg`;
                // Upload forçando o tipo de conteúdo para imagem
                const { error: upErr } = await supabaseClient.storage.from('post-images').upload(fName, file, { contentType: 'image/jpeg' });
                if (upErr) throw upErr;

                // Construção manual do link público para evitar falhas
                imgUrl = `${SUPABASE_URL}/storage/v1/object/public/post-images/${fName}`;
            }

            await supabaseClient.from('posts').insert([{ 
                user_id: userId, username: user.username || "User", content: text, image_url: imgUrl 
            }]);

            await supabaseClient.rpc('increment_points', { user_id: userId, amount: imgUrl ? 10 : 5 });
            location.reload();
        } catch (e) {
            alert("Erro: " + e.message);
            btn.disabled = false;
        }
    }

    async function loadFeed() {
        const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
        let html = "";
        posts?.forEach(p => {
            html += `
            <div class="feed-item">
                <div style="display:flex; justify-content:space-between">
                    <b style="color:var(--yellow)">@${p.username}</b>
                    ${userId === 5401881400 ? `<span style="color:red; cursor:pointer" onclick="deletePost(${p.id})">APAGAR</span>` : ''}
                </div>
                <p>${p.content || ''}</p>
                ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
            </div>`;
        });
        document.getElementById('mainFeed').innerHTML = html;
    }

    async function deletePost(id) {
        if(confirm("Apagar post?")) {
            await supabaseClient.from('posts').delete().eq('id', id);
            loadFeed();
        }
    }

    init();
</script>
</body>
</html>
