<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network v33.12 - Full Interaction</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #F0F2F5; color: #1C1E21; }
        .fb-blue { color: #1877F2; }
        .bg-fb-blue { background-color: #1877F2; }
        .nav-item { position: relative; color: #65676B; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #1877F2; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #1877F2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .post-card { background: white; border-radius: 8px; border: 1px solid #dddfe2; margin-bottom: 12px; }
        .comment-box { background: #F0F2F5; border-radius: 12px; padding: 8px 12px; margin-top: 4px; font-size: 13px; }
        
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #ad-timer { font-size: 4rem; font-weight: 900; color: #1877F2; }
        
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9000; pointer-events: none; display: none; animation: popUp 0.8s forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
    </style>
</head>
<body class="pb-16">

    <div id="ad-overlay">
        <h2 class="text-xl font-bold mb-2">Publicidade Obrigatória</h2>
        <p class="text-sm opacity-70">Aguarde para validar os seus ganhos 100%</p>
        <div id="ad-timer">15</div>
        <button id="skip-ad-btn" onclick="degradeGains()" class="hidden mt-8 text-xs text-gray-400 underline uppercase tracking-widest">Recusar Anúncio (Ganhos 0.5x)</button>
    </div>

    <div id="auth-screen" class="fixed inset-0 bg-white z-[6000] flex flex-col items-center justify-center p-6" style="display:none;">
        <h1 class="text-4xl font-bold fb-blue mb-8 tracking-tighter">Social Network</h1>
        <input type="text" id="login-id" placeholder="O seu ID de Utilizador" class="w-full max-w-xs border border-gray-300 rounded-xl p-4 mb-4 outline-none focus:border-blue-500 font-semibold bg-gray-50">
        <button onclick="doLogin()" class="w-full max-w-xs bg-fb-blue text-white font-bold py-3 rounded-xl shadow-lg text-lg">Entrar na Plataforma</button>
    </div>

    <div id="floating-earning"><div class="text-4xl font-black text-green-500" id="earning-val">+0.0000</div></div>

    <header class="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-xl mx-auto flex items-center justify-between px-4 h-14">
            <h1 class="text-2xl font-bold fb-blue tracking-tighter">Social Network</h1>
            <div class="flex flex-col items-end leading-tight">
                <div id="main-balance" class="font-bold text-green-600 text-sm">0.0000 €</div>
                <div id="multiplier-tag" class="text-[8px] font-black uppercase">Modo Normal</div>
            </div>
        </div>
        <nav class="flex max-w-xl mx-auto h-12">
            <button onclick="nav('social')" class="nav-item active flex-1 flex justify-center items-center"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg></button>
            <button id="nav-wallet-btn" onclick="nav('info')" class="nav-item flex-1 flex justify-center items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg></button>
            <button id="nav-admin-btn" onclick="nav('admin')" class="nav-item flex-1 hidden flex justify-center items-center text-red-600"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a1 1 0 00-2 0v7.268a2 2 0 000 3.464V16a1 1 0 102 0v-1.268a2 2 0 000-3.464V4zM11 4a1 1 0 10-2 0v1.268a2 2 0 000 3.464V16a1 1 0 102 0V8.732a2 2 0 000-3.464V4zM16 3a1 1 0 011 1v7.268a2 2 0 010 3.464V16a1 1 0 11-2 0v-1.268a2 2 0 010-3.464V4a1 1 0 011-1z"></path></svg></button>
            <button onclick="nav('menu')" class="nav-item flex-1 flex justify-center items-center"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M3 5h14v2H3V5zm0 4h14v2H3V9zm0 4h14v2H3v-2z"></path></svg></button>
        </nav>
    </header>

    <main class="max-w-xl mx-auto p-3">
        <section id="view-social" class="tab-content active">
            <div class="bg-white p-4 rounded-lg shadow-sm mb-4">
                <textarea id="post-input" placeholder="No que estás a pensar?" class="w-full bg-gray-100 rounded-xl p-3 h-12 mb-2 outline-none text-sm font-medium"></textarea>
                <input id="post-url" type="text" placeholder="URL da imagem (http://...)" class="w-full bg-gray-50 text-[10px] p-2 mb-3 rounded border border-gray-100 outline-none">
                <button onclick="handleInteraction('post')" class="w-full bg-fb-blue text-white py-2 rounded-md font-bold text-sm">Publicar Conteúdo (+0.0150€)</button>
            </div>
            <div id="feed-container" class="space-y-4"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="bg-white p-8 rounded-lg shadow-sm text-center">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">O Teu Saldo</h3>
                <h2 id="wall-balance" class="text-5xl font-black fb-blue mb-6">0.0000 €</h2>
                <div id="withdraw-area" class="hidden animate-pulse">
                    <input id="pp-email" type="email" placeholder="Email PayPal" class="w-full border-2 border-fb-blue p-4 rounded-xl mb-3 text-center font-bold">
                    <button class="w-full bg-fb-blue text-white py-4 rounded-xl font-bold">Efetuar Levantamento</button>
                </div>
                <div id="progress-container">
                    <div class="w-full bg-gray-200 h-3 rounded-full mb-2 overflow-hidden"><div id="withdraw-progress" class="bg-fb-blue h-full w-0 transition-all duration-1000"></div></div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Meta mínima: 5.0000€</p>
                </div>
            </div>
        </section>

        <section id="view-admin" class="tab-content">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-600">
                <h2 class="text-red-600 font-black mb-4 uppercase text-sm tracking-tighter">Gestão de Ecossistema</h2>
                <div id="adm-stats" class="grid grid-cols-2 gap-2 mb-4"></div>
                <div id="adm-user-list" class="space-y-2"></div>
            </div>
        </section>

        <section id="view-menu" class="tab-content">
            <div class="bg-white p-4 rounded-lg shadow-sm flex items-center space-x-3 mb-3">
                <div class="w-12 h-12 bg-fb-blue rounded-full flex items-center justify-center text-white font-bold">U</div>
                <div><div class="text-xs text-gray-400 font-bold">Utilizador Logado</div><div id="user-display-id" class="font-black">ID: ---</div></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="w-full bg-white p-4 rounded-lg shadow-sm text-red-600 font-bold flex items-center justify-center space-x-2">
                <span>🚪</span><span>Terminar Sessão</span>
            </button>
        </section>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_MASTER = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let activeID = localStorage.getItem('apex_uid');
        let user = { saldo: 0, interactions: 0, multiplier: 1.0 };

        async function init() {
            if (!activeID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
            document.getElementById('user-display-id').innerText = "ID: " + activeID;
            if(activeID === ADMIN_MASTER) document.getElementById('nav-admin-btn').classList.remove('hidden');

            const { data } = await sb.from('perfis').select('*').eq('id', activeID).single();
            if(data) {
                user.saldo = Number(data.saldo) || 0;
                user.multiplier = data.multiplier || 1.0;
            } else {
                await sb.from('perfis').insert([{ id: activeID, saldo: 0, multiplier: 1.0 }]);
            }
            updateUI(); loadFeed();
            setInterval(updateUI, 3000);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = user.saldo.toFixed(4) + " €";
            document.getElementById('wall-balance').innerText = user.saldo.toFixed(4) + " €";
            const tag = document.getElementById('multiplier-tag');
            tag.innerText = user.multiplier === 1 ? "Modo Normal 1.0x" : "Ganhos Reduzidos 0.5x";
            tag.className = user.multiplier === 1 ? "text-[8px] font-black uppercase text-blue-500" : "text-[8px] font-black uppercase text-red-500";
            
            const prog = (user.saldo / 5) * 100;
            document.getElementById('withdraw-progress').style.width = Math.min(prog, 100) + "%";
            if(user.saldo >= 5) document.getElementById('withdraw-area').classList.remove('hidden');
        }

        async function handleInteraction(type, postId = null) {
            if(activeID !== ADMIN_MASTER) {
                user.interactions++;
                if((type === 'post' && user.interactions >= 3) || (['like', 'comment', 'share'].includes(type) && user.interactions >= 2)) {
                    triggerAdFlow();
                    return;
                }
            }

            let gain = 0;
            if(type === 'post') {
                const content = document.getElementById('post-input').value;
                if(!content) return;
                await sb.from('posts').insert([{ user_id: activeID, content, image_url: document.getElementById('post-url').value }]);
                gain = 0.0150;
                document.getElementById('post-input').value = "";
                document.getElementById('post-url').value = "";
                loadFeed();
            } else if(type === 'like') { gain = 0.0006; }
            else if(type === 'share') { gain = 0.0020; }
            else if(type === 'comment') {
                const input = document.getElementById(`comment-input-${postId}`);
                if(!input.value) return;
                const { data: currentPost } = await sb.from('posts').select('comments').eq('id', postId).single();
                let cms = currentPost.comments || [];
                cms.push({ user: activeID, text: input.value });
                await sb.from('posts').update({ comments: cms }).eq('id', postId);
                gain = 0.0110;
                input.value = "";
                loadFeed();
            }

            if(gain > 0) applyGain(gain);
        }

        function triggerAdFlow() {
            const overlay = document.getElementById('ad-overlay');
            const timerTxt = document.getElementById('ad-timer');
            const skipBtn = document.getElementById('skip-ad-btn');
            overlay.style.display = 'flex';
            let timeLeft = 15;
            skipBtn.classList.add('hidden');

            const itv = setInterval(() => {
                timeLeft--;
                timerTxt.innerText = timeLeft;
                if(timeLeft <= 10) skipBtn.classList.remove('hidden');
                if(timeLeft <= 0) {
                    clearInterval(itv);
                    overlay.style.display = 'none';
                    user.interactions = 0;
                    user.multiplier = 1.0;
                    saveUserData();
                }
            }, 1000);
        }

        async function degradeGains() {
            user.multiplier = 0.5;
            user.interactions = 0;
            document.getElementById('ad-overlay').style.display = 'none';
            saveUserData();
        }

        async function applyGain(val) {
            const finalGain = val * user.multiplier;
            user.saldo += finalGain;
            showBigNumber(finalGain);
            saveUserData();
        }

        async function saveUserData() {
            await sb.from('perfis').upsert({ id: activeID, saldo: user.saldo, multiplier: user.multiplier });
        }

        function showBigNumber(val) {
            const c = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            c.style.display = 'block';
            setTimeout(() => c.style.display = 'none', 800);
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = posts.map(p => {
                const commentsHtml = (p.comments || []).map(c => `
                    <div class="comment-box">
                        <span class="font-bold text-fb-blue mr-1">${c.user}:</span>
                        <span class="text-gray-700">${c.text}</span>
                    </div>
                `).join('');

                return `
                <div class="post-card">
                    <div class="p-3 flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center font-bold text-[10px] text-gray-500">U</div>
                            <div class="font-bold text-fb-blue text-sm">${p.user_id}</div>
                        </div>
                        ${activeID === ADMIN_MASTER ? `<button onclick="deletePost('${p.id}')" class="text-red-500 text-[10px] font-black uppercase">Apagar</button>` : ''}
                    </div>
                    
                    <div class="px-3 pb-3 text-sm leading-relaxed">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="w-full border-y border-gray-100">` : ''}
                    
                    <div class="px-3 py-2 flex items-center justify-between border-b border-gray-50">
                        <div class="flex items-center space-x-1 text-[11px] text-gray-400">
                            <span class="bg-blue-100 text-fb-blue px-2 py-0.5 rounded-full font-bold">👍 12</span>
                        </div>
                        <div class="text-[11px] text-gray-400 font-medium">
                            ${(p.comments || []).length} comentários • 2 partilhas
                        </div>
                    </div>

                    <div class="flex p-1">
                        <button onclick="handleInteraction('like')" class="flex-1 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded">Gosto</button>
                        <button onclick="document.getElementById('comment-input-${p.id}').focus()" class="flex-1 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded">Comentar</button>
                        <button onclick="handleInteraction('share')" class="flex-1 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded">Partilhar</button>
                    </div>

                    <div class="bg-gray-50 p-3 rounded-b-lg">
                        <div id="comments-list-${p.id}" class="space-y-1 mb-3">
                            ${commentsHtml}
                        </div>
                        <div class="flex items-center space-x-2">
                            <input id="comment-input-${p.id}" type="text" placeholder="Escreve um comentário..." class="flex-1 bg-white border border-gray-200 rounded-full px-4 py-1.5 text-xs outline-none focus:border-fb-blue">
                            <button onclick="handleInteraction('comment', '${p.id}')" class="bg-fb-blue text-white p-1.5 rounded-full"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg></button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'social') loadFeed();
        }

        function doLogin() {
            const id = document.getElementById('login-id').value.trim();
            if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
        }

        async function deletePost(id) {
            if(confirm('Deseja eliminar permanentemente esta publicação?')) {
                await sb.from('posts').delete().eq('id', id);
                loadFeed();
            }
        }

        init();
    </script>
</body>
</html>
