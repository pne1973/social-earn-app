<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network v33.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; --fb-gray: #65676b; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; font-weight: 700; color: #1c1e21; }
        
        /* HEADER ORIGINAL */
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 2px solid #ddd; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-bar { position: fixed; top: 72px; width: 100%; height: 48px; background: white; border-bottom: 1px solid #ddd; z-index: 900; display: flex; align-items: center; padding: 0 16px; font-size: 10px; color: #34A853; text-transform: uppercase; }
        
        /* PUBLISHER (O QUE ESTÁ A PENSAR) */
        .publisher { margin-top: 130px; background: white; padding: 16px; border-bottom: 8px solid #ddd; }
        .pub-input-trigger { background: #f0f2f5; border-radius: 20px; padding: 10px 16px; color: #65676b; font-size: 14px; font-weight: 400; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* POST ESTILO FACEBOOK LITE (O QUE PEDISTE) */
        .fb-post { background: white; margin-bottom: 8px; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .fb-p-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .fb-p-avatar { width: 36px; height: 36px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .fb-p-info { display: flex; flex-direction: column; }
        .fb-p-name { font-size: 14px; font-weight: 700; }
        .fb-p-time { font-size: 12px; color: #65676b; font-weight: 400; }
        .fb-p-content { padding: 0 12px 12px; font-size: 15px; font-weight: 400; line-height: 1.4; }
        .fb-p-image { width: 100%; display: block; background: #eee; }
        .fb-p-actions { display: flex; border-top: 1px solid #ebedf0; margin: 0 12px; padding: 4px 0; }
        .fb-p-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; color: #65676b; font-size: 13px; font-weight: 700; }

        /* NAVEGAÇÃO IGUAL AO SCREENSHOT */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #ddd; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; text-transform: uppercase; color: #65676b; }
        .nav-item.active { color: #1877F2; border-top: 3px solid #1877F2; }

        /* MODAIS ADS */
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white italic text-2xl font-black">S</div>
            <div class="flex flex-col"><span class="text-blue-600 text-xs font-black uppercase">Social Earn</span><span class="text-[8px] text-gray-300 font-bold uppercase">Official Network</span></div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="text-green-600 text-xl font-black">0.0000€</div>
            <div id="main-brl" class="text-gray-400 text-[9px] font-black">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-bar">
        <span>Ganhos Ativos: 100%</span>
        <button onclick="logout()" class="ml-auto text-gray-300">Sair</button>
    </div>

    <main id="tab-feed" class="tab-content active">
        <div class="publisher">
            <div class="pub-input-trigger" onclick="openPub()">
                <div class="fb-p-avatar" style="width:24px; height:24px;">👤</div>
                <span>O que está a pensar?</span>
            </div>
        </div>
        
        <div id="pub-modal" class="hidden fixed inset-0 bg-white z-[2000] p-4">
            <div class="flex justify-between items-center mb-6">
                <button onclick="closePub()" class="text-blue-600 font-bold">CANCELAR</button>
                <button onclick="sendPost()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-xs uppercase">Publicar</button>
            </div>
            <textarea id="post-text" placeholder="No que está a pensar?" class="w-full text-lg border-none focus:ring-0 font-bold uppercase" rows="5"></textarea>
            <input id="post-img" type="text" placeholder="Link da imagem (opcional)" class="w-full bg-gray-100 p-4 rounded-xl text-xs font-bold outline-none mt-4">
        </div>

        <div id="feed-container"></div>
    </main>

    <main id="tab-ganhos" class="tab-content pt-32 px-6">
        <div class="bg-white border-2 p-10 text-center rounded-2xl">
            <h1 id="wall-eur" class="text-4xl font-black text-blue-600">0.0000€</h1>
            <p id="wall-brl" class="text-[10px] text-gray-400 font-black uppercase">0.0000 BRL</p>
            <div class="w-full bg-gray-100 h-2 rounded-full mt-6 overflow-hidden">
                <div id="progress" class="bg-blue-600 h-full w-0"></div>
            </div>
        </div>
    </main>

    <nav>
        <button onclick="showTab('feed')" id="btn-feed" class="nav-item active">
            <span class="text-2xl">🏠</span>
            <span>Feed</span>
        </button>
        <button onclick="showTab('ganhos')" id="btn-ganhos" class="nav-item">
            <span class="text-2xl">💰</span>
            <span>Ganhos</span>
        </button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        let user = { id: localStorage.getItem('apex_uid'), saldo: 0, actions: 0 };

        async function init() {
            if(!user.id) { 
                let id = prompt("ID DE UTILIZADOR:");
                if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
            }
            let { data } = await sb.from('perfis').select('*').eq('id', user.id).single();
            if(data) user.saldo = data.saldo;
            updateUI(); loadFeed();
        }

        async function loadFeed() {
            let { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            let html = "";
            posts.forEach(p => {
                html += `
                <div class="fb-post">
                    <div class="fb-p-header">
                        <div class="fb-p-avatar">👤</div>
                        <div class="fb-p-info">
                            <span class="fb-p-name">Utilizador ${p.user_id.slice(0,5)}</span>
                            <span class="fb-p-time">Agora mesmo</span>
                        </div>
                    </div>
                    <div class="fb-p-content">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="fb-p-image">` : ''}
                    <div class="fb-p-actions">
                        <button onclick="earn(0.0006)" class="fb-p-btn">👍 Gostar</button>
                        <button onclick="earn(0.0010)" class="fb-p-btn">💬 Comentar</button>
                        <button class="fb-p-btn">🔗 Partilhar</button>
                    </div>
                </div>`;
            });
            document.getElementById('feed-container').innerHTML = html;
        }

        function earn(val) {
            user.saldo += val;
            updateUI();
            sb.from('perfis').upsert({ id: user.id, saldo: user.saldo }).then();
        }

        async function sendPost() {
            let txt = document.getElementById('post-text').value;
            let img = document.getElementById('post-img').value;
            if(!txt) return;
            await sb.from('posts').insert([{ user_id: user.id, content: txt, image_url: img }]);
            earn(0.0150);
            closePub();
            loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (user.saldo * 6.1245).toFixed(4) + " BRL";
            document.getElementById('wall-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('wall-brl').innerText = (user.saldo * 6.1245).toFixed(4) + " BRL";
            let p = (user.saldo / 5.0) * 100;
            document.getElementById('progress').style.width = Math.min(p, 100) + "%";
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
        }

        function openPub() { document.getElementById('pub-modal').classList.remove('hidden'); }
        function closePub() { document.getElementById('pub-modal').classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
