<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social - Multi-User Simulation</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .login-bar { position: fixed; top: 72px; left: 0; right: 0; z-index: 300; background: #fff; border-bottom: 2px solid var(--g-blue); padding: 8px; display: flex; gap: 8px; align-items: center; }
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; cursor: pointer; position: relative; }
        .count-badge { position: absolute; top: 2px; right: 28%; background: var(--g-red); color: white; font-size: 9px; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1.5px solid white; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-24">

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic">S</div>
            <h1 class="text-[12px] font-black uppercase text-blue-600">Social Earn</h1>
        </div>
        <div class="text-right">
            <div id="display-eur" class="font-black text-green-600 text-lg">0.0000€</div>
            <div id="display-id" class="text-[9px] font-black text-gray-400 uppercase">ID: DESCONHECIDO</div>
        </div>
    </header>

    <div class="login-bar shadow-md">
        <input id="login-id" type="number" placeholder="INTRODUZA ID (ex: 1001)" class="flex-1 border p-2 rounded text-[10px] font-black">
        <button onclick="simularLogin()" class="bg-blue-600 text-white px-4 py-2 rounded font-black text-[10px] uppercase">Entrar</button>
    </div>

    <main class="max-w-lg mx-auto pt-[130px] px-4">
        
        <section id="view-social" class="tab-content active">
            <div class="google-card p-4 border-t-4 border-blue-600">
                <textarea id="post-text" placeholder="O QUE ESTÁ A PENSAR?" class="w-full border-none focus:ring-0 text-[11px] font-black uppercase" rows="1"></textarea>
                <button onclick="fazerPost()" class="w-full bg-blue-600 text-white py-2 mt-2 rounded font-black text-[10px] uppercase">Publicar (+0.0150€)</button>
            </div>
            <div id="feed"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="google-card p-10 text-center border-t-[10px] border-blue-600">
                <p class="text-[11px] font-black text-gray-400 uppercase">Saldo Acumulado deste ID</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center font-black text-[11px]">REDE</button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center font-black text-[11px]">CARTEIRA</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let CURRENT_USER_ID = null;
        let CURRENT_SALDO = 0;

        // --- Lógica de Login/Troca de Utilizador ---
        async function simularLogin() {
            const idInput = document.getElementById('login-id').value;
            if(!idInput) return alert("Insira um ID!");

            CURRENT_USER_ID = parseInt(idInput);
            
            // Tenta buscar o perfil ou cria um novo se não existir
            let { data, error } = await sb.from('perfis').select('saldo').eq('id', CURRENT_USER_ID).single();
            
            if (error && error.code === "PGRST116") { // Perfil não existe
                await sb.from('perfis').insert([{ id: CURRENT_USER_ID, saldo: 0 }]);
                CURRENT_SALDO = 0;
            } else {
                CURRENT_SALDO = parseFloat(data.saldo);
            }

            document.getElementById('display-id').innerText = "ID: " + CURRENT_USER_ID;
            updateUI();
            loadFeed();
            alert("Sessão iniciada como Utilizador " + CURRENT_USER_ID);
        }

        async function loadFeed() {
            const container = document.getElementById('feed');
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            
            container.innerHTML = "";
            for (const p of posts) {
                const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', p.id);
                
                container.innerHTML += `
                <div class="google-card p-4 shadow-sm">
                    <div class="text-[9px] text-gray-400 font-black mb-2 uppercase">Post de ID: ${p.user_id}</div>
                    <p class="text-[12px] font-black uppercase mb-4">${p.content}</p>
                    <div class="flex border-t pt-2">
                        <div onclick="addGain(0.0006)" class="interaction-btn">👍 <span class="text-[8px]">GOSTAR</span></div>
                        <div onclick="alert('Funcionalidade de comentário ativa para ID ' + CURRENT_USER_ID)" class="interaction-btn border-x"><div class="count-badge">${count || 0}</div>💬 <span class="text-[8px]">COMENTAR</span></div>
                        <div onclick="addGain(0.0020)" class="interaction-btn">🔗 <span class="text-[8px]">PARTILHAR</span></div>
                    </div>
                </div>`;
            }
        }

        async function addGain(val) {
            if(!CURRENT_USER_ID) return alert("Faça login primeiro!");
            
            CURRENT_SALDO += val;
            updateUI();
            
            // Grava o ganho apenas para o utilizador atual
            await sb.from('perfis').update({ saldo: CURRENT_SALDO }).eq('id', CURRENT_USER_ID);
        }

        async function fazerPost() {
            if(!CURRENT_USER_ID) return alert("Faça login primeiro!");
            const txt = document.getElementById('post-text').value;
            if(!txt) return;

            const { error } = await sb.from('posts').insert([{ user_id: CURRENT_USER_ID, content: txt }]);
            if(!error) {
                document.getElementById('post-text').value = "";
                await addGain(0.0150);
                loadFeed();
            }
        }

        function updateUI() {
            const s = CURRENT_SALDO.toFixed(4) + "€";
            document.getElementById('display-eur').innerText = s;
            document.getElementById('wall-eur').innerText = s;
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        window.onload = () => { console.log("Pronto para simulação."); };
    </script>
</body>
</html>
