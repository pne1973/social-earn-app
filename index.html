<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn v33.12 - FIX DEFINITIVO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--fb-bg); margin: 0; padding-top: 175px; padding-bottom: 80px; font-weight: 700; }
        
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 1px solid #ddd; z-index: 2000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-bar { position: fixed; top: 72px; width: 100%; height: 40px; background: white; border-bottom: 1px solid #eee; z-index: 1999; display: flex; align-items: center; padding: 0 16px; font-size: 10px; color: #34A853; text-transform: uppercase; }
        .publisher { position: fixed; top: 112px; width: 100%; background: white; padding: 12px; z-index: 1998; border-bottom: 8px solid #ddd; }
        
        .fb-post { background: white; margin-bottom: 8px; border-bottom: 1px solid #ddd; width: 100%; }
        .fb-h { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .fb-avatar { width: 36px; height: 36px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .fb-c { padding: 0 12px 12px; font-size: 15px; font-weight: 400; line-height: 1.4; color: #1c1e21; }
        .fb-img { width: 100%; display: block; background: #f0f2f5; }
        .fb-a { display: flex; border-top: 1px solid #eee; margin: 0 12px; padding: 4px 0; }
        .fb-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px; color: #65676b; font-size: 12px; font-weight: 700; }

        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 1px solid #ddd; display: flex; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #65676b; font-weight: 900; }
        .nav-item.active { color: var(--fb-blue); }
        .nav-line { width: 30px; height: 3px; background: transparent; border-radius: 2px; margin-bottom: 4px; }
        .nav-item.active .nav-line { background: var(--fb-blue); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white italic font-black text-2xl">S</div>
            <span class="text-blue-600 font-black text-xs uppercase">Social Earn</span>
        </div>
        <div class="text-right">
            <div id="top-saldo" class="text-green-600 text-xl font-black">0.0000</div>
            <div id="top-cur" class="text-gray-400 text-[8px] font-black uppercase">...</div>
        </div>
    </header>

    <div class="status-bar">
        <span>Ganhos Ativos: 100%</span>
        <button onclick="logout()" class="ml-auto text-gray-300">Sair</button>
    </div>

    <main id="tab-feed" class="tab-content active">
        <div class="publisher">
            <div onclick="openPost()" class="bg-gray-100 rounded-full px-4 py-2 text-gray-400 text-sm font-bold flex items-center gap-2">
                <div class="fb-avatar" style="width:20px; height:20px;">👤</div>
                O que estás a pensar?
            </div>
        </div>
        <div id="feed-container">
            <p class="p-20 text-center text-gray-400 text-xs animate-pulse">A carregar publicações...</p>
        </div>
    </main>

    <main id="tab-ganhos" class="tab-content px-6 pt-10">
        <div class="bg-white p-10 text-center rounded-3xl shadow-sm border border-gray-100">
            <p class="text-[10px] text-gray-300 uppercase mb-2">Saldo Disponível</p>
            <h1 id="wall-saldo" class="text-4xl font-black text-blue-600 mb-6">0.0000</h1>
            <div class="w-full bg-gray-100 h-2 rounded-full mb-4">
                <div id="bar" class="bg-blue-600 h-full rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
            <p id="min-text" class="text-[9px] text-gray-400 uppercase font-black"></p>
        </div>
    </main>

    <nav>
        <button onclick="show('feed')" id="btn-feed" class="nav-item active"><div class="nav-line"></div>🏠 Feed</button>
        <button onclick="show('ganhos')" id="btn-ganhos" class="nav-item"><div class="nav-line"></div>💰 Ganhos</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = { 
            id: localStorage.getItem('apex_uid'), 
            saldo: 0,
            cur: { sym: '€', code: 'EUR', min: 5.0 }
        };

        function setupLocale() {
            if (navigator.language === 'pt-BR') user.cur = { sym: 'R$', code: 'BRL', min: 25.0 };
            document.getElementById('top-cur').innerText = user.cur.code;
            document.getElementById('min-text').innerText = `Saque Mínimo: ${user.cur.sym}${user.cur.min.toFixed(2)}`;
        }

        async function loadFeed() {
            const container = document.getElementById('feed-container');
            const { data: posts, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            
            if (error) { container.innerHTML = `<p class='p-10 text-red-500 text-xs'>Erro: ${error.message}</p>`; return; }
            if (!posts.length) { container.innerHTML = `<p class='p-10 text-center text-gray-400'>Nenhuma publicação.</p>`; return; }

            let html = "";
            posts.forEach((p, idx) => {
                // FIX CRÍTICO: Converter user_id para String antes do slice
                const safeId = String(p.user_id).slice(0, 5);
                html += `
                <div class="fb-post">
                    <div class="fb-h">
                        <div class="fb-avatar">👤</div>
                        <div class="flex flex-col"><span class="text-[14px] font-bold">User ${safeId}</span><span class="text-[11px] text-gray-400 font-normal">Publicado agora</span></div>
                    </div>
                    <div class="fb-c">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="fb-img">` : ''}
                    <div class="fb-a">
                        <button onclick="earn(0.0006)" class="fb-btn">👍 Gosto</button>
                        <button onclick="earn(0.0010)" class="fb-btn">💬 Comentar</button>
                        <button onclick="earn(0.0015)" class="fb-btn">🔗 Partilhar</button>
                    </div>
                </div>`;
                if((idx+1)%3 === 0) html += `<div class="p-8 text-center text-[8px] text-gray-300 font-black uppercase tracking-widest bg-white mb-2">Anúncio Patrocinado</div>`;
            });
            container.innerHTML = html;
        }

        async function init() {
            if (!user.id) {
                const id = prompt("ID DE UTILIZADOR:");
                if (id) { localStorage.setItem('apex_uid', id); location.reload(); }
                return;
            }
            setupLocale();
            const { data } = await sb.from('perfis').select('saldo').eq('id', user.id).single();
            if (data) user.saldo = Number(data.saldo);
            updateUI();
            loadFeed();
        }

        function earn(v) {
            user.saldo += v;
            updateUI();
            sb.from('perfis').update({ saldo: user.saldo }).eq('id', user.id).then();
        }

        function updateUI() {
            const val = `${user.cur.sym}${user.saldo.toFixed(4)}`;
            document.getElementById('top-saldo').innerText = val;
            document.getElementById('wall-saldo').innerText = val;
            let p = (user.saldo / user.cur.min) * 100;
            document.getElementById('bar').style.width = Math.min(p, 100) + "%";
        }

        function show(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            window.scrollTo(0,0);
        }

        async function openPost() {
            const txt = prompt("O QUE ESTÁS A PENSAR?");
            if(txt) {
                const img = prompt("URL DA IMAGEM (OPCIONAL):");
                await sb.from('posts').insert({ user_id: user.id, content: txt, image_url: img });
                earn(0.0150);
                loadFeed();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
