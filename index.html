<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network v33.12 - Fixed Tabs & UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; margin: 0; overflow-x: hidden; }
        
        /* Camadas Fixas com Z-Index Controlado */
        header { position: fixed; top: 0; width: 100%; z-index: 900; height: 60px; background: white; border-bottom: 1px solid #dadce0; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { position: fixed; top: 60px; width: 100%; z-index: 800; height: 30px; background: #f8f9fa; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 9px; text-transform: uppercase; color: var(--g-green); }
        .publisher-fixed { position: fixed; top: 90px; width: 100%; z-index: 700; background: white; border-bottom: 1px solid #dadce0; padding: 10px 16px; }
        
        /* Área de Conteúdo */
        .content-area { padding-top: 155px; padding-bottom: 80px; min-height: 100vh; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Estilo dos Cards e Interações */
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .stats-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; }
        .like-badge { display: flex; align-items: center; gap: 5px; background: #e8f0fe; color: #1967d2; padding: 4px 12px; border-radius: 20px; font-size: 11px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #f1f3f4; border-bottom: 1px solid #f1f3f4; }
        .action-btn { padding: 14px 0; font-size: 11px; font-weight: 900; color: #5f6368; text-transform: uppercase; text-align: center; background: white; }
        .action-btn:not(:last-child) { border-right: 1px solid #f1f3f4; }

        /* Navegação Inferior (Prioridade Máxima de Clique) */
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #dadce0; display: flex; z-index: 1001; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #9aa0a6; cursor: pointer; border-top: 3px solid transparent; }
        .nav-link.active { color: var(--g-blue); border-top-color: var(--g-blue); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">S</div>
            <span class="text-[10px] font-black uppercase text-blue-600">Social Network</span>
        </div>
        <div id="top-bal" class="text-lg font-black text-green-600">0.0000€</div>
    </header>

    <div class="status-bar">MODO NORMAL (100% GANHOS)</div>

    <div id="pub-section" class="publisher-fixed">
        <div id="mini-input" onclick="setPub(true)" class="flex items-center gap-3 bg-gray-100 rounded-full px-4 py-2 cursor-pointer border border-gray-200">
            <div class="w-6 h-6 bg-gray-300 rounded-full"></div>
            <span class="text-[10px] text-gray-400 font-black uppercase">O que quer partilhar?</span>
        </div>
        <div id="full-input" class="hidden">
            <textarea id="p-text" placeholder="ESCREVA AQUI..." class="w-full border-none outline-none font-black uppercase text-xs p-2 mb-2" rows="2"></textarea>
            <div class="flex gap-2">
                <button onclick="setPub(false)" class="flex-1 text-[9px] font-black text-gray-400 uppercase">Fechar</button>
                <button onclick="sendP()" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase">Publicar</button>
            </div>
        </div>
    </div>

    <main class="content-area px-4 max-w-md mx-auto">
        <section id="tab-feed" class="tab-content active">
            <div id="social-feed"></div>
        </section>

        <section id="tab-wallet" class="tab-content">
            <div class="google-card p-8 text-center mt-4">
                <span class="text-[10px] text-gray-400 uppercase">Saldo Total</span>
                <h2 id="wall-bal" class="text-4xl font-black text-blue-600 mt-2">0.0000€</h2>
                <button class="w-full bg-gray-100 text-gray-400 py-4 rounded-xl mt-6 font-black uppercase text-xs">Levantar (Mín. 5€)</button>
            </div>
        </section>

        <section id="tab-menu" class="tab-content">
            <div class="google-card p-4 mt-4 text-center">
                <button onclick="localStorage.clear(); location.reload();" class="text-red-500 font-black uppercase text-xs">Sair da Conta</button>
            </div>
        </section>
    </main>

    <nav>
        <div onclick="switchTab('feed')" id="nav-feed" class="nav-link active">Feed</div>
        <div onclick="switchTab('wallet')" id="nav-wallet" class="nav-link">Carteira</div>
        <div onclick="switchTab('menu')" id="nav-menu" class="nav-link">Menu</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        let uID = localStorage.getItem('apex_uid') || "5401881400";
        let bal = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', uID).single();
            if(data) bal = Number(data.saldo);
            updateUI();
            loadPosts();
        }

        async function loadPosts() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const feed = document.getElementById('social-feed');
            feed.innerHTML = "";
            posts.forEach(p => {
                feed.innerHTML += `
                <div class="google-card shadow-sm">
                    <div class="p-4 pb-0">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="w-8 h-8 bg-blue-100 rounded-full"></div>
                            <span class="text-[10px] font-black text-blue-600 uppercase">${p.user_id}</span>
                        </div>
                        <p class="text-[13px] font-bold text-gray-800 mb-4">${p.content}</p>
                        <div class="stats-row">
                            <div class="like-badge">👍 ${Math.floor(Math.random()*15)}</div>
                            <div class="text-[10px] text-gray-400 uppercase">0 comentários</div>
                        </div>
                        <div class="action-grid">
                            <button onclick="reward(0.0006)" class="action-btn">Gosto</button>
                            <button class="action-btn">Comentar</button>
                            <button onclick="reward(0.0020)" class="action-btn">Partilhar</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function switchTab(tab) {
            // Esconde todos os conteúdos
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            // Ativa o selecionado
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
            
            // Esconde o publicador se não for a aba feed
            document.getElementById('pub-section').style.display = (tab === 'feed') ? 'block' : 'none';
        }

        async function sendP() {
            const txt = document.getElementById('p-text').value;
            if(!txt) return;
            await sb.from('posts').insert([{ user_id: uID, content: txt }]);
            reward(0.0150);
            setPub(false);
            loadPosts();
        }

        function reward(v) {
            bal += v;
            updateUI();
            sb.from('perfis').upsert({ id: uID, saldo: bal });
        }

        function updateUI() {
            document.getElementById('top-bal').innerText = bal.toFixed(4) + "€";
            document.getElementById('wall-bal').innerText = bal.toFixed(4) + "€";
        }

        function setPub(s) {
            document.getElementById('mini-input').classList.toggle('hidden', s);
            document.getElementById('full-input').classList.toggle('hidden', !s);
        }

        init();
    </script>
</body>
</html>
