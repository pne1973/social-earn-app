<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v39.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blue: #4285F4; --bg: #f2f4f7; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-top: 60px; padding-bottom: 20px; }
        
        header { position: fixed; top: 0; width: 100%; height: 55px; background: white; border-bottom: 1px solid #ddd; z-index: 9999; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }

        /* CONTENTOR PRINCIPAL: Garante que os posts não se batam */
        #feed { display: block; width: 100%; max-width: 500px; margin: 0 auto; }

        /* CARTÃO: Isolamento absoluto */
        .post-card { 
            background: white; 
            margin: 12px; 
            border-radius: 12px; 
            border: 1px solid #e1e4e8;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Corta qualquer coisa que tente sair do cartão */
            position: relative;
        }

        /* IMAGEM: Respeita o aspeto original sem sobrepor */
        .post-img-container { width: 100%; background: #f8f9fa; }
        .post-img-container img { 
            width: 100%; 
            height: auto; 
            display: block; 
            max-height: 400px; 
            object-fit: contain; /* Garante que a foto inteira apareça sem esticar */
        }

        /* TEXTO E BOTÕES: Empilhamento garantido */
        .post-footer { padding: 12px; border-top: 1px solid #f0f0f0; }
        .post-text { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 10px; }
        
        .post-actions { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            border-top: 1px solid #eee; 
            padding-top: 8px;
        }
        .action-item { text-align: center; font-size: 10px; font-weight: 800; color: #5f6368; text-transform: uppercase; }

        .btn-pub { background: var(--blue); color: white; border-radius: 8px; font-weight: 800; padding: 12px; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--blue);">APEX SOCIAL</div>
        <div id="u-saldo" style="color: #28a745; font-weight: 900;">0.0000€</div>
    </header>

    <main>
        <div class="post-card p-4">
            <textarea id="in-txt" placeholder="O que pretende partilhar?" class="w-full border-none focus:ring-0 font-bold text-sm mb-3" rows="2"></textarea>
            <div id="status" class="hidden text-[10px] font-black text-blue-600 mb-2 uppercase">📸 Imagem Pronta</div>
            <div class="flex gap-2">
                <label for="in-file" class="bg-gray-100 p-3 rounded-lg cursor-pointer text-[10px] font-black text-gray-500 uppercase">Foto</label>
                <input type="file" id="in-file" accept="image/*" class="hidden" onchange="processarFoto()">
                <button onclick="publicar()" id="btn-pub" class="btn-pub uppercase">Publicar</button>
            </div>
        </div>

        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);
        const MASTER_ID = "5401881400";
        let fotoBase64 = "";

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) document.getElementById('u-saldo').innerText = data.saldo.toFixed(4) + "€";
            carregarFeed();
        }

        function processarFoto() {
            const file = document.getElementById('in-file').files[0];
            if (!file) return;
            document.getElementById('status').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 700;
                    const scale = maxW / img.width;
                    canvas.width = maxW;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    fotoBase64 = canvas.toDataURL('image/jpeg', 0.5); // Comprimido para 50% para carregar mais rápido
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function publicar() {
            const txt = document.getElementById('in-txt').value;
            const btn = document.getElementById('btn-pub');
            if(!txt && !fotoBase64) return;
            
            btn.disabled = true; btn.innerText = "A ENVIAR...";

            const { error } = await _sb.from('posts').insert([{ user_id: MASTER_ID, content: txt, image_url: fotoBase64 }]);
            if(!error) window.location.reload();
            else { btn.disabled = false; btn.innerText = "ERRO"; }
        }

        async function carregarFeed() {
            const { data: posts } = await _sb.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = "";

            posts?.forEach(p => {
                if(!p.content && !p.image_url) return;

                const card = document.createElement('div');
                card.className = "post-card";
                
                let imgHtml = p.image_url ? `
                    <div class="post-img-container">
                        <img src="${p.image_url}" loading="lazy">
                    </div>` : "";

                card.innerHTML = `
                    ${imgHtml}
                    <div class="post-footer">
                        ${p.content ? `<p class="post-text">${p.content}</p>` : ''}
                        <div class="post-actions">
                            <div class="action-item">Gosto</div>
                            <div class="action-item">Comentar</div>
                            <div class="action-item">Partilhar</div>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
