<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pine Social</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RESET E FUNDO INFINITO - MANTIDO INTEGRALMENTE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background-color: #121212; height: 100%; }
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding-top: 165px; 
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER FIXO - MANTIDO */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
        .ad-top { background: #1a1a1a; color: #ffcc00; padding: 8px; text-align: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #333; }
        .nav-main { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .xp-pill { background: #ffcc00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        /* TABS - MANTIDO */
        .tabs { display: flex; background: #1a1a1a; border-top: 1px solid #333; }
        .tab-item { flex: 1; padding: 14px; text-align: center; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .tab-item.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; }

        /* CONTENTOR - MANTIDO */
        .content { padding: 15px; max-width: 550px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* CARDS E POSTS - MANTIDO */
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .post { background: #1e1e1e; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; background: #1a1a1a; border-bottom: 1px solid #252525; }
        .post-avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffcc00; font-weight: bold; border: 1px solid #444; }
        .post-text { padding: 15px; font-size: 15px; line-height: 1.5; color: #eee; word-wrap: break-word; }
        .post-img { width: 100%; height: auto; display: block; border-top: 1px solid #252525; background: #000; max-height: 550px; object-fit: contain; }

        /* INPUTS - MANTIDO */
        .input-area { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; resize: none; min-height: 80px; font-size: 15px; margin-bottom: 10px; outline: none; }
        .btn-pub { background: #ffcc00; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-pub:disabled { opacity: 0.5; }

        .admin-link { display: none; }
        .ad-injection { border: 1px dashed #ffcc00; padding: 15px; text-align: center; border-radius: 12px; margin-bottom: 20px; color: #ffcc00; font-size: 11px; font-weight: bold; background: rgba(255,204,0,0.05); }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="ad-top">📢 CONVITE: Ganha +100 XP por cada amigo convidado!</div>
        <div class="nav-main">
            <h3 style="letter-spacing:1px;">PINE <span style="color:#ffcc00">SOCIAL</span></h3>
            <div id="userXP" class="xp-pill">0 XP</div>
        </div>
        <div class="tabs">
            <div class="tab-item active" onclick="openTab('feed-page', this)">Feed</div>
            <div class="tab-item" onclick="openTab('earn-page', this)">Ranking</div>
            <div class="tab-item" onclick="openTab('wallet-page', this)">Saque</div>
            <div id="adm-tab" class="tab-item admin-link" onclick="openTab('admin-page', this)">Admin</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div class="card">
                <textarea id="postText" class="input-area" placeholder="O que tens em mente?"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:#888; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                    <span id="procStatus" style="display:none; color:#ffcc00; font-size:11px; font-weight:bold;">A processar...</span>
                    <button class="btn-pub" id="pubBtn" onclick="publish()">Publicar</button>
                </div>
            </div>
            <div id="feed-items">Carregando publicações...</div>
        </div>

        <div id="earn-page" class="page">
            <div class="card">
                <h2 style="color:#ffcc00">Top 10 Ranking</h2><br>
                <div id="rankingList" style="font-size: 14px; line-height: 2;">Carregando ranking...</div>
            </div>
        </div>

        <div id="wallet-page" class="page">
            <div class="card" style="text-align:center;">
                <p>Saldo convertível</p>
                <h1 style="color:#ffcc00; font-size:40px; margin:15px 0;"><span id="euroVal">0.0000</span>€</h1>
                <p style="font-size:12px; color:#666;">Mínimo de 5000 XP para levantamento.</p>
            </div>
        </div>

        <div id="admin-page" class="page">
            <div class="card" style="border:1px solid #ff4444">
                <h3 style="color:#ff4444">Painel de Controlo</h3>
                <div id="adminStats" style="margin: 15px 0; font-size: 14px;">Estatísticas: ...</div>
                
                <hr style="border:0; border-top:1px solid #333; margin-bottom:15px;">
                
                <button class="btn-pub" style="background:#ff4444; color:#fff; width:100%; margin-bottom:15px;" onclick="deleteAllPosts()">
                    <i class="fas fa-dumpster-fire"></i> APAGAR TODOS OS POSTS
                </button>

                <input type="text" id="deleteId" class="input-area" style="min-height:45px;" placeholder="Ou ID específico para apagar">
                <button class="btn-pub" style="background:#555; color:#fff; width:100%;" onclick="adminDelete()">Eliminar por ID</button>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const myId = 5401881400;

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'feed-page') fetchFeed();
            if(id === 'earn-page') fetchRanking();
            if(id === 'admin-page') fetchAdminData();
            window.scrollTo(0,0);
        }

        async function getProfile() {
            const { data } = await client.from('profiles').select('points').eq('id', myId).single();
            if (data) {
                document.getElementById('userXP').innerText = data.points + " XP";
                document.getElementById('euroVal').innerText = (data.points * 0.0010).toFixed(4);
            }
            if(myId === 5401881400) document.getElementById('adm-tab').style.display = 'block';
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('pubBtn');
            const status = document.getElementById('procStatus');
            
            if(!txt && !file) return;
            
            btn.disabled = true;
            status.style.display = 'inline';
            let img = null;

            if(file) {
                const name = `pine_${Date.now()}.jpg`;
                const { data, error } = await client.storage.from('post-images').upload(name, file);
                if(!error) img = client.storage.from('post-images').getPublicUrl(name).data.publicUrl;
            }

            await client.from('posts').insert([{ user_id: myId, content: txt, image_url: img }]);
            await client.rpc('increment_points', { user_id: myId, amount: 15 });
            
            document.getElementById('postText').value = '';
            document.getElementById('fileInput').value = '';
            status.style.display = 'none';
            btn.disabled = false;
            fetchFeed();
            getProfile();
        }

        async function fetchFeed() {
            const { data } = await client.from('posts').select('*').order('created_at', {ascending: false}).limit(10);
            const list = document.getElementById('feed-items');
            list.innerHTML = '';
            if(data) {
                data.forEach((p, index) => {
                    const el = document.createElement('div');
                    el.className = 'post';
                    el.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">${p.user_id.toString().slice(-1)}</div>
                            <span style="font-weight:bold; font-size:13px;">User #${p.user_id.toString().slice(-4)}</span>
                            <small style="margin-left:auto; color:#555; font-size:9px;">ID: ${p.id}</small>
                        </div>
                        <div class="post-text">${p.content || ''}</div>
                        ${p.image_url ? `<img src="${p.image_url}" class="post-img" loading="lazy">` : ''}
                    `;
                    list.appendChild(el);

                    if((index + 1) % 3 === 0) {
                        list.innerHTML += `<div class="ad-injection">📢 AD: Ganha XP bónus no primeiro Check-in do dia!</div>`;
                    }
                });
            }
        }

        async function fetchRanking() {
            const { data } = await client.from('profiles').select('id, points').order('points', {ascending: false}).limit(10);
            const container = document.getElementById('rankingList');
            container.innerHTML = '';
            if(data) {
                data.forEach((u, i) => {
                    container.innerHTML += `<p><b>#${i+1}</b> User ...${u.id.toString().slice(-4)} <span style="float:right; color:#ffcc00;">${u.points} XP</span></p>`;
                });
            }
        }

        async function fetchAdminData() {
            const { count: uCount } = await client.from('profiles').select('*', { count: 'exact', head: true });
            const { count: pCount } = await client.from('posts').select('*', { count: 'exact', head: true });
            document.getElementById('adminStats').innerHTML = `Users: <b>${uCount}</b> | Posts: <b>${pCount}</b>`;
        }

        async function adminDelete() {
            const id = document.getElementById('deleteId').value;
            if(!id) return;
            const { error } = await client.from('posts').delete().eq('id', id);
            if(!error) { alert("Removido!"); fetchFeed(); fetchAdminData(); }
        }

        // NOVA FUNÇÃO: Apagar tudo (Apenas para Posts)
        async function deleteAllPosts() {
            if(!confirm("⚠️ ATENÇÃO: Desejas apagar TODOS os posts da base de dados? Esta ação é irreversível.")) return;
            
            // No Supabase, para apagar tudo sem filtro, usamos um filtro que apanhe todos os IDs
            const { error } = await client.from('posts').delete().neq('id', 0); 
            
            if(!error) {
                alert("Limpeza completa concluída com sucesso!");
                fetchFeed();
                fetchAdminData();
            } else {
                alert("Erro na limpeza: " + error.message);
            }
        }

        getProfile();
        fetchFeed();
    </script>
</body>
</html>
