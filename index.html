<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v40.2 - Master Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --border: #dadce0; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; margin: 0; padding-top: 72px; padding-bottom: 85px; }
        
        .google-card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; position: relative; }
        .ad-banner { background: #fff8e1; border: 2px dashed #fbc02d; padding: 15px; text-align: center; border-radius: 12px; margin: 10px 0; }
        
        /* Contador de Interações (Badge Vermelho) */
        .counter-badge { position: absolute; top: -5px; right: 10px; background: var(--g-red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid white; font-weight: 900; }
        
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; cursor: pointer; position: relative; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
        .earning-text { font-size: 3rem; font-weight: 900; color: var(--g-green); -webkit-text-stroke: 1.5px white; }
    </style>
</head>
<body>

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[500] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-sm">A</div>
            <div>
                <h1 class="text-sm font-black uppercase text-blue-600 tracking-tighter">Apex Social</h1>
                <div class="text-[9px] text-green-500 font-black">STATUS: 100% OK</div>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase italic">0.0000 BRL</div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-3">
        <section id="view-social" class="tab-content active">
            <div class="google-card p-4 border-t-8 border-blue-600 shadow-md">
                <textarea id="post-input" placeholder="O QUE PRETENDE PARTILHAR? (+0.0150€)" class="w-full border-none text-xs font-black uppercase outline-none focus:ring-0 mb-3" rows="2"></textarea>
                <div class="border-2 border-dashed border-gray-200 rounded-lg p-4 mb-3 text-center text-gray-400 text-[10px] uppercase font-black">
                    📸 Anexar Foto da Galeria
                </div>
                <button onclick="publish()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-black uppercase text-[11px]">Publicar Agora</button>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content hidden">
            <div class="google-card p-10 text-center border-t-[10px] border-blue-600 mt-4 shadow-xl">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2">Carteira Total</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p id="wall-brl" class="text-sm font-black text-gray-400 mt-2">0.0000 BRL</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[500]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black">REDE</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black">GANHOS</span></button>
        <button onclick="nav('admin')" class="nav-item flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black">GESTÃO</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let userBalance = 0;
        let adCounter = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) userBalance = Number(data.saldo);
            updateUI(); loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = userBalance.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = userBalance.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (userBalance * 6.1245).toFixed(4) + " BRL";
            document.getElementById('wall-brl').innerText = (userBalance * 6.1245).toFixed(4) + " BRL";
        }

        async function earn(amount) {
            adCounter++;
            
            // Lógica de Anúncio à 2ª Interação (e subsequentes pares)
            if(adCounter % 2 === 0) {
                alert("📢 ANÚNCIO PATROCINADO: Ganhe mais pontos convidando amigos!");
            }

            userBalance += amount;
            const el = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + amount.toFixed(4) + "€";
            el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800);
            
            updateUI();
            await sb.from('perfis').update({ saldo: userBalance }).eq('id', MASTER_ID);
        }

        async function publish() {
            const content = document.getElementById('post-input').value;
            if(!content) return;
            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content: content }]);
            if(!error) {
                document.getElementById('post-input').value = "";
                await earn(0.0150);
                loadFeed();
            }
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            
            posts.forEach((p, index) => {
                if(index > 0 && index % 3 === 0) {
                    container.innerHTML += `<div class="ad-banner"><p class="text-[10px] font-black uppercase">Anúncio Patrocinado</p></div>`;
                }

                const card = document.createElement('div');
                card.className = "google-card shadow-sm p-5";
                card.innerHTML = `
                    <p class="text-[13px] font-black uppercase text-gray-800 mb-5">${p.content}</p>
                    <div class="flex border-t pt-3 gap-2">
                        <div onclick="earn(0.0002); updateCount(this)" class="interaction-btn">
                            <span class="counter-badge">4</span>
                            <span class="text-xl">👍</span><span class="text-[9px] uppercase">Gostar</span>
                        </div>
                        <div onclick="earn(0.0005); updateCount(this)" class="interaction-btn border-x border-gray-100">
                            <span class="counter-badge">0</span>
                            <span class="text-xl">💬</span><span class="text-[9px] uppercase">Comentar</span>
                        </div>
                        <div onclick="earn(0.0010); updateCount(this)" class="interaction-btn">
                            <span class="counter-badge">0</span>
                            <span class="text-xl">🔗</span><span class="text-[9px] uppercase">Partilhar</span>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function updateCount(el) {
            const badge = el.querySelector('.counter-badge');
            badge.innerText = parseInt(badge.innerText) + 1;
        }

        function nav(t) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
