<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        
        /* CORREÇÃO DE LAYOUT: Card Flexível */
        .google-card { 
            background: white; 
            border: 1px solid #dadce0; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 16px; 
            display: flex; 
            flex-direction: column; 
            width: 100%;
        }
        
        /* CORREÇÃO PARA TEXTOS LONGOS */
        .post-text-container {
            padding: 20px;
            word-break: break-word; /* Quebra palavras longas */
            overflow-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
            color: #1f2937;
            text-transform: uppercase;
            font-weight: 900;
        }

        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
        .earning-text { font-size: 3rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 20px rgba(52,168,83,0.4); -webkit-text-stroke: 1.5px white; }

        .interaction-row { display: flex; border-top: 1px solid #eee; margin-top: auto; }
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; border: none; background: transparent; cursor: pointer; position: relative; }
        .interaction-btn:active { background: #f8f9fa; }
        .interaction-badge { position: absolute; top: 5px; right: 20%; background: var(--g-red); color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 900; border: 2px solid white; }

        .status-header-fixed { position: fixed; top: 72px; left: 0; right: 0; z-index: 300; background: white; border-bottom: 1px solid #dadce0; padding: 12px 16px; display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 50px; }
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; }
        .modal-300-250 { width: 300px; background: white; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }

        #feed-container { margin-top: 220px; padding: 0 16px; }
        .publisher-area { margin-top: 130px; padding: 0 16px; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-24">

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <div id="ad-overlay">
        <div id="ad-decision-ui" class="modal-300-250 p-6 text-center">
            <h3 class="text-[11px] font-black uppercase text-blue-600 mb-2">Manter Ganhos a 100%</h3>
            <p class="text-[10px] leading-tight font-bold mb-6 text-gray-400">Vê um anúncio para não perderes o bónus de ganhos atual.</p>
            <button onclick="startAdFlow()" class="w-full py-4 bg-blue-600 text-white rounded-lg shadow-md uppercase text-[11px] mb-2 font-black">Ver Anúncio (15s)</button>
            <button onclick="degradeGains()" class="w-full py-2 text-gray-300 uppercase text-[9px] font-black italic">Aceito a redução</button>
        </div>

        <div id="ad-player-ui" class="modal-300-250 hidden">
            <div class="flex-1 bg-black flex flex-col items-center justify-center text-white p-4">
                <div id="ad-timer-circle" class="font-black text-5xl mb-2">15</div>
                <p class="text-[8px] text-gray-400 uppercase font-black">Publicidade</p>
            </div>
            <button id="close-ad-btn" disabled class="h-14 bg-gray-200 text-gray-400 uppercase text-[10px] font-black italic">Aguarde...</button>
        </div>
    </div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-sm">S</div>
            <h1 class="text-[12px] font-black uppercase text-blue-600">Social Earn Network</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg leading-none">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase mt-1">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-header-fixed">
        <div id="status-text" class="text-[9px] font-black uppercase text-green-600 text-center">100% DE GANHOS ATIVOS</div>
        <button id="restore-btn" onclick="startAdFlow(true)" class="hidden bg-red-600 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase shadow-lg">Restaurar 100%</button>
    </div>

    <main class="max-w-lg mx-auto">
        <section id="view-social" class="tab-content active">
            <div class="publisher-area">
                <div class="google-card p-3 border-t-4 border-blue-600 shadow-md">
                    <textarea id="post-input" onclick="expandPublisher()" placeholder="O QUE PRETENDE PARTILHAR?" class="w-full border-none focus:ring-0 text-[12px] mb-1 resize-none uppercase font-black" rows="1"></textarea>
                    <div id="expanded-post" class="hidden">
                        <input id="post-url" type="text" placeholder="URL DA IMAGEM" class="w-full bg-gray-50 border-none text-[10px] p-2 rounded-lg mb-2 font-black uppercase outline-none">
                        <button onclick="handleInteraction('post')" class="w-full bg-blue-600 text-white py-3 rounded-lg font-black text-[11px] uppercase shadow-sm">Publicar</button>
                    </div>
                </div>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content px-4 mt-24">
            <div class="google-card p-10 text-center border-t-[10px] border-blue-600 shadow-xl">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2">Carteira de Ganhos</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black uppercase">REDE</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black uppercase">GANHOS</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = { saldo: 0, interactions: 0, postsToday: 0, multiplier: 1.0, penaltyExpiry: null };
        let pendingAction = null;

        async function init() {
            const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
            if(data) user.saldo = parseFloat(data.saldo) || 0;
            updateUI(); loadFeed();
            setInterval(updateUI, 1000);
        }

        function updateUI() {
            const displays = ['main-eur', 'wall-eur'];
            displays.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerText = user.saldo.toFixed(4) + "€";
            });
            document.getElementById('main-brl').innerText = (user.saldo * 6.12).toFixed(4) + " BRL";
            
            const statusBox = document.getElementById('status-text');
            const restoreBtn = document.getElementById('restore-btn');
            
            if (user.multiplier < 1.0 && user.penaltyExpiry) {
                const diff = new Date(user.penaltyExpiry) - new Date();
                if (diff > 0) {
                    statusBox.innerText = `${user.multiplier * 100}% DE GANHOS ATÉ ${new Date(user.penaltyExpiry).toLocaleString('pt-PT')}`;
                    statusBox.className = "text-[9px] font-black uppercase text-red-600 text-center";
                    restoreBtn.classList.remove('hidden');
                } else { resetMultiplier(); }
            } else {
                statusBox.innerText = "100% DE GANHOS ATIVOS";
                statusBox.className = "text-[9px] font-black uppercase text-green-600";
                restoreBtn.classList.add('hidden');
            }
        }

        async function applyGain(val) {
            const gain = val * user.multiplier;
            // CORREÇÃO: Soma atómica local antes de enviar
            user.saldo = parseFloat((user.saldo + gain).toFixed(4));
            showBigNumber(gain);
            updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        function handleInteraction(type, val = 0, pid = null) {
            if ((user.interactions >= 2 || user.postsToday >= 3) && user.multiplier === 1.0) {
                pendingAction = { type, val, pid };
                document.getElementById('ad-overlay').style.display = 'flex';
                document.getElementById('ad-decision-ui').classList.remove('hidden');
                document.getElementById('ad-player-ui').classList.add('hidden');
            } else { executeAction(type, val, pid); }
        }

        async function executeAction(type, val, pid) {
            if (type === 'post') await publish();
            else {
                user.interactions++;
                if (type === 'comment') await processComment(pid);
                else applyGain(val);
            }
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!posts) return;
            container.innerHTML = posts.map(p => `
                <div class="google-card shadow-sm">
                    <div class="post-text-container">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="w-full border-y shadow-inner">` : ''}
                    <div class="interaction-row">
                        <button onclick="handleInteraction('like', 0.0006)" class="interaction-btn">
                            <span class="text-xl">👍</span><span class="text-[9px] uppercase font-black text-gray-400">Gostar</span>
                        </button>
                        <button onclick="toggleComments('${p.id}')" class="interaction-btn border-x">
                            <div class="interaction-badge" id="badge-${p.id}">0</div>
                            <span class="text-xl">💬</span><span class="text-[9px] uppercase font-black text-gray-400">Comentar</span>
                        </button>
                        <button onclick="handleInteraction('share', 0.0020)" class="interaction-btn">
                            <span class="text-xl">🔗</span><span class="text-[9px] uppercase font-black text-gray-400">Partilhar</span>
                        </button>
                    </div>
                    <div id="comments-${p.id}" class="hidden bg-gray-50 border-t">
                        <div id="list-${p.id}" class="p-4 space-y-2 max-h-40 overflow-y-auto text-[10px] uppercase font-bold"></div>
                        <div class="p-2 bg-white border-t flex gap-2">
                            <input id="in-${p.id}" type="text" placeholder="COMENTAR..." class="flex-1 bg-gray-100 rounded-lg p-2 text-[10px] font-black outline-none">
                            <button onclick="handleInteraction('comment', 0.0010, '${p.id}')" class="bg-blue-600 text-white px-4 rounded-lg font-black text-[10px]">OK</button>
                        </div>
                    </div>
                </div>
            `).join('');
            posts.forEach(p => updateCommentCount(p.id));
        }

        async function publish() {
            const content = document.getElementById('post-input').value;
            if(!content) return;
            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content, image_url: document.getElementById('post-url').value }]);
            if(!error) {
                user.postsToday++;
                await applyGain(0.0150);
                document.getElementById('post-input').value = "";
                document.getElementById('expanded-post').classList.add('hidden');
                loadFeed();
            }
        }

        function startAdFlow(isDirect = false) {
            document.getElementById('ad-overlay').style.display = 'flex';
            document.getElementById('ad-decision-ui').classList.add('hidden');
            document.getElementById('ad-player-ui').classList.remove('hidden');
            let time = 15;
            const timerText = document.getElementById('ad-timer-circle');
            const btn = document.getElementById('close-ad-btn');
            const countdown = setInterval(() => {
                time--; timerText.innerText = time;
                if(time <= 0) {
                    clearInterval(countdown);
                    btn.disabled = false; btn.innerText = "CONCLUIR RECOMPENSA";
                    btn.className = "h-14 bg-green-600 text-white font-black uppercase text-[10px]";
                    btn.onclick = () => {
                        resetMultiplier();
                        if (!isDirect && pendingAction) executeAction(pendingAction.type, pendingAction.val, pendingAction.pid);
                        closeAd();
                    };
                }
            }, 1000);
        }

        function degradeGains() {
            const steps = [1.0, 0.5, 0.25, 0.05];
            const currentIdx = steps.indexOf(user.multiplier);
            user.multiplier = steps[Math.min(currentIdx + 1, steps.length - 1)];
            user.penaltyExpiry = new Date(Date.now() + 86400000).toISOString();
            if (pendingAction) executeAction(pendingAction.type, pendingAction.val, pendingAction.pid);
            closeAd();
        }

        function closeAd() { document.getElementById('ad-overlay').style.display = 'none'; pendingAction = null; }
        function resetMultiplier() { user.multiplier = 1.0; user.penaltyExpiry = null; user.interactions = 0; updateUI(); }
        async function processComment(pid) {
            const input = document.getElementById(`in-${pid}`);
            if(!input.value) return;
            await sb.from('comentarios').insert([{ post_id: pid, user_id: MASTER_ID, content: input.value }]);
            input.value = ""; applyGain(0.0010); updateCommentList(pid);
        }
        async function updateCommentList(pid) {
            const { data } = await sb.from('comentarios').select('*').eq('post_id', pid).order('created_at', {ascending: true});
            const list = document.getElementById(`list-${pid}`);
            if(list) list.innerHTML = data.map(c => `<div class="bg-white p-2 rounded-lg border shadow-sm mb-1">${c.content}</div>`).join('');
            updateCommentCount(pid);
        }
        async function updateCommentCount(pid) {
            const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', pid);
            const badge = document.getElementById(`badge-${pid}`);
            if(badge) badge.innerText = count || 0;
        }
        function toggleComments(id) { document.getElementById(`comments-${id}`).classList.toggle('hidden'); updateCommentList(id); }
        function showBigNumber(val) {
            const container = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            container.style.display = 'block';
            setTimeout(() => container.style.display = 'none', 800);
        }
        function nav(t) { 
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function expandPublisher() { document.getElementById('expanded-post').classList.remove('hidden'); document.getElementById('post-input').rows = 3; }
        window.onload = init;
    </script>
</body>
</html>
