<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social v32.3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --success: #2e7d32; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: white; padding: 15px; border-bottom: 1px solid #dadce0; position: sticky; top: 0; z-index: 100; text-align: center; }
        .balance-group { font-size: 1.5rem; font-weight: 700; color: var(--success); }
        .btn-logout { position: absolute; right: 15px; top: 20px; font-size: 0.7rem; border: 1px solid #ddd; padding: 5px; border-radius: 4px; cursor: pointer; }
        .feed { max-width: 500px; margin: 20px auto; padding: 0 10px; }
        .post { background: white; border: 1px solid #dadce0; border-radius: 12px; margin-bottom: 20px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .post img { width: 100%; border-radius: 8px; margin-top: 12px; }
        .actions { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #eee; padding-top: 12px; }
        .btn-action { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: 600; padding: 10px; }
    </style>
</head>
<body>

<div id="auth-screen" style="display:none; text-align:center; padding-top:100px;">
    <h2>Entrar no Apex Social</h2>
    <input type="text" id="user-input" placeholder="Digite seu ID" style="padding:10px; border-radius:8px; border:1px solid #ccc; width:250px;"><br><br>
    <button onclick="login()" style="padding:10px 30px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">Entrar</button>
</div>

<header id="app-header" style="display:none;">
    <button class="btn-logout" onclick="logout()">SAIR</button>
    <div class="balance-group" id="balance-display">0.0000€</div>
    <div id="sync-status" style="font-size:0.7rem; color:#777; margin-top:5px;">CONECTADO</div>
</header>

<div class="feed" id="app-feed" style="display:none;"></div>

<script>
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let currentID = localStorage.getItem('apex_uid');
    let user = { saldo: 0.0000 };

    function login() {
        const val = document.getElementById('user-input').value.trim();
        if(val) { localStorage.setItem('apex_uid', val); location.reload(); }
    }
    function logout() { localStorage.removeItem('apex_uid'); location.reload(); }

    async function init() {
        if (!currentID) {
            document.getElementById('auth-screen').style.display = 'block';
            return;
        }
        document.getElementById('app-header').style.display = 'block';
        document.getElementById('app-feed').style.display = 'block';

        // Tenta buscar saldo
        let { data, error } = await sb.from('perfis').select('saldo').eq('id', currentID).single();
        
        if (data) {
            user.saldo = parseFloat(data.saldo) || 0;
        } else {
            // SE O ID NÃO EXISTE, CRIA ELE AGORA
            await sb.from('perfis').insert([{ id: currentID, saldo: 0.0000, nome: 'Teste' }]);
        }
        
        updateUI();
        loadFeed();
    }

    function updateUI() {
        const locale = navigator.language || "pt-PT";
        const isBR = locale.includes("BR");
        const valor = isBR ? (user.saldo * 6.12) : user.saldo;
        const moeda = isBR ? "BRL" : "EUR";
        
        document.getElementById('balance-display').innerText = new Intl.NumberFormat(locale, {
            style: 'currency', currency: moeda, minimumFractionDigits: isBR ? 2 : 4
        }).format(valor);
    }

    async function applyGain(val) {
        user.saldo = parseFloat((user.saldo + val).toFixed(4));
        updateUI();
        document.getElementById('sync-status').innerText = "A GUARDAR...";

        // UPSERT: Se não existir cria, se existir atualiza (Garante que salve sempre)
        const { error } = await sb.from('perfis').upsert({ id: currentID, saldo: user.saldo });

        if (error) console.error("Erro ao salvar:", error.message);
        setTimeout(() => document.getElementById('sync-status').innerText = "SINCRONIZADO: " + currentID, 1000);
    }

    async function loadFeed() {
        const { data: posts } = await sb.from('posts').select('*').order('id', { ascending: false }).limit(20);
        const feedEl = document.getElementById('app-feed');
        if (posts) {
            feedEl.innerHTML = posts.map(post => `
                <div class="post">
                    <p>${post.content || ''}</p>
                    ${post.image_url ? `<img src="${post.image_url}">` : ''}
                    <div class="actions">
                        <button class="btn-action" onclick="applyGain(0.0015)">👍 Like</button>
                    </div>
                </div>
            `).join('');
        }
    }

    init();
</script>
</body>
</html>
