<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #efeff4; margin: 0; color: #000; }
        .header { background: #0088cc; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .stats-bar { background: #fff; padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid #dcdce0; font-size: 14px; }
        .ad-container { background: #fdfdfd; border: 1px dashed #bbb; margin: 10px; text-align: center; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #888; }
        .feed { padding: 5px; }
        .post { background: #fff; margin-bottom: 10px; border-radius: 10px; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { color: #0088cc; font-weight: bold; margin-bottom: 5px; display: block; }
        .btn-action { background: #f0f2f5; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; color: #333; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-action:active { background: #e2e4e7; }
    </style>
</head>
<body>

<div class="header">Social Earn 🚀</div>

<div class="stats-bar">
    <div>🏆 Pontos: <span id="points">0</span></div>
    <div>💶 Saldo: €<span id="balance">0.00</span></div>
</div>

<div class="ad-container">
    ANÚNCIO ADSTERRA (Topo)
</div>

<div class="feed">
    <div class="post">
        <span class="user">@Admin</span>
        <p>Bem-vindo! Ganhe pontos interagindo com a comunidade. 1000 pontos = 0,75€!</p>
        <button class="btn-action" onclick="addPoints(2)">❤️ Gostar (+2 pts)</button>
    </div>

    <div class="ad-container">
        ANÚNCIO ADSTERRA (Native/Social Bar)
    </div>

    <div class="post">
        <span class="user">@Comunidade</span>
        <p>Alguém já solicitou o levantamento via PayPal hoje? 💸</p>
        <button class="btn-action" onclick="addPoints(5)">💬 Comentar (+5 pts)</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO SUPABASE
    const supabaseUrl = 'https://SUA_URL.supabase.co';
    const supabaseKey = 'SUA_KEY_ANON';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe.user;

    async function loadData() {
        if (!user) return;
        let { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
        if (data) {
            document.getElementById('points').innerText = data.points || 0;
            document.getElementById('balance').innerText = (data.points * 0.00075).toFixed(2);
        }
    }

    async function addPoints(val) {
        if (!user) return;
        let current = parseInt(document.getElementById('points').innerText);
        let newPoints = current + val;
        
        const { error } = await supabase.from('profiles').upsert({ id: user.id, points: newPoints });
        
        if (!error) {
            document.getElementById('points').innerText = newPoints;
            document.getElementById('balance').innerText = (newPoints * 0.00075).toFixed(2);
            tg.HapticFeedback.impactOccurred('medium');
        }
    }

    tg.ready();
    tg.expand();
    loadData();
</script>
</body>
</html>
