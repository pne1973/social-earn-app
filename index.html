<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network v33.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; --fb-gray: #65676b; }
        body { font-family: 'Roboto', sans-serif; background: var(--fb-bg); margin: 0; font-weight: 700; }
        
        /* HEADER E STATUS DO TEU DOC */
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 2px solid #ddd; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-header { position: fixed; top: 72px; width: 100%; height: 48px; background: white; border-bottom: 1px solid #dadce0; z-index: 900; display: flex; align-items: center; padding: 0 16px; }
        
        /* O VISUAL FACEBOOK LITE QUE PEDISTE */
        .fb-post { background: white; margin-top: 8px; border-y: 1px solid #ddd; }
        .fb-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .fb-avatar { width: 40px; height: 40px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .fb-content { padding: 0 12px 12px; font-weight: 400; font-size: 15px; }
        .fb-image { width: 100%; display: block; background: #eee; }
        .fb-actions { display: flex; border-top: 1px solid #eee; }
        .fb-btn { flex: 1; padding: 10px; text-align: center; color: var(--fb-gray); font-size: 13px; }

        /* LOGICA DE ADS E MODAIS DO TEU DOC */
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; }
        .modal-ad { width: 310px; background: white; border-radius: 12px; text-align: center; overflow: hidden; }
        .tab-content { display: none; padding-top: 130px; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white italic font-black text-xl">S</div>
            <span class="text-blue-600 font-black uppercase text-xs">Social Earn</span>
        </div>
        <div class="text-right">
            <div id="main-eur" class="text-green-600 text-xl font-black">0.0000€</div>
            <div id="main-brl" class="text-gray-400 text-[10px] font-black uppercase">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-header">
        <div id="status-text" class="text-green-600 text-[10px] font-black uppercase">Ganhos: 100% (Normal)</div>
        <button onclick="doLogout()" class="ml-auto text-gray-300 text-[10px] font-black">SAIR</button>
    </div>

    <div id="ad-overlay">
        <div id="ad-ui" class="modal-ad p-6">
            <p class="text-xs font-black mb-4">MANTÉM O TEU MULTIPLICADOR 1.0X</p>
            <button onclick="startAd()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xs mb-2">VER ANÚNCIO (15s)</button>
            <button onclick="applyPenalty()" class="text-gray-400 text-[10px] font-bold">RECUSAR (REDUZIR GANHOS)</button>
        </div>
    </div>

    <main id="view-social" class="tab-content active">
        <div id="feed-container"></div>
    </main>

    <main id="view-admin" class="tab-content px-4">
        <div class="bg-black text-white p-6 rounded-2xl mb-4">
            <p class="text-[10px] opacity-50 uppercase">Lucro Líquido Estimado</p>
            <p id="adm-net-profit" class="text-3xl font-black text-green-400">0.0000€</p>
        </div>
        <div id="adm-user-list" class="space-y-2"></div>
    </main>

    <nav class="fixed bottom-0 w-100 flex bg-white border-t h-20 w-full">
        <button onclick="nav('social')" class="flex-1 font-black text-xs uppercase">Feed</button>
        <button onclick="nav('admin')" id="admin-nav" class="flex-1 font-black text-xs uppercase hidden text-red-600">Admin</button>
    </nav>

    <script>
        // CREDENCIAIS DO TEU DOC
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";

        let user = { id: localStorage.getItem('apex_uid'), saldo: 0, mult: 1.0, count: 0 };

        async function init() {
            if(!user.id) { /* redirecionar login id */ return; }
            if(user.id === ADMIN_ID) { document.getElementById('admin-nav').classList.remove('hidden'); }
            
            let { data } = await sb.from('perfis').select('*').eq('id', user.id).single();
            if(data) user.saldo = data.saldo;
            
            loadFeed();
            updateUI();
        }

        async function loadFeed() {
            let { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            let html = "";
            posts.forEach((p, i) => {
                html += `
                <div class="fb-post">
                    <div class="fb-header">
                        <div class="fb-avatar">👤</div>
                        <div><p class="text-sm font-bold">User ${p.user_id.slice(0,5)}</p></div>
                    </div>
                    <div class="fb-content">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="fb-image">` : ''}
                    <div class="fb-actions">
                        <button onclick="earn(0.0006)" class="fb-btn">👍 Gosto</button>
                        <button onclick="earn(0.0010)" class="fb-btn">💬 Comentar</button>
                    </div>
                </div>`;
                // Injeção de Ad a cada 3 posts (regra v33.12)
                if((i+1)%3 === 0) html += `<div class="p-8 text-center text-[10px] text-gray-400 uppercase font-black">Anúncio Google</div>`;
            });
            document.getElementById('feed-container').innerHTML = html;
        }

        function earn(val) {
            user.count++;
            if(user.count >= 3 && user.mult === 1.0) {
                document.getElementById('ad-overlay').style.display = 'flex';
                return;
            }
            user.saldo += (val * user.mult);
            save();
            updateUI();
        }

        async function save() {
            await sb.from('perfis').upsert({ id: user.id, saldo: user.saldo });
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (user.saldo * 6.1245).toFixed(4) + " BRL";
        }

        // BI LOGIC DO ADMIN (RESTAURADA DO INDEX 39)
        async function loadAdmin() {
            let { data: users } = await sb.from('perfis').select('*');
            let debt = users.reduce((acc, u) => acc + u.saldo, 0);
            let revenue = debt * 1.6; // Teu cálculo de margem de ads
            document.getElementById('adm-net-profit').innerText = (revenue - debt).toFixed(4) + "€";
        }

        function nav(v) {
            document.querySelectorAll('main').forEach(m => m.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            if(v === 'admin') loadAdmin();
        }

        init();
    </script>
</body>
</html>
