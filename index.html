<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Earn v33.12</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #F0F2F5; }
        body { background: var(--fb-bg); font-family: Segoe UI, Helvetica, Arial, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 12px 28px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: var(--fb-blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #log { margin-top: 15px; font-size: 12px; color: #65676B; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="color: var(--fb-blue); font-size: 45px; margin: 0;">f</h1>
        <h2>Social Earn</h2>
        <p style="color: #65676B;">Insira o ID para entrar</p>
        
        <input type="text" id="user-id" placeholder="ID de Teste" value="123">
        <button id="btn-entrar" onclick="tentarEntrar()">Entrar Agora</button>
        
        <div id="log">Aguardando entrada...</div>
    </div>

    <script>
        // CHAVES DO TEU DOCUMENTO
        const URL_DB = "https://fthvszovvpxujykslqex.supabase.co";
        const KEY_DB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0aHZzem92dnB4dWp5a3NscWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTEwNTY0MDAsImV4cCI6MjAyNjYzMjQwMH0.7x9R5-fO1lW4s3E_f_f_f_f_f_f_f";
        
        // Inicialização
        const _supabase = supabase.createClient(URL_DB, KEY_DB);

        async function tentarEntrar() {
            const id = document.getElementById('user-id').value.trim();
            const log = document.getElementById('log');
            const btn = document.getElementById('btn-entrar');

            if (!id) return alert("Insira um ID!");

            log.innerText = "A ligar ao servidor...";
            btn.disabled = true;

            try {
                // Tenta ler a tabela (Verifica se existe e se há rede)
                let { data, error } = await _supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', id);

                if (error) throw error;

                if (data.length === 0) {
                    log.innerText = "ID não encontrado. A criar novo perfil...";
                    
                    const { data: newUser, error: errIns } = await _supabase
                        .from('profiles')
                        .insert([{ id: id, username: "User_" + id, balance: 0.0 }])
                        .select();

                    if (errIns) throw errIns;
                    log.innerText = "Sucesso! Perfil criado.";
                    alert("Bem-vindo! Perfil novo criado para o ID: " + id);
                } else {
                    log.innerText = "Sucesso! Perfil carregado.";
                    alert("Entrou com sucesso! Saldo: € " + data[0].balance.toFixed(4));
                }

                // Se chegou aqui, a conexão está 100%
                log.style.color = "green";
                log.innerText = "Conectado ao Supabase!";

            } catch (err) {
                console.error(err);
                log.style.color = "red";
                // Explicação amigável do erro técnico
                if (err.message === "Failed to fetch") {
                    log.innerText = "Erro: Sem internet ou Supabase bloqueou o acesso (CORS).";
                } else {
                    log.innerText = "Erro: " + err.message;
                }
                alert("Falha técnica: " + err.message);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
