<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Social - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #f0f2f5; padding-top: 215px; }

        /* HEADER & ADS */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 999; background: #fff; border-bottom: 1px solid #ddd; }
        
        /* ESPAÇO PUBLICITÁRIO TOPO */
        .ad-top { background: #fff3cd; color: #856404; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-bottom: 2px solid #ffeeba; text-transform: uppercase; }

        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 200; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px 0; text-align: center; border-bottom: 1px solid #eee; }
        .stats b { display: block; color: #1a73e8; font-size: 12px; }
        .stats label { font-size: 8px; color: #777; text-transform: uppercase; }

        .tabs { display: flex; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 11px; font-weight: bold; color: #5f6368; cursor: pointer; }
        .tab.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; }

        /* FEED & POSTS */
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; }
        
        /* FOTOS MINIATURA (O QUE PEDIU) */
        .post-img-box { width: 100%; height: 150px; overflow: hidden; border-radius: 6px; margin: 10px 0; background: #f8f9fa; border: 1px solid #eee; }
        .post-img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* ESPAÇO PUBLICITÁRIO FEED */
        .ad-feed { background: #e7f3ff; border: 1px dashed #1877f2; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 10px; }
        .ad-feed span { background: #1877f2; color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        .btn-send { background: #1a73e8; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; float: right; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="ad-top">Anúncio: Aproveite 20% de bónus em XP hoje!</div>
        <div class="blue-bar">APEX SOCIAL NETWORK</div>
        <div class="stats">
            <div><label>Meus XP</label><b id="valXP">0</b></div>
            <div><label>Saldo EUR</label><b id="valEUR">0.0000€</b></div>
            <div><label>Rede</label><b style="color:green">Ativa</b></div>
        </div>
        <nav class="tabs">
            <div class="tab active">EXPLORAR</div>
            <div class="tab">REDE</div>
            <div class="tab">INFO</div>
        </nav>
    </header>

    <main class="container">
        <div class="card" style="overflow: hidden;">
            <textarea id="txt" style="width:100%; border:none; outline:none; font-size:14px; height:40px;" placeholder="Partilhe algo..."></textarea>
            <button class="btn-send">Publicar</button>
        </div>

        <div id="feed"></div>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const f = document.getElementById('feed');
            f.innerHTML = "";

            posts.forEach((p, i) => {
                // INSERÇÃO DE PUBLICIDADE NO FEED
                if (i === 2 || (i > 2 && i % 3 === 0)) {
                    f.innerHTML += `
                        <div class="ad-feed">
                            <span>AD</span>
                            <p style="font-size:12px; margin-top:5px; color:#1877f2;">Espaço Publicitário Apex</p>
                        </div>`;
                }

                f.innerHTML += `
                    <div class="card">
                        <p style="font-size:14px;">${p.content || ''}</p>
                        ${p.image_url ? `<div class="post-img-box"><img src="${p.image_url}"></div>` : ''}
                    </div>`;
            });
        }
        load();
    </script>
</body>
</html>
