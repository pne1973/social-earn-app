<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network v33.12 - Production Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --g-yellow: #FBBC05; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
        .feed-ad-unit { background: #ffffff; border: 2px dashed var(--g-blue); border-radius: 12px; padding: 20px; margin-bottom: 12px; text-align: center; }
        
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
        .earning-text { font-size: 3.5rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 20px rgba(52,168,83,0.4); -webkit-text-stroke: 1.5px white; }

        /* Layout Fixo corrigido */
        header { position: fixed; top: 0; left: 0; right: 0; height: 72px; background: white; border-bottom: 2px solid #eee; z-index: 1000; }
        .status-header-fixed { position: fixed; top: 72px; left: 0; right: 0; height: 48px; background: white; border-bottom: 1px solid #ddd; z-index: 900; }
        .publisher-fixed { position: fixed; top: 120px; left: 0; right: 0; background: #f1f3f4; padding: 10px; z-index: 800; border-bottom: 1px solid #ddd; }
        
        #feed-container { margin-top: 200px; padding: 10px; }
        body.is-admin #feed-container { margin-top: 85px; }

        .nav-item { transition: all 0.3s; color: #5f6368; flex: 1; text-align: center; padding: 15px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; position: relative; }
        .count-badge { position: absolute; top: 2px; right: 20%; background: var(--g-red); color: white; font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 6000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" style="display:none;">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center text-white font-black italic text-3xl shadow-lg">S</div>
        <input type="text" id="login-id" placeholder="ID DE UTILIZADOR" class="w-full max-w-xs border-2 p-5 text-center mb-4 rounded-2xl font-black outline-none focus:border-blue-600">
        <button onclick="doLogin()" class="w-full max-w-xs bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase">Entrar</button>
    </div>

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <div id="ad-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:5000; align-items:center; justify-content:center;">
        <div id="ad-decision-ui" class="bg-white p-8 rounded-2xl text-center w-[310px]">
            <h3 class="text-blue-600 font-black text-xs uppercase mb-4">Manter Ganhos 100%</h3>
            <button onclick="startAdFlow()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black mb-2">VER ANÚNCIO</button>
            <button onclick="degradeGains()" class="text-[9px] text-gray-400 font-black uppercase">Aceitar redução</button>
        </div>
        <div id="ad-player-ui" class="hidden bg-white p-8 rounded-2xl text-center w-[310px]">
            <div id="ad-timer-circle" class="text-6xl font-black mb-4">15</div>
            <p class="text-[9px] text-blue-600 font-black uppercase">Monetizando...</p>
            <button id="close-ad-btn" disabled class="mt-4 w-full py-3 bg-gray-100 text-gray-400 rounded-xl font-black text-[10px]">A PROCESSAR...</button>
        </div>
    </div>

    <header class="px-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-md">S</div>
            <h1 class="text-[11px] font-black uppercase text-blue-600">Social Earn</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-xl">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-header-fixed flex items-center justify-center px-4">
        <div id="status-text" class="text-[9px] font-black uppercase text-green-600">Ganhos Ativos: 100%</div>
        <button id="restore-btn" onclick="startAdFlow(true)" class="hidden ml-2 bg-red-600 text-white px-2 py-1 rounded-lg text-[8px] font-black">RESTAURAR</button>
        <button onclick="doLogout()" class="ml-auto text-[8px] text-gray-300 font-black uppercase">Sair</button>
    </div>

    <div id="pub-fixed-container" class="publisher-fixed">
        <div id="mini-pub" onclick="expandPublisher()" class="bg-white border p-3 rounded-full flex items-center gap-3 cursor-pointer shadow-sm">
            <div class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-[10px]">👤</div>
            <div class="text-[10px] text-gray-400 font-black uppercase">O que quer partilhar agora?</div>
        </div>
        <div id="expanded-post" class="hidden google-card p-4 mt-2 border-t-4 border-blue-600">
            <textarea id="post-input" placeholder="ESCREVA AQUI..." class="w-full border-none focus:ring-0 text-xs mb-2 resize-none uppercase font-black" rows="3"></textarea>
            <input id="post-url" type="text" placeholder="URL DA IMAGEM (OPCIONAL)" class="w-full bg-gray-50 p-3 rounded-xl mb-3 text-[10px] font-black">
            <div class="flex gap-2">
                <button onclick="collapsePublisher()" class="flex-1 text-[9px] font-black text-gray-400 uppercase">Cancelar</button>
                <button onclick="handleInteraction('post')" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-black text-[11px] uppercase">Publicar (+0.0150€)</button>
            </div>
        </div>
    </div>

    <main class="max-w-lg mx-auto">
        <section id="view-social" class="tab-content active">
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content px-4 mt-32">
            <div class="google-card p-10 text-center border-t-[12px] border-blue-600 shadow-xl">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-4">Utilizador ID: <span id="display-uid" class="text-blue-600">--</span></p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600 mb-2">0.0000€</h1>
                <p id="wall-brl-sub" class="text-xs font-black text-gray-300 mb-8">0.0000 BRL</p>
                <div id="withdraw-area" class="hidden">
                    <input id="pp-email" type="email" placeholder="EMAIL PAYPAL" class="w-full border-2 p-4 rounded-xl text-center mb-3 font-black text-xs outline-none">
                    <button onclick="alert('Pedido enviado!')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[11px] uppercase">Levantar Agora</button>
                </div>
                <div id="progress-container" class="pt-6 border-t border-dashed">
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden mb-2">
                        <div id="withdraw-progress" class="bg-blue-600 h-full w-0 transition-all duration-1000"></div>
                    </div>
                    <p class="text-[9px] text-gray-400 font-black uppercase">Mínimo: 5.0000€</p>
                </div>
            </div>
        </section>

        <section id="view-admin" class="tab-content px-4 mt-32 pb-10">
            <div class="bg-gray-900 text-white p-6 rounded-2xl mb-4 shadow-2xl">
                <h2 class="text-blue-400 font-black uppercase text-xs mb-4 tracking-widest">Admin Dashboard</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div><p class="text-[8px] opacity-50 uppercase">Receita Bruta</p><p id="adm-gross-revenue" class="text-xl font-black">0.0000€</p></div>
                    <div><p class="text-[8px] opacity-50 uppercase">Total Users</p><p id="adm-total-users" class="text-xl font-black">0</p></div>
                </div>
            </div>
            <div class="google-card shadow-sm">
                <table class="w-full text-left text-[10px] font-black uppercase">
                    <thead class="bg-gray-50 border-b"><tr><th class="p-4">ID</th><th class="p-4">Saldo</th><th class="p-4 text-right">Ação</th></tr></thead>
                    <tbody id="adm-user-list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex h-20 z-[1000]">
        <button onclick="nav('social')" class="nav-item active">Feed</button>
        <button id="nav-wallet-btn" onclick="nav('info')" class="nav-item">Carteira</button>
        <button id="nav-admin-btn" onclick="nav('admin')" class="hidden nav-item text-red-600">Admin</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_MASTER = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let activeID = localStorage.getItem('apex_uid');
        let user = { saldo: 0, interactions: 0, postsToday: 0, multiplier: 1.0, penaltyExpiry: null };
        let pendingAction = null;

        async function init() {
            if (!activeID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
            document.getElementById('display-uid').innerText = activeID;

            if(activeID === ADMIN_MASTER) {
                document.getElementById('nav-admin-btn').classList.remove('hidden');
                document.getElementById('nav-wallet-btn').classList.add('hidden');
                document.body.classList.add('is-admin');
                document.getElementById('pub-fixed-container').style.display = 'none';
                document.querySelector('.status-header-fixed').style.display = 'none';
            }

            const { data } = await sb.from('perfis').select('*').eq('id', activeID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            else await sb.from('perfis').insert([{ id: activeID, saldo: 0.0000 }]);

            updateUI();
            loadFeed();
            setInterval(updateUI, 1000);
        }

        function updateUI() {
            const cur = user.saldo;
            document.getElementById('main-eur').innerText = cur.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = cur.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (cur * 6.1245).toFixed(4) + " BRL";
            document.getElementById('wall-brl-sub').innerText = (cur * 6.1245).toFixed(4) + " BRL";
            
            const progress = (cur / 5.0) * 100;
            document.getElementById('withdraw-progress').style.width = Math.min(progress, 100) + "%";
            if(cur >= 5.0) document.getElementById('withdraw-area').classList.remove('hidden');
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!posts) return;

            let html = "";
            posts.forEach((p, index) => {
                html += `
                <div class="google-card shadow-sm border border-gray-100">
                    <div class="p-5">
                        <p class="text-[13px] font-black uppercase text-gray-800 mb-5">${p.content}</p>
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-2xl mb-5 shadow-inner">` : ''}
                        <div class="flex border-t pt-2">
                            <button onclick="handleInteraction('like', 0.0006)" class="interaction-btn">
                                <div class="count-badge">0</div><span class="text-xl">👍</span><span class="text-[8px] uppercase font-black text-gray-400">Gostar</span>
                            </button>
                            <button onclick="toggleComments('${p.id}')" class="interaction-btn border-x border-gray-50">
                                <div class="count-badge" id="badge-${p.id}">0</div><span class="text-xl">💬</span><span class="text-[8px] uppercase font-black text-gray-400">Comentar</span>
                            </button>
                            <button onclick="handleInteraction('share', 0.0020)" class="interaction-btn">
                                <span class="text-xl">🔗</span><span class="text-[8px] uppercase font-black text-gray-400">Partilhar</span>
                            </button>
                        </div>
                    </div>
                    <div id="comments-${p.id}" class="hidden bg-gray-50 border-t p-4">
                        <div id="list-${p.id}" class="space-y-2 mb-3 max-h-40 overflow-y-auto"></div>
                        <div class="flex gap-2">
                            <input id="in-${p.id}" type="text" placeholder="ALGO..." class="flex-1 bg-white p-2 rounded-xl text-[10px] font-black outline-none border">
                            <button onclick="handleInteraction('comment', 0.0010, '${p.id}')" class="bg-blue-600 text-white px-4 rounded-xl font-black text-[10px]">OK</button>
                        </div>
                    </div>
                </div>`;
                if (activeID !== ADMIN_MASTER && (index + 1) % 3 === 0) {
                    html += `<div class="feed-ad-unit"><p class="text-[9px] font-black text-gray-400 uppercase mb-2">Anúncio Patrocinado</p><div class="h-20 bg-gray-50 rounded flex items-center justify-center border text-[10px] text-blue-600 font-black">PUBLICIDADE</div></div>`;
                }
            });
            container.innerHTML = html || "<p class='text-center p-10 text-[10px] uppercase font-black opacity-30'>Sem posts.</p>";
            posts.forEach(p => updateCount(p.id));
        }

        async function handleInteraction(type, val = 0, pid = null) {
            if ((user.interactions >= 2 || user.postsToday >= 3) && user.multiplier === 1.0) {
                pendingAction = { type, val, pid };
                document.getElementById('ad-overlay').style.display = 'flex';
            } else { executeAction(type, val, pid); }
        }

        async function executeAction(type, val, pid) {
            if (type === 'post') await publish();
            else if (type === 'comment') await addComment(pid);
            else applyGain(val);
        }

        async function applyGain(val) {
            const final = val * user.multiplier;
            user.saldo += final;
            showBigNumber(final);
            updateUI();
            await sb.from('perfis').upsert({ id: activeID, saldo: user.saldo });
        }

        async function publish() {
            const content = document.getElementById('post-input').value;
            const url = document.getElementById('post-url').value;
            if(!content) return;
            const { error } = await sb.from('posts').insert([{ user_id: activeID, content, image_url: url }]);
            if(!error) { 
                user.postsToday++; applyGain(0.0150); 
                document.getElementById('post-input').value = "";
                collapsePublisher(); loadFeed(); 
            }
        }

        async function addComment(pid) {
            const val = document.getElementById(`in-${pid}`).value;
            if(!val) return;
            const { error } = await sb.from('comentarios').insert([{ post_id: pid, user_id: activeID, content: val }]);
            if(!error) { document.getElementById(`in-${pid}`).value = ""; applyGain(0.0010); updateComments(pid); }
        }

        async function updateComments(pid) {
            const { data } = await sb.from('comentarios').select('*').eq('post_id', pid);
            const list = document.getElementById(`list-${pid}`);
            if(list) list.innerHTML = data.map(c => `<div class="bg-white p-2 rounded-lg border text-[9px]">${c.content}</div>`).join('');
            updateCount(pid);
        }

        async function updateCount(pid) {
            const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', pid);
            const badge = document.getElementById(`badge-${pid}`);
            if(badge) badge.innerText = count || 0;
        }

        function toggleComments(id) {
            const sec = document.getElementById(`comments-${id}`);
            sec.classList.toggle('hidden');
            if(!sec.classList.contains('hidden')) updateComments(id);
        }

        function showBigNumber(val) {
            const c = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            c.style.display = 'block'; setTimeout(() => c.style.display = 'none', 800);
        }

        function startAdFlow() {
            document.getElementById('ad-decision-ui').classList.add('hidden');
            document.getElementById('ad-player-ui').classList.remove('hidden');
            let t = 15;
            const timer = setInterval(() => {
                t--; document.getElementById('ad-timer-circle').innerText = t;
                if(t <= 0) {
                    clearInterval(timer);
                    const btn = document.getElementById('close-ad-btn');
                    btn.disabled = false; btn.innerText = "RESGATAR AGORA";
                    btn.onclick = () => { user.interactions = 0; if(pendingAction) executeAction(pendingAction.type, pendingAction.val, pendingAction.pid); closeAd(); };
                }
            }, 1000);
        }

        async function loadAdminStats() {
            const { data: users } = await sb.from('perfis').select('*');
            document.getElementById('adm-total-users').innerText = users.length;
            document.getElementById('adm-user-list').innerHTML = users.map(u => `
                <tr class="border-b"><td class="p-4 font-black text-blue-600">${u.id}</td><td class="p-4">${Number(u.saldo).toFixed(4)}€</td><td class="p-4 text-right text-red-500">BAN</td></tr>
            `).join('');
        }

        function closeAd() { document.getElementById('ad-overlay').style.display = 'none'; document.getElementById('ad-player-ui').classList.add('hidden'); document.getElementById('ad-decision-ui').classList.remove('hidden'); }
        function degradeGains() { user.multiplier = 0.5; if(pendingAction) executeAction(pendingAction.type, pendingAction.val, pendingAction.pid); closeAd(); }
        function expandPublisher() { document.getElementById('mini-pub').classList.add('hidden'); document.getElementById('expanded-post').classList.remove('hidden'); }
        function collapsePublisher() { document.getElementById('mini-pub').classList.remove('hidden'); document.getElementById('expanded-post').classList.add('hidden'); }
        function doLogin() { const id = document.getElementById('login-id').value.trim(); if(id) { localStorage.setItem('apex_uid', id); location.reload(); } }
        function doLogout() { localStorage.removeItem('apex_uid'); location.reload(); }
        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'admin') loadAdminStats();
        }

        init();
    </script>
</body>
</html>
