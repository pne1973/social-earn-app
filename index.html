<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v170</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; margin: 0; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; padding-bottom: 120px; }
        .nav-btn.active { color: #4285F4; border-top: 3px solid #4285F4; font-weight: 900; background: #f1f3f4; }
        .card { background: white; border-radius: 14px; border: 1px solid #dadce0; margin-bottom: 12px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <header class="sticky top-0 bg-white border-b z-50 px-5 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black text-blue-600 italic uppercase">Apex Social</h1>
            <p class="text-[10px] font-black text-green-500 uppercase italic">Vercel Stable v170</p>
        </div>
        <div class="text-right">
            <span id="bal-eur" class="font-black text-green-600 text-lg">0.0000€</span>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <section id="view-feed" class="tab-content active">
            <div class="card bg-blue-600 text-white flex justify-between items-center mb-4">
                <div><p class="text-[9px] font-bold uppercase opacity-80">Ações Turbo</p><p id="bonus-display" class="font-black italic text-sm">🔥 15 Restantes</p></div>
                <button onclick="nav('wallet')" class="bg-white text-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">Recarregar</button>
            </div>
            
            <div id="posts-list" class="space-y-4">
                <div class="card text-center"><p class="text-[10px] text-gray-400 font-black uppercase italic py-4">A carregar rede social...</p></div>
            </div>
        </section>

        <section id="view-wallet" class="tab-content">
            <div class="card text-center border-b-4 border-blue-500 shadow-md">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Saldo Total</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600 tracking-tighter">0.0000€</h1>
            </div>
            <div class="space-y-3 mt-4">
                <button onclick="syncBonus()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-xs uppercase italic shadow-lg active:scale-95 transition">Sincronizar (Ver Vídeo)</button>
                <button onclick="addCash(0.0500)" class="w-full border-2 border-green-500 text-green-600 py-4 rounded-2xl font-black text-[10px] uppercase active:bg-green-50 transition">Check-in Diário (+0,0500€)</button>
                <p class="text-[8px] text-center font-black text-gray-300 uppercase italic">Pagamentos PayPal às sextas-feiras</p>
            </div>
        </section>

        <section id="view-friends" class="tab-content">
            <div class="card border-l-4 border-blue-500 shadow-sm">
                <h2 class="font-black text-sm uppercase text-blue-600 mb-1">Convidar Amigos</h2>
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-4">Ganha 10% de comissão vitalícia.</p>
                <div class="bg-gray-50 p-4 rounded-xl border border-dashed mb-6 text-[10px] font-mono text-blue-600 italic break-all text-center" id="ref-box">
                    A gerar o teu link único...
                </div>
                <button onclick="shareLink()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-md active:scale-95 transition">Convidar via WhatsApp</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-1 z-40 shadow-2xl">
        <button onclick="nav('feed')" id="btn-feed" class="nav-btn flex-1 flex flex-col items-center p-3 text-gray-400 active"><span class="text-[10px] font-black uppercase">Feed</span></button>
        <button onclick="nav('wallet')" id="btn-wallet" class="nav-btn flex-1 flex flex-col items-center p-3 text-gray-400"><span class="text-[10px] font-black uppercase">Ganhos</span></button>
        <button onclick="nav('friends')" id="btn-friends" class="nav-btn flex-1 flex flex-col items-center p-3 text-gray-400"><span class="text-[10px] font-black uppercase">Rede</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY"; 
        const UID = "5401881400";

        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        let localStats = { saldo: 0, bonus: 15 };

        function nav(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            window.scrollTo(0, 0);
        }

        async function init() {
            // Gera o link de convite imediatamente baseado na URL da Vercel
            document.getElementById('ref-box').innerText = window.location.origin + "/?ref=" + UID;

            try {
                const { data } = await supabase.from('perfis').select('*').eq('id', UID).single();
                if (data) localStats = data;
                
                const { data: posts } = await supabase.from('posts').select('*').limit(5);
                if (posts) {
                    document.getElementById('posts-list').innerHTML = posts.map(p => `
                        <div class="card"><p class="text-xs text-gray-700">${p.content}</p></div>
                    `).join('');
                }
            } catch (err) {
                console.log("Modo Offline Ativado.");
            }
            refreshUI();
        }

        function refreshUI() {
            const val = localStats.saldo.toFixed(4);
            document.getElementById('bal-eur').innerText = val + "€";
            document.getElementById('wall-eur').innerText = val + "€";
            document.getElementById('bonus-display').innerText = "🔥 " + localStats.bonus + " Restantes";
        }

        async function addCash(amt) {
            localStats.saldo += amt;
            refreshUI();
            // Tenta salvar, mas se falhar o saldo continua visível no ecrã
            await supabase.from('perfis').upsert({ id: UID, saldo: localStats.saldo });
        }

        function syncBonus() {
            alert("Bónus Sincronizado!");
            localStats.bonus = 15;
            refreshUI();
        }

        function shareLink() {
            const msg = "Vem ganhar dinheiro comigo no Apex Social: " + window.location.origin + "/?ref=" + UID;
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
        }

        window.onload = init;
    </script>
</body>
</html>
