<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Real Estate v33.23</title>
    <style>
        :root { 
            --google-blue: #1a73e8; --google-green: #34a853; --google-red: #ea4335; 
            --google-yellow: #fbbc05; --dark-bg: #121212;
        }
        body { font-family: 'Roboto', sans-serif; background: var(--dark-bg); margin: 0; padding: 0; color: #fff; }

        .header-app { background: #1f1f1f; padding: 15px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .main-wallet { 
            background: linear-gradient(135deg, #1a73e8, #0b51b7); 
            margin: 15px; padding: 20px; border-radius: 20px; text-align: center;
        }

        .container { padding: 0 15px 100px 15px; }
        
        /* Card de Imóvel Ativo */
        .property-card { 
            background: #ffffff; color: #202124; 
            border-radius: 18px; padding: 20px; margin-bottom: 15px;
            position: relative; border-left: 5px solid var(--google-blue);
        }

        /* Card de Antevisão (Próximos Níveis) */
        .preview-card {
            background: #2a2a2a; color: #888;
            border-radius: 18px; padding: 15px; margin-bottom: 10px;
            border: 1px dashed #444; opacity: 0.7;
            display: flex; justify-content: space-between; align-items: center;
        }

        .income-amount { font-size: 24px; font-weight: 700; color: var(--google-green); }
        .lock-icon { font-size: 18px; filter: grayscale(1); }

        .btn-upgrade { 
            background: var(--google-blue); color: white; border: none; 
            padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer;
        }
        
        .section-title { font-size: 12px; color: #aaa; margin: 20px 0 10px 5px; font-weight: bold; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b style="color: var(--google-blue);">APEX REAL ESTATE</b>
            <span style="font-size: 11px; opacity: 0.6;">Admin: 5401881400</span>
        </div>
    </div>

    <div class="container">
        <div class="main-wallet">
            <div style="font-size: 11px; opacity: 0.9;">SALDO ACUMULADO</div>
            <div style="font-size: 32px; font-weight: 800; margin: 5px 0;">€ <span id="total-balance">0.0000</span></div>
            <div id="investor-rank" style="font-size: 10px; color: var(--google-yellow);">RANK: INVESTIDOR INICIANTE</div>
        </div>

        <div class="section-title">Imóvel Atual</div>
        <div id="active-property" class="property-card">
            <div style="display: flex; justify-content: space-between;">
                <span id="p-name" style="font-weight: bold; color: var(--google-blue);">🏠 QUARTO ALUGADO</span>
                <span style="font-size: 11px; color: #70757a;">Renda Ativa</span>
            </div>
            <div style="margin: 15px 0;">
                <div class="income-amount">€ <span id="p-acc">0.0000</span></div>
                <div style="font-size: 10px; color: #999;">Taxa: <span id="p-speed">0.0001</span> €/seg</div>
            </div>
            <button onclick="collectRent()" class="btn-upgrade" style="background: var(--google-green); margin-bottom: 8px;">RECOLHER RENDA</button>
            <button onclick="upgradeProp()" class="btn-upgrade">UPGRADE PARA <span id="next-label">APARTAMENTO</span> (€<span id="up-cost">0.0500</span>)</button>
        </div>

        <div class="section-title">Próximos Níveis de Património</div>
        <div id="previews">
            </div>
    </div>

    <script>
        let mainBalance = 0.0000;
        let currentLevel = 0;
        let accRent = 0.0000;
        let speed = 0.0001;
        let upgradeCost = 0.0500;

        const levels = [
            { name: "QUARTO ALUGADO", icon: "🏠", mult: 1 },
            { name: "APARTAMENTO T1", icon: "🏢", mult: 2.4 },
            { name: "VIVENDA LUXO", icon: "🏡", mult: 5.8 },
            { name: "MANSÃO APEX", icon: "🏰", mult: 14.0 },
            { name: "HOTEL 5 ESTRELAS", icon: "🏨", mult: 35.0 }
        ];

        function gameLoop() {
            accRent += speed;
            document.getElementById('p-acc').innerText = accRent.toFixed(4);
            document.getElementById('total-balance').innerText = mainBalance.toFixed(4);
            updatePreviews();
        }

        function collectRent() {
            mainBalance += accRent;
            accRent = 0;
            if (mainBalance > 10) document.getElementById('investor-rank').innerText = "RANK: INVESTIDOR PROFISSIONAL";
        }

        function upgradeProp() {
            if (mainBalance >= upgradeCost && currentLevel < levels.length - 1) {
                mainBalance -= upgradeCost;
                currentLevel++;
                speed *= 2.4;
                upgradeCost *= 3.5;
                
                // Update UI
                let next = levels[currentLevel];
                document.getElementById('p-name').innerText = next.icon + " " + next.name;
                document.getElementById('p-speed').innerText = speed.toFixed(4);
                document.getElementById('up-cost').innerText = upgradeCost.toFixed(4);
                
                if (currentLevel < levels.length - 1) {
                    document.getElementById('next-label').innerText = levels[currentLevel+1].name.split(' ')[0];
                } else {
                    document.getElementById('next-label').innerText = "MAX";
                }
            } else {
                alert("Saldo insuficiente para expandir o património!");
            }
        }

        function updatePreviews() {
            let container = document.getElementById('previews');
            container.innerHTML = "";
            
            for (let i = currentLevel + 1; i < levels.length; i++) {
                let l = levels[i];
                let estIncome = (0.0001 * l.mult).toFixed(4);
                container.innerHTML += `
                    <div class="preview-card">
                        <div>
                            <div style="font-size: 13px; font-weight: bold;">${l.icon} ${l.name}</div>
                            <div style="font-size: 10px;">Renda Estimada: € ${estIncome}/seg</div>
                        </div>
                        <div class="lock-icon">🔒</div>
                    </div>
                `;
            }
        }

        setInterval(gameLoop, 1000);
    </script>
</body>
</html>
