<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.28</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        :root {
            --google-blue: #4285F4;
            --fb-bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --border: #CED0D4;
            --success: #16a34a;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--fb-bg); 
            margin: 0; padding-top: 110px; padding-bottom: 80px; 
        }

        /* HEADER & AD SYSTEM */
        header {
            position: fixed; top: 0; left: 0; right: 0; background: #fff;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .ad-banner {
            position: fixed; top: 60px; left: 0; right: 0; background: #fff;
            height: 45px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 800; color: #888; border-bottom: 1px solid var(--border); z-index: 999;
        }

        /* FEED & CARDS */
        .feed-container { max-width: 500px; margin: 0 auto; padding: 0 10px; }
        .post-card {
            background: var(--card-bg); border-radius: 8px; margin-bottom: 12px;
            border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .post-header { display: flex; align-items: center; padding: 12px; }
        .user-icon { width: 38px; height: 38px; border-radius: 50%; background: #e4e6eb; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-body { padding: 0 12px 12px 12px; font-size: 14px; color: #1c1e21; }
        
        /* ACTIONS */
        .post-actions { display: flex; border-top: 1px solid #f0f2f5; border-bottom: 1px solid #f0f2f5; }
        .act-btn { flex: 1; background: none; border: none; padding: 10px; color: #65676b; font-weight: 600; font-size: 13px; cursor: pointer; }

        /* COMMENTS AREA (BALÕES) */
        .comments-section { background: #fff; padding: 10px; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        .bubble-list { display: flex; flex-direction: column; gap: 6px; }
        .bubble { 
            background: #F0F2F5; border-radius: 18px; padding: 8px 12px; 
            font-size: 13px; max-width: 85%; align-self: flex-start;
        }
        
        /* INPUT AREA */
        .comment-box { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .comment-input { flex: 1; background: #F0F2F5; border: none; border-radius: 20px; padding: 9px 15px; font-size: 13px; }

        /* BOTTOM NAV */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #fff; height: 70px; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #9ca3af; text-decoration: none; }
        .nav-link.active { color: var(--google-blue); }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--google-blue); font-size: 18px;">Social Earn</div>
        <div id="display-balance" style="font-weight: 900; color: var(--success); font-size: 18px;">0.0000€</div>
    </header>

    <div class="ad-banner">PUBLICIDADE OFICIAL APEX</div>

    <main class="feed-container">
        <div id="post-feed"></div>
    </main>

    <nav class="navbar">
        <a href="#" class="nav-link active">🏠<br>FEED</a>
        <a href="#" class="nav-link">💰<br>CARTEIRA</a>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        
        let userID = localStorage.getItem('apex_uid') || "5401881400";
        let userBalance = 0;

        // VALORES ORIGINAIS DE RECOMPENSA
        const RECOMPENSAS = { like: 0.0020, comment: 0.0050 };

        async function start() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', userID).single();
            if(data) userBalance = parseFloat(data.saldo);
            refreshUI();
            loadPosts();
        }

        function refreshUI() {
            document.getElementById('display-balance').innerText = userBalance.toFixed(4) + "€";
        }

        async function updateBalance(amount) {
            userBalance += amount;
            await sb.from('perfis').update({ saldo: userBalance }).eq('id', userID);
            refreshUI();
        }

        async function loadPosts() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('post-feed');
            container.innerHTML = '';

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <div class="user-icon">${p.user_id.charAt(0).toUpperCase()}</div>
                        <div style="font-weight:700; font-size:14px;">Membro ${p.user_id}</div>
                    </div>
                    <div class="post-body">${p.content || ''}</div>
                    <div class="post-actions">
                        <button class="act-btn" onclick="giveLike(this)">👍 Gosto</button>
                        <button class="act-btn">💬 Balão</button>
                    </div>
                    <div class="comments-section">
                        <div class="bubble-list" id="bubbles-${p.id}"></div>
                        <div class="comment-box">
                            <input type="text" class="comment-input" placeholder="Escreva aqui..." onkeydown="if(event.key==='Enter') addComment('${p.id}', this)">
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function giveLike(btn) {
            btn.style.color = "var(--google-blue)";
            btn.innerText = "💙 Gostei";
            updateBalance(RECOMPENSAS.like);
        }

        function addComment(id, input) {
            if(!input.value) return;
            const list = document.getElementById('bubbles-'+id);
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = input.value;
            list.appendChild(b);
            input.value = '';
            updateBalance(RECOMPENSAS.comment);
        }

        start();
    </script>
</body>
</html>
