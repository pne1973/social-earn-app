<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v40.8 - Full Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --border: #dadce0; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; margin: 0; padding-top: 165px; padding-bottom: 85px; font-weight: 700; overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; height: 75px; background: white; border-bottom: 1px solid #ddd; z-index: 9999; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        
        .sticky-publisher { position: fixed; top: 75px; left: 0; right: 0; z-index: 999; background: #f1f3f4; padding: 12px 16px; border-bottom: 1px solid #ddd; }
        .publisher-card { background: white; border: 3px solid var(--g-blue); border-radius: 18px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .post-card { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; position: relative; }
        .post-content-area { padding: 12px; }
        .post-image { width: 100%; height: auto; display: block; background: #eee; }
        
        .user-info { display: flex; justify-content: space-between; padding: 10px 12px; font-size: 9px; font-weight: 900; color: #bdc1c6; text-transform: uppercase; font-style: italic; border-bottom: 1px solid #f8f9fa; }

        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; padding: 10px 0; }
        .badge { position: absolute; top: 4px; right: 22%; background: var(--g-red); color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; border: 2px solid white; font-weight: 900; z-index: 5; }
        .interaction-label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #5f6368; margin-top: 2px; }

        #ad-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10001; display: none; align-items: center; justify-content: center; padding: 25px; }
        .modal-content { background: white; border-radius: 25px; width: 100%; max-width: 350px; overflow: hidden; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-blue { background: var(--g-blue); color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 11px; }
        .btn-photo { background: #f8f9fa; border: 2px dashed #dadce0; border-radius: 12px; padding: 8px; font-size: 10px; color: #70757a; width: 100%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

    <div id="ad-modal">
        <div class="modal-content">
            <div class="bg-blue-600 p-6 text-center text-white"><h2 class="italic font-black text-lg">PUBLICIDADE OBRIGATÓRIA</h2></div>
            <div class="p-6 text-center">
                <p class="text-[10px] font-black uppercase text-gray-400 mb-6 leading-tight">Visualize o anúncio para continuar com o seu <b>STATUS: 100% OK</b> e receber o valor total das interações.</p>
                <div class="bg-blue-50 border-2 border-dashed border-blue-100 p-4 rounded-xl mb-6">
                    <p class="text-[11px] font-black text-blue-700 uppercase">📢 Anúncio: Ganhe +100 XP por cada amigo convidado hoje!</p>
                </div>
                <button onclick="resolveAd(true)" class="btn-blue bg-green-500 mb-3">✅ VER ANÚNCIO (MANTER 100%)</button>
                <button onclick="resolveAd(false)" class="w-full py-2 text-[9px] font-black text-gray-400 uppercase">Ignorar e reduzir ganhos</button>
            </div>
        </div>
    </div>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black italic shadow-sm text-xl">A</div>
            <div>
                <h1 class="text-[13px] font-black uppercase text-blue-600 leading-none">Apex Social</h1>
                <div id="status-tag" class="text-[9px] font-black italic mt-1 text-green-500">STATUS: 100% OK</div>
            </div>
        </div>
        <div class="text-right">
            <div id="eur" class="font-black text-green-600 text-xl leading-none">0.0000€</div>
            <div id="brl" class="text-[9px] font-black text-gray-400 italic mt-1">0.0000 BRL</div>
        </div>
    </header>

    <div class="sticky-publisher">
        <div class="publisher-card">
            <textarea id="post-text" placeholder="O QUE PRETENDE PARTILHAR? (+0.0150€)" class="w-full border-none text-[11px] font-black uppercase outline-none resize-none mb-2" rows="1"></textarea>
            
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="previewImg()">
            <button onclick="document.getElementById('file-input').click()" class="btn-photo" id="photo-label">
                📸 ANEXAR FOTO DA GALERIA
            </button>
            
            <button onclick="handlePublish()" id="pub-btn" class="btn-blue">PUBLICAR AGORA (+0.0150€)</button>
        </div>
    </div>

    <main id="feed" class="px-4 pb-10"></main>

    <nav class="fixed bottom-0 w-full h-16 bg-white border-t border-gray-200 flex justify-around items-center z-[9999]">
        <div class="text-[10px] font-black uppercase text-blue-600 border-b-2 border-blue-600 pb-1">Rede</div>
        <div class="text-[10px] font-black uppercase text-gray-400">Ganhos</div>
        <div class="text-[10px] font-black uppercase text-gray-400">Gestão</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6I..." // Chave Supabase
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);
        const MASTER_ID = "5401881400";

        let userSaldo = 0;
        let actionCount = 0;
        let bonusActive = true;
        let tempImg = "";

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) userSaldo = data.saldo;
            updateHeader(); loadPosts();
        }

        function updateHeader() {
            document.getElementById('eur').innerText = userSaldo.toFixed(4) + "€";
            document.getElementById('brl').innerText = (userSaldo * 6.1245).toFixed(4) + " BRL";
            const tag = document.getElementById('status-tag');
            tag.innerText = bonusActive ? "STATUS: 100% OK" : "STATUS: 60% OK (BAIXO)";
            tag.className = `text-[9px] font-black italic mt-1 ${bonusActive ? 'text-green-500' : 'text-red-500'}`;
        }

        function previewImg() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImg = e.target.result;
                document.getElementById('photo-label').innerHTML = "✅ FOTO ANEXADA";
                document.getElementById('photo-label').classList.add('bg-green-50', 'border-green-200');
            };
            reader.readAsDataURL(file);
        }

        async function processInteraction(val) {
            actionCount++;
            if(actionCount % 2 === 0) {
                document.getElementById('ad-modal').style.display = 'flex';
                return;
            }
            const gain = bonusActive ? val : val * 0.6;
            userSaldo += gain;
            updateHeader();
            await _sb.from('perfis').update({ saldo: userSaldo }).eq('id', MASTER_ID);
        }

        function resolveAd(success) {
            bonusActive = success;
            document.getElementById('ad-modal').style.display = 'none';
            userSaldo += bonusActive ? 0.0005 : 0.0005 * 0.6;
            updateHeader();
        }

        async function loadPosts() {
            const { data } = await _sb.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            data?.forEach(p => {
                const imgTag = p.image_url ? `<img src="${p.image_url}" class="post-image">` : "";
                feed.innerHTML += `
                    <div class="post-card shadow-sm">
                        <div class="user-info"><span>Utilizador Master</span><span>#101</span></div>
                        ${imgTag}
                        <div class="post-content-area">
                            <p class="text-[12px] font-black uppercase text-gray-800">${p.content || ''}</p>
                        </div>
                        <div class="flex border-t border-gray-50 mt-2">
                            <div class="interaction-btn" onclick="processInteraction(0.0002)"><div class="badge">4</div><span class="text-xl">👍</span><div class="interaction-label">Gostar</div></div>
                            <div class="interaction-btn border-x border-gray-50" onclick="processInteraction(0.0005)"><div class="badge">0</div><span class="text-xl">💬</span><div class="interaction-label">Comentar</div></div>
                            <div class="interaction-btn" onclick="processInteraction(0.0010)"><div class="badge">0</div><span class="text-xl">🔗</span><div class="interaction-label">Partilhar</div></div>
                        </div>
                    </div>`;
            });
        }

        async function handlePublish() {
            const txt = document.getElementById('post-text').value;
            if(!txt && !tempImg) return;
            document.getElementById('pub-btn').innerText = "A PROCESSAR...";
            
            await _sb.from('posts').insert([{ user_id: MASTER_ID, content: txt, image_url: tempImg }]);
            userSaldo += bonusActive ? 0.0150 : 0.0150 * 0.6;
            window.location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
