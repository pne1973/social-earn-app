<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #ffffff; --yellow: #ffcf05; --gray: #888; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .xp-badge { background: var(--yellow); color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        .post-box { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 16px; resize: none; outline: none; min-height: 60px; }
        
        .btn-publish { background: var(--yellow); color: #000; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-photo { background: #333; padding: 8px 15px; border-radius: 10px; font-size: 14px; cursor: pointer; color: white; }

        .feed-item { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #222; animation: fadeIn 0.3s ease; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; display: block; }
        
        .actions { display: flex; gap: 20px; margin-top: 15px; font-size: 14px; color: var(--gray); }
        .nav { position: fixed; bottom: 0; width: 100%; background: #161616; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0; letter-spacing: 1px;">SOCIAL NETWORK</h3>
        <div id="userXP" class="xp-badge">-- XP</div>
    </div>

    <div class="post-box">
        <textarea id="postInput" placeholder="O que estás a pensar?"></textarea>
        <div id="previewArea"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            <label class="btn-photo">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImg()">
                📷 Foto
            </label>
            <button id="publishBtn" class="btn-publish" onclick="publishPost()">Publicar</button>
        </div>
    </div>

    <div id="mainFeed"></div>

    <div class="nav">
        <div onclick="location.reload()" style="cursor:pointer">🏠</div>
        <div onclick="alert('Ranking em breve!')" style="cursor:pointer">🏆</div>
        <div onclick="alert('Carteira em breve!')" style="cursor:pointer">💰</div>
    </div>

<script>
    // 1. CONFIGURAÇÃO - COLA AQUI OS TEUS DADOS
    const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const ADMIN_ID = 5401881400; // O teu ID

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. DADOS DO TELEGRAM
    const tg = window.Telegram?.WebApp;
    tg?.expand();
    const user = tg?.initDataUnsafe?.user || { id: 5401881400, username: "Admin_Test" };
    const userId = user.id;
    const username = user.username || "User_" + userId;

    async function init() {
        await checkProfile();
        loadFeed();
    }

    async function checkProfile() {
        const { data, error } = await supabaseClient.from('profiles').select('xp').eq('user_id', userId).single();
        if (data) {
            document.getElementById('userXP').innerText = `${data.xp} XP`;
        } else {
            // Cria perfil se não existir
            await supabaseClient.from('profiles').insert([{ user_id: userId, username: username, xp: 0 }]);
            document.getElementById('userXP').innerText = `0 XP`;
        }
    }

    async function publishPost() {
        const text = document.getElementById('postInput').value;
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('publishBtn');
        let imgUrl = null;

        if (!text && !file) return;
        btn.disabled = true;
        btn.innerText = "A enviar...";

        try {
            if (file) {
                const fName = `${Date.now()}_${userId}.jpg`;
                
                // Upload forçando o tipo de conteúdo (MIME Type)
                const { error: upErr } = await supabaseClient.storage
                    .from('post-images')
                    .upload(fName, file, { contentType: 'image/jpeg', upsert: true });

                if (upErr) throw upErr;

                // Construção da URL manual para evitar erros de redirecionamento
                const cleanUrl = SUPABASE_URL.replace(/\/$/, "");
                imgUrl = `${cleanUrl}/storage/v1/object/public/post-images/${fName}`;
            }

            // Gravar post
            const { error: dbErr } = await supabaseClient.from('posts').insert([{ 
                user_id: userId, 
                username: username, 
                content: text, 
                image_url: imgUrl 
            }]);

            if (dbErr) throw dbErr;

            // Atribuir XP via RPC
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: imgUrl ? 10 : 5 });
            
            location.reload();
        } catch (e) {
            alert("Erro: " + e.message);
            btn.disabled = false;
            btn.innerText = "Publicar";
        }
    }

    async function loadFeed() {
        const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
        let html = "";
        
        posts?.forEach(p => {
            html += `
            <div class="feed-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b style="color:var(--yellow)">@${p.username}</b>
                    ${userId === ADMIN_ID ? `<span style="color:#ff4d4d; font-size:11px; cursor:pointer;" onclick="deletePost(${p.id})">APAGAR</span>` : ''}
                </div>
                <div style="font-size:15px; line-height:1.4;">${p.content || ''}</div>
                ${p.image_url ? `<img src="${p.image_url}" class="post-img" onerror="this.style.display='none'">` : ''}
                
                <div class="actions">
                    <span>❤️ ${p.likes || 0}</span>
                    <span>💬 Comentar</span>
                </div>
            </div>`;
        });
        document.getElementById('mainFeed').innerHTML = html || "<p style='text-align:center; opacity:0.5; margin-top:50px;'>Feed vazio</p>";
    }

    async function deletePost(id) {
        if(confirm("Desejas apagar este post?")) {
            await supabaseClient.from('posts').delete().eq('id', id);
            loadFeed();
        }
    }

    function previewImg() {
        document.getElementById('previewArea').innerHTML = `<p style="color:var(--yellow); font-size:12px; margin: 10px 0 0 0;">✓ Foto pronta para publicar</p>`;
    }

    init();
</script>
</body>
</html>
