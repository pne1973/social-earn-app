<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network - FB Edition v33.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #F0F2F5; color: #1C1E21; -webkit-tap-highlight-color: transparent; }
        .fb-shadow { box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1); }
        .fb-blue { color: #1877F2; }
        .bg-fb-blue { background-color: #1877F2; }
        
        .nav-item { position: relative; color: #65676B; transition: all 0.2s; cursor: pointer; }
        .nav-item.active { color: #1877F2; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #1877F2; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }

        .post-card { background: white; border-radius: 8px; border: 1px solid #dddfe2; margin-bottom: 12px; }
    </style>
</head>
<body class="pb-16">

    <div id="auth-screen" class="fixed inset-0 bg-white z-[6000] flex flex-col items-center justify-center p-6" style="display:none;">
        <h1 class="text-4xl font-bold fb-blue mb-8 tracking-tighter">facebook</h1>
        <input type="text" id="login-id" placeholder="ID de Utilizador" class="w-full max-w-xs border border-gray-300 rounded-xl p-4 mb-4 outline-none focus:border-blue-500 font-semibold bg-gray-50">
        <button onclick="doLogin()" class="w-full max-w-xs bg-fb-blue text-white font-bold py-3 rounded-xl shadow-lg text-lg">Entrar</button>
    </div>

    <div id="floating-earning"><div class="text-4xl font-black text-green-500" id="earning-val">+0.0000€</div></div>

    <header class="sticky top-0 z-50 bg-white fb-shadow">
        <div class="max-w-xl mx-auto flex items-center justify-between px-4 h-14">
            <h1 class="text-2xl font-bold fb-blue tracking-tighter">facebook</h1>
            <div class="flex items-center space-x-3">
                <div class="text-right leading-none">
                    <div id="main-eur" class="font-bold text-green-600 text-sm">0.0000€</div>
                    <div id="main-brl" class="text-[9px] text-gray-400 font-bold uppercase">0.00 BRL</div>
                </div>
                <div class="bg-gray-100 p-2 rounded-full" onclick="nav('menu')"><svg class="w-5 h-5" fill="black" viewBox="0 0 20 20"><path d="M3 5h14v2H3V5zm0 4h14v2H3V9zm0 4h14v2H3v-2z"></path></svg></div>
            </div>
        </div>
        
        <nav id="main-nav" class="flex border-t border-gray-100 max-w-xl mx-auto h-12">
            <button onclick="nav('social')" class="nav-item active flex-1 flex justify-center items-center">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            </button>
            <button onclick="nav('friends')" class="nav-item flex-1 flex justify-center items-center">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a7 7 0 00-7 7v1h12v-1a7 7 0 00-7-7z"></path></svg>
            </button>
            <button onclick="nav('info')" class="nav-item flex-1 flex justify-center items-center">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            </button>
            <button id="nav-admin-btn" onclick="nav('admin')" class="nav-item flex-1 hidden flex justify-center items-center text-red-600">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a1 1 0 00-2 0v7.268a2 2 0 000 3.464V16a1 1 0 102 0v-1.268a2 2 0 000-3.464V4zM11 4a1 1 0 10-2 0v1.268a2 2 0 000 3.464V16a1 1 0 102 0V8.732a2 2 0 000-3.464V4zM16 3a1 1 0 011 1v7.268a2 2 0 010 3.464V16a1 1 0 11-2 0v-1.268a2 2 0 010-3.464V4a1 1 0 011-1z"></path></svg>
            </button>
        </nav>
    </header>

    <main class="max-w-xl mx-auto p-3">
        
        <section id="view-social" class="tab-content active">
            <div class="bg-white p-4 rounded-lg fb-shadow mb-3">
                <div class="flex space-x-3 mb-3">
                    <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center font-bold text-gray-500">👤</div>
                    <textarea id="post-input" placeholder="No que você está pensando?" class="w-full bg-gray-100 rounded-2xl px-4 py-2 border-none focus:ring-0 resize-none text-[15px] h-11 font-medium"></textarea>
                </div>
                <input id="post-url" type="text" placeholder="URL da imagem (opcional)" class="w-full bg-gray-50 text-[10px] p-2 mb-2 rounded border border-gray-100 outline-none focus:bg-white">
                <button onclick="handleInteraction('post')" class="w-full bg-fb-blue text-white py-2 rounded-md font-bold text-sm">Publicar (+0.0150€)</button>
            </div>
            <div id="feed-container" class="space-y-3"></div>
        </section>

        <section id="view-friends" class="tab-content">
            <div class="bg-white rounded-lg fb-shadow p-4">
                <h2 class="text-xl font-bold mb-4">Sugestões de Amizade</h2>
                <div id="friends-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="bg-white p-6 rounded-lg fb-shadow text-center">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">O seu Saldo</h3>
                <h2 id="wall-eur" class="text-5xl font-black fb-blue mb-1">0.0000€</h2>
                <p id="wall-brl-sub" class="text-gray-400 font-bold mb-6">0.0000 BRL</p>
                <div id="withdraw-area" class="hidden">
                    <input id="pp-email" type="email" placeholder="E-mail PayPal" class="w-full border-2 border-fb-blue p-4 rounded-xl mb-3 text-center font-bold">
                    <button onclick="requestWithdraw()" class="w-full bg-fb-blue text-white py-4 rounded-xl font-bold">Solicitar Saque</button>
                </div>
                <div id="progress-container">
                    <div class="w-full bg-gray-200 h-3 rounded-full mb-3 overflow-hidden">
                        <div id="withdraw-progress" class="bg-fb-blue h-full w-0 transition-all duration-700"></div>
                    </div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Mínimo: 5.0000€</p>
                </div>
            </div>
        </section>

        <section id="view-admin" class="tab-content">
            <div class="bg-white rounded-xl fb-shadow p-4 border-l-4 border-red-600 mb-4">
                <h2 class="text-red-600 font-black text-lg mb-4">BUSINESS INTELLIGENCE</h2>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-gray-100 p-4 rounded-xl text-center">
                        <div class="text-[10px] uppercase font-bold opacity-50">Usuários</div>
                        <div id="adm-total-users" class="text-2xl font-black">0</div>
                    </div>
                    <div class="bg-gray-100 p-4 rounded-xl text-center">
                        <div class="text-[10px] uppercase font-bold opacity-50">Posts</div>
                        <div id="adm-total-posts" class="text-2xl font-black">0</div>
                    </div>
                </div>
                <div class="bg-green-50 p-4 rounded-xl mb-6 border border-green-100">
                    <div class="text-[10px] uppercase font-bold text-green-600">Dívida Total (Soma de Saldos)</div>
                    <div id="adm-total-debt" class="text-2xl font-black text-green-700">0.0000€</div>
                </div>
                <div class="font-bold text-sm mb-2 uppercase opacity-50">Gestão de Contas</div>
                <div id="adm-user-list" class="divide-y divide-gray-100 bg-gray-50 rounded-xl overflow-hidden"></div>
            </div>
        </section>

        <section id="view-menu" class="tab-content">
            <div class="space-y-3">
                <div class="bg-white p-4 rounded-lg fb-shadow flex items-center space-x-3">
                    <div class="w-12 h-12 bg-fb-blue rounded-full flex items-center justify-center text-white text-xl">👤</div>
                    <div><div class="font-bold" id="menu-user-id">---</div><div class="text-xs text-gray-500">Ver perfil</div></div>
                </div>
                <button onclick="localStorage.clear(); location.reload();" class="w-full bg-white p-4 rounded-lg fb-shadow text-red-600 font-bold flex items-center space-x-3 hover:bg-red-50 transition">
                    <span>🚪</span><span>Terminar Sessão</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_MASTER = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let activeID = localStorage.getItem('apex_uid');
        let user = { saldo: 0 };

        async function init() {
            if (!activeID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
            document.getElementById('display-uid' && 'menu-user-id').innerText = "ID: " + activeID;
            
            // Ativa aba Admin se for o Master
            if(activeID === ADMIN_MASTER) {
                document.getElementById('nav-admin-btn').classList.remove('hidden');
            }

            const { data } = await sb.from('perfis').select('*').eq('id', activeID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            else await sb.from('perfis').insert([{ id: activeID, saldo: 0.0000 }]);

            updateUI(); 
            loadFeed();
            loadFriends();
            setInterval(updateUI, 2000);
        }

        function updateUI() {
            const cur = user.saldo;
            const brl = cur * 6.1245;
            document.getElementById('main-eur').innerText = cur.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = cur.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = brl.toFixed(4) + " BRL";
            document.getElementById('wall-brl-sub').innerText = brl.toFixed(4) + " BRL";
            
            const progress = (cur / 5.0) * 100;
            document.getElementById('withdraw-progress').style.width = Math.min(progress, 100) + "%";
            if(cur >= 5.0) {
                document.getElementById('withdraw-area').classList.remove('hidden');
                document.getElementById('progress-container').classList.add('hidden');
            }
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = posts.map(p => `
                <div class="post-card">
                    <div class="p-3 flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <div class="w-9 h-9 bg-gray-200 rounded-full flex items-center justify-center font-bold text-xs text-gray-400">👤</div>
                            <div><div class="text-sm font-bold text-fb-blue">${p.user_id}</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Publicado agora</div></div>
                        </div>
                        ${activeID === ADMIN_MASTER ? `<button onclick="deletePost('${p.id}')" class="text-red-500 text-[10px] font-black uppercase">Eliminar</button>` : ''}
                    </div>
                    <div class="px-3 pb-3 text-[15px] leading-tight">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="w-full border-y border-gray-100">` : ''}
                    <div class="flex border-t border-gray-50 p-1">
                        <button onclick="handleInteraction('like', 0.0006)" class="flex-1 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-md transition">👍 Gosto</button>
                        <button onclick="handleInteraction('comment', 0.0010)" class="flex-1 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-md transition">💬 Comentar</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadFriends() {
            const { data: users } = await sb.from('perfis').select('id').limit(15);
            const container = document.getElementById('friends-list');
            container.innerHTML = users.map(u => `
                <div class="flex items-center justify-between py-2">
                    <div class="flex items-center space-x-3">
                        <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center font-bold text-gray-400">👤</div>
                        <div class="font-bold text-sm">${u.id}</div>
                    </div>
                    <button class="bg-fb-blue text-white px-4 py-1.5 rounded-lg font-bold text-xs">Adicionar</button>
                </div>
            `).join('');
        }

        async function loadAdminStats() {
            if(activeID !== ADMIN_MASTER) return;
            const { data: users } = await sb.from('perfis').select('*');
            const { count: postCount } = await sb.from('posts').select('*', { count: 'exact', head: true });
            
            let totalDebt = users.reduce((acc, u) => acc + Number(u.saldo), 0);
            
            document.getElementById('adm-total-users').innerText = users.length;
            document.getElementById('adm-total-posts').innerText = postCount;
            document.getElementById('adm-total-debt').innerText = totalDebt.toFixed(4) + "€";

            const list = document.getElementById('adm-user-list');
            list.innerHTML = users.map(u => `
                <div class="p-4 flex justify-between items-center bg-white">
                    <div>
                        <div class="font-bold text-[10px] opacity-50">${u.id}</div>
                        <div class="text-fb-blue font-black text-sm">${Number(u.saldo).toFixed(4)}€</div>
                    </div>
                    <div class="flex space-x-2">
                         <button onclick="banUser('${u.id}')" class="bg-red-100 text-red-600 text-[9px] font-black p-2 rounded uppercase">Banir</button>
                    </div>
                </div>
            `).join('');
        }

        async function handleInteraction(type, val = 0) {
            if (type === 'post') {
                const content = document.getElementById('post-input').value;
                const url = document.getElementById('post-url').value;
                if(!content) return;
                const { error } = await sb.from('posts').insert([{ user_id: activeID, content, image_url: url }]);
                if(!error) {
                    document.getElementById('post-input').value = "";
                    document.getElementById('post-url').value = "";
                    applyGain(0.0150);
                    loadFeed();
                }
            } else { applyGain(val); }
        }

        async function applyGain(val) {
            user.saldo = Number((user.saldo + val).toFixed(4));
            showBigNumber(val);
            await sb.from('perfis').upsert({ id: activeID, saldo: user.saldo });
        }

        function showBigNumber(val) {
            const c = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            c.style.display = 'block';
            setTimeout(() => c.style.display = 'none', 800);
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'admin') loadAdminStats();
            if(t === 'social') loadFeed();
        }

        function doLogin() {
            const id = document.getElementById('login-id').value.trim();
            if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
        }

        async function deletePost(id) {
            if(confirm('Apagar permanentemente?')) {
                await sb.from('posts').delete().eq('id', id);
                loadFeed();
            }
        }

        init();
    </script>
</body>
</html>
