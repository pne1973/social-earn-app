<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social v32 - Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; --success: #2e7d32; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        /* Header Estilo Google Edition */
        header { 
            background: white; padding: 15px; border-bottom: 1px solid #ddd; 
            position: sticky; top: 0; z-index: 100; display: flex; 
            flex-direction: column; align-items: center; gap: 5px;
        }
        .balance-group { display: flex; gap: 20px; font-size: 1.1rem; font-weight: 600; }
        #balance-eur { color: var(--success); }
        #balance-brl { color: var(--primary); }

        /* Feed e Cards */
        .feed { max-width: 500px; margin: 20px auto; padding: 0 10px; }
        .post { 
            background: white; border: 1px solid #dadce0; border-radius: 8px; 
            margin-bottom: 15px; padding: 15px; transition: 0.2s;
        }
        .post:hover { box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
        .post img { width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        
        /* Ações de Ganho */
        .actions { 
            display: flex; justify-content: space-around; 
            margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; 
        }
        .btn-action { 
            background: none; border: none; color: var(--primary); 
            cursor: pointer; font-weight: 500; font-size: 0.9rem; padding: 8px;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-action:hover { background: #f1f3f4; border-radius: 4px; }
        
        .status-msg { font-size: 0.8rem; color: #70757a; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div class="balance-group">
        <span id="balance-eur">0.0000€</span>
        <span id="balance-brl">R$ 0.00</span>
    </div>
    <div class="status-msg" id="sync-status">Sincronizado com Apex Cloud</div>
</header>

<div class="feed" id="feed">
    <div style="text-align:center; padding:50px;">A carregar posts...</div>
</div>

<script>
    // 1. CREDENCIAIS FORNECIDAS
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 2. CONFIGURAÇÃO DO UTILIZADOR (MASTER_ID COMO TEXTO)
    const MASTER_ID = "5401881400"; 
    const CAMBIO_BRL = 6.12; 
    let user = { saldo: 0.0000, multiplier: 1.0 };

    // 3. INICIALIZAÇÃO: Carregar Saldo Real
    async function init() {
        const { data, error } = await sb
            .from('perfis')
            .select('saldo')
            .eq('id', MASTER_ID)
            .single();

        if (data) {
            user.saldo = parseFloat(data.saldo) || 0;
            console.log("Sistema Apex: Saldo recuperado da Cloud.");
        } else {
            console.warn("Aviso: Perfil não encontrado. Certifique-se de que o SQL foi executado.");
        }

        updateUI();
        loadFeed();
    }

    // 4. ATUALIZAÇÃO DA INTERFACE
    function updateUI() {
        document.getElementById('balance-eur').innerText = user.saldo.toFixed(4) + "€";
        document.getElementById('balance-brl').innerText = "R$ " + (user.saldo * CAMBIO_BRL).toFixed(2);
    }

    // 5. LÓGICA DE GANHOS (SEM XP)
    async function applyGain(valorBase) {
        const ganhoReal = valorBase * user.multiplier;
        user.saldo = parseFloat((user.saldo + ganhoReal).toFixed(4));
        
        updateUI();
        document.getElementById('sync-status').innerText = "A guardar ganhos...";

        // Atualização persistente no Supabase
        const { error } = await sb
            .from('perfis')
            .update({ saldo: user.saldo })
            .eq('id', MASTER_ID);

        if (!error) {
            setTimeout(() => {
                document.getElementById('sync-status').innerText = "Sincronizado";
            }, 1000);
        }
    }

    // 6. CARREGAR FEED (Limite de 10 posts por vez - Infinite Scroll pronto)
    async function loadFeed() {
        const { data: posts, error } = await sb
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(10);

        const feedEl = document.getElementById('feed');
        if (posts) {
            feedEl.innerHTML = ''; 
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post';
                card.innerHTML = `
                    <small>ID: ${post.id}</small>
                    <p>${post.content || ''}</p>
                    ${post.image_url ? `<img src="${post.image_url}" loading="lazy">` : ''}
                    <div class="actions">
                        <button class="btn-action" onclick="applyGain(0.0015)">👍 Like (+0.0015€)</button>
                        <button class="btn-action" onclick="applyGain(0.0030)">💬 Share (+0.0030€)</button>
                    </div>
                `;
                feedEl.appendChild(card);
            });
        }
    }

    // Arrancar Aplicação
    init();
</script>

</body>
</html>
