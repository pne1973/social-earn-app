<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #121212; --tg-theme-text: #ffffff; --tg-theme-button: #ffcc00; }
        body { font-family: sans-serif; background: var(--tg-theme-bg); color: var(--tg-theme-text); margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .xp-badge { background: var(--tg-theme-button); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .post-box { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; resize: none; font-size: 16px; outline: none; margin-bottom: 10px; }
        .actions { display: flex; justify-content: space-between; align-items: center; }
        .btn-pub { background: var(--tg-theme-button); color: #000; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .feed-post { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; position: relative; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
        .btn-delete { color: #ff4444; font-size: 12px; cursor: pointer; float: right; text-transform: uppercase; }
        .user-info { color: var(--tg-theme-button); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>SOCIAL NETWORK</h2>
        <div id="userXP" class="xp-badge">Carregando...</div>
    </div>

    <div class="post-box">
        <textarea id="postText" placeholder="O que estás a pensar?" rows="3"></textarea>
        <div class="actions">
            <button onclick="document.getElementById('fileInput').click()" style="background:#333; color:#fff; border:none; padding:8px 12px; border-radius:8px;">📷 Foto</button>
            <input type="file" id="fileInput" hidden accept="image/*">
            <button class="btn-pub" onclick="handlePublish()">Publicar</button>
        </div>
    </div>

    <div id="feed"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // CONFIGURAÇÃO SUPABASE
        const SUPABASE_URL = "A_TUA_URL_AQUI"; 
        const SUPABASE_KEY = "A_TUA_KEY_AQUI";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_ID = 5401881400; // O teu ID
        const user = tg.initDataUnsafe?.user || { id: ADMIN_ID, username: "pine1971" };
        const userId = user.id;

        async function init() {
            // BUSCAR XP (Usando 'points' e 'id' conforme o teu print)
            const { data, error } = await supabaseClient
                .from('profiles')
                .select('points')
                .eq('id', userId)
                .single();

            if (data) {
                document.getElementById('userXP').innerText = `${data.points} XP`;
            } else {
                document.getElementById('userXP').innerText = `0 XP`;
            }
            loadFeed();
        }

        async function loadFeed() {
            const { data: posts } = await supabaseClient
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = '';

            posts?.forEach(p => {
                const isOwner = userId === ADMIN_ID || p.user_id === userId;
                feedDiv.innerHTML += `
                    <div class="feed-post">
                        ${isOwner ? `<span class="btn-delete" onclick="deletePost(${p.id})">Apagar</span>` : ''}
                        <div class="user-info">@${p.username || 'user'}</div>
                        <div>${p.content}</div>
                        ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    </div>
                `;
            });
        }

        async function handlePublish() {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            let imageUrl = null;

            if (!text && !file) return;

            if (file) {
                const fileName = `${Date.now()}_${userId}.jpg`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('post-images')
                    .upload(fileName, file);

                if (uploadError) return alert("Erro no upload: " + uploadError.message);

                // Criar link público
                const { data: publicUrlData } = supabaseClient.storage
                    .from('post-images')
                    .getPublicUrl(fileName);
                imageUrl = publicUrlData.publicUrl;
            }

            // Inserir Post
            const { error: postError } = await supabaseClient.from('posts').insert([{
                user_id: userId,
                username: user.username,
                content: text,
                image_url: imageUrl
            }]);

            if (postError) {
                alert("Erro ao postar: " + postError.message);
            } else {
                document.getElementById('postText').value = '';
                document.getElementById('fileInput').value = '';
                init(); // Atualiza feed e XP
            }
        }

        async function deletePost(postId) {
            if (!confirm("Apagar post?")) return;
            const { error } = await supabaseClient.from('posts').delete().eq('id', postId);
            if (!error) init();
        }

        init();
    </script>
</body>
</html>
