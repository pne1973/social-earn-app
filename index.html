<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #121212; --tg-theme-text: #ffffff; --tg-theme-button: #ffcc00; --card-bg: #1e1e1e; }
        body { font-family: sans-serif; background: var(--tg-theme-bg); color: var(--tg-theme-text); margin: 0; padding: 10px; padding-bottom: 50px; }
        
        /* Header & XP */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        .xp-badge { background: var(--tg-theme-button); color: #000; padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 14px; }
        
        /* Caixa de Postagem */
        .post-box { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; resize: none; font-size: 16px; outline: none; min-height: 60px; }
        .actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; padding-top: 10px; }
        
        /* Feed, Posts e Imagens */
        .feed-post { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .post-img { width: 100%; border-radius: 10px; margin: 10px 0; display: block; max-height: 350px; object-fit: cover; }
        .user-info { font-weight: bold; color: var(--tg-theme-button); display: flex; justify-content: space-between; align-items: center; }
        
        /* Comentários */
        .comment-section { margin-top: 12px; border-top: 1px solid #2a2a2a; padding-top: 10px; }
        .comment { background: #252525; padding: 6px 10px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; border-left: 2px solid var(--tg-theme-button); }
        .comment-user { font-weight: bold; color: var(--tg-theme-button); margin-right: 5px; }
        .comment-input-group { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; padding: 6px 12px; outline: none; }

        /* Espaço para Anúncio (Placeholder) */
        .ad-placeholder { background: #1a1a1a; border: 1px dashed #444; padding: 30px 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; color: #555; font-size: 12px; }

        /* Botões */
        .btn-pub { background: var(--tg-theme-button); color: #000; border: none; padding: 8px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-del { color: #ff4444; font-size: 10px; cursor: pointer; border: 1px solid #ff4444; padding: 2px 6px; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">SOCIAL APP</h3>
        <div id="userXP" class="xp-badge">-- XP</div>
    </div>

    <div class="post-box">
        <textarea id="postText" placeholder="O que estás a pensar?"></textarea>
        <div class="actions">
            <input type="file" id="fileInput" hidden accept="image/*">
            <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:#888; cursor:pointer;">📷 Foto</button>
            <button class="btn-pub" id="pubBtn" onclick="handlePublish()">Publicar</button>
        </div>
    </div>

    <div id="feed"></div>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const userId = 5401881400; 
        const username = "pine1971";

        async function init() {
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if(data) document.getElementById('userXP').innerText = `${data.points} XP`;
            loadFeed();
        }

        async function loadFeed() {
            const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = '';

            if (!posts) return;

            for (let i = 0; i < posts.length; i++) {
                const p = posts[i];
                
                // Carregar comentários
                const { data: comments } = await supabaseClient.from('comments').select('*').eq('post_id', p.id).order('created_at', {ascending: true});
                
                let commentsHtml = '';
                comments?.forEach(c => {
                    commentsHtml += `<div class="comment"><span class="comment-user">@${c.username}</span> ${c.content}</div>`;
                });

                // Post HTML
                feedDiv.innerHTML += `
                    <div class="feed-post">
                        <div class="user-info">
                            <span>@${p.username}</span>
                            ${p.user_id === userId ? `<span class="btn-del" onclick="deletePost(${p.id})">Apagar</span>` : ''}
                        </div>
                        <div style="margin:10px 0; white-space: pre-wrap;">${p.content || ''}</div>
                        ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                        
                        <div class="comment-section">
                            <div id="comments-${p.id}">${commentsHtml}</div>
                            <div class="comment-input-group">
                                <input type="text" id="in-${p.id}" class="comment-input" placeholder="Comentar...">
                                <button onclick="addComment(${p.id})" style="background:var(--tg-theme-button); border:none; border-radius:8px; width:35px; font-weight:bold;">></button>
                            </div>
                        </div>
                    </div>
                `;

                // Espaço para Anúncio a cada 3 posts
                if ((i + 1) % 3 === 0) {
                    feedDiv.innerHTML += `
                        <div class="ad-placeholder">
                            <div style="color:var(--tg-theme-button); font-weight:bold; margin-bottom:5px;">[ESPAÇO RESERVADO PARA ADS]</div>
                            Nenhuma impressão gasta.
                        </div>
                    `;
                }
            }
        }

        async function handlePublish() {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('pubBtn');
            let imageUrl = null;

            if (!text && !file) return;
            btn.disabled = true;
            btn.innerText = "...";

            try {
                if (file) {
                    const fileName = `${Date.now()}.jpg`;
                    await supabaseClient.storage.from('post-images').upload(fileName, file);
                    const { data } = supabaseClient.storage.from('post-images').getPublicUrl(fileName);
                    imageUrl = data.publicUrl;
                }
                await supabaseClient.from('posts').insert([{ user_id: userId, username, content: text, image_url: imageUrl }]);
                location.reload();
            } catch (e) {
                alert("Erro: " + e.message);
                btn.disabled = false;
            }
        }

        async function addComment(postId) {
            const input = document.getElementById(`in-${postId}`);
            if (!input.value) return;
            await supabaseClient.from('comments').insert([{ post_id: postId, user_id: userId, username, content: input.value }]);
            input.value = '';
            loadFeed();
        }

        async function deletePost(id) {
            if(confirm("Eliminar post?")) {
                await supabaseClient.from('posts').delete().eq('id', id);
                loadFeed();
            }
        }

        init();
    </script>
</body>
</html>
