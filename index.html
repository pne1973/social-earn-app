<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network v33.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --bg-color: #FFFFFF;
            --text-color: #202124;
            --border-color: #DADCE0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.5; }

        header {
            background-color: #fff;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: bold; }
        .logo span:nth-child(1) { color: var(--google-blue); }
        .logo span:nth-child(2) { color: var(--google-red); }
        .logo span:nth-child(3) { color: var(--google-yellow); }
        .logo span:nth-child(4) { color: var(--google-blue); }
        .logo span:nth-child(5) { color: var(--google-green); }
        .logo span:nth-child(6) { color: var(--google-red); }

        main { margin-top: 70px; padding: 15px; max-width: 600px; margin-left: auto; margin-right: auto; }

        .card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .btn {
            background-color: var(--google-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        #auth-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-modal">
        <div class="logo" style="font-size: 40px; margin-bottom: 20px;">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>
        <input type="text" id="auth-username" placeholder="Insira seu ID" style="max-width: 300px;">
        <button class="btn" onclick="processAuth()">Entrar</button>
    </div>

    <header>
        <div class="logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span> Edition
        </div>
        <div id="balance-container" style="font-weight: bold;">
            € <span id="user-balance">0.0000</span>
        </div>
    </header>

    <main>
        <div class="card">
            <input type="text" id="post-content" placeholder="O que você está pensando?">
            <button class="btn" onclick="createNewPost()">Postar (+€0.0150)</button>
        </div>
        <div id="feed"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://fthvszovvpxujykslqex.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0aHZzem92dnB4dWp5a3NscWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTEwNTY0MDAsImV4cCI6MjAyNjYzMjQwMH0.7x9R5-fO1lW4s3E_f_f_f_f_f_f_f';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        async function processAuth() {
            const id = document.getElementById('auth-username').value;
            if (!id) return alert("Digite um ID");

            let { data: profile, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('id', id)
                .single();

            if (error || !profile) {
                const { data: newUser, error: createError } = await _supabase
                    .from('profiles')
                    .insert([{ id: id, username: 'User_' + id, balance: 0 }])
                    .select()
                    .single();
                
                if (createError) return alert("Erro ao criar perfil");
                profile = newUser;
            }

            currentUser = profile;
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('user-balance').innerText = currentUser.balance.toFixed(4);
            loadPosts();
        }

        async function loadPosts() {
            const { data: posts } = await _supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            const feed = document.getElementById('feed');
            feed.innerHTML = posts.map(post => `
                <div class="card">
                    <strong>${post.author_name}</strong>
                    <p>${post.content}</p>
                    <div style="margin-top:10px; font-size:12px; color:gray;">
                        <span onclick="likePost()">Curtir (+€0.0006)</span>
                    </div>
                </div>
            `).join('');
        }

        async function createNewPost() {
            const content = document.getElementById('post-content').value;
            if (!content) return;

            const { error } = await _supabase
                .from('posts')
                .insert([{ 
                    author_id: currentUser.id, 
                    author_name: currentUser.username, 
                    content: content 
                }]);

            if (!error) {
                currentUser.balance += 0.0150;
                await _supabase.from('profiles').update({ balance: currentUser.balance }).eq('id', currentUser.id);
                document.getElementById('user-balance').innerText = currentUser.balance.toFixed(4);
                document.getElementById('post-content').value = '';
                loadPosts();
            }
        }
    </script>
</body>
</html>
