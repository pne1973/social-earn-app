<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pine Social Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background-color: #121212; height: 100%; }
        body { 
            background-color: #121212; color: #fff; 
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh; padding-top: 175px; 
        }

        /* HEADER FIXO */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: #121212; border-bottom: 1px solid #333; }
        .ad-top { background: linear-gradient(90deg, #1a1a1a, #252525); color: #ffcc00; padding: 10px; text-align: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #333; }
        .nav-main { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .xp-badge { background: #ffcc00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        /* TABS */
        .tabs { display: flex; background: #1a1a1a; border-top: 1px solid #333; }
        .tab-item { flex: 1; padding: 14px; text-align: center; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-item.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; }

        /* CONTENT */
        .content { padding: 15px; max-width: 550px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* CARDS E POSTS - BLINDAGEM DE LAYOUT */
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .post { background: #1e1e1e; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; display: block; width: 100%; }
        
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; background: #1a1a1a; border-bottom: 1px solid #252525; }
        .post-avatar { width: 35px; height: 35px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffcc00; font-weight: bold; flex-shrink: 0; }
        
        /* O corpo do post agora tem largura total forçada */
        .post-body { padding: 15px; font-size: 15px; line-height: 1.5; color: #eee; word-wrap: break-word; width: 100%; display: block; }
        
        /* Contentor da Imagem Corrigido */
        .post-img-container { width: 100%; background: #000; display: block; border-top: 1px solid #252525; }
        .post-img { width: 100%; height: auto; max-height: 500px; object-fit: contain; display: block; }

        /* ACTIONS */
        .post-actions { display: flex; padding: 12px 15px; gap: 20px; background: #1a1a1a; border-top: 1px solid #252525; }
        .action-btn { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .action-btn.liked { color: #ffcc00; }

        /* INPUTS */
        .input-area { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; resize: none; min-height: 80px; font-size: 15px; margin-bottom: 10px; outline: none; }
        .btn-pub { background: #ffcc00; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="ad-top">✨ Patrocínio: Ganha 500 XP extra ao convidar 5 amigos!</div>
        <div class="nav-main">
            <h3>PINE <span style="color:#ffcc00">SOCIAL</span></h3>
            <div id="userXP" class="xp-badge">0 XP</div>
        </div>
        <div class="tabs">
            <div class="tab-item active" onclick="switchTab('feed-page', this)">Feed</div>
            <div class="tab-item" onclick="switchTab('earn-page', this)">Ganhos</div>
            <div class="tab-item" onclick="switchTab('wallet-page', this)">Saque</div>
        </div>
    </div>

    <main class="content">
        <div id="feed-page" class="page active">
            <div class="card">
                <textarea id="postText" class="input-area" placeholder="O que estás a pensar?"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:#888; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                    <button class="btn-pub" id="pubBtn" onclick="handlePublish()">Publicar</button>
                </div>
            </div>
            <div id="feed-items">A carregar publicações...</div>
        </div>

        <div id="earn-page" class="page">
            <div class="card"><h2>Ranking de Ganhos</h2><p>Top 10 em breve!</p></div>
        </div>

        <div id="wallet-page" class="page">
            <div class="card" style="text-align:center;"><h1 style="color:#ffcc00; font-size:40px;"><span id="euroVal">0.0000</span>€</h1></div>
        </div>
    </main>

    <script>
        // CHAVE CORRIGIDA (Com o Q final)
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QQ";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const myId = 5401881400;

        function switchTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'feed-page') fetchFeed();
        }

        async function fetchFeed() {
            const list = document.getElementById('feed-items');
            try {
                const { data, error } = await client.from('posts').select('*').order('created_at', {ascending: false});
                
                if(error) throw error;

                list.innerHTML = '';
                data.forEach((p, index) => {
                    // Ads
                    if (index > 0 && index % 3 === 0) {
                        list.innerHTML += `<div class="post" style="padding:20px; text-align:center; background:#1a1a1a; border:1px dashed #ffcc00;"><small style="color:#ffcc00">ANÚNCIO</small><br><b>🚀 Ganha XP infinito com VIP!</b></div>`;
                    }

                    const el = document.createElement('div');
                    el.className = 'post';
                    el.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">${p.user_id.toString().slice(-1)}</div>
                            <span style="font-weight:bold; font-size:13px;">User #${p.user_id.toString().slice(-4)}</span>
                        </div>
                        <div class="post-body">${p.content || ''}</div>
                        ${p.image_url ? `
                        <div class="post-img-container">
                            <img src="${p.image_url}" class="post-img" onerror="this.parentElement.style.display='none'">
                        </div>` : ''}
                        <div class="post-actions">
                            <button class="action-btn" onclick="likePost('${p.id}', this)"><i class="fas fa-heart"></i> <span class="count">${p.likes || 0}</span></button>
                            <button class="action-btn"><i class="fas fa-comment"></i> Comentar</button>
                            <button class="action-btn" onclick="share()"><i class="fas fa-share-alt"></i></button>
                        </div>
                    `;
                    list.appendChild(el);
                });
            } catch (e) {
                list.innerHTML = `<div style="text-align:center; padding:20px; color:#ff4444;">Erro na ligação ao servidor.</div>`;
            }
        }

        async function handlePublish() {
            const txt = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('pubBtn');
            if(!txt && !file) return;
            
            btn.disabled = true;
            btn.innerText = "...";
            let img = null;

            try {
                if(file) {
                    const name = `${Date.now()}_${myId}.jpg`;
                    const { data, error } = await client.storage.from('post-images').upload(name, file);
                    if(data) img = client.storage.from('post-images').getPublicUrl(name).data.publicUrl;
                }

                await client.from('posts').insert([{ user_id: myId, content: txt, image_url: img }]);
                await client.rpc('increment_points', { user_id: myId, amount: 15 });
                
                document.getElementById('postText').value = '';
                document.getElementById('fileInput').value = '';
                fetchFeed();
                updateProfile();
            } catch (e) {
                alert("Erro ao publicar.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Publicar";
            }
        }

        async function updateProfile() {
            const { data } = await client.from('profiles').select('points').eq('id', myId).single();
            if (data) {
                document.getElementById('userXP').innerText = data.points + " XP";
                document.getElementById('euroVal').innerText = (data.points * 0.0010).toFixed(4);
            }
        }

        function share() { if (navigator.share) navigator.share({ title: 'Pine Social', url: window.location.href }); }
        
        async function likePost(id, btn) {
            const countEl = btn.querySelector('.count');
            countEl.innerText = parseInt(countEl.innerText) + 1;
            btn.classList.add('liked');
            await client.rpc('increment_likes', { post_id: id });
            await client.rpc('increment_points', { user_id: myId, amount: 2 });
            updateProfile();
        }

        updateProfile();
        fetchFeed();
    </script>
</body>
</html>
