<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network v33.12 - Multi-Currency</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #1877F2; --fb-bg: #f0f2f5; --fb-gray: #65676b; }
        body { font-family: 'Roboto', sans-serif; background: var(--fb-bg); color: #1c1e21; font-weight: 700; margin: 0; overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 2px solid #ddd; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .status-header { position: fixed; top: 72px; width: 100%; height: 48px; background: white; border-bottom: 1px solid #dadce0; z-index: 900; display: flex; align-items: center; padding: 0 16px; }
        .publisher-fixed { position: fixed; top: 120px; width: 100%; background: white; padding: 12px; z-index: 800; border-bottom: 8px solid #ddd; }
        
        #feed-container { margin-top: 200px; padding-bottom: 110px; min-height: 100vh; }
        
        /* POST FACEBOOK LITE */
        .fb-post { background: white; margin-bottom: 8px; border-y: 1px solid #ddd; }
        .fb-p-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .fb-p-avatar { width: 40px; height: 40px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #4b4f56; }
        .fb-p-content { padding: 0 12px 12px; font-size: 15px; font-weight: 400; line-height: 1.4; color: #050505; }
        .fb-p-image { width: 100%; max-height: 500px; object-fit: cover; display: block; background: #eee; }
        .fb-p-actions { display: flex; border-top: 1px solid #ebedf0; margin: 0 12px; padding: 4px 0; }
        .fb-p-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; color: var(--fb-gray); font-size: 13px; font-weight: 700; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 2px solid #ddd; display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #65676b; gap: 2px; }
        .nav-btn.active { color: var(--fb-blue); }
        .nav-btn.active div { width: 30px; height: 3px; background: var(--fb-blue); border-radius: 10px; margin-bottom: 4px; }

        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white italic font-black text-2xl">S</div>
            <span class="text-blue-600 font-black uppercase text-xs leading-none">Social<br>Earn</span>
        </div>
        <div class="text-right">
            <div id="display-saldo" class="text-green-600 text-2xl font-black tracking-tighter">0.00</div>
            <div id="user-location" class="text-gray-400 text-[9px] font-black uppercase">Detetando país...</div>
        </div>
    </header>

    <div class="status-header">
        <div id="status-text" class="text-green-600 text-[10px] font-black uppercase tracking-widest">Ganhos Ativos: 100%</div>
        <button onclick="logout()" class="ml-auto text-gray-300 text-[10px] font-black uppercase">Sair</button>
    </div>

    <main id="view-social" class="tab-content active">
        <div class="publisher-fixed">
            <div onclick="openPub()" class="bg-gray-100 rounded-full px-4 py-3 flex items-center gap-3 text-gray-400 font-bold text-sm">
                <div class="fb-p-avatar" style="width:25px; height:25px; font-size:10px;">👤</div>
                <span id="lang-pub">O que estás a pensar?</span>
            </div>
        </div>
        <div id="feed-container"></div>
    </main>

    <main id="view-ganhos" class="tab-content pt-44 px-6">
        <div class="bg-white border-2 border-gray-100 p-10 text-center rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
            <p id="lang-balance" class="text-[10px] font-black text-gray-300 uppercase mb-4">Saldo Disponível</p>
            <h1 id="wall-saldo" class="text-5xl font-black text-blue-600 mb-6">0.00</h1>
            <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden mb-3">
                <div id="progress-bar" class="bg-blue-600 h-full w-0 transition-all duration-700"></div>
            </div>
            <p id="withdraw-info" class="text-[9px] font-black text-gray-400 uppercase">Progresso para Saque</p>
        </div>
    </main>

    <main id="view-admin" class="tab-content pt-44 px-4">
        <div class="bg-[#1a0b2e] text-white p-6 rounded-2xl mb-6 shadow-2xl">
            <div class="flex justify-between mb-4 border-b border-white/10 pb-4">
                <div><p class="text-[8px] uppercase opacity-50">Receita Bruta</p><p id="adm-rev" class="text-xl font-black text-blue-400">0.00</p></div>
                <div class="text-right"><p class="text-[8px] uppercase opacity-50">Dívida Utilizadores</p><p id="adm-debt" class="text-xl font-black text-red-400">0.00</p></div>
            </div>
            <div class="text-center">
                <p class="text-[8px] uppercase opacity-50">Lucro Líquido Real</p><p id="adm-profit" class="text-3xl font-black text-green-400">0.00</p>
            </div>
        </div>
        <div class="bg-white rounded-2xl overflow-hidden shadow-xl border border-gray-100">
            <table class="w-full text-[10px] text-left">
                <tbody id="adm-users" class="font-bold"></tbody>
            </table>
        </div>
    </main>

    <div id="ad-overlay">
        <div class="bg-white w-[310px] rounded-3xl p-8 text-center shadow-2xl">
            <h3 class="text-[10px] font-black text-blue-600 uppercase mb-2">Manter Ganhos 100%</h3>
            <p id="lang-ad-text" class="text-xs font-bold text-gray-400 mb-8 leading-relaxed">Vê um anúncio rápido para manter o teu multiplicador atual.</p>
            <button onclick="startAd()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs mb-3 shadow-lg shadow-blue-200">Ver Anúncio (15s)</button>
            <button onclick="penalty()" class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Recusar e Perder 50%</button>
        </div>
    </div>

    <nav>
        <button onclick="nav('social')" id="nav-social" class="nav-btn active"><div></div><span>Feed</span></button>
        <button onclick="nav('ganhos')" id="nav-ganhos" class="nav-btn"><div></div><span id="lang-earn-tab">Ganhos</span></button>
        <button onclick="nav('admin')" id="nav-admin" class="nav-btn hidden text-red-600"><div></div><span>Admin BI</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        // LÓGICA DE LOCALIZAÇÃO (MOEDA E LÍNGUA)
        const userLocale = navigator.language || 'pt-PT';
        const userCurrency = {
            'pt-BR': { sym: 'R$', code: 'BRL', min: 25.00, post: 0.10, like: 0.005 },
            'pt-PT': { sym: '€', code: 'EUR', min: 5.00, post: 0.015, like: 0.0006 },
            'en-US': { sym: '$', code: 'USD', min: 5.00, post: 0.015, like: 0.0006 }
        }[userLocale] || { sym: '€', code: 'EUR', min: 5.00, post: 0.015, like: 0.0006 };

        let user = { id: localStorage.getItem('apex_uid'), saldo: 0, mult: 1.0, actions: 0 };
        let pending = null;

        async function init() {
            if(!user.id) {
                let id = prompt(userLocale.includes('pt') ? "DIGITE SEU ID:" : "ENTER YOUR ID:");
                if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
                return;
            }
            if(user.id === ADMIN_ID) document.getElementById('nav-admin').classList.remove('hidden');
            
            document.getElementById('user-location').innerText = `${userCurrency.code} (${userLocale.toUpperCase()})`;

            const { data } = await sb.from('perfis').select('*').eq('id', user.id).single();
            if(data) user.saldo = Number(data.saldo);
            else await sb.from('perfis').insert({ id: user.id, saldo: 0 });

            loadFeed();
            updateUI();
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            let html = "";
            posts.forEach((p, i) => {
                html += `
                <div class="fb-post">
                    <div class="fb-p-header">
                        <div class="fb-p-avatar">👤</div>
                        <div class="flex flex-col"><span class="text-sm font-bold">User ${p.user_id.slice(0,5)}</span><span class="text-[11px] text-gray-500 font-normal">Online</span></div>
                    </div>
                    <div class="fb-p-content">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="fb-p-image">` : ''}
                    <div class="fb-p-actions">
                        <button onclick="handleInteraction('like', ${userCurrency.like})" class="fb-p-btn">👍 ${userLocale.includes('pt') ? 'Gosto' : 'Like'}</button>
                        <button onclick="handleInteraction('comment', ${userCurrency.like * 2})" class="fb-p-btn">💬 ${userLocale.includes('pt') ? 'Comentar' : 'Comment'}</button>
                    </div>
                </div>`;
                if((i+1)%3 === 0) html += `<div class="p-8 text-center text-[9px] text-gray-300 font-black uppercase tracking-widest">Sponsored Ads</div>`;
            });
            container.innerHTML = html;
        }

        function handleInteraction(type, val) {
            if(user.actions >= 2 && user.mult === 1.0 && user.id !== ADMIN_ID) {
                pending = { type, val };
                document.getElementById('ad-overlay').style.display = 'flex';
                return;
            }
            execute(type, val);
        }

        async function execute(type, val) {
            user.actions++;
            user.saldo += (val * user.mult);
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', user.id);
            updateUI();
        }

        function updateUI() {
            const fmt = (v) => `${userCurrency.sym} ${v.toFixed(4)}`;
            document.getElementById('display-saldo').innerText = fmt(user.saldo);
            document.getElementById('wall-saldo').innerText = fmt(user.saldo);
            let p = (user.saldo / userCurrency.min) * 100;
            document.getElementById('progress-bar').style.width = Math.min(p, 100) + "%";
        }

        async function loadAdmin() {
            const { data: users } = await sb.from('perfis').select('*');
            const { count: posts } = await sb.from('posts').select('*', { count: 'exact', head: true });
            let debt = users.reduce((acc, u) => acc + Number(u.saldo), 0);
            let rev = posts * 0.05; 
            document.getElementById('adm-debt').innerText = `${userCurrency.sym} ${debt.toFixed(4)}`;
            document.getElementById('adm-rev').innerText = `${userCurrency.sym} ${rev.toFixed(4)}`;
            document.getElementById('adm-profit').innerText = `${userCurrency.sym} ${(rev - debt).toFixed(4)}`;
            document.getElementById('adm-users').innerHTML = users.map(u => `<tr class="border-b border-gray-50"><td class="p-4 text-blue-600">${u.id}</td><td class="p-4 font-black">${u.saldo.toFixed(4)}</td></tr>`).join('');
        }

        function nav(t) {
            document.querySelectorAll('.tab-content').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            document.getElementById('nav-'+t).classList.add('active');
            if(t === 'admin') loadAdmin();
            window.scrollTo(0,0);
        }

        function logout() { localStorage.clear(); location.reload(); }
        function penalty() { user.mult = 0.5; document.getElementById('ad-overlay').style.display = 'none'; if(pending) execute(pending.type, pending.val); }
        function startAd() { user.mult = 1.0; user.actions = 0; document.getElementById('ad-overlay').style.display = 'none'; if(pending) execute(pending.type, pending.val); }

        init();
    </script>
</body>
</html>
