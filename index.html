<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network - FB Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            background-color: #F0F2F5; 
            color: #1C1E21;
        }
        .fb-shadow { box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1); }
        .fb-blue { color: #1877F2; }
        .bg-fb-blue { background-color: #1877F2; }
        .tab-active { border-bottom: 3px solid #1877F2; color: #1877F2; }
        .post-card { background: white; border-radius: 8px; margin-bottom: 16px; border: 1px solid #dddfe2; }
        
        /* Loading overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white fb-shadow">
        <div class="max-w-4xl mx-auto flex items-center justify-between px-4 h-14">
            <h1 class="text-2xl font-bold fb-blue tracking-tighter">facebook</h1>
            <div class="flex space-x-2">
                <button onclick="window.location.reload()" class="p-2 bg-gray-100 rounded-full">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1z"></path></svg>
                </button>
            </div>
        </div>
        
        <nav class="flex border-t border-gray-200">
            <button onclick="switchTab('feed')" id="tab-feed" class="flex-1 py-3 text-gray-600 font-semibold flex justify-center tab-active">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            </button>
            <button onclick="switchTab('wallet')" id="tab-wallet" class="flex-1 py-3 text-gray-600 font-semibold flex justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            </button>
            <button onclick="switchTab('admin')" id="tab-admin" class="flex-1 py-3 text-gray-600 font-semibold flex justify-center hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </button>
        </nav>
    </header>

    <main class="max-w-xl mx-auto p-4 pb-20">
        
        <div id="section-feed">
            <div class="bg-white p-4 rounded-lg fb-shadow mb-4">
                <div class="flex space-x-3 mb-3">
                    <div class="w-10 h-10 bg-gray-300 rounded-full flex-shrink-0"></div>
                    <textarea id="post-input" placeholder="No que você está pensando?" class="w-full bg-gray-100 rounded-2xl px-4 py-2 border-none focus:ring-0 resize-none text-sm"></textarea>
                </div>
                <div class="border-t pt-3 flex justify-end">
                    <button onclick="createPost()" class="bg-fb-blue text-white px-8 py-1.5 rounded-md font-semibold text-sm hover:bg-blue-600 transition">Publicar</button>
                </div>
            </div>

            <div id="feed-container">
                </div>
            
            <div id="infinite-scroll-trigger" class="h-10 flex justify-center items-center text-gray-400 text-xs">
                Carregando mais publicações...
            </div>
        </div>

        <div id="section-wallet" class="hidden">
            <div class="bg-white p-6 rounded-lg fb-shadow">
                <h2 class="text-xl font-bold mb-4">Sua Carteira</h2>
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6">
                    <p class="text-gray-500 text-sm uppercase font-bold tracking-wider">Saldo Atual</p>
                    <div class="flex justify-between items-end">
                        <span id="balance-eur" class="text-3xl font-bold fb-blue">0.0000€</span>
                        <span id="balance-brl" class="text-lg text-gray-600 font-semibold">R$ 0.00</span>
                    </div>
                </div>
                
                <div class="mb-6">
                    <div class="flex justify-between text-xs font-bold mb-1">
                        <span>Progresso para Saque</span>
                        <span>Mínimo: 5.000€</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="withdraw-progress" class="bg-fb-blue h-3 rounded-full" style="width: 0%"></div>
                    </div>
                </div>

                <button onclick="requestWithdrawal()" class="w-full bg-gray-200 text-gray-500 py-3 rounded-md font-bold cursor-not-allowed" id="btn-withdraw" disabled>
                    Solicitar Levantamento via PayPal
                </button>
            </div>
        </div>

        <div id="section-admin" class="hidden">
            <div class="grid grid-cols-2 gap-4 mb-6" id="admin-stats">
                </div>
            <div class="bg-white rounded-lg fb-shadow overflow-hidden">
                <div class="p-4 bg-gray-50 border-bottom font-bold text-sm uppercase">Lista de Usuários</div>
                <div id="user-list" class="divide-y"></div>
            </div>
        </div>

    </main>

    <div id="ad-overlay" class="fixed inset-0 bg-black z-[100] hidden flex flex-col items-center justify-center p-8 text-center text-white">
        <div class="bg-white text-black p-6 rounded-lg max-w-xs">
            <h3 class="font-bold mb-2">Anúncio Obrigatório</h3>
            <p class="text-sm text-gray-600 mb-4">Aguarde o vídeo terminar para manter seus ganhos em 100%.</p>
            <div id="ad-timer" class="text-4xl font-black fb-blue mb-4">15</div>
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div id="ad-progress" class="bg-fb-blue h-full" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        // Mantenha aqui todo o seu script do Supabase, 
        // funções de balance, createPost, switchTab, e o ID 5401881400.
        // O layout agora utiliza as novas IDs e classes FB.
    </script>

</body>
</html>
