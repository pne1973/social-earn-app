<style>
    .admin-section { padding: 20px; display: none; }
    .stats-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
    .admin-table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
    .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .admin-table th { background: #f4f4f4; }
</style>

<main id="tab-feed">
    <div id="posts-container"></div>
</main>

<main id="tab-stats" class="admin-section">
    <h2 style="color:var(--google-blue)">Estatísticas Globais</h2>
    <div id="stats-content">Carregando dados...</div>
</main>

<main id="tab-admin" class="admin-section">
    <h2 style="color:red">Painel de Controlo</h2>
    <div style="overflow-x:auto">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Saldo (€)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="admin-users-list"></tbody>
        </table>
    </div>
</main>

<nav class="bottom-nav">
    <a href="javascript:void(0)" class="nav-link active" onclick="showTab('feed', this)">🏠<br>FEED</a>
    <a href="javascript:void(0)" class="nav-link" onclick="showTab('stats', this)">📊<br>ESTATÍSTICAS</a>
    <a href="javascript:void(0)" class="nav-link" style="color:red" onclick="showTab('admin', this)">⚙️<br>PAINEL ADMIN</a>
</nav>

<script>
    // Função para trocar as abas (Tabs)
    function showTab(tabName, el) {
        // Esconder todas
        document.getElementById('tab-feed').style.display = 'none';
        document.getElementById('tab-stats').style.display = 'none';
        document.getElementById('tab-admin').style.display = 'none';
        
        // Remover classe ativa
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        // Mostrar a selecionada
        document.getElementById('tab-' + tabName).style.display = 'block';
        el.classList.add('active');

        if(tabName === 'stats') loadStats();
        if(tabName === 'admin') loadAdminPanel();
    }

    // Carregar Estatísticas (Total de Users e Posts)
    async function loadStats() {
        const { count: userCount } = await sb.from('perfis').select('*', { count: 'exact', head: true });
        const { count: postCount } = await sb.from('posts').select('*', { count: 'exact', head: true });
        
        document.getElementById('stats-content').innerHTML = `
            <div class="stats-card"><b>Utilizadores Totais:</b> ${userCount}</div>
            <div class="stats-card"><b>Publicações Ativas:</b> ${postCount}</div>
        `;
    }

    // Carregar Lista de Utilizadores para o Admin
    async function loadAdminPanel() {
        const { data: users } = await sb.from('perfis').select('*').order('saldo', { ascending: false });
        const list = document.getElementById('admin-users-list');
        list.innerHTML = '';

        users.forEach(u => {
            list.innerHTML += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.saldo.toFixed(4)}€</td>
                    <td><button onclick="deleteUser('${u.id}')" style="color:red; font-size:10px">Banir</button></td>
                </tr>
            `;
        });
    }

    // Função de moderação simples
    async function deleteUser(id) {
        if(confirm("Deseja banir este utilizador?")) {
            await sb.from('perfis').delete().eq('id', id);
            loadAdminPanel();
        }
    }
</script>
