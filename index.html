<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Elite v3 - Ranking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --dark: #0d0d0d; --card: #1e1e1e; --text: #ffffff; --admin: #dc2626; --success: #4ade80; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        /* ADMIN PANEL */
        .admin-box { background: var(--admin); margin: 15px; padding: 15px; border-radius: 15px; display: none; border: 1px solid white; z-index: 2000; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        .admin-stat { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; text-align: center; font-size: 11px; }

        /* DASHBOARD */
        .dashboard { background: linear-gradient(145deg, #252525, #121212); margin: 15px; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .dash-row { display: flex; justify-content: space-around; }
        .val-big { font-size: 24px; font-weight: 900; color: var(--gold); display: block; }
        .label-small { font-size: 10px; color: #888; text-transform: uppercase; }
        
        .progress-container { background: #333; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; border: 1px solid #444; }
        #progress-bar { background: var(--gold); height: 100%; width: 0%; transition: 0.8s; }

        /* SEÇÕES (FEED vs RANKING) */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* RANKING STYLE */
        .ranking-container { padding: 15px; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 30px; padding-top: 20px; }
        .podium-item { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; width: 30%; position: relative; }
        .podium-item.first { height: 140px; border-color: var(--gold); }
        .podium-item.second { height: 110px; }
        .podium-item.third { height: 90px; }
        .podium-rank { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 3px solid var(--dark); }
        
        .ranking-list { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .ranking-row { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #2a2a2a; align-items: center; }
        .rank-num { font-weight: bold; color: #666; width: 30px; }
        .rank-user { flex-grow: 1; font-weight: 600; }
        .rank-pts { color: var(--gold); font-weight: 800; }

        /* POSTS & ADS */
        .post { background: var(--card); margin: 15px; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .ad-divider { background: #111; padding: 20px 5px; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); margin: 20px 0; text-align: center; position: relative; }
        .ad-tag { font-size: 9px; color: var(--gold); opacity: 0.6; position: absolute; top: 5px; left: 10px; font-weight: bold; }

        /* NAV */
        .nav-bottom { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); border-radius: 20px; display: flex; justify-content: space-around; padding: 15px; border: 1px solid #333; z-index: 1000; }
        .nav-link { color: #555; font-size: 20px; cursor: pointer; }
        .nav-link.active { color: var(--gold); }

        .btn-earn { background: #2a2a2a; color: white; border: 1px solid #444; padding: 12px; width: 100%; border-radius: 10px; font-weight: 600; margin-top: 12px; cursor: pointer; }
        .floating-pts { position: absolute; color: var(--gold); font-weight: 900; animation: rise 0.8s ease-out forwards; pointer-events: none; z-index: 3000; }
        @keyframes rise { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }
    </style>
</head>
<body>

<div id="admin-panel" class="admin-box">
    <span style="font-size:12px; font-weight:900;"><i class="fas fa-shield-alt"></i> MODO ADMIN</span>
    <div class="admin-grid">
        <div class="admin-stat">Users<br><b id="adm-users">0</b></div>
        <div class="admin-stat">Pts Totais<br><b id="adm-points">0</b></div>
    </div>
    <button onclick="checkWithdrawals()" style="width:100%; margin-top:10px; font-size:10px; padding:5px; border-radius:5px; border:none; background:white; font-weight:bold;">PAGAMENTOS PENDENTES</button>
</div>

<div class="dashboard">
    <div class="dash-row">
        <div style="text-align:center">
            <span class="label-small">Meus XP</span>
            <span class="val-big" id="points">0</span>
        </div>
        <div style="text-align:center">
            <span class="label-small">Saldo Real</span>
            <span class="val-big">€<span id="balance">0.0000</span></span>
        </div>
    </div>
    <div class="progress-container"><div id="progress-bar"></div></div>
    <button id="withdraw-btn" onclick="requestWithdraw()" class="btn-earn" disabled style="background:var(--gold); color:black; font-weight:900; border:none;">€5.0000 PARA LEVANTAR</button>
</div>

<div id="section-feed" class="view-section active">
    <div id="feed">
        <div class="post">
            <span style="color:var(--gold); font-weight:bold;">@Dica_Mestre</span>
            <p style="font-size:14px; color:#ddd;">Ganha dinheiro rápido convidando amigos. Clica no ícone de partilha na barra abaixo!</p>
            <button class="btn-earn" onclick="earn(event, 5)">Reclamar +5 XP</button>
        </div>

        <div class="ad-divider">
            <span class="ad-tag">SUGESTÃO</span>
            <script async="async" data-cfasync="false" src="https://pl28956833.profitablecpmratenetwork.com/573694a9ae5d9b7de992bc7d8441b76e/invoke.js"></script>
            <div id="container-573694a9ae5d9b7de992bc7d8441b76e"></div>
        </div>

        <div class="post">
            <span style="color:var(--gold); font-weight:bold;">@Ranking_News</span>
            <p style="font-size:14px; color:#ddd;">Os 3 melhores do ranking ganham bónus extra todos os domingos às 20h!</p>
            <button class="btn-earn" onclick="earn(event, 10)">Reclamar +10 XP</button>
        </div>
    </div>
</div>

<div id="section-ranking" class="view-section">
    <div class="ranking-container">
        <h2 style="text-align:center; font-size:18px; margin-bottom:0;">Top Utilizadores</h2>
        <div class="podium" id="ranking-podium">
            </div>
        <div class="ranking-list" id="ranking-list-body">
            </div>
    </div>
</div>

<nav class="nav-bottom">
    <i class="fas fa-home nav-link active" onclick="switchTab('feed')"></i>
    <i class="fas fa-trophy nav-link" onclick="switchTab('ranking')"></i>
    <i class="fas fa-share-alt nav-link" onclick="generateInvite()"></i>
    <i class="fas fa-wallet nav-link" onclick="requestWithdraw()"></i>
</nav>

<script>
    const ADMIN_ID = 5401881400;
    const BOT_USER = "socialntworkbot";
    const VALOR_PT = 0.00075;

    const supabaseUrl = 'https://fickstyevektwbgimapy.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY';
    const _client = supabase.createClient(supabaseUrl, supabaseKey);
    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe?.user;

    async function init() {
        if (!user) return;
        if (user.id === ADMIN_ID) {
            document.getElementById('admin-panel').style.display = 'block';
            loadAdminData();
        }

        let { data } = await _client.from('profiles').select('points').eq('id', user.id).maybeSingle();
        if (!data) {
            const ref = tg.initDataUnsafe?.start_param || null;
            await _client.from('profiles').insert([{ id: user.id, username: user.username || 'Anon', points: 0, referred_by: ref }]);
            updateUI(0);
        } else {
            updateUI(data.points);
        }
        loadRanking();
    }

    function switchTab(tab) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        if(tab === 'feed') {
            document.getElementById('section-feed').classList.add('active');
            event.target.classList.add('active');
        } else {
            document.getElementById('section-ranking').classList.add('active');
            document.querySelector('.fa-trophy').classList.add('active');
            loadRanking();
        }
    }

    function updateUI(pts) {
        document.getElementById('points').innerText = pts;
        const cash = (pts * VALOR_PT);
        document.getElementById('balance').innerText = cash.toFixed(4);
        const percent = Math.min((cash / 5) * 100, 100);
        document.getElementById('progress-bar').style.width = percent + "%";

        const btn = document.getElementById('withdraw-btn');
        if (cash >= 5) {
            btn.disabled = false;
            btn.innerText = "PEDIR LEVANTAMENTO";
        }
    }

    async function earn(event, val) {
        const floating = document.createElement("div");
        floating.className = "floating-pts";
        floating.innerText = "+" + val;
        floating.style.left = event.pageX + "px";
        floating.style.top = event.pageY + "px";
        document.body.appendChild(floating);
        setTimeout(() => floating.remove(), 800);

        let current = parseInt(document.getElementById('points').innerText);
        let novo = current + val;
        const { error } = await _client.from('profiles').update({ points: novo }).eq('id', user.id);
        if (!error) {
            updateUI(novo);
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    async function loadRanking() {
        const { data } = await _client.from('profiles').select('username, points').order('points', { ascending: false }).limit(10);
        if (!data) return;

        // Pódio
        const podiumDiv = document.getElementById('ranking-podium');
        podiumDiv.innerHTML = '';
        const order = [1, 0, 2]; // 2nd, 1st, 3rd visualmente
        order.forEach(i => {
            if (data[i]) {
                const item = document.createElement('div');
                item.className = `podium-item ${i === 0 ? 'first' : i === 1 ? 'second' : 'third'}`;
                item.innerHTML = `<div class="podium-rank">${i+1}</div>
                    <div style="font-size:11px; margin-top:10px;">@${data[i].username}</div>
                    <div style="color:var(--gold); font-weight:900; font-size:12px;">${data[i].points}</div>`;
                podiumDiv.appendChild(item);
            }
        });

        // Lista
        const listBody = document.getElementById('ranking-list-body');
        listBody.innerHTML = '';
        data.slice(3).forEach((u, index) => {
            const row = document.createElement('div');
            row.className = 'ranking-row';
            row.innerHTML = `<span class="rank-num">${index + 4}</span>
                <span class="rank-user">@${u.username}</span>
                <span class="rank-pts">${u.points} XP</span>`;
            listBody.appendChild(row);
        });
    }

    function generateInvite() {
        const link = `https://t.me/${BOT_USER}?start=${user.id}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent("Ganha dinheiro real no Social Earn! 💰")}`);
    }

    async function requestWithdraw() {
        const val = (parseInt(document.getElementById('points').innerText) * VALOR_PT);
        tg.showConfirm(`Confirmar levantamento de €${val.toFixed(2)}?`, async (ok) => {
            if(ok) {
                await _client.from('withdrawals').insert([{ user_id: user.id, username: user.username, amount: val, status: 'pending' }]);
                tg.showAlert("Pedido enviado!");
            }
        });
    }

    async function loadAdminData() {
        const { count } = await _client.from('profiles').select('*', { count: 'exact', head: true });
        document.getElementById('adm-users').innerText = count;
        const { data } = await _client.from('profiles').select('points');
        const sum = data.reduce((a, b) => a + (b.points || 0), 0);
        document.getElementById('adm-points').innerText = sum;
    }

    function checkWithdrawals() {
        tg.showAlert("Verifica os pedidos pendentes no painel SQL do Supabase!");
    }

    tg.ready();
    tg.expand();
    init();
</script>
</body>
</html>
