        /* FEED */

        .card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; }

        .post-actions { display: flex; justify-content: space-between; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; }
        .btn-act { background: none; border: none; color: #65676b; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-act i { color: #1a73e8; }
        
        .img-preview { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #eee; }
        .post-img-result { width: 100%; border-radius: 8px; margin: 10px 0; }
        
        /* COMMENTS */

        .comm-item { font-size: 12px; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px solid #ddd; }
