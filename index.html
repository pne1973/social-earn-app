<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pine Social Master Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; --bg: #F8F9FA; --txt: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 100px 0 95px; }
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-bottom: 1px solid #dadce0; z-index: 2000; box-sizing: border-box; }
        .logo { font-weight: bold; font-size: 20px; }
        .logo span:nth-child(1) { color: var(--g-blue); } .logo span:nth-child(2) { color: var(--g-red); } .logo span:nth-child(3) { color: var(--g-yellow); } .logo span:nth-child(4) { color: var(--g-blue); } .logo span:nth-child(5) { color: var(--g-green); }
        .xp-badge { background: var(--g-blue); color: #fff; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #dadce0; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #5f6368; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--g-blue); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
        .card { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #dadce0; }
        .btn { width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-blue { background: var(--g-blue); color: #fff; }
        textarea { width: 100%; border: 1px solid #f1f3f4; padding: 12px; border-radius: 8px; font-size: 15px; box-sizing: border-box; background: #f8f9fa; }
        .ad-container { background: #fff; border: 1px solid #dadce0; border-radius: 12px; padding: 15px; margin-bottom: 16px; }
        .hidden { display: none !important; }
        .admin-box { background: #fff5f5; border: 1px solid var(--g-red); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>P</span><span>i</span><span>n</span><span>e</span> <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span></div>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <div id="feed-tab" class="container">
        <div class="ad-container" style="background: linear-gradient(90deg, #fff3cd, #fff); border: 1px dashed var(--g-yellow);">
            <small style="color:#70757a; font-weight:bold;">DESTAQUE</small><br>
            <span style="font-weight:600; color:var(--g-blue)">Convida e ganha 100 XP por amigo!</span>
        </div>
        <div class="card">
            <textarea id="postText" rows="3" placeholder="Escreve algo..."></textarea>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
                <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:var(--g-blue); font-weight:600;"><i class="fas fa-image"></i> Foto</button>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
                <button class="btn btn-blue" style="width:auto; padding:8px 20px;" id="pubBtn" onclick="publish()">Publicar</button>
            </div>
            <div id="upload-status" style="display:none; font-size:11px; color:var(--g-blue); margin-top:5px;">A processar...</div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="info-tab" class="container hidden"></div>
    <div id="rank-tab" class="container hidden"></div>
    <div id="invite-tab" class="container hidden"></div>
    <div id="wallet-tab" class="container hidden"></div>
    
    <div id="admin-tab" class="container hidden">
        <div class="card" style="border-top: 4px solid var(--g-red);">
            <h3 style="color:var(--g-red); margin-top:0;"><i class="fas fa-shield-alt"></i> Painel Master Admin</h3>
            <div id="adm-stats" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
            
            <h4>💰 Pedidos de Saque (PayPal)</h4>
            <div id="adm-withdraws" style="margin-bottom:20px;"></div>

            <h4>🛠️ Moderação de Conteúdo</h4>
            <div style="display:flex; gap:5px;">
                <input type="number" id="delId" placeholder="ID do Post" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                <button onclick="adminDel()" style="background:var(--g-red); color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer;">Apagar</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('feed-tab', this)"><i class="fas fa-home"></i>Feed</div>
        <div class="nav-item" onclick="tab('info-tab', this)"><i class="fas fa-coins"></i>Ganhos</div>
        <div class="nav-item" onclick="tab('rank-tab', this)"><i class="fas fa-trophy"></i>Rank</div>
        <div class="nav-item" onclick="tab('invite-tab', this)"><i class="fas fa-users"></i>Amigos</div>
        <div class="nav-item" onclick="tab('wallet-tab', this)"><i class="fas fa-wallet"></i>Saque</div>
    </nav>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const userId = 5401881400;

        let page = 0; let compressedImg = null; let loading = false;

        async function init() {
            if(userId === 5401881400) {
                const nav = document.querySelector('.nav');
                const btn = document.createElement('div'); btn.className="nav-item"; btn.innerHTML='<i class="fas fa-user-shield"></i>Admin';
                btn.onclick = () => tab('admin-tab', btn); nav.appendChild(btn);
            }
            loadProfile(); loadFeed(true);
        }

        async function loadFeed(reset = false) {
            if(loading) return; loading = true;
            const fDiv = document.getElementById('feed');
            if(reset) { page = 0; fDiv.innerHTML = ''; }
            
            const { data, error } = await supabaseClient.from('posts').select('*, profiles(username)').order('created_at', {ascending:false}).range(page*10, (page+1)*10-1);
            
            if(data && data.length > 0) {
                data.forEach((p, idx) => {
                    if(idx > 0 && idx % 3 === 0) {
                        fDiv.innerHTML += `<div class="ad-container"><small style="color:#999;font-weight:bold;">ANÚNCIO</small><p style="margin:5px 0; font-weight:600; color:var(--g-blue);">💰 Queres ganhar mais XP? Testa Apps!</p></div>`;
                    }
                    fDiv.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:8px;">
                            <b style="color:var(--g-blue)">@${p.profiles?.username || 'user'}</b>
                            <span style="color:#bdc1c6;"><i class="fas fa-flag"></i> ID: ${p.id}</span>
                        </div>
                        <p style="margin:0; font-size:15px; line-height:1.4;">${p.content || ''}</p>
                        ${p.image_url ? `<img src="${p.image_url}" style="width:calc(100% + 32px); margin:12px -16px 0; border-top:1px solid #eee;">` : ''}
                        <div style="margin-top:12px; border-top:1px solid #f8f8f8; padding-top:8px;">
                            <button style="background:none; border:none; color:#5f6368; font-weight:bold; font-size:13px;" onclick="toggleLike(${p.id}, this)"><i class="far fa-heart"></i> Like (+2 XP)</button>
                        </div>
                    </div>`;
                });
                page++;
            } else if(page === 0) { fDiv.innerHTML = '<p style="text-align:center; padding:30px; color:#999;">Sem posts. Publica o primeiro!</p>'; }
            loading = false;
        }

        async function publish() {
            const txt = document.getElementById('postText').value; if(!txt && !compressedImg) return;
            const btn = document.getElementById('pubBtn'); btn.disabled = true;
            
            let imgUrl = null;
            if(compressedImg) {
                const fileName = `p_${Date.now()}.jpg`;
                const blob = await (await fetch(compressedImg)).blob();
                await supabaseClient.storage.from('post-images').upload(fileName, blob);
                imgUrl = SUPABASE_URL + "/storage/v1/object/public/post-images/" + fileName;
            }

            const { error } = await supabaseClient.from('posts').insert([{ user_id: userId, content: txt, image_url: imgUrl }]);
            if(!error) {
                await supabaseClient.rpc('increment_points', { user_id: userId, amount: 15 });
                document.getElementById('postText').value = ""; compressedImg = null;
                alert("Publicado!");
                loadProfile(); loadFeed(true); // Força atualização do feed
            } else { alert("Erro ao publicar!"); console.error(error); }
            btn.disabled = false;
        }

        async function loadAdmin() {
            const { count: u } = await supabaseClient.from('profiles').select('*', {count:'exact', head:true});
            const { count: p } = await supabaseClient.from('posts').select('*', {count:'exact', head:true});
            document.getElementById('adm-stats').innerHTML = `
                <div class="admin-box" style="text-align:center;">Users<br><b style="font-size:18px;">${u}</b></div>
                <div class="admin-box" style="text-align:center;">Posts<br><b style="font-size:18px;">${p}</b></div>`;
            
            const { data: ws } = await supabaseClient.from('withdrawals').select('*').eq('status','pending');
            let h = "";
            ws?.forEach(w => h += `
                <div class="admin-box" style="background:#fff; border:1px solid #ddd; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${w.paypal_email}</b><br>${w.amount_xp} XP</span>
                    <button class="btn btn-blue" style="width:auto; padding:5px 10px; background:var(--g-green);" onclick="confirmPay(${w.id})">PAGAR</button>
                </div>`);
            document.getElementById('adm-withdraws').innerHTML = h || "Sem pedidos.";
        }

        async function adminDel() {
            const id = document.getElementById('delId').value;
            if(!id) return;
            const { error } = await supabaseClient.from('posts').delete().eq('id', id);
            if(!error) { alert("Post apagado!"); loadFeed(true); } else { alert("Erro ao apagar!"); }
        }

        function tab(id, el) { 
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden')); 
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden'); el.classList.add('active');
            if(id === 'admin-tab') loadAdmin();
        }

        async function loadProfile() {
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if(data) document.getElementById('userXP').innerText = data.points + " XP";
        }

        async function toggleLike(pid, btn) {
            const { error } = await supabaseClient.from('post_likes').insert([{ post_id: pid, user_id: userId }]);
            if(!error) {
                btn.style.color="var(--g-red)"; btn.innerHTML = '<i class="fas fa-heart"></i> +2 XP';
                await supabaseClient.rpc('increment_points', { user_id: userId, amount: 2 });
                loadProfile();
            }
        }

        async function handleFile(input) {
            const file = input.files[0]; if(!file) return;
            document.getElementById('upload-status').style.display = 'block';
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 800;
                    if(w > h && w > max) { h *= max/w; w = max; } else if(h > max) { w *= max/h; h = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    compressedImg = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('upload-status').innerText = "Imagem Pronta!";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.onscroll = () => { if((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) loadFeed(); };
        init();
    </script>
</body>
</html>
