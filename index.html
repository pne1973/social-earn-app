<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
        
        /* Efeito de Ganho Flutuante */
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
        .earning-text { font-size: 3rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 20px rgba(52,168,83,0.4); -webkit-text-stroke: 1.5px white; }

        /* Botões de Interação Estilo Social */
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; position: relative; border: none; background: transparent; cursor: pointer; }
        .interaction-btn:active { background: #f8f9fa; }
        .interaction-badge { position: absolute; top: 5px; right: 20%; background: var(--g-red); color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 900; border: 2px solid white; }
        
        .comment-section { display: none; background: #f8f9fa; border-top: 1px solid #eee; width: 100%; }
        .comment-section.active { display: flex; flex-direction: column; }

        /* Banner de Status e Restauro */
        .status-bar-premium { position: fixed; top: 72px; left: 0; right: 0; z-index: 300; background: white; border-bottom: 1px solid #dadce0; padding: 10px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; min-height: 45px; }
        
        /* Modal de Anúncio (300x250) */
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; }
        .modal-300-250 { width: 300px; height: 250px; background: white; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; position: relative; }

        #feed-container { margin-top: 210px; padding: 0 16px; }
        .publisher-area { margin-top: 120px; padding: 0 16px; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-24">

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <div id="ad-overlay">
        <div class="modal-300-250">
            <div class="flex-1 bg-black flex items-center justify-center relative">
                <div id="ad-timer-circle" class="text-white font-black text-4xl">15</div>
                <p class="absolute bottom-4 text-[8px] text-gray-500 uppercase font-black">Anúncio Obrigatório para Restauro</p>
            </div>
            <button id="close-ad-btn" disabled class="h-14 bg-gray-200 text-gray-400 uppercase text-[10px] font-black">Aguarde o fim do anúncio...</button>
        </div>
    </div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-sm">S</div>
            <h1 class="text-[12px] font-black uppercase text-blue-600">Social Earn Network</h1>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg leading-none">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase mt-1">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-bar-premium">
        <div id="status-text" class="text-[10px] font-black uppercase text-green-600">
            100% de Ganhos Ativos
        </div>
        <button id="restore-btn" onclick="triggerImmediateAd()" class="hidden bg-red-600 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase animate-pulse shadow-lg">
            Ver Anúncio para Restaurar 100%
        </button>
    </div>

    <main class="max-w-lg mx-auto">
        <section id="view-social" class="tab-content active">
            <div class="publisher-area">
                <div class="google-card p-3 border-t-4 border-blue-600 shadow-md">
                    <textarea id="post-input" onclick="expandPublisher()" placeholder="O QUE PRETENDE PARTILHAR?" class="w-full border-none focus:ring-0 text-[12px] mb-1 resize-none uppercase font-black" rows="1"></textarea>
                    <div id="expanded-post" class="hidden">
                        <input id="post-url" type="text" placeholder="URL DA IMAGEM" class="w-full bg-gray-50 border-none text-[10px] p-2 rounded-lg mb-2 font-black uppercase outline-none">
                        <button onclick="checkPostLimit()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-black text-[11px] uppercase shadow-sm">Publicar Agora</button>
                    </div>
                </div>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content px-4 mt-24">
            <div class="google-card p-10 text-center border-t-[10px] border-blue-600 shadow-xl">
                <p class="text-[11px] font-black text-gray-400 uppercase mb-2">Saldo Disponível</p>
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black uppercase">REDE</span></button>
        <button onclick="nav('info')" class="nav-item flex-1 py-2 flex flex-col items-center"><span class="text-[11px] font-black uppercase">GANHOS</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = { saldo: 0, interactions: 0, postsToday: 0, multiplier: 1.0, penaltyExpiry: null };

        async function init() {
            const { data } = await sb.from('perfis').select('*').eq('id', MASTER_ID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            updateUI(); loadFeed();
            setInterval(updateUI, 1000);
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (user.saldo * 6.12).toFixed(4) + " BRL";
            
            const statusBox = document.getElementById('status-text');
            const restoreBtn = document.getElementById('restore-btn');
            
            if (user.multiplier < 1.0 && user.penaltyExpiry) {
                const now = new Date();
                const diff = user.penaltyExpiry - now;
                if (diff > 0) {
                    statusBox.innerText = `${user.multiplier * 100}% de Ganhos até ${new Date(user.penaltyExpiry).toLocaleString('pt-PT')}`;
                    statusBox.className = "text-[10px] font-black uppercase text-red-600";
                    restoreBtn.classList.remove('hidden');
                } else {
                    resetMultiplier();
                }
            } else {
                statusBox.innerText = "100% de Ganhos Ativos";
                statusBox.className = "text-[10px] font-black uppercase text-green-600";
                restoreBtn.classList.add('hidden');
            }
        }

        // --- SISTEMA DE ANÚNCIOS ---
        function triggerImmediateAd() {
            document.getElementById('ad-overlay').style.display = 'flex';
            let time = 15;
            const btn = document.getElementById('close-ad-btn');
            const timerText = document.getElementById('ad-timer-circle');
            
            const timer = setInterval(() => {
                time--;
                timerText.innerText = time;
                if(time <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "RESTAURO CONCLUÍDO";
                    btn.classList.replace('bg-gray-200', 'bg-green-600');
                    btn.classList.add('text-white');
                    btn.onclick = () => {
                        resetMultiplier();
                        document.getElementById('ad-overlay').style.display = 'none';
                        resetAdState();
                    };
                }
            }, 1000);
        }

        function resetMultiplier() {
            user.multiplier = 1.0;
            user.penaltyExpiry = null;
            user.interactions = 0;
            updateUI();
        }

        function resetAdState() {
            const btn = document.getElementById('close-ad-btn');
            btn.disabled = true;
            btn.innerText = "Aguarde o fim do anúncio...";
            btn.className = "h-14 bg-gray-200 text-gray-400 uppercase text-[10px] font-black";
            document.getElementById('ad-timer-circle').innerText = "15";
        }

        // --- SISTEMA SOCIAL ---
        async function reagir(val) {
            if(user.interactions >= 2 && user.multiplier === 1.0) {
                // Penaliza automaticamente se ultrapassar o limite de 2 interações livres
                applyPenalty();
                return;
            }
            user.interactions++;
            addGain(val);
        }

        function applyPenalty() {
            if (user.multiplier === 1.0) user.multiplier = 0.5;
            else if (user.multiplier === 0.5) user.multiplier = 0.25;
            else if (user.multiplier === 0.25) user.multiplier = 0.05;
            user.penaltyExpiry = new Date(Date.now() + 24 * 60 * 60 * 1000);
            updateUI();
        }

        async function addGain(val) {
            const finalVal = val * user.multiplier;
            user.saldo += finalVal;
            showBigNumber(finalVal);
            updateUI();
            await sb.from('perfis').update({ saldo: user.saldo }).eq('id', MASTER_ID);
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!posts) return;
            container.innerHTML = "";
            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = "google-card shadow-sm";
                card.innerHTML = `
                    <div class="p-5">
                        <p class="text-[14px] font-black uppercase text-gray-800 mb-4">${p.content}</p>
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-xl mb-4 border">` : ''}
                        <div class="flex border-t pt-2">
                            <button onclick="reagir(0.0006)" class="interaction-btn">
                                <span class="text-xl">👍</span><span class="text-[9px] uppercase font-black text-gray-400">Gostar</span>
                            </button>
                            <button onclick="toggleComments('${p.id}')" class="interaction-btn border-x">
                                <div class="interaction-badge" id="badge-${p.id}">0</div>
                                <span class="text-xl">💬</span><span class="text-[9px] uppercase font-black text-gray-400">Comentar</span>
                            </button>
                            <button onclick="reagir(0.0020)" class="interaction-btn">
                                <span class="text-xl">🔗</span><span class="text-[9px] uppercase font-black text-gray-400">Partilhar</span>
                            </button>
                        </div>
                    </div>
                    <div id="comments-${p.id}" class="comment-section">
                        <div id="list-${p.id}" class="p-4 space-y-2 max-h-48 overflow-y-auto bg-gray-50 text-[10px] uppercase font-bold"></div>
                        <div class="p-3 bg-white border-t flex gap-2">
                            <input id="in-${p.id}" type="text" placeholder="ESCREVER COMENTÁRIO..." class="flex-1 bg-gray-100 rounded-lg p-2 text-[10px] font-black border-none outline-none">
                            <button onclick="addComment('${p.id}')" class="bg-blue-600 text-white px-5 rounded-lg font-black text-[10px]">ENVIAR</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                updateCommentCount(p.id);
            });
        }

        async function addComment(pid) {
            const input = document.getElementById(`in-${pid}`);
            if(!input.value) return;
            const { error } = await sb.from('comentarios').insert([{ post_id: pid, user_id: MASTER_ID, content: input.value }]);
            if(!error) { input.value = ""; await reagir(0.0010); updateCommentList(pid); }
        }

        async function updateCommentList(pid) {
            const { data } = await sb.from('comentarios').select('*').eq('post_id', pid).order('created_at', {ascending: true});
            const list = document.getElementById(`list-${pid}`);
            list.innerHTML = data.map(c => `<div class="bg-white p-2 rounded-lg border shadow-sm">${c.content}</div>`).join('');
            updateCommentCount(pid);
        }

        async function updateCommentCount(pid) {
            const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', pid);
            const badge = document.getElementById(`badge-${pid}`);
            if(badge) badge.innerText = count || 0;
        }

        function toggleComments(id) { document.getElementById(`comments-${id}`).classList.toggle('active'); updateCommentList(id); }

        // --- SISTEMA DE PUBLICAÇÃO ---
        function checkPostLimit() {
            if (user.postsToday >= 3) triggerImmediateAd();
            else publish();
        }

        async function publish() {
            const content = document.getElementById('post-input').value;
            if(!content) return;
            const { error } = await sb.from('posts').insert([{ user_id: MASTER_ID, content, image_url: document.getElementById('post-url').value }]);
            if(!error) {
                user.postsToday++;
                user.saldo += 0.0150 * user.multiplier;
                updateUI();
                document.getElementById('post-input').value = "";
                document.getElementById('expanded-post').classList.add('hidden');
                document.getElementById('post-input').rows = 1;
                loadFeed();
            }
        }

        // --- UTILITÁRIOS ---
        function showBigNumber(val) {
            const container = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            container.style.display = 'block';
            setTimeout(() => container.style.display = 'none', 800);
        }
        function nav(t) { 
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function expandPublisher() { document.getElementById('expanded-post').classList.remove('hidden'); document.getElementById('post-input').rows = 3; }
        window.onload = init;
    </script>
</body>
</html>
