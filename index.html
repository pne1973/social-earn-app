<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network v33.12 - Production Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --g-yellow: #FBBC05; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        
        /* ECRÃ DE LOGIN - FORÇADO */
        #auth-screen { 
            position: fixed; 
            inset: 0; 
            background: white; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 24px; 
        }

        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
        .feed-ad-unit { background: #ffffff; border: 2px dashed var(--g-blue); border-radius: 12px; padding: 20px; margin-bottom: 12px; text-align: center; }
        
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 8000; pointer-events: none; display: none; animation: popUp 0.8s forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }
        .earning-text { font-size: 3.5rem; font-weight: 900; color: var(--g-green); text-shadow: 0 4px 20px rgba(52,168,83,0.4); }

        .status-header-fixed { position: fixed; top: 72px; left: 0; right: 0; z-index: 300; background: white; border-bottom: 1px solid #dadce0; padding: 8px 16px; display: flex; align-items: center; justify-content: center; min-height: 48px; }
        .publisher-fixed { position: fixed; top: 120px; left: 0; right: 0; z-index: 280; background: #f1f3f4; padding: 8px 16px; border-bottom: 1px solid #dadce0; }
        
        #feed-container { margin-top: 185px; padding: 0 16px; }
        .nav-item { transition: all 0.3s; color: #5f6368; flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 10px; text-transform: uppercase; font-weight: 900; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #ad-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-300-250 { width: 310px; background: white; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center text-white font-black italic text-3xl shadow-lg">S</div>
        <h2 class="text-blue-600 font-black uppercase text-xs mb-8 tracking-[0.2em]">Social Earn Network</h2>
        <input type="text" id="login-id" placeholder="ID DE UTILIZADOR" class="w-full max-w-xs border-2 border-gray-100 rounded-2xl p-5 text-center mb-4 uppercase font-black focus:border-blue-600 outline-none shadow-sm">
        <button onclick="doLogin()" class="w-full max-w-xs bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase active:scale-95 transition-transform">Entrar no Sistema</button>
        <p class="mt-6 text-[9px] text-gray-300 font-bold uppercase">v33.12 Production</p>
    </div>

    <div id="floating-earning"><div class="earning-text" id="earning-val">+0.0000€</div></div>

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-[200] px-5 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-md">S</div>
            <div>
                <h1 class="text-[11px] font-black uppercase text-blue-600 leading-none">Social Earn</h1>
                <p class="text-[8px] font-black text-gray-300 uppercase tracking-widest mt-1">Official Network</p>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-xl tracking-tighter">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 uppercase">0.0000 BRL</div>
        </div>
    </header>

    <div class="status-header-fixed">
        <div id="status-text" class="text-[9px] font-black uppercase text-green-600">Verificando Ganhos...</div>
        <button onclick="doLogout()" class="ml-auto text-[8px] text-gray-400 uppercase font-black">Sair</button>
    </div>

    <div id="pub-fixed-container" class="publisher-fixed">
        <div id="mini-pub" onclick="expandPublisher()" class="bg-white border border-gray-200 rounded-full px-4 py-2 flex items-center gap-3 cursor-pointer">
            <div class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-[10px]">👤</div>
            <div class="text-[10px] text-gray-300 font-black uppercase">O que quer partilhar agora?</div>
        </div>
        <div id="expanded-post" class="hidden google-card p-4 border-t-4 border-blue-600 shadow-md mt-2">
            <textarea id="post-input" placeholder="ESCREVA AQUI..." class="w-full border-none focus:ring-0 text-xs mb-2 resize-none uppercase font-black" rows="3"></textarea>
            <input id="post-url" type="text" placeholder="URL DA IMAGEM (OPCIONAL)" class="w-full bg-gray-50 border-none text-[10px] p-3 rounded-xl mb-3 font-black uppercase outline-none">
            <div class="flex gap-2">
                <button onclick="collapsePublisher()" class="flex-1 text-[9px] font-black text-gray-400 uppercase">Cancelar</button>
                <button onclick="handleInteraction('post')" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-black text-[11px] uppercase shadow-lg">Publicar (+0.0150€)</button>
            </div>
        </div>
    </div>

    <main class="max-w-lg mx-auto">
        <section id="view-social" class="tab-content active">
            <div id="feed-container"></div>
        </section>

        <section id="view-info" class="tab-content px-4 mt-32">
            <div class="google-card p-12 text-center border-t-[12px] border-blue-600 shadow-xl">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Utilizador ID: <span id="display-uid" class="text-blue-600">---</span></p>
                <h1 id="wall-eur" class="text-6xl font-black text-blue-600 tracking-tighter mb-2">0.0000€</h1>
                <p id="wall-brl-sub" class="text-xs font-black text-gray-300 uppercase mb-8">0.0000 BRL</p>
                <div id="progress-container" class="pt-6 border-t border-dashed">
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden mb-2">
                        <div id="withdraw-progress" class="bg-blue-600 h-full w-0 transition-all duration-1000"></div>
                    </div>
                    <p class="text-[9px] text-gray-400 uppercase font-black">Mínimo para Levantamento: 5.0000€</p>
                </div>
            </div>
        </section>

        <section id="view-admin" class="tab-content px-4 mt-32 pb-10">
            <h2 class="font-black uppercase text-blue-600 mb-5 text-sm">Painel Administrativo</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-4 rounded-xl text-center border-b-4 border-blue-500">
                    <div class="text-[8px] text-gray-400 uppercase font-black">Utilizadores</div>
                    <div id="adm-total-users" class="text-2xl font-black text-gray-800">0</div>
                </div>
                <div class="bg-white p-4 rounded-xl text-center border-b-4 border-green-500">
                    <div class="text-[8px] text-gray-400 uppercase font-black">Publicações</div>
                    <div id="adm-total-posts" class="text-2xl font-black text-gray-800">0</div>
                </div>
            </div>
            <div class="bg-white rounded-xl overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[8px] uppercase font-black border-b">
                        <tr><th class="p-4">ID</th><th class="p-4">Saldo</th><th class="p-4 text-right">Ação</th></tr>
                    </thead>
                    <tbody id="adm-user-list" class="text-[10px] font-bold uppercase"></tbody>
                </table>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-[200]">
        <button onclick="nav('social')" class="nav-item active py-2"><span>Feed</span></button>
        <button id="nav-wallet-btn" onclick="nav('info')" class="nav-item py-2"><span>Carteira</span></button>
        <button id="nav-admin-btn" onclick="nav('admin')" class="hidden nav-item py-2 text-red-600"><span>Admin</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_ID = "5401881400"; // Teu ID Principal
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let activeID = null;
        let user = { saldo: 0, multiplier: 1.0 };

        function doLogin() {
            const input = document.getElementById('login-id').value.trim();
            if(!input) return;
            activeID = input;
            document.getElementById('auth-screen').style.display = 'none';
            initApp();
        }

        function doLogout() {
            activeID = null;
            document.getElementById('login-id').value = "";
            document.getElementById('auth-screen').style.display = 'flex';
        }

        async function initApp() {
            document.getElementById('display-uid').innerText = activeID;
            
            // Gestão de Abas baseada no ID
            if(activeID === ADMIN_ID) {
                document.getElementById('nav-admin-btn').classList.remove('hidden');
                document.getElementById('status-text').innerText = "MODO ADMINISTRADOR (SEM ANÚNCIOS)";
            } else {
                document.getElementById('nav-admin-btn').classList.add('hidden');
                document.getElementById('status-text').innerText = "100% DE GANHOS ATIVOS (MODO NORMAL)";
            }

            // Carregar dados do perfil ou criar novo
            const { data } = await sb.from('perfis').select('*').eq('id', activeID).single();
            if(data) {
                user.saldo = Number(data.saldo) || 0;
            } else {
                await sb.from('perfis').insert([{ id: activeID, saldo: 0 }]);
                user.saldo = 0;
            }

            updateUI();
            loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = user.saldo.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (user.saldo * 6.1245).toFixed(4) + " BRL";
            document.getElementById('wall-brl-sub').innerText = (user.saldo * 6.1245).toFixed(4) + " BRL";
            
            const progress = (user.saldo / 5.0) * 100;
            document.getElementById('withdraw-progress').style.width = Math.min(progress, 100) + "%";
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(!posts) return;

            container.innerHTML = posts.map((p, i) => `
                <div class="google-card shadow-sm mb-4">
                    <div class="p-5">
                        <p class="text-[13px] font-black uppercase text-gray-800 mb-4">${p.content}</p>
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-2xl mb-4 border shadow-inner">` : ''}
                        <div class="flex border-t pt-2">
                            <button onclick="handleInteraction('like', 0.0006)" class="flex-1 py-3 text-xl">👍</button>
                            <button onclick="handleInteraction('comment', 0.0010)" class="flex-1 py-3 text-xl">💬</button>
                            <button onclick="handleInteraction('share', 0.0020)" class="flex-1 py-3 text-xl">🔗</button>
                        </div>
                    </div>
                </div>
                ${(activeID !== ADMIN_ID && (i+1)%3 === 0) ? '<div class="feed-ad-unit"><p class="text-[10px] font-black text-blue-600 uppercase">Espaço Publicitário</p></div>' : ''}
            `).join('');
        }

        async function handleInteraction(type, value) {
            if(activeID !== ADMIN_ID) {
                user.saldo += value;
                showGain(value);
                updateUI();
                await sb.from('perfis').update({ saldo: user.saldo }).eq('id', activeID);
            }
        }

        function showGain(val) {
            const el = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 800);
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'admin') loadAdminStats();
        }

        async function loadAdminStats() {
            const { data: users } = await sb.from('perfis').select('*');
            const { count: postCount } = await sb.from('posts').select('*', { count: 'exact', head: true });
            document.getElementById('adm-total-users').innerText = users.length;
            document.getElementById('adm-total-posts').innerText = postCount;
            document.getElementById('adm-user-list').innerHTML = users.map(u => `
                <tr class="border-b"><td class="p-4">${u.id}</td><td class="p-4">${Number(u.saldo).toFixed(4)}€</td><td class="p-4 text-right">❌</td></tr>
            `).join('');
        }

        function expandPublisher() { document.getElementById('mini-pub').classList.add('hidden'); document.getElementById('expanded-post').classList.remove('hidden'); }
        function collapsePublisher() { document.getElementById('mini-pub').classList.remove('hidden'); document.getElementById('expanded-post').classList.add('hidden'); }
    </script>
</body>
</html>
