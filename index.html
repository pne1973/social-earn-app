<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v88</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        .google-blue { color: #4285F4; }
        .google-bg-blue { background-color: #4285F4; }
        .nav-active { color: #4285F4 !important; border-top: 3px solid #4285F4; font-weight: 900; background: #f1f3f4; }
        .card { background: white; border-radius: 12px; border: 1px solid #dadce0; margin-bottom: 12px; overflow: hidden; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; border: none; background: none; cursor: pointer; transition: 0.2s; }
        #loader { display: none; position: fixed; inset: 0; background: white; z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="pb-24">

    <div id="loader">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500 mb-2"></div>
        <p class="text-[9px] font-black uppercase text-blue-600">A processar...</p>
    </div>

    <header class="sticky top-0 bg-white border-b z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-lg font-black google-blue tracking-tighter">APEX SOCIAL</h1>
            <p class="text-[8px] font-black text-gray-400 uppercase italic">v60 Production</p>
        </div>
        <div class="text-right">
            <span id="bal-eur" class="font-black text-green-600 text-base">0.0000€</span>
            <p id="bal-brl" class="text-[8px] font-bold text-gray-400 uppercase">0.0000 BRL</p>
        </div>
    </header>

    <main id="app-container" class="p-4 max-w-md mx-auto"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around z-40 shadow-2xl">
        <button onclick="tab('feed')" id="tab-feed" class="nav-btn text-gray-400"><span class="text-[10px] font-black uppercase">Feed</span></button>
        <button onclick="tab('wallet')" id="tab-wallet" class="nav-btn text-gray-400"><span class="text-[10px] font-black uppercase">Carteira</span></button>
        <button onclick="tab('friends')" id="tab-friends" class="nav-btn text-gray-400"><span class="text-[10px] font-black uppercase">Amigos</span></button>
        <button onclick="tab('profile')" id="tab-profile" class="nav-btn text-gray-400"><span class="text-[10px] font-black uppercase">Perfil</span></button>
        <button onclick="tab('admin')" id="tab-admin" class="nav-btn text-red-300 hidden"><span class="text-[10px] font-black uppercase">Admin</span></button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "COLA_AQUI_A_TUA_KEY"; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const UID = "5401881400";

        let localUser = { saldo: 0.0, bonus: 15 };
        let localPosts = [{ user_id: 'SISTEMA', content: 'Bem-vindo! Poste agora para ganhar 0,0150€.' }];

        async function init() {
            if (UID === "5401881400") document.getElementById('tab-admin').classList.remove('hidden');
            
            // Tenta carregar dados, mas não bloqueia se falhar
            try {
                const { data } = await supabase.from('perfis').select('*').eq('id', UID).single();
                if (data) localUser = data;
                const { data: ps } = await supabase.from('posts').select('*').order('created_at', { ascending: false }).limit(5);
                if (ps && ps.length > 0) localPosts = ps;
            } catch (e) { console.log("Modo offline/Erro DB"); }
            
            updateTopBar();
            tab('feed');
        }

        function updateTopBar() {
            document.getElementById('bal-eur').innerText = localUser.saldo.toFixed(4) + "€";
            document.getElementById('bal-brl').innerText = (localUser.saldo * 6.12).toFixed(4) + " BRL";
        }

        async function addReward(amt) {
            if (localUser.bonus <= 0) { alert("Sincronize na Carteira!"); return; }
            localUser.saldo += amt;
            localUser.bonus--;
            updateTopBar();
            await supabase.from('perfis').upsert({ id: UID, saldo: localUser.saldo, bonus: localUser.bonus });
            tab(window.currentTab);
        }

        async function sendPost() {
            const txt = document.getElementById('input-post').value;
            if (!txt) return;
            showLoader(true);
            const { error } = await supabase.from('posts').insert([{ user_id: UID, content: txt }]);
            if (!error) {
                document.getElementById('input-post').value = "";
                await addReward(0.0150);
                init(); // Atualiza feed
            }
            showLoader(false);
        }

        function tab(name) {
            window.currentTab = name;
            const container = document.getElementById('app-container');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + name).classList.add('nav-active');

            if (name === 'feed') {
                container.innerHTML = `
                    <div class="card p-4 google-bg-blue text-white flex justify-between items-center shadow-md">
                        <div><p class="text-[9px] font-black uppercase">Bónus Disponível</p><p class="text-sm font-black">🔥 ${localUser.bonus} Acções Turbo</p></div>
                        <button onclick="tab('wallet')" class="bg-white text-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">Sincronizar</button>
                    </div>
                    <div class="card p-4 shadow-sm">
                        <textarea id="input-post" placeholder="No que estás a pensar? (+0,0150€)" class="w-full text-sm border-none p-0 focus:ring-0 mb-3" rows="2"></textarea>
                        <button onclick="sendPost()" class="w-full google-bg-blue text-white py-3 rounded-xl font-black text-[10px] uppercase">Publicar e Ganhar</button>
                    </div>
                    <div class="space-y-3">
                        ${localPosts.map(p => `
                            <div class="card p-4">
                                <p class="text-[9px] font-black text-gray-400 uppercase mb-2">User #${p.user_id.slice(-4)}</p>
                                <p class="text-xs text-gray-700 mb-4">${p.content}</p>
                                <button onclick="addReward(0.0015)" class="w-full border py-2 rounded-lg text-[9px] font-black uppercase text-blue-500">Gostar (+0,0015€)</button>
                            </div>
                        `).join('<div class="p-2 text-center text-[8px] text-gray-300 font-bold uppercase tracking-widest">[ Espaço Publicitário Adsterra ]</div>')}
                    </div>
                `;
            } else if (name === 'wallet') {
                container.innerHTML = `
                    <div class="card p-10 text-center"><p class="text-[10px] font-black text-gray-400 uppercase mb-2">Saldo Total</p><h1 class="text-5xl font-black google-blue">${localUser.saldo.toFixed(4)}€</h1></div>
                    <div class="card p-4 space-y-3">
                        <button onclick="tab('feed')" class="w-full google-bg-blue text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg italic">Ver Vídeo (Sincronizar Turbo)</button>
                        <button onclick="addReward(0.0500)" class="w-full border-2 border-green-500 text-green-600 py-3 rounded-xl font-black text-[10px] uppercase">Check-in (+0,0500€)</button>
                    </div>
                `;
            } else if (name === 'friends') {
                container.innerHTML = `
                    <div class="card p-6 border-l-4 border-blue-500">
                        <h2 class="font-black text-sm uppercase google-blue mb-1">Amigos</h2>
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-4">Link de Convite (Ganha 10%):</p>
                        <div class="bg-gray-50 p-3 rounded border border-dashed mb-4 text-[9px] font-mono text-blue-500 italic">https://apex-social.onrender.com/?ref=${UID}</div>
                        <button class="w-full google-bg-blue text-white py-3 rounded-xl font-black text-[10px] uppercase">Partilhar Link</button>
                    </div>
                `;
            } else if (name === 'profile') {
                container.innerHTML = `
                    <div class="card p-6 text-center space-y-2">
                        <div class="w-12 h-12 bg-gray-100 rounded-full mx-auto mb-4"></div>
                        <button class="w-full bg-white py-3 border rounded text-[9px] font-black uppercase">Autopost</button>
                        <button class="w-full bg-white py-3 border rounded text-[9px] font-black uppercase">Reset Diário</button>
                    </div>
                `;
            }
        }

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        window.onload = init;
    </script>
</body>
</html>
