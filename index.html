<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Earn Network - FB Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #F0F2F5; color: #1C1E21; -webkit-tap-highlight-color: transparent; }
        .fb-shadow { box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1); }
        .fb-blue { color: #1877F2; }
        .bg-fb-blue { background-color: #1877F2; }
        
        /* Sistema de Abas Ativas */
        .nav-item { position: relative; color: #65676B; transition: all 0.2s; }
        .nav-item.active { color: #1877F2; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #1877F2; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }

        .post-card { background: white; border-radius: 8px; border: 1px solid #dddfe2; margin-bottom: 16px; }
    </style>
</head>
<body class="pb-20">

    <div id="auth-screen" class="fixed inset-0 bg-white z-[6000] flex flex-col items-center justify-center p-6" style="display:none;">
        <h1 class="text-4xl font-bold fb-blue mb-8 tracking-tighter">facebook</h1>
        <input type="text" id="login-id" placeholder="Número de Telemóvel ou ID" class="w-full max-w-xs border border-gray-300 rounded-xl p-4 mb-4 outline-none focus:border-blue-500 font-semibold bg-gray-50">
        <button onclick="doLogin()" class="w-full max-w-xs bg-fb-blue text-white font-bold py-3 rounded-xl shadow-lg text-lg">Entrar</button>
        <div class="mt-6 text-fb-blue font-semibold text-sm">Criar nova conta</div>
    </div>

    <div id="floating-earning"><div class="text-4xl font-black text-green-500" id="earning-val">+0.0000€</div></div>

    <header class="sticky top-0 z-50 bg-white fb-shadow">
        <div class="max-w-xl mx-auto flex items-center justify-between px-4 h-14">
            <h1 class="text-2xl font-bold fb-blue tracking-tighter">facebook</h1>
            <div class="flex space-x-2">
                <div class="bg-gray-100 p-2 rounded-full"><svg class="w-5 h-5" fill="black" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11H9v-2h2v2zm0-4H9V5h2v4z"></path></svg></div>
                <div class="bg-gray-100 p-2 rounded-full" onclick="nav('menu')"><svg class="w-5 h-5" fill="black" viewBox="0 0 20 20"><path d="M3 5h14v2H3V5zm0 4h14v2H3V9zm0 4h14v2H3v-2z"></path></svg></div>
            </div>
        </div>
        
        <nav class="flex border-t border-gray-100 max-w-xl mx-auto h-12">
            <button onclick="nav('social')" class="nav-item active flex-1 flex justify-center items-center">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            </button>
            <button onclick="nav('friends')" class="nav-item flex-1 flex justify-center items-center">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a7 7 0 00-7 7v1h12v-1a7 7 0 00-7-7z"></path></svg>
            </button>
            <button onclick="nav('info')" class="nav-item flex-1 flex justify-center items-center">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            </button>
            <button id="nav-admin-btn" onclick="nav('admin')" class="nav-item flex-1 hidden flex justify-center items-center text-red-500">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a1 1 0 00-2 0v7.268a2 2 0 000 3.464V16a1 1 0 102 0v-1.268a2 2 0 000-3.464V4zM11 4a1 1 0 10-2 0v1.268a2 2 0 000 3.464V16a1 1 0 102 0V8.732a2 2 0 000-3.464V4zM16 3a1 1 0 011 1v7.268a2 2 0 010 3.464V16a1 1 0 11-2 0v-1.268a2 2 0 010-3.464V4a1 1 0 011-1z"></path></svg>
            </button>
        </nav>
    </header>

    <main class="max-w-xl mx-auto p-3">
        
        <section id="view-social" class="tab-content active">
            <div class="bg-white p-4 rounded-lg fb-shadow mb-4">
                <div class="flex space-x-3 mb-3">
                    <div class="w-10 h-10 bg-fb-blue rounded-full flex items-center justify-center text-white font-bold">👤</div>
                    <textarea id="post-input" placeholder="No que você está pensando?" class="w-full bg-gray-100 rounded-2xl px-4 py-2 border-none focus:ring-0 resize-none text-[15px] h-11 font-medium"></textarea>
                </div>
                <div class="flex border-t pt-2 justify-between">
                    <button class="flex items-center space-x-2 text-gray-500 font-bold text-sm px-2 py-1"><span class="text-red-500">📷</span><span>Foto</span></button>
                    <button onclick="handleInteraction('post')" class="bg-fb-blue text-white px-6 py-1 rounded-md font-bold text-sm">Publicar</button>
                </div>
                <input id="post-url" type="text" placeholder="Cole o link da imagem aqui..." class="w-full bg-gray-50 text-[10px] p-2 mt-2 rounded border-none outline-none focus:bg-white">
            </div>
            <div id="feed-container" class="space-y-4"></div>
        </section>

        <section id="view-friends" class="tab-content">
            <div class="bg-white rounded-lg fb-shadow p-4">
                <h2 class="text-xl font-bold mb-4">Pessoas que você pode conhecer</h2>
                <div id="friends-list" class="space-y-4">
                    </div>
            </div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="bg-white p-6 rounded-lg fb-shadow text-center">
                <div class="w-20 h-20 bg-gray-100 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl">💰</div>
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Saldo em Carteira</h3>
                <h2 id="wall-eur" class="text-4xl font-black fb-blue mb-1">0.0000€</h2>
                <p id="wall-brl-sub" class="text-gray-400 font-bold mb-6">0.0000 BRL</p>
                
                <div id="withdraw-area" class="hidden animate-pulse">
                    <input id="pp-email" type="email" placeholder="E-mail PayPal" class="w-full border-2 border-fb-blue p-4 rounded-xl mb-3 text-center font-bold">
                    <button onclick="requestWithdraw()" class="w-full bg-fb-blue text-white py-4 rounded-xl font-bold">Levantar Dinheiro</button>
                </div>

                <div id="progress-container">
                    <div class="w-full bg-gray-200 h-3 rounded-full mb-3 overflow-hidden">
                        <div id="withdraw-progress" class="bg-fb-blue h-full w-0 transition-all duration-700"></div>
                    </div>
                    <p class="text-[10px] text-gray-500 font-bold">Mínimo para saque: 5.0000€</p>
                </div>
            </div>
        </section>

        <section id="view-admin" class="tab-content">
            <div class="bg-white rounded-xl fb-shadow p-4 border-l-4 border-red-500">
                <h2 class="text-red-500 font-black text-lg mb-4">PAINEL DE CONTROLO</h2>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-gray-100 p-3 rounded-lg text-center"><div class="text-[10px] uppercase font-bold opacity-50">Usuários</div><div id="adm-total-users" class="text-xl font-black">0</div></div>
                    <div class="bg-gray-100 p-3 rounded-lg text-center"><div class="text-[10px] uppercase font-bold opacity-50">Posts</div><div id="adm-total-posts" class="text-xl font-black">0</div></div>
                </div>
                <div id="adm-user-list" class="divide-y"></div>
            </div>
        </section>

        <section id="view-menu" class="tab-content">
            <div class="space-y-4">
                <div class="bg-white p-4 rounded-lg fb-shadow flex items-center space-x-3">
                    <div class="w-12 h-12 bg-fb-blue rounded-full flex items-center justify-center text-white text-xl">👤</div>
                    <div><div class="font-bold" id="menu-user-id">Carregando...</div><div class="text-xs text-gray-500">Ver o seu perfil</div></div>
                </div>
                <button onclick="localStorage.clear(); location.reload();" class="w-full bg-white p-4 rounded-lg fb-shadow text-red-600 font-bold flex items-center space-x-3">
                    <span>🚪</span><span>Sair da Conta</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const ADMIN_MASTER = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let activeID = localStorage.getItem('apex_uid');
        let user = { saldo: 0 };

        async function init() {
            if (!activeID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
            document.getElementById('display-uid').innerText = activeID;
            document.getElementById('menu-user-id').innerText = "ID: " + activeID;
            
            if(activeID === ADMIN_MASTER) document.getElementById('nav-admin-btn').classList.remove('hidden');

            const { data } = await sb.from('perfis').select('*').eq('id', activeID).single();
            if(data) user.saldo = Number(data.saldo) || 0;
            else await sb.from('perfis').insert([{ id: activeID, saldo: 0.0000 }]);

            updateUI(); 
            loadFeed();
            loadFriends();
            setInterval(updateUI, 1500);
        }

        function updateUI() {
            const cur = user.saldo;
            document.getElementById('wall-eur').innerText = cur.toFixed(4) + "€";
            document.getElementById('wall-brl-sub').innerText = (cur * 6.1245).toFixed(4) + " BRL";
            
            const progress = (cur / 5.0) * 100;
            document.getElementById('withdraw-progress').style.width = Math.min(progress, 100) + "%";
            if(cur >= 5.0) {
                document.getElementById('withdraw-area').classList.remove('hidden');
                document.getElementById('progress-container').classList.add('hidden');
            }
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = posts.map(p => `
                <div class="post-card">
                    <div class="p-3 flex items-center space-x-2">
                        <div class="w-9 h-9 bg-gray-200 rounded-full flex items-center justify-center font-bold text-xs text-gray-500">👤</div>
                        <div><div class="text-sm font-bold">${p.user_id}</div><div class="text-[10px] text-gray-400 font-bold">Sugestão para si</div></div>
                    </div>
                    <div class="px-3 pb-3 text-[15px]">${p.content}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="w-full border-y border-gray-100">` : ''}
                    <div class="flex border-t border-gray-50 p-1">
                        <button onclick="handleInteraction('like', 0.0006)" class="flex-1 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-md transition">👍 Gosto</button>
                        <button class="flex-1 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-md transition">💬 Comentar</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadFriends() {
            const { data: users } = await sb.from('perfis').select('id').limit(10);
            const container = document.getElementById('friends-list');
            container.innerHTML = users.map(u => `
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-14 h-14 bg-gray-200 rounded-full flex items-center justify-center font-bold">👤</div>
                        <div class="font-bold text-sm">${u.id}</div>
                    </div>
                    <button class="bg-fb-blue text-white px-4 py-1.5 rounded-lg font-bold text-sm">Adicionar</button>
                </div>
            `).join('');
        }

        async function handleInteraction(type, val = 0) {
            if (type === 'post') {
                const content = document.getElementById('post-input').value;
                const url = document.getElementById('post-url').value;
                if(!content) return;
                const { error } = await sb.from('posts').insert([{ user_id: activeID, content, image_url: url }]);
                if(!error) {
                    document.getElementById('post-input').value = "";
                    document.getElementById('post-url').value = "";
                    applyGain(0.0150);
                    loadFeed();
                }
            } else { applyGain(val); }
        }

        async function applyGain(val) {
            user.saldo = Number((user.saldo + val).toFixed(4));
            showBigNumber(val);
            await sb.from('perfis').upsert({ id: activeID, saldo: user.saldo });
        }

        function showBigNumber(val) {
            const c = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + val.toFixed(4) + "€";
            c.style.display = 'block';
            setTimeout(() => c.style.display = 'none', 800);
        }

        function nav(t) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'admin') loadAdminStats();
        }

        function doLogin() {
            const id = document.getElementById('login-id').value.trim();
            if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
        }

        init();
    </script>
</body>
</html>
