<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* LOGIN - Screenshot 12:29 */
        #login-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 40px; }
        .l-logo { background: #2962ff; width: 90px; height: 90px; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .l-logo span { color: #fff; font-size: 55px; font-weight: 900; font-style: italic; }
        .l-text { color: #2962ff; font-weight: 800; font-size: 14px; letter-spacing: 1.5px; margin-bottom: 50px; }
        #id-input { width: 100%; max-width: 350px; padding: 22px; text-align: center; border: 2px solid #2962ff; border-radius: 20px; font-size: 24px; font-weight: bold; margin-bottom: 20px; outline: none; }
        .btn-entrar { width: 100%; max-width: 350px; padding: 20px; background: #2962ff; color: #fff; border: none; border-radius: 20px; font-size: 16px; font-weight: 800; text-transform: uppercase; }

        /* USER INTERFACE - esta.jpg */
        .user-view .u-header { height: 70px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; }
        .user-view .u-balance { text-align: right; }
        .user-view .u-eur { color: #1e8e3e; font-size: 22px; font-weight: 800; display: block; }
        .user-view .u-brl { color: #9aa0a6; font-size: 12px; }
        .user-view .u-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; display: flex; border-top: 1px solid #eee; }
        .user-view .u-tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #70757a; font-size: 13px; border-top: 4px solid transparent; }
        .user-view .u-tab.active { color: #2962ff; border-top: 4px solid #2962ff; }

        /* ADMIN INTERFACE - 19:51 / 20:00 */
        .admin-view { background: #000; color: #0f0; min-height: 100vh; font-family: monospace; }
        .admin-view .a-header { height: 65px; border-bottom: 2px solid #0055ff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .admin-view .a-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; }
        .admin-view .a-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: bold; }
        .admin-view .a-tab.active { color: #0f0; border-top: 3px solid #0055ff; background: linear-gradient(to bottom, #001133, #000); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="l-logo"><span>S</span></div>
        <div class="l-text">SOCIAL EARN NETWORK</div>
        <input type="number" id="id-input" placeholder="123">
        <button class="btn-entrar" onclick="login()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="app-user" class="user-view hidden">
        <header class="u-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="background:#2962ff; color:#fff; padding:4px 8px; border-radius:8px; font-weight:900; font-style:italic;">S</div>
                <span style="color:#2962ff; font-weight:800; font-size:14px;">SOCIAL EARN</span>
            </div>
            <div class="u-balance">
                <span class="u-eur" id="u-val-eur">0.0000€</span>
                <span class="u-brl" id="u-val-brl">0.0000 BRL</span>
            </div>
        </header>
        <div style="padding: 85px 15px;">
            <div style="color:#1e8e3e; font-size:11px; font-weight:800; margin-bottom:15px;">GANHOS ATIVOS: 100%</div>
            <div id="feed-lista"></div>
        </div>
        <nav class="u-nav">
            <div class="u-tab active">FEED</div>
            <div class="u-tab">CARTEIRA</div>
        </nav>
    </div>

    <div id="app-admin" class="admin-view hidden">
        <header class="a-header">
            <div style="color:#0055ff; font-weight:900; letter-spacing:1px;">APEX C&C CENTER</div>
            <div style="color:#0f0; font-size:9px;">● SB_LIVE_FEED</div>
        </header>
        <div style="padding: 20px;">
            <h2 style="margin-bottom:20px;">SISTEMA_LOGS_POSTS</h2>
            <div id="admin-logs"></div>
        </div>
        <nav class="a-nav">
            <div class="a-tab active">🖥️<br>MONITOR</div>
            <div class="a-tab">📊<br>STATS</div>
            <div class="a-tab">⚔️<br>ADMIN</div>
        </nav>
    </div>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_ID = "5401881400";

        async function login() {
            const id = document.getElementById('id-input').value;
            const { data: user } = await sb.from('perfis').select('*').eq('id', id).single();
            
            if(!user) return alert("Erro");

            document.getElementById('login-screen').classList.add('hidden');
            if(id === ADMIN_ID) {
                document.getElementById('app-admin').classList.remove('hidden');
                loadAdmin();
            } else {
                document.getElementById('app-user').classList.remove('hidden');
                document.getElementById('u-val-eur').innerText = user.saldo.toFixed(4) + "€";
                document.getElementById('u-val-brl').innerText = (user.saldo * 6.12).toFixed(4) + " BRL";
                loadUser();
            }
        }

        async function loadUser() {
            const { data } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            document.getElementById('feed-lista').innerHTML = data.map(p => `
                <div style="background:#fff; border:1px solid #eee; border-radius:15px; padding:15px; margin-bottom:10px;">
                    <b style="color:#8a8d91; font-size:11px;">ID: ${p.user_id}</b>
                    <p style="margin-top:5px; font-weight:600;">${p.content}</p>
                </div>
            `).join('');
        }

        async function loadAdmin() {
            const { data } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            document.getElementById('admin-logs').innerHTML = data.map(p => `
                <div style="margin-bottom:10px;">
                    <span style="color:#444">[${new Date(p.created_at).toLocaleTimeString()}]</span>
                    <span style="color:#0f0"> ID:${p.user_id}</span> postou: "${p.content}"
                </div>
            `).join('');
        }
    </script>
</body>
</html>
