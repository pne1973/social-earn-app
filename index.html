<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social v32.6</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a73e8; --success: #1e8e3e; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #202124; }
        
        /* LOGIN */
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { text-align: center; padding: 30px; border: 1px solid #dadce0; border-radius: 12px; width: 320px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; }
        .btn-blue { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* HEADER */
        header { background: white; padding: 15px; border-bottom: 1px solid #dadce0; position: sticky; top: 0; text-align: center; z-index: 99; }
        .balance { font-size: 1.8rem; font-weight: 700; color: var(--success); }
        .user-info { font-size: 0.7rem; color: #70757a; margin-top: 5px; font-weight: bold; }
        .logout { position: absolute; right: 15px; top: 20px; font-size: 0.75rem; color: #d93025; cursor: pointer; font-weight: bold; }

        .feed { max-width: 500px; margin: 20px auto; padding: 0 10px; }
        .post { background: white; border: 1px solid #dadce0; border-radius: 12px; margin-bottom: 15px; padding: 15px; }
        .post img { width: 100%; border-radius: 8px; margin-top: 10px; }
        .btn-action { width: 100%; margin-top: 15px; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; background: #fff; cursor: pointer; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="auth-screen" style="display:none;">
    <div class="login-card">
        <h2 style="color:var(--primary); margin:0;">Apex Social</h2>
        <p style="color:#5f6368; font-size:0.9rem;">Insira o seu ID para carregar saldo</p>
        <input type="text" id="user-field" placeholder="Ex: joao_123">
        <button class="btn-blue" onclick="doLogin()">ENTRAR</button>
    </div>
</div>

<header id="app-header" style="display:none;">
    <span class="logout" onclick="doLogout()">SAIR</span>
    <div class="balance" id="val-saldo">0.0000€</div>
    <div class="user-info" id="val-user">A CONECTAR...</div>
</header>

<div class="feed" id="app-feed" style="display:none;"></div>

<script>
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let currentUID = localStorage.getItem('apex_uid');
    let account = { saldo: 0.0000 };

    function doLogin() {
        const id = document.getElementById('user-field').value.trim();
        if(id) { localStorage.setItem('apex_uid', id); location.reload(); }
    }
    function doLogout() { localStorage.removeItem('apex_uid'); location.reload(); }

    async function start() {
        if (!currentUID) { document.getElementById('auth-screen').style.display = 'flex'; return; }
        document.getElementById('app-header').style.display = 'block';
        document.getElementById('app-feed').style.display = 'block';

        // Tenta buscar ou criar perfil (Upsert silencioso)
        const { data } = await sb.from('perfis').select('saldo').eq('id', currentUID).single();
        
        if (data) {
            account.saldo = parseFloat(data.saldo) || 0;
        } else {
            // Se for ID novo, cria imediatamente no banco
            await sb.from('perfis').insert([{ id: currentUID, saldo: 0.0000 }]);
        }
        
        updateUI();
        loadPosts();
    }

    function updateUI() {
        const locale = navigator.language || "pt-PT";
        const isBR = locale.includes("BR");
        const val = isBR ? (account.saldo * 6.12) : account.saldo;
        
        document.getElementById('val-saldo').innerText = new Intl.NumberFormat(locale, {
            style: 'currency', currency: isBR ? "BRL" : "EUR", minimumFractionDigits: isBR ? 2 : 4
        }).format(val);
        
        document.getElementById('val-user').innerText = "UTILIZADOR: " + currentUID;
    }

    async function earn(amt) {
        account.saldo = parseFloat((account.saldo + amt).toFixed(4));
        updateUI();
        
        // UPSERT garante que o saldo seja guardado para o ID ativo
        const { error } = await sb.from('perfis').upsert({ id: currentUID, saldo: account.saldo });
        if(error) console.error("Erro ao guardar:", error.message);
    }

    async function loadPosts() {
        const { data: list } = await sb.from('posts').select('*').order('id', { ascending: false }).limit(10);
        const feed = document.getElementById('app-feed');
        if (list) {
            feed.innerHTML = list.map(p => `
                <div class="post">
                    <p>${p.content || ''}</p>
                    ${p.image_url ? `<img src="${p.image_url}">` : ''}
                    <button class="btn-action" onclick="earn(0.0015)">👍 CURTIR (+0.0015€)</button>
                </div>
            `).join('');
        }
    }

    start();
</script>
</body>
</html>
