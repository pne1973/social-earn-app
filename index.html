<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pine Social Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; --bg: #F1F3F4; --txt: #202124; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 75px 0 90px; }
        
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #fff; border-bottom: 1px solid #dadce0; z-index: 2000; box-sizing: border-box; }
        .logo { font-weight: bold; font-size: 22px; }
        .logo span:nth-child(1) { color: var(--g-blue); } .logo span:nth-child(2) { color: var(--g-red); } .logo span:nth-child(3) { color: var(--g-yellow); } .logo span:nth-child(4) { color: var(--g-blue); } .logo span:nth-child(5) { color: var(--g-green); }
        .xp-badge { background: var(--g-blue); color: #fff; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #dadce0; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 14px 0; color: #5f6368; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: var(--g-blue); border-top: 3px solid var(--g-blue); }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; box-sizing: border-box; width: 100%; }
        .card { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #dadce0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn { width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--g-blue); color: #fff; }
        
        textarea { width: 100%; border: 1px solid #eee; padding: 10px; border-radius: 8px; font-size: 15px; outline: none; background: #f8f9fa; margin-bottom: 10px; resize: none; box-sizing: border-box; }
        .post-img { width: calc(100% + 32px); margin: 10px -16px; display: block; max-height: 350px; object-fit: cover; border-top: 1px solid #eee; }
        .ad-card { background: #fff8e1; border: 1px dashed var(--g-yellow); padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; color: #856404; font-size: 13px; }
        
        .actions { display: flex; gap: 20px; border-top: 1px solid #f1f3f4; padding-top: 10px; margin-top: 10px; }
        .act-btn { background: none; border: none; color: #5f6368; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>P</span><span>i</span><span>n</span><span>e</span> <span>S</span><span>o</span><span>c</span><span>i</span><span>a</span><span>l</span></div>
        <div id="userXP" class="xp-badge">0 XP</div>
    </div>

    <section id="feed-tab" class="tab-content container">
        <div class="ad-card"><b>Ganhe +100 XP</b> por cada amigo convidado! 🚀</div>
        <div class="card">
            <textarea id="postText" rows="3" placeholder="No que estás a pensar?"></textarea>
            <div id="img-status" style="font-size:11px; color:var(--g-blue); margin-bottom:10px;" class="hidden">Foto pronta! ✅</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:var(--g-green); font-weight:bold; cursor:pointer;"><i class="fas fa-camera"></i> Foto</button>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImg(this)">
                <button class="btn btn-blue" style="width:auto; padding:8px 25px;" id="pubBtn" onclick="publish()">Publicar</button>
            </div>
        </div>
        <div id="feed-list">Carregando feed...</div>
    </section>

    <section id="info-tab" class="tab-content container hidden">
        <div class="card">
            <h3 style="color:var(--g-blue);">📊 Tabela de Ganhos</h3>
            <div style="line-height:2.5; font-size:14px;">
                <div>Postagem: <b style="color:var(--g-green); float:right;">+15 XP</b></div>
                <div>Amigo: <b style="color:var(--g-green); float:right;">+100 XP</b></div>
                <div>Like: <b style="color:var(--g-green); float:right;">+2 XP</b></div>
            </div>
            <div style="margin-top:20px; text-align:center; padding:15px; background:#f8f9fa; border-radius:10px;">
                1000 XP = <b id="rate-display">1.0000€</b>
            </div>
        </div>
    </section>

    <section id="rank-tab" class="tab-content container hidden">
        <div class="card"><h3>🏆 Top 10 Ranking</h3><div id="rank-list"></div></div>
    </section>

    <section id="wallet-tab" class="tab-content container hidden">
        <div class="card" style="text-align:center;">
            <p>Saldo Estimado</p>
            <h1 id="cash-val">0.0000€</h1>
            <input type="email" id="ppEmail" placeholder="E-mail PayPal" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px;">
            <button class="btn btn-blue" onclick="alert('Mínimo 5000 XP necessário')">Solicitar Saque</button>
        </div>
    </section>

    <nav class="nav">
        <div class="nav-item active" onclick="showTab('feed-tab', this)"><i class="fas fa-home"></i>Feed</div>
        <div class="nav-item" onclick="showTab('info-tab', this)"><i class="fas fa-coins"></i>Ganhos</div>
        <div class="nav-item" onclick="showTab('rank-tab', this)"><i class="fas fa-trophy"></i>Rank</div>
        <div class="nav-item" onclick="showTab('wallet-tab', this)"><i class="fas fa-wallet"></i>Saque</div>
    </nav>

    <script>
        const SUPABASE_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const myId = 5401881400;

        let compressedImg = null;
        let rate = 1.0; let symbol = "€";

        async function init() {
            if(window.navigator.language.includes('BR')) { rate = 6.2; symbol = "R$"; }
            document.getElementById('rate-display').innerText = (1 * rate).toFixed(4) + symbol;
            loadProfile();
            loadFeed();
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            el.classList.add('active');
            if(id === 'rank-tab') loadRanking();
        }

        async function loadFeed() {
            const list = document.getElementById('feed-list');
            // Busca simplificada sem joins complexos para garantir que carrega
            const { data, error } = await supabaseClient.from('posts').select('*').order('created_at', {ascending:false});
            
            if(error) { list.innerHTML = "Erro ao carregar feed."; return; }
            
            list.innerHTML = '';
            data.forEach((p, i) => {
                if(i > 0 && i % 3 === 0) list.innerHTML += `<div class="ad-card">📢 <b>Anúncio:</b> Ganhe XP com inquéritos!</div>`;
                list.innerHTML += `
                <div class="card">
                    <div style="font-weight:bold; color:var(--g-blue); margin-bottom:5px;">Utilizador #${p.user_id.toString().slice(-4)}</div>
                    <p style="margin:0;">${p.content}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                    <div class="actions">
                        <button class="act-btn" onclick="likePost(this)"><i class="far fa-heart"></i> Like</button>
                    </div>
                </div>`;
            });
        }

        async function publish() {
            const txt = document.getElementById('postText').value;
            if(!txt && !compressedImg) return;
            const btn = document.getElementById('pubBtn');
            btn.disabled = true;

            let imgUrl = null;
            if(compressedImg) {
                const name = `img_${Date.now()}.jpg`;
                const blob = await (await fetch(compressedImg)).blob();
                await supabaseClient.storage.from('post-images').upload(name, blob);
                imgUrl = SUPABASE_URL + "/storage/v1/object/public/post-images/" + name;
            }

            const { error } = await supabaseClient.from('posts').insert([{ user_id: myId, content: txt, image_url: imgUrl }]);
            if(!error) {
                await supabaseClient.rpc('increment_points', { user_id: myId, amount: 15 });
                location.reload();
            } else { alert("Erro ao publicar."); btn.disabled = false; }
        }

        function handleImg(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if(w > 800) { h *= 800/w; w = 800; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    compressedImg = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('img-status').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function likePost(btn) {
            btn.style.color = 'var(--g-red)';
            btn.innerHTML = '<i class="fas fa-heart"></i> +2 XP';
            await supabaseClient.rpc('increment_points', { user_id: myId, amount: 2 });
            loadProfile();
        }

        async function loadProfile() {
            const { data } = await supabaseClient.from('profiles').select('points').eq('id', myId).single();
            if(data) {
                document.getElementById('userXP').innerText = data.points + " XP";
                document.getElementById('cash-val').innerText = (data.points * rate / 1000).toFixed(4) + symbol;
            }
        }

        async function loadRanking() {
            const { data } = await supabaseClient.from('profiles').select('username, points').order('points', {ascending:false}).limit(10);
            const rList = document.getElementById('rank-list');
            rList.innerHTML = data ? data.map((u, i) => `<div style="padding:10px 0; border-bottom:1px solid #eee;">${i+1}. @${u.username} <b style="float:right;">${u.points} XP</b></div>`).join('') : 'Sem dados.';
        }

        init();
    </script>
</body>
</html>
