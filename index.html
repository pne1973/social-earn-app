<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Social - Master Definitivo</title>

    <!-- Supabase v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; 
            padding-top: 185px; 
            padding-bottom: 20px;
        }

        /* HEADER */
        .header-fixed { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; 
            z-index: 9999; 
            background: #121212; 
            border-bottom: 1px solid #333; 
        }

        .ad-banner { 
            background: #1a1a1a; 
            color: #ffcc00; 
            padding: 10px; 
            text-align: center; 
            font-size: 11px; 
            font-weight: bold; 
            border-bottom: 1px solid #333; 
        }

        .stats-bar { 
            display: flex; 
            justify-content: space-around; 
            padding: 15px 10px; 
            background: #121212; 
            text-align: center; 
        }

        .stat-item { flex: 1; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .stat-value { font-size: 14px; font-weight: bold; color: #ffcc00; }

        /* NAV */
        .nav-tabs { display: flex; background: #1a1a1a; border-top: 1px solid #333; }
        .tab-link { 
            flex: 1; 
            padding: 15px 5px; 
            text-align: center; 
            color: #888; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            border-bottom: 3px solid transparent; 
        }
        .tab-link.active { color: #ffcc00; border-bottom-color: #ffcc00; background: rgba(255,204,0,0.05); }

        /* CONTENT */
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .app-page { display: none; }
        .app-page.active { display: block; animation: fadeIn 0.3s ease; }

        /* CARDS */
        .card { background: #1e1e1e; border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #333; }

        /* POSTS */
        .post { background: #1e1e1e; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; background: #1a1a1a; border-bottom: 1px solid #252525; }
        .avatar { width: 34px; height: 34px; background: #333; border-radius: 50%; border: 1px solid #ffcc00; display: flex; align-items: center; justify-content: center; color: #ffcc00; font-weight: bold; }
        .post-content { padding: 15px; font-size: 15px; color: #eee; }

        /* FEED ACTIONS */
        .post-actions { display: flex; justify-content: space-between; padding: 12px 20px; border-top: 1px solid #252525; color: #aaa; font-size: 13px; }
        .act-btn { cursor: pointer; display: flex; align-items: center; gap: 7px; }
        .act-btn:active { color: #ffcc00; }

        /* COMMENTS */
        .comments-section { display: none; background: #161616; padding: 12px; border-top: 1px solid #252525; }
        .comment-input { width: 100%; background: #222; border: 1px solid #333; border-radius: 20px; padding: 8px 15px; color: #fff; font-size: 13px; outline: none; margin-bottom: 10px; }

        /* BUTTONS */
        .btn-gold { background: #ffcc00; color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-gold:active { transform: scale(0.98); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header-fixed">
        <div class="ad-banner" id="topAlert">📢 APEX SOCIAL: Ganhe dinheiro real interagindo!</div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Saldo Total</span>
                <span class="stat-value" id="valTotal">0.0000€</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Amigos</span>
                <span class="stat-value" id="valAmigos">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Renda Rede</span>
                <span class="stat-value" id="valRede">0.0000€</span>
            </div>
        </div>

        <nav class="nav-tabs">
            <div class="tab-link active" onclick="switchTab('feed', this)">Feed</div>
            <div class="tab-link" onclick="switchTab('ranking', this)">Ranking</div>
            <div class="tab-link" onclick="switchTab('carteira', this)">Carteira</div>
            <div class="tab-link" onclick="switchTab('info', this)">Info</div>
            <div id="admTab" class="tab-link" style="display:none; color:#ff4444;" onclick="switchTab('admin', this)">Admin</div>
        </nav>
    </header>

    <!-- CONTENT -->
    <main class="container">
<script>
    /* ================================
       CONFIGURAÇÃO SUPABASE
    =================================*/
    const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";

    const client = supabase.createClient(SB_URL, SB_KEY);

    // ID fixo do utilizador (como no teu original)
    const myId = 5401881400;


    /* ================================
       SISTEMA DE ABAS (OTIMIZADO)
    =================================*/
    function switchTab(tabId, element) {
        document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));

        const page = document.getElementById(`page-${tabId}`);
        if (page) page.classList.add('active');

        element.classList.add('active');

        if (tabId === 'ranking') loadRanking();
        if (tabId === 'admin') loadAdmin();
    }


    /* ================================
       INICIALIZAÇÃO
    =================================*/
    async function init() {
        await loadProfile();
        await loadFeed();
    }


    /* ================================
       PERFIL / CARTEIRA
    =================================*/
    async function loadProfile() {
        const { data, error } = await client
            .from('profiles')
            .select('*')
            .eq('id', myId)
            .single();

        if (error || !data) return;

        const totalXP = (data.points || 0) + (data.referral_points || 0);
        const eur = (totalXP * 0.0010).toFixed(4);

        document.getElementById('valTotal').innerText = eur + "€";
        document.getElementById('valAmigos').innerText = data.friends_count || 0;
        document.getElementById('valRede').innerText = (data.referral_points * 0.0010).toFixed(4) + "€";

        document.getElementById('xpDisplay').innerText = totalXP + " XP";
        document.getElementById('brlDisplay').innerText = "R$ " + (totalXP * 0.0062).toFixed(4);

        document.getElementById('refLink').innerText = `https://apex.social/?ref=${myId}`;

        if (myId === 5401881400) {
            document.getElementById('admTab').style.display = 'block';
        }
    }


    /* ================================
       FEED
    =================================*/
    async function loadFeed() {
        const { data: posts, error } = await client
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

        const feed = document.getElementById('feedList');
        feed.innerHTML = '';

        if (error || !posts) {
            feed.innerHTML = "<p>Erro ao carregar feed.</p>";
            return;
        }

        posts.forEach(p => {
            const div = document.createElement('div');
            div.className = 'post';

            div.innerHTML = `
                <div class="post-header">
                    <div class="avatar">${p.user_id.toString().slice(-1)}</div>
                    <span>User #${p.user_id.toString().slice(-4)}</span>
                </div>

                <div class="post-content">${p.content}</div>

                ${p.image_url ? `<img src="${p.image_url}" style="width:100%;">` : ''}

                <div class="post-actions">
                    <div class="act-btn" onclick="reward(2, this)">
                        <i class="fas fa-heart"></i> ${p.likes || 0}
                    </div>

                    <div class="act-btn" onclick="toggleComments(${p.id})">
                        <i class="fas fa-comment"></i> ${p.comments_count || 0}
                    </div>

                    <div class="act-btn" onclick="socialShare('${p.content}')">
                        <i class="fas fa-share"></i>
                    </div>
                </div>

                <div id="box-${p.id}" class="comments-section">
                    <input type="text" 
                           class="comment-input" 
                           placeholder="Comentar..." 
                           onkeypress="if(event.key==='Enter') sendComment(${p.id}, this)">
                    <div style="font-size:12px; color:#888;">Pressione Enter para enviar (+5 XP)</div>
                </div>
            `;

            feed.appendChild(div);
        });
    }


    /* ================================
       PUBLICAR POST
    =================================*/
    async function handlePublish() {
        const txt = document.getElementById('postText').value.trim();
        if (!txt) return;

        await client.from('posts').insert([{ user_id: myId, content: txt }]);

        // XP por publicar
        await client.rpc('increment_points', { user_id: myId, amount: 5 });

        document.getElementById('postText').value = '';

        // Atualiza apenas o necessário
        loadFeed();
        loadProfile();
    }


    /* ================================
       COMENTÁRIOS
    =================================*/
    function toggleComments(id) {
        const box = document.getElementById(`box-${id}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function sendComment(postId, input) {
        const text = input.value.trim();
        if (!text) return;

        await client.from('comments').insert([{ post_id: postId, user_id: myId, content: text }]);

        await client.rpc('increment_points', { user_id: myId, amount: 5 });

        input.value = '';
        loadFeed();
        loadProfile();
    }


    /* ================================
       LIKE / REWARD
    =================================*/
    async function reward(amount, btn) {
        btn.style.color = "#ffcc00";

        await client.rpc('increment_points', { user_id: myId, amount });

        loadProfile();
    }


    /* ================================
       PARTILHAR
    =================================*/
    function socialShare(txt) {
        if (navigator.share) {
            navigator.share({
                title: 'Apex Social',
                text: txt,
                url: window.location.href
            });
        }
    }


    /* ================================
       COPIAR LINK
    =================================*/
    function copyRef() {
        navigator.clipboard.writeText(document.getElementById('refLink').innerText);
        alert("Link de Afiliado copiado!");
    }


    /* ================================
       INICIAR APP
    =================================*/
    init();
</script>
</body>
</html>
