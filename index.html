<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Network v33.12 - Top Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; }
        
        /* Cabeçalhos Fixos */
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 500; height: 60px; background: white; border-bottom: 1px solid #dadce0; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { position: fixed; top: 60px; left: 0; right: 0; z-index: 400; height: 30px; background: #f8f9fa; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 9px; text-transform: uppercase; color: var(--g-green); }
        
        /* Publicador Fixado e Reduzido */
        .publisher-fixed { position: fixed; top: 90px; left: 0; right: 0; z-index: 300; background: white; border-bottom: 2px solid #dadce0; padding: 8px 12px; }
        #mini-pub { display: flex; align-items: center; gap: 10px; background: #f1f3f4; border-radius: 20px; padding: 6px 15px; cursor: pointer; }
        #mini-pub span { font-size: 11px; color: #5f6368; text-transform: uppercase; }
        
        #expanded-post { display: none; background: white; padding: 5px 0; }
        #post-input { width: 100%; border: none; outline: none; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; min-height: 40px; }
        #post-url { width: 100%; border: 1px solid #e8eaed; border-radius: 8px; padding: 5px 10px; font-size: 10px; outline: none; margin-bottom: 8px; }
        
        /* Ajuste do Feed para não ficar por baixo do topo fixo */
        #feed-container { margin-top: 160px; padding: 12px; }
        
        /* Estilo dos Cards */
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
        .stat-bubble { display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; background: #e8f0fe; font-size: 10px; color: #1967d2; font-weight: 900; }
        .interaction-btn { flex: 1; padding: 10px 0; font-size: 10px; font-weight: 900; color: #5f6368; text-transform: uppercase; text-align: center; }
        .comment-item { background: #f1f3f4; border-radius: 10px; padding: 6px 10px; margin-bottom: 4px; font-size: 11px; width: fit-content; }
        
        /* Barra de Navegação */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #dadce0; display: flex; height: 60px; z-index: 500; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; text-transform: uppercase; color: #5f6368; }
        .nav-item.active { color: var(--g-blue); }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">S</div>
            <span class="text-[10px] font-black uppercase text-blue-600">Social Network</span>
        </div>
        <div class="text-right">
            <div id="main-balance" class="text-lg font-black text-green-600">0.0000€</div>
        </div>
    </header>

    <div class="status-bar">
        <span id="multiplier-tag">Modo Normal (100% Ganhos)</span>
    </div>

    <div class="publisher-fixed">
        <div id="mini-pub" onclick="expandPublisher()">
            <div class="w-6 h-6 bg-gray-300 rounded-full"></div>
            <span>Partilhe algo novo...</span>
        </div>
        
        <div id="expanded-post">
            <textarea id="post-input" placeholder="O QUE ESTÁ A PENSAR?"></textarea>
            <input id="post-url" type="text" placeholder="URL DA IMAGEM">
            <div class="flex gap-2">
                <button onclick="collapsePublisher()" class="flex-1 text-[10px] uppercase font-black text-gray-400">Fechar</button>
                <button onclick="handleInteraction('post')" class="flex-[2] bg-blue-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Publicar</button>
            </div>
        </div>
    </div>

    <main id="feed-container"></main>

    <nav>
        <button onclick="location.reload()" class="nav-item active">Feed</button>
        <button class="nav-item">Carteira</button>
        <button class="nav-item">Menu</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        let activeID = localStorage.getItem('apex_uid') || "5401881400"; // Test ID

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = "";

            posts.forEach(p => {
                const cms = p.comments || [];
                container.innerHTML += `
                <div class="google-card">
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-7 h-7 bg-gray-200 rounded-full flex items-center justify-center text-[9px]">👤</div>
                            <span class="text-[10px] font-black text-blue-600 uppercase">${p.user_id}</span>
                        </div>
                        <p class="text-xs font-bold mb-3">${p.content}</p>
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-lg mb-3 border">` : ''}
                        
                        <div class="flex justify-between items-center mb-2">
                            <div class="stat-bubble">👍 ${Math.floor(Math.random()*15)}</div>
                            <div class="text-[9px] text-gray-400 uppercase font-black">${cms.length} comentários</div>
                        </div>

                        <div class="flex border-y border-gray-50 mb-3">
                            <button onclick="handleInteraction('like')" class="interaction-btn">Gosto</button>
                            <button onclick="document.getElementById('in-${p.id}').focus()" class="interaction-btn border-x">Comentar</button>
                            <button onclick="handleInteraction('share')" class="interaction-btn">Partilhar</button>
                        </div>

                        <div class="space-y-1 mb-3">
                            ${cms.slice(0, 3).map(c => `<div class="comment-item"><strong>${c.user}:</strong> ${c.text}</div>`).join('')}
                        </div>

                        <div class="flex gap-2">
                            <input id="in-${p.id}" type="text" placeholder="Escreva..." class="flex-1 bg-gray-100 rounded-full px-3 py-1 text-[10px] outline-none">
                            <button onclick="addComment('${p.id}')" class="bg-blue-600 text-white px-3 rounded-full text-[9px] font-black uppercase">Ok</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        async function addComment(pid) {
            const input = document.getElementById(`in-${pid}`);
            if(!input.value) return;
            const { data: p } = await sb.from('posts').select('comments').eq('id', pid).single();
            let cms = p.comments || [];
            cms.push({ user: activeID, text: input.value });
            await sb.from('posts').update({ comments: cms }).eq('id', pid);
            input.value = "";
            loadFeed();
        }

        function expandPublisher() {
            document.getElementById('mini-pub').style.display = 'none';
            document.getElementById('expanded-post').style.display = 'block';
        }

        function collapsePublisher() {
            document.getElementById('mini-pub').style.display = 'flex';
            document.getElementById('expanded-post').style.display = 'none';
        }

        async function handleInteraction(type) {
            if(type === 'post') {
                const content = document.getElementById('post-input').value;
                const img = document.getElementById('post-url').value;
                if(!content) return;
                await sb.from('posts').insert([{ user_id: activeID, content, image_url: img }]);
                collapsePublisher();
                loadFeed();
            }
            // A lógica de ganhos e anúncios continua processada em background
        }

        loadFeed();
    </script>
</body>
</html>
