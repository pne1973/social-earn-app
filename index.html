<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social v32 - Global Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; --success: #2e7d32; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        header { 
            background: white; padding: 15px; border-bottom: 1px solid #dadce0; 
            position: sticky; top: 0; z-index: 100; text-align: center;
        }
        .balance-group { font-size: 1.5rem; font-weight: 700; color: var(--success); margin-bottom: 5px; }
        .status-msg { font-size: 0.75rem; color: #70757a; text-transform: uppercase; letter-spacing: 1px; }

        .feed { max-width: 500px; margin: 20px auto; padding: 0 10px; }
        .post { 
            background: white; border: 1px solid #dadce0; border-radius: 12px; 
            margin-bottom: 20px; padding: 16px; box-shadow: 0 1px 2px rgba(60,64,67,0.3);
        }
        .post img { width: 100%; border-radius: 8px; margin-top: 12px; display: block; object-fit: cover; max-height: 400px; }
        
        .actions { 
            display: flex; justify-content: space-around; 
            margin-top: 15px; border-top: 1px solid #eee; padding-top: 12px; 
        }
        .btn-action { 
            background: none; border: none; color: var(--primary); 
            cursor: pointer; font-weight: 600; font-size: 0.9rem; padding: 10px;
            display: flex; align-items: center; gap: 8px; border-radius: 8px;
        }
        .btn-action:hover { background: #f1f3f4; }
    </style>
</head>
<body>

<header>
    <div class="balance-group" id="balance-display">---</div>
    <div class="status-msg" id="sync-status">Sincronizando...</div>
</header>

<div class="feed" id="feed">
    <div style="text-align:center; padding:50px; color:#70757a;">Carregando conteúdo global...</div>
</div>

    const MASTER_ID = "5401881400"; 
    let user = { saldo: 0.0000, multiplier: 1.0 };

    const TAXAS = { "BRL": 6.12, "USD": 1.08, "GBP": 0.84, "EUR": 1.00 };

    // 3. INICIALIZAÇÃO
    async function init() {
        const { data, error } = await sb
            .from('perfis')
            .select('saldo')
            .eq('id', MASTER_ID)
            .single();

        if (data) {
            user.saldo = parseFloat(data.saldo) || 0;
        }

        updateUI();
        loadFeed();
    }

    // 4. INTERFACE INTELIGENTE (DETETA PAÍS E MOEDA)
    function updateUI() {
        const locale = navigator.language || "pt-PT";
        const region = new Intl.Locale(locale).region || "PT";
        
        // Seleção de Moeda Automática
        let moeda = "EUR";
        if (region === "BR") moeda = "BRL";
        else if (region === "US") moeda = "USD";
        else if (region === "GB") moeda = "GBP";

        const taxa = TAXAS[moeda] || 1.0;
        const valorConvertido = user.saldo * taxa;

        // Formatação Internacional
        const formatador = new Intl.NumberFormat(locale, {
            style: 'currency',
            currency: moeda,
            minimumFractionDigits: (moeda === 'EUR' ? 4 : 2)
        });

        document.getElementById('balance-display').innerText = formatador.format(valorConvertido);
        document.getElementById('sync-status').innerText = "Sincronizado • " + region;
        
        // Atualizar textos dos botões no Feed
        traduzirBotoes(region);
    }
