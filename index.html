<script>
    const SB_URL = 'https://fickstyevektwbdgimapy.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let user = null;

    async function entrar() {
        const idInput = document.getElementById('login-id').value.trim();
        if(!idInput) return;

        // Tenta buscar o perfil existente
        const { data: perfil, error: fetchError } = await sb
            .from('perfis')
            .select('*')
            .eq('id', idInput)
            .maybeSingle();

        if (fetchError) {
            console.error("Erro Supabase:", fetchError);
            alert("Erro de conexão ou RLS. Verifique o console.");
            return;
        }

        if (perfil) {
            // Se o perfil existe (como o seu ID 123), entra direto
            user = perfil;
            iniciarApp();
        } else {
            // Se NÃO existe, tenta criar
            const { data: novo, error: createError } = await sb
                .from('perfis')
                .insert([{ id: idInput, nome: 'Novo_User', saldo_eur: 0 }])
                .select().single();

            if (createError) {
                alert("Erro RLS: A tabela 'perfis' não permite criar novos usuários via código.");
                return;
            }
            user = novo;
            iniciarApp();
        }
    }

    function iniciarApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('nav-header').classList.remove('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        
        // Exibe o saldo_eur que vimos no seu print
        document.getElementById('val-saldo').innerText = Number(user.saldo_eur || 0).toFixed(4);
        carregarFeed();
    }

    async function carregarFeed() {
        // Usa a tabela 'posts' e colunas reais
        const { data: posts } = await sb.from('posts').select('*').order('created_at', { ascending: false });
        
        if(posts) {
            document.getElementById('feed-container').innerHTML = posts.map(p => `
                <div class="fb-card">
                    <div class="card-header">
                        <div class="avatar"></div>
                        <div class="user-info">
                            <div class="user-name">${p.username || 'Anónimo'}</div>
                            <div class="post-meta">ID: ${p.user_id}</div>
                        </div>
                    </div>
                    <div class="card-body">${p.content || ''}</div>
                    <div class="card-actions">
                        <div class="act-btn" onclick="ganhar(0.0006)"><i class="fa-regular fa-thumbs-up"></i> Gosto</div>
                    </div>
                </div>
            `).join('');
        }
    }

    async function ganhar(v) {
        user.saldo_eur = (Number(user.saldo_eur) || 0) + v;
        await sb.from('perfis').update({ saldo_eur: user.saldo_eur }).eq('id', user.id);
        document.getElementById('val-saldo').innerText = user.saldo_eur.toFixed(4);
    }
</script>
