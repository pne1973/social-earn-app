<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Social - Full Functional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8f9fa; color: #202124; font-family: 'Roboto', sans-serif; padding-top: 235px; }

        /* HEADER & ADS */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; z-index: 99999; background: #fff; border-bottom: 1px solid #dadce0; }
        .ad-top { background: #ffd600; color: #000; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #000; }
        .blue-bar { background: #1a73e8; color: #fff; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0; text-align: center; border-bottom: 1px solid #f1f3f4; background: #fff; }
        .stats b { display: block; color: #1a73e8; font-size: 11px; }
        .stats label { font-size: 8px; color: #70757a; text-transform: uppercase; margin-bottom: 2px; }

        .tabs { display: flex; background: #fff; border-bottom: 1px solid #dadce0; }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; color: #5f6368; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; }
        .tab.admin-tab { color: #d93025; }

        .container { max-width: 500px; margin: 0 auto; padding: 12px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card { background: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #f1f3f4; padding-bottom: 8px; }
        .avatar { width: 32px; height: 32px; background: #e8f0fe; border: 2px solid #1a73e8; border-radius: 50%; color: #1a73e8; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .post-img-box { width: 100%; height: 150px; overflow: hidden; border-radius: 6px; margin: 10px 0; border: 1px solid #eee; }
        .post-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .post-actions { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #f1f3f4; padding-top: 12px; margin-top: 10px; }
        .btn-act { background: none; border: none; font-size: 11px; color: #5f6368; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-act i { color: #1a73e8; font-size: 16px; }
        .btn-del { color: #d93025 !important; }

        .ad-container { background: #e7f3ff; border: 1px solid #dadce0; padding: 15px; border-radius: 8px; margin-bottom: 12px; text-align: center; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="ad-top">▲ MONETIZAÇÃO ATIVA: CLIQUE E GANHE ▲</div>
        <div class="blue-bar">APEX SOCIAL NETWORK</div>
        <div class="stats">
            <div><label>Meus XP</label><b id="stXP">0</b></div>
            <div><label>Saldo EUR</label><b id="stEUR">0.0000€</b></div>
            <div><label>Dívida</label><b id="stDebt" style="color:#d93025;">0.00€</b></div>
            <div><label>Estado</label><b id="stNet" style="color:#1e8e3e;">ONLINE</b></div>
        </div>
        <nav class="tabs">
            <div class="tab active" onclick="showTab('explorar', this)">Explorar</div>
            <div class="tab" onclick="showTab('rede', this)">Rede</div>
            <div class="tab" onclick="showTab('info', this)">Info</div>
            <div class="tab admin-tab" onclick="showTab('master', this)">Master</div>
        </nav>
    </header>

    <main class="container">
        
        <section id="view-explorar" class="view-section active">
            <div class="card">
                <textarea id="postContent" style="width:100%; border:none; outline:none; font-size:15px; min-height:60px;" placeholder="No que está a pensar?"></textarea>
                <div style="text-align:right; margin-top:10px;">
                    <button onclick="createPost()" style="background:#1a73e8; color:#fff; border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">PUBLICAR (+15 XP)</button>
                </div>
            </div>
            <div id="mainFeed"></div>
        </section>

        <section id="view-rede" class="view-section">
            <div class="card">
                <h3>O seu Link de Convite</h3>
                <p id="inviteLink" style="font-size:11px; color:#1a73e8; font-weight:bold; margin:15px 0;">https://apex.social/ref/5401881400</p>
                <button onclick="copyInvite()" style="width:100%; background:#1a73e8; color:#fff; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">COPIAR E GANHAR 100 XP</button>
            </div>
        </section>

        <section id="view-info" class="view-section">
            <div class="card">
                <h3>Regras de Ganhos</h3>
                <p style="font-size:12px;">1 XP = 0.0001€</p>
                <p style="font-size:12px; color:red; font-weight:bold;">Levantamento mínimo: 5.000 XP</p>
            </div>
        </section>

        <section id="view-master" class="view-section">
            <div class="card" style="border:1px solid #d93025;">
                <h3 style="color:#d93025;">Painel Master (Admin)</h3>
                <p>Dívida Atual: <b id="masterDebtDisplay">0.00€</b></p>
            </div>
        </section>

    </main>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const client = supabase.createClient(SB_URL, SB_KEY);

        let myXP = 0;

        function updateUI() {
            const eur = (myXP * 0.0001).toFixed(4);
            document.getElementById('stXP').innerText = myXP;
            document.getElementById('stEUR').innerText = eur + "€";
            document.getElementById('masterDebtDisplay').innerText = eur + "€";
        }

        function showTab(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            el.classList.add('active');
        }

        async function createPost() {
            const content = document.getElementById('postContent').value;
            if(!content) return alert("Escreva algo!");
            
            const { error } = await client.from('posts').insert([{ content: content }]);
            if(!error) {
                myXP += 15;
                document.getElementById('postContent').value = "";
                updateUI();
                loadFeed();
            }
        }

        async function deletePost(id) {
            if(confirm("Deseja eliminar este post?")) {
                const { error } = await client.from('posts').delete().eq('id', id);
                if(!error) loadFeed();
            }
        }

        function giveLike() {
            myXP += 2;
            updateUI();
            alert("Ganhou +2 XP por interagir!");
        }

        function copyInvite() {
            const link = document.getElementById('inviteLink').innerText;
            navigator.clipboard.writeText(link);
            myXP += 100;
            updateUI();
            alert("Link copiado! +100 XP creditados.");
        }

        async function loadFeed() {
            const { data: posts } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const f = document.getElementById('mainFeed');
            f.innerHTML = "";
            posts?.forEach((p, i) => {
                if (i > 0 && i % 3 === 0) f.innerHTML += `<div class="ad-container"><p style="font-size:10px; font-weight:bold; color:#1a73e8;">ANÚNCIO APEX</p></div>`;
                
                f.innerHTML += `
                    <div class="card">
                        <div class="post-header">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="avatar">A</div>
                                <span style="font-size:13px; font-weight:bold; color:#1a73e8;">Utilizador Apex</span>
                            </div>
                            <span style="font-size:9px; color:#777;">#${p.id}</span>
                        </div>
                        <p style="font-size:14px;">${p.content || ''}</p>
                        ${p.image_url ? `<div class="post-img-box"><img src="${p.image_url}"></div>` : ''}
                        <div class="post-actions">
                            <button class="btn-act" onclick="giveLike()"><i class="far fa-heart"></i> Gosto</button>
                            <button class="btn-act"><i class="far fa-comment"></i> Comentar</button>
                            <button class="btn-act btn-del" onclick="deletePost(${p.id})"><i class="fas fa-times"></i> Apagar</button>
                        </div>
                    </div>`;
            });
        }

        updateUI();
        loadFeed();
    </script>
</body>
</html>
