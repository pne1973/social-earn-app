<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v35.000</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .google-card { background: white; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* PUBLISHER FIXO */
        .sticky-pub { position: fixed; top: 72px; left: 0; right: 0; z-index: 40; background: #f1f3f4; padding: 12px 16px; }
        
        /* COMENTÁRIOS */
        .comment-area { display: none; background: #f8f9fa; border-top: 2px solid #eee; padding: 15px; }
        .comment-area.open { display: block; }
        .c-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .c-bubble { background: white; padding: 10px; border-radius: 12px; border: 1px solid #e0e0e0; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        
        .badge { position: absolute; top: -5px; right: 15%; background: var(--g-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 900; border: 2px solid white; }
        
        #feed { margin-top: 155px; }
        input, textarea, button { font-weight: 900 !important; text-transform: uppercase; }
    </style>
</head>
<body class="pb-24">

    <header class="fixed top-0 left-0 right-0 bg-white border-b-2 z-50 px-4 py-4 flex justify-between items-center h-[72px]">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic">A</div>
            <h1 class="text-sm font-black text-blue-600">APEX SOCIAL</h1>
        </div>
        <div id="main-eur" class="font-black text-green-600 text-base">0.0000€</div>
    </header>

    <main class="max-w-lg mx-auto p-4">
        <section id="view-social" class="tab-content active">
            <div class="sticky-pub">
                <div class="google-card p-4 border-t-8 border-blue-600 shadow-lg">
                    <textarea id="post-txt" onclick="this.rows=3; document.getElementById('post-extra').classList.remove('hidden')" placeholder="PARTILHAR... (+0.0150€)" class="w-full border-none focus:ring-0 text-xs mb-2 resize-none" rows="1"></textarea>
                    <div id="post-extra" class="hidden text-right">
                        <input id="post-img" type="text" placeholder="URL DA IMAGEM" class="w-full bg-gray-100 border-none text-[10px] p-3 rounded-xl mb-4 outline-none">
                        <button onclick="enviarPost()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-[11px]">PUBLICAR</button>
                    </div>
                </div>
            </div>
            <div id="feed"></div>
        </section>

        <section id="view-info" class="tab-content">
            <div class="google-card p-12 text-center border-t-[10px] border-blue-600 mt-4">
                <h1 id="wall-eur" class="text-5xl font-black text-blue-600">0.0000€</h1>
                <p class="text-[10px] text-gray-400 mt-4">SALDO TOTAL</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 flex justify-around items-center h-20 z-50">
        <button onclick="tab('social')" class="flex-1 py-2 font-black text-[10px] text-blue-600">REDE</button>
        <button onclick="tab('info')" class="flex-1 py-2 font-black text-[10px] text-gray-400">GANHOS</button>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const MASTER_ID = "5401881400";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let saldo = 0;

        async function init() {
            const { data } = await sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) saldo = Number(data.saldo);
            renderUI();
            loadFeed();
        }

        function renderUI() {
            document.getElementById('main-eur').innerText = saldo.toFixed(4) + "€";
            document.getElementById('wall-eur').innerText = saldo.toFixed(4) + "€";
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const feed = document.getElementById('feed');
            feed.innerHTML = "";

            for (const p of posts) {
                const { count } = await sb.from('comentarios').select('*', { count: 'exact', head: true }).eq('post_id', p.id);
                
                const div = document.createElement('div');
                div.className = "google-card p-6";
                div.innerHTML = `
                    <p class="text-[10px] text-gray-400 mb-2">ID..${String(p.user_id).slice(-4)}</p>
                    <p class="text-[13px] text-gray-800 mb-3 uppercase">${p.content}</p>
                    ${p.image_url ? `<img src="${p.image_url}" class="w-full rounded-xl mb-4 border">` : ''}
                    
                    <div class="flex justify-between border-t pt-4 relative">
                        <button onclick="pagar(0.0006)" class="flex-1 text-center"><span class="text-xl">👍</span><br><span class="text-[8px]">GOSTAR</span></button>
                        
                        <button onclick="abrirComentarios('${p.id}')" class="flex-1 text-center relative border-x">
                            <div id="badge-${p.id}" class="badge">${count || 0}</div>
                            <span class="text-xl">💬</span><br><span class="text-[8px]">COMENTAR</span>
                        </button>
                        
                        <button onclick="pagar(0.0002)" class="flex-1 text-center"><span class="text-xl">🔗</span><br><span class="text-[8px]">PARTILHAR</span></button>
                    </div>

                    <div id="area-${p.id}" class="comment-area">
                        <div id="list-${p.id}" class="c-list"></div>
                        <div class="flex gap-2">
                            <input id="in-${p.id}" type="text" placeholder="ESCREVER..." class="flex-1 text-[11px] p-3 border-2 rounded-xl outline-none">
                            <button onclick="enviarComentario('${p.id}')" class="bg-blue-600 text-white px-5 rounded-xl text-[10px]">OK</button>
                        </div>
                    </div>
                `;
                feed.appendChild(div);
            }
        }

        async function abrirComentarios(id) {
            const area = document.getElementById(`area-${id}`);
            const list = document.getElementById(`list-${id}`);
            
            if(area.classList.contains('open')) {
                area.classList.remove('open');
            } else {
                area.classList.add('open');
                list.innerHTML = "<p class='text-[9px] text-center py-2'>A CARREGAR...</p>";
                const { data } = await sb.from('comentarios').select('*').eq('post_id', id).order('created_at', {ascending: true});
                list.innerHTML = data.map(c => `<div class="c-bubble"><p class="text-[8px] text-blue-600 mb-1">ID..${String(c.user_id).slice(-4)}</p>${c.content}</div>`).join('') || "<p class='text-[9px] text-center py-2'>SEM COMENTÁRIOS</p>";
                list.scrollTop = list.scrollHeight;
            }
        }

        async function enviarComentario(id) {
            const input = document.getElementById(`in-${id}`);
            const list = document.getElementById(`list-${id}`);
            const val = input.value.trim();
            if(!val) return;

            // Inserir no Supabase
            const { error } = await sb.from('comentarios').insert([{ post_id: id, user_id: MASTER_ID, content: val }]);
            
            if(!error) {
                // Atualizar lista visualmente NA HORA
                if(list.innerText.includes("SEM COMENTÁRIOS")) list.innerHTML = "";
                const novo = document.createElement('div');
                novo.className = "c-bubble";
                novo.innerHTML = `<p class="text-[8px] text-blue-600 mb-1">ID..${String(MASTER_ID).slice(-4)}</p>${val}`;
                list.appendChild(novo);
                
                // Limpar input e atualizar badge
                input.value = "";
                const b = document.getElementById(`badge-${id}`);
                b.innerText = parseInt(b.innerText) + 1;
                
                list.scrollTop = list.scrollHeight;
                pagar(0.0010);
            }
        }

        async function pagar(valor) {
            saldo += valor;
            renderUI();
            await sb.from('perfis').update({ saldo: saldo }).eq('id', MASTER_ID);
        }

        async function enviarPost() {
            const t = document.getElementById('post-txt').value;
            const i = document.getElementById('post-img').value;
            if(!t) return;
            await sb.from('posts').insert([{ user_id: MASTER_ID, content: t, image_url: i }]);
            location.reload();
        }

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
