<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v105</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; -webkit-tap-highlight-color: transparent; margin: 0; }
        .google-blue { color: #4285F4; }
        .google-bg-blue { background-color: #4285F4; }
        .nav-btn.active { color: #4285F4 !important; border-top: 3px solid #4285F4; font-weight: 900; background: #f8f9fa; }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 16px; border: 1px solid #dadce0; margin-bottom: 12px; overflow: hidden; }
        .ad-slot { background: #fffde7; border: 1px dashed #fbc02d; text-align: center; padding: 15px; border-radius: 12px; margin: 10px 0; font-size: 10px; font-weight: 900; color: #856404; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div class="animate-spin rounded-full h-10 w-10 border-t-4 border-blue-500"></div></div>

    <header class="sticky top-0 bg-white border-b z-50 px-5 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black google-blue italic tracking-tighter">APEX SOCIAL</h1>
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">v60 Production</p>
        </div>
        <div class="text-right">
            <span id="bal-eur" class="font-black text-green-600 text-lg">0.0000€</span>
            <p id="bal-brl" class="text-[9px] font-bold text-gray-400 uppercase">0.0000 BRL</p>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <div id="view-feed" class="tab-content active">
            <div class="card p-4 bg-gradient-to-r from-blue-600 to-blue-400 text-white flex justify-between items-center mb-4">
                <div><p class="text-[9px] font-black uppercase">Sessão Turbo</p><p id="bonus-count" class="text-sm font-black italic">🔥 15 Ações</p></div>
                <button onclick="changeTab('wallet')" class="bg-white text-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase font-bold shadow-md">Recarregar</button>
            </div>
            
            <div class="card p-4">
                <textarea id="post-input" placeholder="O que vais partilhar? (+0,0150€)" class="w-full text-sm border-none focus:ring-0 p-0 mb-3" rows="2"></textarea>
                <div class="flex space-x-2">
                    <button onclick="handlePost()" class="flex-1 google-bg-blue text-white py-3 rounded-xl font-black text-[10px] uppercase">Publicar</button>
                    <button onclick="handleShare()" class="bg-gray-100 px-4 rounded-xl font-black text-[10px] uppercase border">Partilhar</button>
                </div>
            </div>

            <div class="ad-slot">[ ADSTERRA NATIVE FEED ]</div>
            <div id="feed-list" class="space-y-4"></div>
        </div>

        <div id="view-wallet" class="tab-content">
            <div class="card p-10 text-center mb-4 border-b-4 border-green-500">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Saldo Atual</p>
                <h1 id="wall-eur" class="text-5xl font-black google-blue tracking-tighter">0.0000€</h1>
            </div>
            <div class="card p-5 space-y-4 text-center">
                <button onclick="syncAd()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-xs uppercase shadow-xl italic">Sincronizar (Ver Vídeo)</button>
                <button onclick="handleReward(0.0500)" class="w-full border-2 border-green-500 text-green-600 py-4 rounded-2xl font-black text-[10px] uppercase">Check-in (+0,0500€)</button>
                <div class="ad-slot">[ BANNER ADSTERRA 320X50 ]</div>
            </div>
        </div>

        <div id="view-friends" class="tab-content">
            <div class="card p-6 border-l-4 border-blue-500">
                <h2 class="font-black text-sm uppercase google-blue mb-1">Convida Amigos</h2>
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-6">Ganha 10% de comissão sobre a tua rede.</p>
                <div class="bg-gray-50 p-4 rounded-xl border border-dashed mb-6 text-[9px] font-mono text-blue-500 italic break-all" id="ref-url">A carregar link...</div>
                <button onclick="handleShare()" class="w-full google-bg-blue text-white py-4 rounded-2xl font-black text-[10px] uppercase">Copiar Convite</button>
            </div>
        </div>

        <div id="view-profile" class="tab-content">
            <div class="card p-6 text-center">
                <div class="w-16 h-16 bg-gray-100 rounded-full mx-auto mb-4 border-2 border-blue-400 flex items-center justify-center font-black text-gray-300 italic">#</div>
                <p class="font-black text-[12px] uppercase mb-8">ID: 5401881400</p>
                <div class="space-y-3">
                    <button onclick="changeTab('wallet')" class="w-full bg-white py-4 border rounded-xl text-[9px] font-black uppercase">Ativar Autopost</button>
                    <button onclick="changeTab('wallet')" class="w-full bg-white py-4 border rounded-xl text-[9px] font-black uppercase shadow-sm">Reset de Nível Diário</button>
                    <button onclick="changeTab('wallet')" class="w-full bg-white py-4 border rounded-xl text-[9px] font-black uppercase shadow-sm">Validar Bio</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="tab-content">
            <div class="card p-6 border-2 border-red-500 bg-red-50 text-center">
                <h2 class="text-red-600 font-black text-xs uppercase mb-6 tracking-widest italic">Painel Admin Master</h2>
                <button class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg mb-4">Ver Levantamentos</button>
                <input placeholder="ID do Post" id="del-id" class="w-full border p-3 rounded-lg text-xs mb-2">
                <button onclick="alert('Post Removido')" class="w-full bg-black text-white py-2 rounded-lg text-[10px] font-black uppercase">Eliminar Post</button>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-1 z-40 shadow-2xl">
        <button onclick="changeTab('feed')" id="btn-feed" class="nav-btn flex-1 flex flex-col items-center p-3 text-gray-400 active"><span class="text-[10px] font-black uppercase">Feed</span></button>
        <button onclick="changeTab('wallet')" id="btn-wallet" class="nav-btn flex-1 flex flex-col items-center p-3 text-gray-400"><span class="text-[10px] font-black uppercase">Carteira</span></button>
        <button onclick="changeTab('friends')" id="btn-friends" class="nav-btn flex-1 flex flex-col items-center p-3 text-gray-400"><span class="text-[10px] font-black uppercase">Amigos</span></button>
        <button onclick="changeTab('profile')" id="btn-profile" class="nav-btn flex-1 flex flex-col items-center p-3 text-gray-400"><span class="text-[10px] font-black uppercase">Perfil</span></button>
        <button onclick="changeTab('admin')" id="btn-admin" class="nav-btn hidden flex-1 flex flex-col items-center p-3 text-red-300 italic"><span class="text-[10px] font-black uppercase">Admin</span></button>
    </nav>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = ""; 
        const supabase =eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY window.supabase.createClient(SB_URL, SB_KEY);
        const UID = "5401881400";

        let state = { saldo: 0, bonus: 15 };

        // 1. NAVEGAÇÃO (Independente do Banco de Dados)
        function changeTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            window.scrollTo(0, 0);
        }

        // 2. LOGICA DE DADOS
        async function boot() {
            if (UID === "5401881400") document.getElementById('btn-admin').classList.remove('hidden');
            document.getElementById('ref-url').innerText = `https://apex-social.onrender.com/?ref=${UID}`;
            
            try {
                const { data: p } = await supabase.from('perfis').select('*').eq('id', UID).single();
                if (p) state = p;
                
                const { data: ps } = await supabase.from('posts').select('*').order('created_at', { ascending: false }).limit(10);
                renderFeed(ps || []);
            } catch (e) { console.log("Erro de conexão Supabase"); }
            
            updateUI();
        }

        function updateUI() {
            const val = state.saldo.toFixed(4);
            document.getElementById('bal-eur').innerText = val + "€";
            document.getElementById('wall-eur').innerText = val + "€";
            document.getElementById('bal-brl').innerText = (state.saldo * 6.1245).toFixed(4) + " BRL";
            document.getElementById('bonus-count').innerText = `🔥 ${state.bonus} Ações`;
        }

        function renderFeed(data) {
            const feed = document.getElementById('feed-list');
            feed.innerHTML = data.map(p => `
                <div class="card p-4">
                    <p class="text-[9px] font-black text-gray-400 uppercase mb-2">User #${p.user_id.slice(-4)}</p>
                    <p class="text-xs text-gray-700 font-medium mb-4">${p.content}</p>
                    <button onclick="handleReward(0.0015)" class="w-full border py-2 rounded-lg text-[9px] font-black uppercase text-blue-500 italic">Gostar (+0,0015€)</button>
                </div>
            `).join('<div class="ad-slot py-3">PUBLICIDADE ADSTERRA</div>');
        }

        async function handleReward(amt) {
            if (state.bonus <= 0) return alert("Bónus Expirado! Sincronize na Carteira.");
            state.saldo += amt;
            state.bonus--;
            updateUI();
            await supabase.from('perfis').upsert({ id: UID, saldo: state.saldo, bonus: state.bonus });
        }

        async function handlePost() {
            const txt = document.getElementById('post-input').value;
            if (!txt) return;
            document.getElementById('loader').style.display = 'flex';
            const { error } = await supabase.from('posts').insert([{ user_id: UID, content: txt }]);
            if (!error) {
                document.getElementById('post-input').value = "";
                await handleReward(0.0150);
                boot();
            }
            document.getElementById('loader').style.display = 'none';
        }

        function handleShare() {
            const m = `Vem faturar no Apex Social! Link: https://apex-social.onrender.com/?ref=${UID}`;
            if (navigator.share) navigator.share({ title: 'Apex', text: m });
            else window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(m)}`);
        }

        function syncAd() {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(async () => {
                state.bonus = 15;
                updateUI();
                await supabase.from('perfis').upsert({ id: UID, bonus: 15 });
                document.getElementById('loader').style.display = 'none';
                changeTab('feed');
            }, 2000);
        }

        window.onload = boot;
    </script>
</body>
</html>
