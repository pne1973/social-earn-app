<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Social - v33.13</title>
    <style>
        :root {
            --google-blue: #4285F4;
            --fb-bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-main: #1C1E21;
            --text-secondary: #65676B;
            --border-color: #CED0D4;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fb-bg);
            color: var(--text-main);
            margin: 0;
            padding-top: 60px;
        }

        /* Banner de Monetização Fixo */
        #monetization-top {
            position: fixed;
            top: 0;
            width: 100%;
            height: 50px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Card de Post estilo Facebook */
        .post-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
            padding: 12px;
            border: 1px solid var(--border-color);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            margin-right: 10px;
        }

        .post-meta {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
        }

        .post-time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .post-content {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 12px;
            word-wrap: break-word;
        }

        .post-image {
            width: calc(100% + 24px);
            margin-left: -12px;
            max-height: 500px;
            object-fit: cover;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .post-actions {
            display: flex;
            border-top: 1px solid #eee;
            margin-top: 10px;
            padding-top: 5px;
        }

        .action-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
        }

        .action-btn:hover {
            background-color: rgba(0,0,0,0.05);
        }

        /* Ad Injection Style */
        .ad-container {
            background: #f9f9f9;
            text-align: center;
            padding: 15px;
            margin-bottom: 16px;
            border-radius: 8px;
            font-size: 12px;
            color: #999;
            border: 1px dashed #ccc;
        }

        /* Status de Processamento */
        #status-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status-overlay">Processando...</div>

    <div id="monetization-top">
        <span>Publicidade Oficial Apex</span>
    </div>

    <div class="feed-container" id="main-feed">
        </div>

    <script>
        // CONFIGURAÇÕES BASE v33.12
        const ADMIN_ID = "5401881400";
        const MIN_WITHDRAWAL = 5000;
        const CONVERSION_RATE = 0.0001; // Exemplo para 4 casas decimais
        
        let posts = [];
        let postCount = 0;

        // FUNÇÃO DE RENDERIZAÇÃO ESTILO FACEBOOK
        function renderPosts(data) {
            const feed = document.getElementById('main-feed');
            
            data.forEach((post, index) => {
                const postElement = document.createElement('div');
                postElement.className = 'post-card';
                postElement.innerHTML = `
                    <div class="post-header">
                        <div class="user-avatar"></div>
                        <div class="post-meta">
                            <span class="user-name">Usuário ${post.userId}</span>
                            <span class="post-time">ID: ${post.id}</span>
                        </div>
                        ${post.userId === ADMIN_ID ? '<button onclick="deletePost('+post.id+')" style="margin-left:auto">X</button>' : ''}
                    </div>
                    <div class="post-content">${post.text}</div>
                    ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    <div class="post-actions">
                        <button class="action-btn" onclick="likePost(${post.id})">👍 Curtir (+2 XP)</button>
                        <button class="action-btn" onclick="reportPost(${post.id})">🚩 Denunciar</button>
                    </div>
                `;
                feed.appendChild(postElement);

                // Injeção automática de anúncios a cada 3 posts
                if ((index + 1) % 3 === 0) {
                    const ad = document.createElement('div');
                    ad.className = 'ad-container';
                    ad.innerText = "Espaço Publicitário - Apex Social";
                    feed.appendChild(ad);
                }
            });
        }

        // Simulação de Infinite Scroll (10 por vez)
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
                // Lógica para carregar mais 10 posts
            }
        };

        // Gamificação
        function addPoints(type) {
            const points = { 'post': 15, 'friend': 100, 'like': 2, 'checkin': 5 };
            console.log(`Ganhou ${points[type]} XP`);
        }

        // Compressão de Imagem < 500KB
        async function processImage(file) {
            document.getElementById('status-overlay').style.display = 'flex';
            // Lógica de compressão aqui
            document.getElementById('status-overlay').style.display = 'none';
        }

        // Inicialização
        console.log("Apex Social v33.13 carregado para ID:", ADMIN_ID);
    </script>
</body>
</html>
