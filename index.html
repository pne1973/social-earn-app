<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.15 - Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; margin: 0; padding-top: 185px; padding-bottom: 80px; }

        header { position: fixed; top: 0; width: 100%; z-index: 1000; height: 60px; background: white; border-bottom: 1px solid #dadce0; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { position: fixed; top: 60px; width: 100%; z-index: 950; height: 32px; background: white; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--g-green); text-transform: uppercase; }
        .ad-provider { position: fixed; top: 92px; width: 100%; z-index: 900; height: 28px; background: #f8f9fa; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #bdc1c6; text-transform: uppercase; }
        .publisher-zone { position: fixed; top: 120px; width: 100%; z-index: 850; background: white; border-bottom: 1px solid #dadce0; padding: 10px 16px; height: 65px; display: flex; align-items: center; }

        .feed-container { max-width: 550px; margin: 0 auto; padding: 10px; }
        .post-card { background: white; border-radius: 28px; border: 1px solid #dadce0; margin-bottom: 16px; display: flex; overflow: hidden; width: 100%; }
        .post-content { flex: 1; padding: 20px; }
        .post-sidebar { width: 85px; background: #f8f9fa; border-left: 1px solid #f1f3f4; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 15px 0; }

        .icon-btn { width: 46px; height: 46px; background: white; border-radius: 50%; border: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .modal-fullscreen { position: fixed; inset: 0; background: white; z-index: 5000; display: none; flex-direction: column; }
        .modal-header { height: 65px; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .custom-textarea { width: 100%; flex: 1; font-size: 22px; font-weight: 700; border: none; padding: 20px; outline: none; resize: none; text-transform: uppercase; }
        
        .nav-fixed { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 1px solid #dadce0; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #5f6368; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 bg-white z-[7000] flex flex-col items-center justify-center p-10">
        <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black italic mb-10">S</div>
        <input id="login-id" type="number" placeholder="ID (EX: 123)" class="w-full max-w-xs bg-gray-100 p-6 rounded-2xl text-center font-black mb-5 outline-none">
        <button onclick="login()" class="w-full max-w-xs bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs">Aceder</button>
    </div>

    <header>
        <div class="flex items-center gap-2"><div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">S</div><span class="text-[12px] font-black uppercase text-blue-600">Apex Social</span></div>
        <div id="bal-top" class="text-2xl font-black text-green-600">0.0000€</div>
    </header>

    <div class="status-bar">Servidor em Produção • 100% Ganhos</div>
    <div class="ad-provider">Google Adsense Partner</div>

    <div class="publisher-zone">
        <div onclick="openModal('modal-editor')" class="bg-gray-100 rounded-full px-6 py-3 border border-gray-200 w-full flex items-center gap-4">
            <div class="w-7 h-7 bg-gray-300 rounded-full"></div>
            <span class="text-[12px] text-gray-500 font-black uppercase italic">Escreva aqui a sua publicação...</span>
        </div>
    </div>

    <main class="feed-container" id="feed-list"></main>

    <div id="modal-editor" class="modal-fullscreen">
        <div class="modal-header">
            <button onclick="closeModal('modal-editor')" class="text-gray-400 font-black text-xs uppercase">Fechar</button>
            <span class="font-black uppercase text-[13px]">Nova Publicação</span>
            <button onclick="publish()" id="btn-pub" class="text-blue-600 font-black text-xs uppercase">Publicar</button>
        </div>
        <div class="flex flex-col flex-1 p-5">
            <textarea id="post-txt" placeholder="ESCREVA AQUI..." class="custom-textarea"></textarea>
            <input id="post-url" type="text" placeholder="URL DA IMAGEM (OPCIONAL)" class="w-full p-4 bg-gray-100 rounded-xl mb-4 outline-none font-bold text-xs uppercase">
            <div class="text-center p-4 border-t border-gray-100">
                <span class="text-[9px] font-black text-blue-600 uppercase block">Anúncio de Rede Parceira</span>
                <span class="text-[10px] text-gray-400 font-bold uppercase">Ganhos de +0.0150€ ao publicar</span>
            </div>
        </div>
    </div>

    <nav class="nav-fixed">
        <div class="nav-item">Feed</div>
        <div class="nav-item" onclick="location.reload()">Ranking</div>
        <div class="nav-item" onclick="logout()">Sair</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let uID = localStorage.getItem('apex_uid_v33');
        let bal = 0;

        function login() {
            const id = document.getElementById('login-id').value.trim();
            if(!id) return;
            localStorage.setItem('apex_uid_v33', id);
            location.reload();
        }

        async function init() {
            if(!uID) return;
            document.getElementById('auth-screen').classList.add('hidden');
            
            // Tenta carregar perfil, se não existir, cria um
            let { data } = await sb.from('perfis').select('saldo').eq('id', uID).single();
            if(!data) {
                await sb.from('perfis').insert([{ id: uID, saldo: 0 }]);
                bal = 0;
            } else {
                bal = Number(data.saldo);
            }
            
            updateUI();
            await loadFeed();
        }

        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-list');
            container.innerHTML = "";
            if(posts) {
                posts.forEach(p => {
                    container.innerHTML += `
                    <div class="post-card">
                        <div class="post-content">
                            <span class="text-[10px] font-black text-blue-600 uppercase mb-2 block">Utilizador ${p.user_id}</span>
                            <p class="text-[17px] font-bold text-gray-800 uppercase leading-tight">${p.content}</p>
                            ${p.media_url ? `<img src="${p.media_url}" class="w-full rounded-2xl mt-4 border border-gray-100">` : ''}
                        </div>
                        <div class="post-sidebar">
                            <div class="icon-btn" onclick="reward(0.0005)">👍</div>
                            <div class="icon-btn" onclick="reward(0.0005)">💬</div>
                        </div>
                    </div>`;
                });
            }
        }

        async function publish() {
            const txt = document.getElementById('post-txt').value.trim();
            const url = document.getElementById('post-url').value.trim();
            const btn = document.getElementById('btn-pub');

            if(!txt) return alert("Escreva algo antes de publicar.");

            btn.innerText = "A ENVIAR...";
            btn.disabled = true;

            // Tentativa de inserção com tratamento de erro robusto
            const { error } = await sb.from('posts').insert([
                { 
                    user_id: uID.toString(), // Garante que é enviado como string
                    content: txt, 
                    media_url: url || null 
                }
            ]);

            if (error) {
                console.error("Erro detalhado:", error);
                alert("Erro técnico: " + error.message);
                btn.innerText = "PUBLICAR";
                btn.disabled = false;
            } else {
                reward(0.0150);
                closeModal('modal-editor');
                document.getElementById('post-txt').value = "";
                document.getElementById('post-url').value = "";
                btn.innerText = "PUBLICAR";
                btn.disabled = false;
                await loadFeed();
            }
        }

        async function reward(val) {
            bal += val;
            updateUI();
            await sb.from('perfis').upsert({ id: uID, saldo: bal });
        }

        function updateUI() { document.getElementById('bal-top').innerText = bal.toFixed(4) + "€"; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
