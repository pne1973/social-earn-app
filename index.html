<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v33.12 - Final Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; margin: 0; padding-top: 185px; padding-bottom: 80px; }

        /* HEADER & BARS */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; height: 60px; background: white; border-bottom: 1px solid #dadce0; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { position: fixed; top: 60px; width: 100%; z-index: 950; height: 32px; background: white; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--g-green); text-transform: uppercase; }
        .ad-provider { position: fixed; top: 92px; width: 100%; z-index: 900; height: 28px; background: #f8f9fa; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #bdc1c6; text-transform: uppercase; }
        .publisher-zone { position: fixed; top: 120px; width: 100%; z-index: 850; background: white; border-bottom: 1px solid #dadce0; padding: 10px 16px; height: 65px; display: flex; align-items: center; }

        /* FEED - CARDS GRANDES (CORREÇÃO DE TAMANHO) */
        .feed-container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .post-card { background: white; border-radius: 24px; border: 1px solid #dadce0; margin-bottom: 20px; display: flex; overflow: hidden; width: 100%; }
        .post-content { flex: 1; padding: 25px; }
        .post-sidebar { width: 90px; background: #fcfdfe; border-left: 1px solid #f1f3f4; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 25px; padding: 20px 0; }

        .icon-circle { width: 48px; height: 48px; background: white; border-radius: 50%; border: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .count-text { font-size: 11px; font-weight: 900; color: #70757a; text-transform: uppercase; margin-top: 5px; }

        /* MODAIS IDENTICOS (PUBLICAÇÃO E COMENTÁRIOS) */
        .modal-fullscreen { position: fixed; inset: 0; background: white; z-index: 5000; display: none; flex-direction: column; }
        .modal-header { height: 65px; border-bottom: 1px solid #dadce0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: white; }
        .modal-body { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: white; }
        
        .custom-textarea { width: 100%; flex: 1; padding: 25px; font-size: 22px; font-weight: 700; border: none; outline: none; resize: none; text-transform: uppercase; color: #202124; }
        .url-box { padding: 20px; border-top: 1px solid #f1f3f4; background: #fff; }
        .url-input { width: 100%; padding: 18px; background: #f8f9fa; border: 1px solid #dadce0; border-radius: 18px; font-size: 13px; font-weight: 700; outline: none; }

        /* ANÚNCIO NO FUNDO DOS MODAIS */
        .modal-ad-banner { background: #f8f9fa; border-top: 1px solid #e8eaed; padding: 20px; text-align: center; }
        .ad-label { font-size: 9px; font-weight: 900; color: var(--g-blue); text-transform: uppercase; letter-spacing: 1px; }

        /* LISTA DE COMENTÁRIOS */
        .comment-row { padding: 18px 25px; border-bottom: 1px solid #f1f3f4; }
        .comment-input-area { padding: 15px 20px; border-top: 1px solid #dadce0; display: flex; gap: 12px; background: white; align-items: center; }

        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 1px solid #dadce0; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #5f6368; text-transform: uppercase; }
        .nav-item.active { color: var(--g-blue); border-top: 4px solid var(--g-blue); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 bg-white z-[6000] flex flex-col items-center justify-center p-10">
        <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-5xl font-black italic mb-12 shadow-2xl">S</div>
        <input id="login-id" type="text" placeholder="ID DE ACESSO" class="w-full max-w-xs bg-gray-100 p-6 rounded-2xl text-center font-black mb-6 outline-none border-2 border-transparent focus:border-blue-600 text-lg">
        <button onclick="login()" class="w-full max-w-xs bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-sm tracking-widest">Entrar</button>
    </div>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic">S</div>
            <span class="text-[13px] font-black uppercase text-blue-600 tracking-tighter">Apex Social</span>
        </div>
        <div id="bal-top" class="text-2xl font-black text-green-600 tabular-nums">0.0000€</div>
    </header>

    <div class="status-bar">v33.12 FINAL • SERVIDOR EM PRODUÇÃO</div>
    <div class="ad-provider">Network Adsense Partner</div>

    <div class="publisher-zone">
        <div onclick="openModal('modal-editor')" class="bg-gray-100 rounded-full px-7 py-3 border border-gray-200 w-full flex items-center gap-4 cursor-pointer">
            <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
            <span class="text-[13px] text-gray-500 font-black uppercase italic">Partilhe algo novo...</span>
        </div>
    </div>

    <main class="feed-container" id="feed-list"></main>

    <div id="modal-editor" class="modal-fullscreen">
        <div class="modal-header">
            <button onclick="closeModal('modal-editor')" class="text-gray-400 font-black text-xs uppercase">Cancelar</button>
            <span class="font-black uppercase text-sm">Criar Post</span>
            <button onclick="publish()" class="text-blue-600 font-black text-xs uppercase">Publicar</button>
        </div>
        <div class="modal-body">
            <textarea id="post-txt" placeholder="O QUE ESTÁ A PENSAR?" class="custom-textarea"></textarea>
            <div class="url-box">
                <input id="post-url" type="text" placeholder="LINK DA IMAGEM (WEBURL)" class="url-input">
            </div>
        </div>
        <div class="modal-ad-banner">
            <span class="ad-label">Google Adsense Partner</span>
            <p class="text-[10px] font-black text-gray-400 uppercase mt-2 italic">Ganhos: +0.0150€ por envio</p>
        </div>
    </div>

    <div id="modal-comment" class="modal-fullscreen">
        <div class="modal-header">
            <button onclick="closeModal('modal-comment')" class="text-gray-400 font-black text-xs uppercase">Voltar</button>
            <span class="font-black uppercase text-sm">Comentários</span>
            <button onclick="addComment()" class="text-blue-600 font-black text-xs uppercase">Enviar</button>
        </div>
        <div class="modal-body bg-gray-50" id="comment-list">
            </div>
        <div class="modal-ad-banner">
            <span class="ad-label">Publicidade Sugerida</span>
        </div>
        <div class="comment-input-area">
            <input id="comm-txt" type="text" placeholder="ESCREVA UM COMENTÁRIO..." class="flex-1 bg-gray-100 p-5 rounded-2xl font-bold text-xs outline-none uppercase border-2 border-transparent focus:border-blue-600">
        </div>
    </div>

    <nav>
        <div class="nav-item active">Feed</div>
        <div class="nav-item" onclick="location.reload()">Ranking</div>
        <div class="nav-item" onclick="logout()">Sair</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let uID = localStorage.getItem('apex_uid_v33');
        let bal = 0;
        let activePostID = null;

        function login() {
            const id = document.getElementById('login-id').value.trim();
            if(!id) return;
            localStorage.setItem('apex_uid_v33', id);
            location.reload();
        }

        async function init() {
            if(!uID) return;
            document.getElementById('auth-screen').classList.add('hidden');
            const { data } = await sb.from('perfis').select('saldo').eq('id', uID).single();
            if(data) bal = Number(data.saldo);
            updateUI();
            await loadFeed();
        }

        async function loadFeed() {
            const { data: posts, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
            if(error) return;

            const container = document.getElementById('feed-list');
            container.innerHTML = ""; // Limpa o feed para garantir atualização

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    <div class="post-content">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-black text-[11px]">U</div>
                            <span class="text-[13px] font-black text-blue-600 uppercase">Utilizador ${p.user_id}</span>
                        </div>
                        <p class="text-[18px] font-bold text-gray-800 leading-tight uppercase mb-5">${p.content}</p>
                        ${p.media_url ? `<img src="${p.media_url}" class="w-full rounded-3xl border border-gray-100 shadow-sm mb-2">` : ''}
                    </div>
                    <div class="post-sidebar">
                        <div class="flex flex-col items-center" onclick="reward(0.0006)">
                            <div class="icon-circle">👍</div>
                            <span class="count-text">${Math.floor(Math.random()*90)}</span>
                        </div>
                        <div class="flex flex-col items-center" onclick="openComments('${p.id}')">
                            <div class="icon-circle">💬</div>
                            <span class="count-text">Ver</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function publish() {
            const txt = document.getElementById('post-txt').value.trim();
            const url = document.getElementById('post-url').value.trim();
            if(!txt) return alert("Escreva um texto!");

            const { error } = await sb.from('posts').insert([{ user_id: uID, content: txt, media_url: url }]);
            if(!error) {
                reward(0.0150);
                closeModal('modal-editor');
                document.getElementById('post-txt').value = "";
                document.getElementById('post-url').value = "";
                await loadFeed(); // Recarrega feed imediatamente
            }
        }

        async function openComments(postID) {
            activePostID = postID;
            document.getElementById('modal-comment').style.display = 'flex';
            await loadComments();
        }

        async function loadComments() {
            const { data } = await sb.from('comentarios').select('*').eq('post_id', activePostID).order('created_at', {ascending: true});
            const list = document.getElementById('comment-list');
            list.innerHTML = "";
            
            if(!data || data.length === 0) {
                list.innerHTML = `<div class="p-20 text-center opacity-30 font-black uppercase text-xs">Sem comentários ainda</div>`;
                return;
            }

            data.forEach(c => {
                list.innerHTML += `<div class="comment-row">
                    <span class="text-[10px] font-black text-blue-600 block mb-1 uppercase">Utilizador ${c.user_id}</span>
                    <p class="text-sm font-bold uppercase text-gray-700">${c.texto}</p>
                </div>`;
            });
            list.scrollTop = list.scrollHeight;
        }

        async function addComment() {
            const txt = document.getElementById('comm-txt').value.trim();
            if(!txt || !activePostID) return;

            const { error } = await sb.from('comentarios').insert([{ post_id: activePostID, user_id: uID, texto: txt }]);
            if(!error) {
                reward(0.0010);
                document.getElementById('comm-txt').value = "";
                await loadComments();
            }
        }

        function reward(val) {
            bal += val;
            updateUI();
            sb.from('perfis').upsert({ id: uID, saldo: bal });
        }

        function updateUI() { document.getElementById('bal-top').innerText = bal.toFixed(4) + "€"; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
