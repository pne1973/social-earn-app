<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Social v40.5 - Produção</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-green: #34A853; --border: #dadce0; }
        body { font-family: 'Roboto', sans-serif; background: #f1f3f4; color: #3c4043; font-weight: 700; margin: 0; padding-top: 160px; padding-bottom: 85px; }
        
        header { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 1px solid #ddd; z-index: 9999; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .sticky-publisher { position: fixed; top: 72px; left: 0; right: 0; z-index: 999; background: #f1f3f4; padding: 12px 16px; border-bottom: 1px solid #ddd; }
        
        /* Modal de Anúncio - Decisivo */
        #ad-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 350px; overflow: hidden; }
        .modal-header { background: var(--g-blue); color: white; padding: 20px; text-align: center; }
        .modal-body { padding: 20px; text-align: center; }
        
        /* Badges de Interação */
        .counter-badge { position: absolute; top: -2px; right: 15%; background: var(--g-red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid white; font-weight: 900; }
        .interaction-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; cursor: pointer; position: relative; }

        #floating-earning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; display: none; animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); } }
        
        .google-card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="ad-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="text-xl font-black italic">ANÚNCIO APEX</h2>
            </div>
            <div class="modal-body">
                <p class="text-xs font-black uppercase text-gray-500 mb-4 leading-tight">
                    Para continuar a ganhar a <span class="text-green-600">100%</span> e manter a sua conta ativa, visualize o anúncio de patrocinadores.
                </p>
                <div class="bg-gray-100 p-4 rounded-xl mb-6">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Patrocinador Oficial</p>
                    <p class="text-sm font-black text-blue-600 mt-1">APEX SOCIAL ADS v1.0</p>
                </div>
                <div class="space-y-3">
                    <button onclick="closeAd(true)" class="w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase text-xs">Sim, ver anúncio (+100%)</button>
                    <button onclick="closeAd(false)" class="w-full bg-gray-200 text-gray-500 py-3 rounded-xl font-black uppercase text-[10px]">Não, continuar sem bónus</button>
                </div>
            </div>
        </div>
    </div>

    <div id="floating-earning"><div class="text-4xl font-black text-green-500" id="earning-val">+0.0000€</div></div>

    <header>
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-sm">A</div>
            <div>
                <h1 class="text-sm font-black uppercase text-blue-600">Apex Social</h1>
                <div id="status-tag" class="text-[9px] text-green-500 font-black italic">STATUS: 100% OK</div>
            </div>
        </div>
        <div class="text-right">
            <div id="main-eur" class="font-black text-green-600 text-lg">0.0000€</div>
            <div id="main-brl" class="text-[9px] font-black text-gray-400 italic">0.0000 BRL</div>
        </div>
    </header>

    <main id="view-social">
        <div class="sticky-publisher">
            <div class="google-card p-4 border-t-8 border-blue-600 shadow-md">
                <textarea id="post-input" placeholder="O QUE PRETENDE PARTILHAR? (+0.0150€)" class="w-full border-none text-[11px] font-black uppercase outline-none focus:ring-0 mb-3" rows="1"></textarea>
                <div class="flex gap-2">
                    <button onclick="publish()" class="bg-blue-600 text-white p-3 rounded-lg flex-1 font-black uppercase text-[10px]">Publicar Agora</button>
                </div>
            </div>
        </div>
        <div id="feed-container" class="max-w-lg mx-auto p-3 pt-4"></div>
    </main>

    <nav>
        <div class="text-[11px] font-black uppercase text-blue-600">Rede</div>
        <div class="text-[11px] font-black uppercase text-gray-400">Ganhos</div>
        <div class="text-[11px] font-black uppercase text-gray-400">Gestão</div>
    </nav>

    <script>
        const SB_URL = "https://fickstyevektwbgimapy.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpY2tzdHlldmVrdHdiZ2ltYXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkxNTgsImV4cCI6MjA4OTYxNTE1OH0.lx4kyyzXemOjndyB70QN2zVW_kGSsBEsaDOB3eqC9QY";
        const _sb = window.supabase.createClient(SB_URL, SB_KEY);
        const MASTER_ID = "5401881400";
        
        let userBalance = 0;
        let adCounter = 0;
        let bonusActive = true;

        async function init() {
            const { data } = await _sb.from('perfis').select('saldo').eq('id', MASTER_ID).single();
            if(data) userBalance = data.saldo;
            updateUI(); loadFeed();
        }

        function updateUI() {
            document.getElementById('main-eur').innerText = userBalance.toFixed(4) + "€";
            document.getElementById('main-brl').innerText = (userBalance * 6.1245).toFixed(4) + " BRL";
            document.getElementById('status-tag').innerText = bonusActive ? "STATUS: 100% OK" : "STATUS: 60% OK (BAIXO)";
            document.getElementById('status-tag').className = bonusActive ? "text-[9px] text-green-500 font-black italic" : "text-[9px] text-red-500 font-black italic";
        }

        async function earn(amount) {
            adCounter++;
            
            // Lógica de abertura do Modal à 2ª interação
            if(adCounter % 2 === 0) {
                document.getElementById('ad-modal').style.display = 'flex';
                return; // Bloqueia o ganho até decidir no modal
            }

            const finalAmount = bonusActive ? amount : amount * 0.6;
            userBalance += finalAmount;
            
            const el = document.getElementById('floating-earning');
            document.getElementById('earning-val').innerText = "+" + finalAmount.toFixed(4) + "€";
            el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800);
            
            updateUI();
            await _sb.from('perfis').update({ saldo: userBalance }).eq('id', MASTER_ID);
        }

        function closeAd(accept) {
            bonusActive = accept;
            document.getElementById('ad-modal').style.display = 'none';
            // Se aceitou, processa o ganho da interação que disparou o modal
            const mockAmount = 0.0005; 
            userBalance += bonusActive ? mockAmount : mockAmount * 0.6;
            updateUI();
        }

        async function loadFeed() {
            const { data: posts } = await _sb.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = "";

            posts?.forEach(p => {
                const card = document.createElement('div');
                card.className = "google-card shadow-sm p-4";
                card.innerHTML = `
                    <div class="text-[9px] font-black text-gray-300 mb-2 uppercase italic">Utilizador Master #101</div>
                    <p class="text-[13px] font-black uppercase text-gray-800 mb-4">${p.content || ''}</p>
                    <div class="flex border-t pt-2">
                        <div class="interaction-btn" onclick="earn(0.0002)">
                            <div class="counter-badge">4</div><span class="text-xl">👍</span><span class="text-[9px]">Gostar</span>
                        </div>
                        <div class="interaction-btn border-x" onclick="earn(0.0005)">
                            <div class="counter-badge">0</div><span class="text-xl">💬</span><span class="text-[9px]">Comentar</span>
                        </div>
                        <div class="interaction-btn" onclick="earn(0.0010)">
                            <div class="counter-badge">0</div><span class="text-xl">🔗</span><span class="text-[9px]">Partilhar</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function publish() {
            const txt = document.getElementById('post-input').value;
            if(!txt) return;
            const { error } = await _sb.from('posts').insert([{ user_id: MASTER_ID, content: txt }]);
            if(!error) {
                await earn(0.0150);
                window.location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
